# ---- Licensing & certification ---------------------------------------------
- id: q-wa-lic-003
  domainId: wa.licensing
  skillIds: [wa.lic.certificate-types]
  type: single
  difficulty: 2
  stem: "In Washington, which credential does an individual need to perform general electrical work as an employee of an electrical contractor?"
  options:
    - { id: a, text: "A certificate of competency (e.g., 01 general journeyman) or registered trainee status", isCorrect: true }
    - { id: b, text: "An electrical contractor license" }
    - { id: c, text: "A city business license only" }
    - { id: d, text: "No credential is required for employees" }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Individuals hold a certificate of competency (or work as supervised trainees); the business holds the contractor license."
    codePath: ["RCW 19.28.161"]
    steps:
      - { text: "Individuals doing electrical work must be certified or be supervised registered trainees.", ref: "RCW 19.28.161" }
  timeTargetSec: 45
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Research-verified 2026-07 vs RCW 19.28 / WAC 296-46B; final live pending human sign-off — confirm: confirm certificate-vs-license distinction in current RCW 19.28."

