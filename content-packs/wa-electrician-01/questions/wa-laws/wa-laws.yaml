  skillIds: [wa.lic.supervision-ratio]
  type: single
  difficulty: 2
  stem: "In Washington, a person performing electrical work generally must either hold the appropriate certificate of competency OR be doing so under what condition?"
  options:
    - { id: a, text: "Under the direct supervision of a properly certified electrician, as a registered trainee", isCorrect: true }
    - { id: b, text: "After passing a written safety quiz only" }
    - { id: c, text: "As long as a permit is displayed on site" }
    - { id: d, text: "Any homeowner may supervise the work" }
