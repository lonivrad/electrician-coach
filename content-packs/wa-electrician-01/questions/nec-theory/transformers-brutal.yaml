# ---- 450.3 (transformer) vs 240.21(C) (secondary conductors) scope split ------
- id: q-xfmr-x027
  domainId: nec.transformers
  skillIds: [nec.xfmr.secondary]
  type: single
  difficulty: 9
  stem: "A 45 kVA, 480 V Delta – 208Y/120 V transformer gets a 70 A primary breaker (54.1 A × 1.25 = 67.7 A, Note 1 → 70 A). The installer then runs 20 ft of secondary conductor to a main-lug-only panel and reasons: 'the 70 A primary breaker reflects to 70 × 480/208 = 161.5 A on the secondary, and my conductors are good for 175 A, so they're protected.' What is wrong?"
  options:
    - id: a
      text: "For a delta-wye transformer the primary device cannot protect the secondary conductors at all — line-to-neutral secondary faults do not reflect predictably — so the run must satisfy a 240.21(C) secondary-conductor rule and terminate in an overcurrent device"
      isCorrect: true
    - id: b
      text: "Only the arithmetic is wrong: the reflected limit is 70 × 208/480 = 30.3 A, so the conductors are undersized rather than protected"
      distractorRationale: "The ratio direction is a distraction — the disqualifier is upstream of any math. 240.21(C)(1) denies primary-device protection to 3-phase delta-wye secondaries entirely, because a single line-to-neutral secondary fault splits unevenly across primary phases."
    - id: c
      text: "Nothing — 240.21(C)(1) recognizes conductor protection by the primary device where the ampacity, multiplied by the ratio, is not exceeded, and 161.5 A is below the 175 A ampacity"
      distractorRationale: "That allowance is limited to a transformer with a 2-wire primary and 2-wire secondary (or 3-wire delta-delta) — configurations where primary and secondary currents track one-for-one. A 4-wire wye secondary is expressly outside it."
    - id: d
      text: "The only defect is length: reflected primary protection is valid up to 10 ft of secondary conductor, and this run is 20 ft"
      distractorRationale: "The 10 ft and 25 ft rules in 240.21(C) are separate allowances with their own conditions (including terminating in an OCPD) — they are not distance extensions of primary-device protection, which never applies to a delta-wye secondary regardless of length."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Two different protections, two different articles: the 70 A breaker satisfies 450.3(B) for the TRANSFORMER; the secondary conductors need their own 240.21(C) compliance, and the ratio argument is void for delta-wye."
    codePath: ["450.3(B) → transformer protection only", "240.21(C)(1) → ratio protection limited to 2-wire/2-wire and delta-delta 3-wire", "240.21(C)(6) → 25 ft rule, must terminate in a single OCPD"]
    steps:
      - { text: "450.3(B) sized the 70 A breaker to protect windings — it says nothing about conductor protection." }
      - { text: "240.21(C)(1) allows ratio-reflected protection only where secondary current maps one-to-one to primary current; a 4-wire wye secondary does not (an L-N fault divides across two primary lines)." }
      - { text: "A 20 ft run can comply via the 25 ft rule: ampacity per the rule's minimums and termination in a single set of overcurrent devices — an MLO panel with no main fails that condition.", ref: "240.21(C)(6)" }
  trapIds: [table-column-selection, unit-or-phase-confusion]
  timeTargetSec: 300
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-xfmr-x028
  domainId: nec.transformers
  skillIds: [nec.xfmr.secondary]
  type: single
  difficulty: 9
  stem: "Four transformer installations each propose running secondary conductors WITHOUT any overcurrent device at the secondary, relying on the primary breaker (sized per 450.3(B) and per the turns ratio for the conductors). Under 240.21(C)(1), which ONE can actually do this?"
  options:
    - id: a
      text: "A single-phase 480 V to 240 V transformer, 2-wire primary and 2-wire secondary, with the primary device not exceeding the secondary conductor ampacity times the secondary-to-primary voltage ratio"
      isCorrect: true
    - id: b
      text: "A 480 V Delta to 208Y/120 V transformer, because its primary breaker was sized at only 125% — the most conservative cell of Table 450.3(B)"
      distractorRationale: "How conservatively the 450.3(B) device was chosen is irrelevant — 240.21(C)(1) categorically excludes 4-wire wye secondaries, where a line-to-neutral fault does not reflect one-for-one to the primary device."
    - id: c
      text: "A 480 V to 208Y/120 V transformer, provided the secondary conductors are larger than the ratio-adjusted primary rating requires and the run is under 10 ft"
      distractorRationale: "Oversizing conductors and shortening the run points at the 10 ft rule, 240.21(C)(2) — but that rule has its own conditions and still involves the conductors landing on an OCPD or equipment with overcurrent protection; it is not primary-device protection under (C)(1)."
    - id: d
      text: "A single-phase 480 V to 120/240 V transformer with a 3-wire, center-tapped secondary, since each half of the winding is effectively 2-wire"
      distractorRationale: "The center tap is exactly what breaks the one-to-one current reflection: unbalanced neutral current on the two halves is invisible to the primary device. 240.21(C)(1) is limited to true 2-wire (and delta-delta 3-wire) secondaries."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Primary-device protection of secondary conductors exists only where every secondary overcurrent maps proportionally onto the primary: 2-wire to 2-wire (and 3-wire delta-delta) — never wye 4-wire or center-tapped secondaries."
    codePath: ["240.21(C)(1) → 2-wire/2-wire or delta-delta 3-wire only", "primary OCPD ≤ conductor ampacity × (Vsec/Vpri)"]
    steps:
      - { text: "The qualifying test is topology, not device sizing: can any secondary fault current be 'seen' proportionally by the primary device?" }
      - { text: "2-wire to 2-wire: yes — currents track by the turns ratio, so the primary device protects the secondary conductors when sized to the ratio." }
      - { text: "Wye 4-wire and center-tap 3-wire: no — L-N loads and faults unbalance the reflection, so those secondaries always need conductor protection under another 240.21(C) provision." }
  trapIds: [table-column-selection]
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."
