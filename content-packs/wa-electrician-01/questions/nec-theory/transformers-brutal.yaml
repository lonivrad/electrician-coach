      text: "Use the 167% cell: 90.2 × 1.67 = 150.6 A, then round up to 200 A since the secondary panel already has branch breakers"
      distractorRationale: "The 167% cell is for primary FLC between 2 A and 9 A — 90.2 A is far outside it. Branch breakers in the panel are not the 'secondary protection' of the table either; that must be a device protecting the secondary at ≤125%."
