# ---- Ceiling vs Note 1 adjudication and cell-flip reasoning (single-choice) ----
- id: q-xfmr-x023
  domainId: nec.transformers
  skillIds: [nec.xfmr.ocp-sizing]
  type: single
  difficulty: 10
  stem: "A 4.3 kVA, single-phase, 480 V-primary transformer (primary FLC = 4,300 ÷ 480 = 8.96 A) has primary-only protection. The foreman argues: '8.96 rounds to 9, so it's the 125% cell — 8.96 × 1.25 = 11.2 A, and Note 1 takes us to a 15 A fuse.' Which statement correctly adjudicates this?"
  options:
    - id: a
      text: "The band is set by the actual FLC, not a rounded value: 8.96 A is less than 9 A, so 167% applies as a hard ceiling of 14.96 A — a 15 A fuse is not permitted"
      isCorrect: true
    - id: b
      text: "The foreman is right: current values in Table 450.3(B) are applied to the nearest whole ampere, so 8.96 A is treated as 9 A and the 125% cell with Note 1 governs"
      distractorRationale: "No provision rounds an FLC to the nearest ampere before entering Table 450.3(B). The 167% band runs to LESS THAN 9 A, and 8.96 A satisfies it — the cell choice is made on the computed current."
    - id: c
      text: "Both paths land near 15 A anyway, so either a 14.96 A maximum or a 15 A fuse is acceptable — the difference is within normal fuse tolerance"
      distractorRationale: "14.96 A is a maximum the device RATING may not exceed; a 15 A rating exceeds it. 'Close' is not a code concept — the same logic would justify 15 A on a 13.9 A ceiling too."
    - id: d
      text: "Neither is right: at 8.96 A the transformer qualifies for the 300% cell, allowing a fuse up to 26.9 A"
      distractorRationale: "300% requires FLC LESS THAN 2 A. 8.96 A is deep in the 2 A-to-9 A band — this option misreads the table's smallest-current row as a general small-transformer allowance."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Table 450.3(B) bands are entered with the computed FLC as-is; 8.96 A < 9 A → 167% ceiling (14.96 A), and Note 1's round-up cannot rescue a 15 A fuse because it belongs to the 125% cell only."
    codePath: ["I = 4,300/480 = 8.96 A", "Table 450.3(B) → 2 A to <9 A: 167% max", "Note 1 scope → 125% cell only"]
    steps:
      - { text: "8.96 A is not 9 A. The 167% band is written as 'less than 9 amperes' — the boundary test uses the actual computed current." }
      - { text: "8.96 × 1.67 = 14.96 A maximum device value; a 15 A fuse exceeds it by rating, however slightly." }
      - { text: "Contrast: at 9.00 A FLC the answer genuinely becomes a 15 A fuse (11.25 A → Note 1). Four hundredths of an ampere flip the rounding rule." }
  trapIds: [next-size-up-rounding, table-column-selection]
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

