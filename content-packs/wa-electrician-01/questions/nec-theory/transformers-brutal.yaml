# Transformers (Article 450) — BRUTAL tier (difficulty 9–10). 2020 NEC. All DRAFT.
# 450.3(B) cell flips at exactly 2 A / 9 A FLC, 167%/300% ceilings vs Note 1 round-up in one stem,
# dual-winding four-combo distractors, delta-wye √3 placement, and 450.3 vs 240.21(C) scope splits.

# ---- Table 450.3(B) current-band boundaries: exactly 2 A, just under 2 A ------
- id: q-xfmr-x001
  recompute: { calc: transformerPrimaryMaxOCP, inputs: { kva: 0.96, volts: 480, phase: 1 } }
  domainId: nec.transformers
  commonMistake: "If you got 6.00 A you used the 300% cell — but 960 ÷ 480 = 2.00 A EXACTLY, and the 300% cell requires FLC LESS THAN 2 A. At exactly 2 A the 167% band governs. If you got 2.50 A you ran 125%, which needs FLC of 9 A or more."
  skillIds: [nec.xfmr.ocp-sizing]
  type: numeric
  difficulty: 10
  stem: "A 960 VA, single-phase control transformer (480 V primary, 120 V secondary, nameplate impedance 4.2%, temperature rise 115°C) is protected on the primary only inside a listed industrial control panel. The panel schedule also lists the secondary current as 8.0 A — the panel builder wants a fuse chosen from Table 450.3(B). What is the MAXIMUM primary fuse ampere value permitted?"
  answer: { kind: numeric, value: 3.34, unit: "A", tolerance: 0.1 }
  solution:
    keyIdea: "960 ÷ 480 lands EXACTLY on the 2 A breakpoint — 'less than 2 A' is not satisfied, so the 167% cell (not 300%) governs, and its product is a hard ceiling."
    codePath: ["I = 960/480 = 2.00 A", "Table 450.3(B) → 2 A to <9 A: 167% max", "no Note 1 round-up outside the 125% cell"]
    steps:
      - { text: "Primary FLC = 960 ÷ 480 = 2.00 A. The impedance, temp rise, and the 8.0 A secondary figure are surplus data.", ref: "450.3(B)" }
      - { text: "The 300% cell reads 'less than 2 amperes.' 2.00 A is NOT less than 2 A, so the 2 A-to-9 A band applies.", ref: "Table 450.3(B)" }
      - { text: "2.00 × 1.67 = 3.34 A maximum. This is a ceiling — no note permits rounding up to a larger fuse." }
  trapIds: [table-column-selection, next-size-up-rounding]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

