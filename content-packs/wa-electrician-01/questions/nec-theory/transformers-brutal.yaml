# ---- Protection strategy selection: 450.3(B) both-columns reasoning -----------
- id: q-xfmr-x025
  domainId: nec.transformers
  skillIds: [nec.xfmr.ocp-sizing]
  type: single
  difficulty: 9
  stem: "A 112.5 kVA, three-phase, 480 V – 208Y/120 V transformer (primary FLC 135.3 A, secondary FLC 312.3 A) keeps nuisance-tripping its 175 A primary-only breaker on energization. The engineer wants a 350 A primary breaker 'for inrush.' Under Table 450.3(B), which assessment is correct?"
  options:
    - id: a
      text: "350 A is not permitted under any row: even WITH compliant secondary protection the primary ceiling is 250% × 135.3 = 338.3 A, and that value does not round up — the largest standard primary breaker is 300 A, paired with a secondary device at not more than 125% of 312.3 A"
      isCorrect: true
    - id: b
      text: "350 A is fine once a secondary main is added: 338.3 A is not a standard rating, so Note 1 permits the next size up"
      distractorRationale: "Note 1's next-size-up allowance is written into the 125% cells. The 250% figure in the primary-and-secondary row is a maximum — a ceiling that may only be rounded DOWN to 300 A."
    - id: c
      text: "350 A is fine with primary-only protection: 135.3 × 1.25 = 169.2 A, and Note 1 allows rounding up to any standard size that solves the inrush problem"
      distractorRationale: "Note 1 permits ONE step up from the calculated value — 169.2 A rounds to 175 A, not to any convenient larger rating. 350 A is double the primary-only allowance."
    - id: d
      text: "350 A is fine because the breaker also sees the 312.3 A secondary current reflected through the transformer, making its effective rating adequate"
      distractorRationale: "Reflected current is already what the primary carries — 312.3 A at 208 V IS 135.3 A at 480 V. Table 450.3(B) limits are applied to the primary FLC directly; there is no 'effective rating' adjustment."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Moving to the primary-and-secondary row buys headroom (125% → 250%), but 250% is a ceiling: 338.3 A caps the primary at a 300 A standard breaker, never 350 A."
