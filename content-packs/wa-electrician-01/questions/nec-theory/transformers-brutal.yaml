  options:
    - id: a
      text: "Provide a secondary overcurrent device at not more than 125% of 208.2 A — with that in place, the primary limit becomes 250% × 90.2 = 225.5 A, and the 200 A breaker complies"
      isCorrect: true
    - id: b
      text: "Nothing is needed: 200 A does not exceed 250% of 90.2 A, and the 250% figure is the general primary limit for transformers 1,000 V and less"
      distractorRationale: "250% is available ONLY in the primary-and-secondary row. With no secondary device the primary-only limit applies: 90.2 × 1.25 = 112.8 → 125 A max via Note 1, and 200 A fails."
    - id: c
      text: "Apply Note 1 to the primary-only row: 90.2 × 1.25 = 112.8 A, which is not standard, so the next standard size the installer has available — 200 A — is permitted"
