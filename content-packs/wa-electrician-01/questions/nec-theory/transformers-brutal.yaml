      - { text: "Switch rows: with a secondary main at ≤ 260.2 A (e.g., 250 A), the primary may be up to 225.5 A." }
      - { text: "200 A ≤ 225.5 A → compliant. The design change happens on the SECONDARY to fix a PRIMARY protection problem — the table's two columns work together." }
