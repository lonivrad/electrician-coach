  options:
    - { id: a, text: "Not compliant — the 25-ft rule's other conditions are met (155 A ≥ 450 ÷ 3 = 150 A), but the tap must terminate in a single circuit breaker or single set of fuses", isCorrect: true }
    - { id: b, text: "Compliant — 155 A exceeds the 150 A one-third floor and the combined 180 A of breakers is irrelevant to the tap rule", distractorRationale: "The termination condition is part of 240.21(B)(2) itself: a single OCPD rated no more than the tap ampacity. Splitting into two devices fails the rule even with ampacity to spare." }
