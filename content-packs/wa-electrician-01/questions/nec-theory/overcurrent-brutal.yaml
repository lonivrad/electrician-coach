    - { id: d, text: "Not compliant — the tap conductors need a 450 A ampacity to match the feeder device", distractorRationale: "Full feeder ampacity is never the tap requirement; the 25-ft rule sets the floor at 1/3 of the device (150 A), which these conductors meet." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Run the whole 240.21(B)(2) checklist — length, 1/3 ampacity, physical protection, AND single-OCPD termination; this tap fails only the last item."
    codePath: ["240.21(B)(2) → 450 ÷ 3 = 150 A ≤ 155 A", "240.21(B)(2) → single OCPD ≤ tap ampacity — two 90 A devices fail"]
    steps:
      - { text: "Length 18 ft ≤ 25 ft; ampacity 155 A ≥ 150 A; physically protected — three conditions pass.", ref: "240.21(B)(2)" }
      - { text: "The tap terminates in TWO overcurrent devices — 240.21(B)(2) requires a SINGLE breaker or set of fuses rated ≤ 155 A.", ref: "240.21(B)(2)" }
      - { text: "Fix: land the tap on one OCPD (e.g., a single 150 A device) and distribute downstream of it." }
