- id: q-ocp-x026
  domainId: nec.overcurrent
  commonMistake: "Work the minimum from the load (125% continuous → standard size) and the maximum from 240.4(D) — here they meet at exactly 30 A, leaving precisely one legal breaker."
  skillIds: [nec.ocp.small-conductor, nec.ocp.standard-ratings]
  type: single
  difficulty: 9
  stem: "A 10 AWG THHN/THWN-2 copper circuit (75°C terminations, 35 A cell; 30°C ambient; 3 CCC) supplies a 22 A CONTINUOUS process heater. Which breaker selection is correct?"
  options:
    - { id: a, text: "30 A — the computed minimum is 22 × 1.25 = 27.5 A → 30 A standard, which exactly equals the 240.4(D) ceiling for 10 AWG copper", isCorrect: true }
    - { id: b, text: "25 A — round 27.5 A down to stay conservative", distractorRationale: "A device below the 210.20(A) computed minimum (27.5 A) is undersized for the continuous load — 'conservative' on the device is a violation on the load side." }
    - { id: c, text: "35 A — the conductor's 75°C ampacity is 35 A, so a 35 A breaker matches it", distractorRationale: "240.4(D) caps the device for 10 AWG copper at 30 A even though the conductor's table ampacity is 35 A — the cap, not the ampacity, is the ceiling." }
    - { id: d, text: "The circuit cannot be built with 10 AWG — no standard rating satisfies both limits", distractorRationale: "The window is one device wide but not empty: 30 A is ≥ the 27.5 A minimum and ≤ the 30 A cap, and the 35 A conductor ampacity covers the 27.5 A requirement." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Minimum (27.5 → 30 A standard) and maximum (240.4(D) 30 A) coincide — 30 A is the only compliant device."
    codePath: ["210.20(A) → 22 × 1.25 = 27.5 A", "240.6(A) → 30 A", "240.4(D) → 30 A cap for 10 Cu", "Table 310.16 → 35 A @75°C ≥ 27.5 A"]
    steps:
      - { text: "Minimum device: 22 × 1.25 = 27.5 A → next standard rating 30 A.", ref: "210.20(A)" }
      - { text: "Maximum device: 240.4(D) caps 10 AWG copper at 30 A → the two limits meet exactly.", ref: "240.4(D)" }
      - { text: "Conductor check: 35 A (75°C) ≥ 27.5 A required — compliant at 30 A.", ref: "210.19(A)" }
  trapIds: [continuous-load-125, next-size-up-rounding]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-ocp-x027
  domainId: nec.overcurrent
  commonMistake: "Meeting the 1/3 ampacity floor does NOT stretch the length limit — past 25 ft (outside the special higher-length allowances), the conductors simply are not tap conductors and need OCPD at the point they receive their supply."
  skillIds: [nec.ocp.tap-rules]
  type: single
  difficulty: 10
  stem: "A 28-ft run is proposed from a feeder protected at 300 A to a fused switch. The conductors would have a 120 A allowable ampacity (≥ 300 ÷ 3 = 100 A), run in RMC protected from damage, and terminate in a single 110 A fused switch; the calculated load is 95 A. Which statement is correct?"
  options:
    - { id: a, text: "Not permitted as a tap — at 28 ft it exceeds the 25-ft rule, so the conductors must be protected by an OCPD at the point they receive their supply (or the layout shortened to qualify)", isCorrect: true }
    - { id: b, text: "Permitted — every substantive 25-ft-rule condition (1/3 ampacity, physical protection, single OCPD) is satisfied, and 3 ft of excess length is de minimis", distractorRationale: "There is no de-minimis allowance: 240.21(B)(2) applies only to taps not over 25 ft. At 28 ft the rule is unavailable no matter how well the other conditions are met." }
    - { id: c, text: "Permitted under the 10-ft rule — the ampacity far exceeds 1/10 of 300 A (30 A)", distractorRationale: "The 10-ft rule is even further out of reach — this run is nearly three times its length limit; the 1/10 floor never comes into play." }
    - { id: d, text: "Permitted if the conductors are upsized so their ampacity equals the full 300 A feeder protection", distractorRationale: "Conductors with ampacity ≥ the feeder device are simply protected conductors — but then this is no longer a 'tap' question, and the option misstates it as a tap-rule cure; the stated fix in the rule structure is OCPD at the supply point." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Length is the gatekeeper condition: beyond 25 ft, the general rule of 240.21 reasserts itself — protection at the point of supply."
    codePath: ["240.21 → conductors protected at their supply point unless a tap rule applies", "240.21(B)(2) → limited to 25 ft; 28 ft fails"]
    steps:
      - { text: "Check the 25-ft rule first: ampacity (120 ≥ 100), protection, and single-OCPD termination all pass — but 28 ft > 25 ft.", ref: "240.21(B)(2)" }
      - { text: "No qualifying tap rule → the base rule of 240.21 applies: overcurrent protection where the conductors receive their supply.", ref: "240.21" }
      - { text: "Cures: add an OCPD at the feeder connection, or redesign so the tap length is within a rule that fits." }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-ocp-x028
  domainId: nec.overcurrent
  commonMistake: "Above 800 A the device rounds DOWN to the ampacity, but it must still clear the 125%-continuous minimum from below — check both directions before signing off."
  skillIds: [nec.ocp.standard-ratings, nec.ocp.next-size-up]
  type: single
  difficulty: 9
  stem: "A switchboard feeder carries 240 A of continuous load and 420 A of noncontinuous load (computed minimum: 240 × 1.25 + 420 = 720 A). The parallel conductors have a combined allowable ampacity of 840 A. What is the maximum standard device rating permitted?"
  options:
    - { id: a, text: "800 A", isCorrect: true }
    - { id: b, text: "1000 A", distractorRationale: "1000 A is the next standard rating above 840 A — but the 240.4(B) allowance stops at 800 A devices, and 240.4(C) requires ampacity ≥ rating above that." }
    - { id: c, text: "840 A", distractorRationale: "840 A is the conductor ampacity, not a standard 240.6(A) rating — devices come from the standard list." }
    - { id: d, text: "700 A", distractorRationale: "An unneeded extra round-down: 800 A is standard, does not exceed the 840 A ampacity, and clears the 720 A minimum — nothing pushes the device to 700 A." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "The window is 720 A (minimum) to 840 A (ampacity); the largest standard rating inside it is 800 A — next-size-up to 1000 A is barred."
    codePath: ["215.3 → 720 A minimum", "240.4(B)/(C) → no round-up past 800 A", "240.6(A) → 800 A ≤ 840 A"]
    steps:
      - { text: "Minimum: 240 × 1.25 + 420 = 720 A.", ref: "215.3" }
      - { text: "Next standard above 840 A is 1000 A — a device over 800 A must have ampacity ≥ its rating, which 840 A cannot provide.", ref: "240.4(C)" }
      - { text: "Largest standard rating ≤ 840 A is 800 A; it also exceeds the 720 A minimum → 800 A.", ref: "240.6(A)" }
  trapIds: [continuous-load-125, next-size-up-rounding]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-ocp-x029
  domainId: nec.overcurrent
  commonMistake: "This asks for the MAXIMUM: derate → cap → confirm 240.4(B) → next size up from 135.72 A. The 125% continuous math (125 A) sets the separate MINIMUM — mixing the two directions is the trap."
  skillIds: [nec.ocp.next-size-up, nec.ocp.standard-ratings]
  type: single
  difficulty: 10
  stem: "A 2/0 THHN/THWN-2 copper feeder shares a raceway with 4 current-carrying conductors through a 45°C penthouse; terminations are 75°C (175 A cell). Its corrected and adjusted ampacity computes to 195 × 0.87 × 0.80 = 135.72 A. It serves a 100 A continuous load (no noncontinuous portion, no receptacle outlets). What is the MAXIMUM standard OCPD rating permitted for this feeder?"
  options:
    - { id: a, text: "150 A", isCorrect: true }
    - { id: b, text: "125 A", distractorRationale: "125 A is the MINIMUM device (100 × 1.25 = 125 A, itself a standard rating) — the question asks how large the device may go while the 135.72 A conductors remain protected." }
    - { id: c, text: "175 A", distractorRationale: "This protects at the 75°C termination cell — but the derated 135.72 A, being lower, is the conductor's real ampacity, and 175 A far exceeds the 150 A next-size-up ceiling." }
    - { id: d, text: "135 A", distractorRationale: "135 A is not a 240.6(A) standard rating — the list runs 125, 150; with 240.4(B) available, the device may be 150 A." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Maximum = next standard rating above the final derated ampacity (240.4(B) conditions all hold); the continuous-load 125% governs only the floor."
    codePath: ["310.15 → 135.72 A", "215.3 → minimum 125 A", "240.4(B) → conditions met", "240.6(A) → 150 A"]
    steps:
      - { text: "Final ampacity: 195 × 0.87 (45°C) × 0.80 (4 CCC) = 135.72 A < 175 A termination cap.", ref: "310.15" }
      - { text: "Load check: 100 A ≤ 135.72 A; conductor also meets the 125 A continuous requirement (135.72 ≥ 125).", ref: "215.3" }
      - { text: "Fixed load, no receptacles, 135.72 A not standard, ≤ 800 A → 240.4(B) permits the next size up: 150 A.", ref: "240.4(B)" }
  trapIds: [continuous-load-125, next-size-up-rounding, adjusted-vs-corrected-ampacity]
  timeTargetSec: 300
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-ocp-x030
  domainId: nec.overcurrent
  commonMistake: "Heavy bundling can drop a small conductor's ampacity to EXACTLY a standard rating — and 240.4(B) requires the ampacity NOT to correspond to a standard rating, so the round-up door closes at 20 A even before 240.4(D) is consulted."
  skillIds: [nec.ocp.small-conductor, nec.ocp.next-size-up]
  type: single
  difficulty: 10
  stem: "Twelve current-carrying 10 AWG THHN/THWN-2 copper conductors are bundled through one raceway in a 30°C space (no ambient correction); terminations are 75°C (35 A cell). Each circuit feeds a fixed 16 A noncontinuous load. The adjusted ampacity is 40 × 0.50 = 20 A exactly. What is the maximum standard breaker permitted per circuit?"
  options:
    - { id: a, text: "20 A", isCorrect: true }
    - { id: b, text: "25 A", distractorRationale: "This applies 240.4(B) next-size-up — but the allowance exists only when the ampacity does NOT correspond to a standard rating, and 20 A is exactly standard; a 25 A device would protect the conductor above its ampacity." }
    - { id: c, text: "30 A", distractorRationale: "This quotes the 240.4(D) cap for 10 AWG copper — the cap is a CEILING, and here the 20 A adjusted ampacity sits below it and governs instead." }
    - { id: d, text: "35 A", distractorRationale: "This is the 75°C termination cell with the 12-conductor bundling adjustment (0.50) ignored entirely." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "40 × 0.50 lands EXACTLY on 20 A — a standard rating — so no round-up exists; the 30 A small-conductor cap never becomes the binding limit."
    codePath: ["Table 310.15(C)(1) → 12 CCC = 0.50", "40 × 0.50 = 20 A", "240.4(B) → unavailable (exact standard match)", "240.4(D) → 30 A ceiling, not binding"]
    steps:
      - { text: "Adjusted ampacity: 40 (90°C cell) × 0.50 (10–20 CCC band) = 20 A; the 16 A load fits.", ref: "Table 310.15(C)(1)" }
      - { text: "20 A corresponds to a standard rating → 240.4(B)'s round-up condition fails; the device may not exceed 20 A.", ref: "240.4(B)" }
      - { text: "The 240.4(D) 30 A cap sits above the governing 20 A ampacity — a decoy in this direction.", ref: "240.4(D)" }
  trapIds: [next-size-up-rounding, adjusted-vs-corrected-ampacity, termination-temp-limit]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
