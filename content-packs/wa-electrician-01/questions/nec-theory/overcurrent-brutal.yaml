- id: q-ocp-x017
  domainId: nec.overcurrent
  commonMistake: "Walk BOTH tap checklists before declaring a winner: length kicks this tap out of the 10-ft rule, and the 1/3 ampacity floor kicks it out of the 25-ft rule — failing either list's one condition fails the whole allowance."
  skillIds: [nec.ocp.tap-rules]
  type: single
  difficulty: 10
  stem: "A 12-ft field-installed tap is made from a feeder protected by a 600 A breaker. The tap conductors have a 150 A allowable ampacity, are protected from physical damage in EMT, and terminate in a single 150 A breaker in a panelboard. The calculated load is 120 A. Which statement is correct?"
  options:
    - { id: a, text: "Not compliant — at 12 ft the 10-ft rule is unavailable, and under the 25-ft rule the conductors must have an ampacity of at least 200 A (1/3 of 600 A)", isCorrect: true }
    - { id: b, text: "Compliant under the 10-ft rule — 150 A exceeds 1/10 of 600 A (60 A) and the tap terminates in a single OCPD", distractorRationale: "Every 240.21(B)(1) condition list starts with LENGTH: this tap is 12 ft, so the 10-ft rule cannot be used no matter how well the other conditions are met." }
    - { id: c, text: "Compliant under the 25-ft rule — the tap carries the 120 A load, is protected from damage, and ends in a single OCPD not exceeding its ampacity", distractorRationale: "Three of the four 240.21(B)(2) conditions pass, but the ampacity floor fails: 600 ÷ 3 = 200 A, and 150 A falls short — carrying the load is necessary but not sufficient." }
    - { id: d, text: "Compliant — 240.4(B) permits rounding the 150 A conductors up to the 200 A requirement since 150 A is a standard rating anyway", distractorRationale: "240.21 expressly withholds the 240.4(B) next-size-up allowance from tap conductors; the 1/3 floor must be met by actual ampacity, not by rounding." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "The tap fails BOTH rules for different reasons: 12 ft > 10 ft (rule 1) and 150 A < 200 A (rule 2) — the fix is larger tap conductors."
    codePath: ["240.21(B)(1) → length ≤ 10 ft fails", "240.21(B)(2) → 1/3 × 600 = 200 A > 150 A fails", "240.21 → no 240.4(B) for taps"]
    steps:
      - { text: "10-ft rule: 12 ft exceeds the length limit — disqualified regardless of ampacity.", ref: "240.21(B)(1)" }
      - { text: "25-ft rule: requires ampacity ≥ 600 ÷ 3 = 200 A; the 150 A conductors fail this single condition.", ref: "240.21(B)(2)" }
      - { text: "Next-size-up cannot bridge the gap — 240.21 bars 240.4(B) for tap conductors; upsize to ≥ 200 A.", ref: "240.21" }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

