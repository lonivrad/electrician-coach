  type: numeric
  difficulty: 10
  stem: "The 4/0 THHN/THWN-2 copper feeder above finishes the derating chain at 189.28 A (75°C terminations, 230 A cap not binding). It supplies a fixed 182 A noncontinuous mechanical load — no receptacle outlets anywhere on the feeder. The panel schedule offers 175 A, 200 A, and 225 A breakers. What is the maximum standard OCPD rating (A) permitted to protect these conductors?"
  answer: { kind: numeric, value: 200, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "When the final derated ampacity falls between standard ratings and every 240.4(B) condition holds, the device may round UP — the crux is confirming the conditions, not the arithmetic."
    codePath: ["310.15 → 189.28 A", "240.4(B)(1)-(3) → no receptacles, no standard match, ≤ 800 A", "240.6(A) → 200 A"]
    steps:
      - { text: "Load check: 182 A ≤ 189.28 A ampacity — the conductor carries the load.", ref: "210.19(A)" }
      - { text: "240.4(B): not a multioutlet receptacle circuit; 189.28 A matches no standard rating; result will not exceed 800 A — all three conditions met.", ref: "240.4(B)" }
      - { text: "Next standard rating above 189.28 A is 200 A.", ref: "240.6(A)" }
      - { text: "225 A would exceed the next-size-up allowance; 175 A is an unneeded round-down." }
  trapIds: [next-size-up-rounding, termination-temp-limit]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live. Chain partner of q-ocp-x001."

# ---- Exact standard-rating landings (no round-up available) -------------------
- id: q-ocp-x003
  recompute: { calc: ocpdMixedLoad, inputs: { continuous: 68, noncontinuous: 40, standardize: 1 } }
  domainId: nec.overcurrent
  commonMistake: "If you got 150, you reflexively jumped a size after landing on 125 — when the 125%/100% sum IS a standard rating, that rating is the minimum; if you got 110, you summed 68 + 40 = 108 without the 125% factor."
  skillIds: [nec.ocp.standard-ratings]
  type: numeric
  difficulty: 9
  stem: "A strip-mall feeder serves 68 A of parking-lot and signage lighting that operates dusk-to-dawn (continuous) plus 40 A of noncontinuous receptacle and equipment load. The conductors are 1/0 THHN copper at 75°C (150 A — comfortably adequate) and the run passes through a 30°C ceiling with only 3 current-carrying conductors, so no derating applies. Per 215.3 and 240.6(A), what minimum standard OCPD rating (A) is required?"
  answer: { kind: numeric, value: 125, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "68 × 1.25 + 40 lands EXACTLY on 125 A — a standard rating — so there is no next-size-up step; the extra ampacity and derating facts are decoys."
    codePath: ["215.3 → 68 × 1.25 + 40 = 125 A", "240.6(A) → 125 A is standard"]
    steps:
      - { text: "Continuous portion: 68 × 1.25 = 85 A; add noncontinuous 40 A → 125 A.", ref: "215.3" }
      - { text: "125 A appears in the 240.6(A) list, so the computed minimum IS the device rating — the chain ends.", ref: "240.6(A)" }
      - { text: "The 150 A conductor ampacity sets the MAXIMUM device, not the minimum — it is surplus data for this ask." }
  trapIds: [continuous-load-125, next-size-up-rounding]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

