# Overcurrent protection (Article 240 / 210.20 / 215.3 / 240.21) — BRUTAL tier (difficulty 9–10). 2020 NEC. DRAFT.
# Full derate→termination→load-check→240.4(B)/(C)/(D) chains, exact standard-rating landings, >800 A round-down, and dual-rule tap adjudication.

# ---- Full chain: derate → termination cap → 240.4(B) -------------------------
- id: q-ocp-x001
  recompute: { calc: ampacityDerating, inputs: { size: "4/0", tempColumn: 90, ambientC: 40, ccc: 4, terminationColumn: 75 } }
  domainId: nec.overcurrent
  commonMistake: "If you got 230, you jumped to the 75°C termination value with no derating; if you got 236.6, you corrected for ambient but skipped the 4-conductor adjustment; if you got 209.3 you derated the 75°C cell instead of the 90°C insulation value."
  skillIds: [nec.ocp.next-size-up]
  type: numeric
  difficulty: 9
  stem: "A feeder to a rooftop unit uses 4/0 THHN/THWN-2 copper. The raceway carries 4 current-carrying conductors (plus a full-size EGC that does not count) through a 40°C mezzanine; the unit nameplate says MCA 182 A / MOCP 225 A, and the breaker and lugs are marked 75°C. Ignoring the nameplate for now, what final allowable ampacity (A) does each 4/0 conductor bring to the OCPD-selection step?"
  answer: { kind: numeric, value: 189.28, unit: "A", tolerance: 1.0 }
  solution:
    keyIdea: "Derate from the 90°C insulation column, then cap at the 75°C termination value — here the derated number is lower, so it governs."
    codePath: ["Table 310.16 → 4/0 Cu @90°C = 260 A", "Table 310.15(B)(1) → 40°C @90°C col = 0.91", "Table 310.15(C)(1) → 4 CCC = 0.80", "110.14(C) → 75°C cap 230 A (not binding)"]
    steps:
      - { text: "4/0 Cu at 90°C = 260 A — the derating basis; the EGC is not a current-carrying conductor.", ref: "Table 310.16" }
      - { text: "40°C ambient → 0.91; 4 CCC → 0.80: 260 × 0.91 × 0.80 = 189.28 A.", ref: "310.15" }
      - { text: "75°C termination value is 230 A; 189.28 < 230, so the derated value governs.", ref: "110.14(C)" }
      - { text: "The nameplate MCA/MOCP are decoys at this step — the conductor ampacity is a property of the installation." }
  trapIds: [adjusted-vs-corrected-ampacity, termination-temp-limit, table-column-selection]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-ocp-x002
  recompute: { calc: nextStandardSize, inputs: { value: 189.28 } }
