    - { id: c, text: "2 AWG", distractorRationale: "2 AWG reads the table for a single 300 kcmil conductor. Parallel sets are summed: 600 kcmil equivalent." }
    - { id: d, text: "1/0 AWG per Table 250.122 for the 800 A main", distractorRationale: "Table 250.122 sizes load-side EGCs by OCPD. The GEC follows the service-conductor equivalent area in Table 250.66 — the 800 A main is a decoy." }
