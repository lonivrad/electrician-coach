      - { text: "Ratio = 211,600 ÷ 52,620 = 4.0217.", ref: "Chapter 9, Table 8" }
      - { text: "Required area = 16,510 × 4.0217 ≈ 66,398 cmil > 66,360 (2 AWG) → 1 AWG (83,690 cmil) is the minimum.", ref: "250.122(B)" }
  trapIds: [table-column-selection, unit-or-phase-confusion]
