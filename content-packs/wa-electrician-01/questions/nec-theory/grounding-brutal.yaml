    - { id: d, text: "2 AWG", distractorRationale: "This protects at the un-derated 75°C table value (230 A → 250 A device → still ≤300 A row anyway); 2 AWG is the ≤500 A row — two rows past the 225 A device." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Finish the whole protection chain first: derate → termination check → 240.4(B) next-size-up → THEN Table 250.122 with the installed device, not the ampacity."
    codePath: ["Table 310.16 → 4/0 Cu @90°C = 260 A", "Table 310.15(C)(1) → 4 CCC = 0.80 → 208 A", "240.4(B)/240.6(A) → 225 A", "Table 250.122 → over 200 A, ≤300 A → 4 AWG Cu"]
    steps:
      - { text: "Adjusted ampacity: 260 × 0.80 = 208 A; the 75°C cap (230 A) is not binding.", ref: "310.15" }
      - { text: "240.4(B): no receptacles, 208 A matches no standard rating, result ≤ 800 A — next standard size up is 225 A.", ref: "240.4(B)" }
      - { text: "225 A exceeds the 200 A row → ≤300 A row → 4 AWG copper EGC.", ref: "Table 250.122" }
