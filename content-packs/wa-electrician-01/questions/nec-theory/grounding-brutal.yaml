      - { text: "Each raceway of the parallel run gets its own wire EGC sized from the full 350 A device.", ref: "250.122(F)" }
      - { text: "350 A is over 300 A → ≤400 A row → 3 AWG copper in each raceway.", ref: "Table 250.122" }
