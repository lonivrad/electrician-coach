# ---- EGC via a fully derived OCPD (load → 215.3/240.4(B) → 240.6 → 250.122) --
- id: q-gnd-x001
  recompute: { calc: egcSize, inputs: { ocpd: 110 } }
  domainId: nec.grounding-bonding
  commonMistake: "If you got 8 AWG, you skipped the 125% continuous factor (88 A → 90 A device, ≤100 A row). The required device is 76 × 1.25 + 12 = 107 A → 110 A standard, which is over the 100 A row."
  skillIds: [nec.gnd.egc-sizing]
  type: single
  difficulty: 9
  stem: "A 208Y/120 V feeder serves 76 A of continuous parking-garage lighting plus 12 A of noncontinuous exhaust-fan load. The conductors are 2 AWG THWN copper (115 A at 75°C — adequate), run at 30°C with only 3 current-carrying conductors, so no derating applies. The OCPD is the minimum standard rating per 215.3 and 240.6(A). What is the minimum copper equipment grounding conductor per Table 250.122?"
  options:
    - { id: a, text: "8 AWG", distractorRationale: "This sizes the device from the raw 88 A load (→ 90 A, ≤100 A row). The 125% continuous factor pushes the minimum device to 76 × 1.25 + 12 = 107 A → 110 A, past the 100 A row." }
    - { id: b, text: "6 AWG", isCorrect: true }
    - { id: c, text: "10 AWG", distractorRationale: "10 AWG is the ≤60 A row — this reads Table 250.122 with a number nowhere in this problem." }
    - { id: d, text: "4 AWG", distractorRationale: "4 AWG applies only above 200 A. Applying 125% to the noncontinuous load too (88 × 1.25 = 110) happens to land on the same device, but 4 AWG skips a row regardless." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "The EGC is keyed to the device you must install: 125% of continuous + 100% of noncontinuous → standard rating → Table 250.122. The conductor ampacity and ambient facts are surplus."
    codePath: ["215.3 → 76 × 1.25 + 12 = 107 A", "240.6(A) → 110 A standard", "Table 250.122 → over 100 A, ≤200 A → 6 AWG Cu"]
    steps:
      - { text: "Minimum OCPD = 76 A × 1.25 + 12 A = 107 A.", ref: "215.3" }
      - { text: "Next standard rating ≥ 107 A is 110 A.", ref: "240.6(A)" }
      - { text: "110 A is over the 100 A row → ≤200 A row → 6 AWG copper EGC. The 115 A conductor ampacity never enters Table 250.122.", ref: "Table 250.122" }
  trapIds: [continuous-load-125, next-size-up-rounding, table-column-selection]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

