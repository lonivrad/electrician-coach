- id: q-gnd-x006
  domainId: nec.grounding-bonding
  commonMistake: "If you got 10 AWG, you stopped at Table 250.122 — 250.122(A) caps the EGC at the ungrounded-conductor size, which matters when 430.52 lets the branch device far exceed the conductor ampacity."
  skillIds: [nec.gnd.egc-sizing]
  type: single
  difficulty: 10
  stem: "A 3 hp, 230 V, three-phase motor (Table 430.250 FLC 9.6 A; nameplate 9.0 A) has branch conductors sized per 430.22 (9.6 × 1.25 = 12 A → 14 AWG THHN copper). The inverse-time breaker is set at the 430.52 maximum: 9.6 × 2.5 = 24 A → 25 A standard. Table 250.122 lists 10 AWG for a 25 A device. What copper equipment grounding conductor is actually required?"
  options:
    - { id: a, text: "14 AWG — the EGC is never required to be larger than the circuit's ungrounded conductors.", isCorrect: true }
    - { id: b, text: "10 AWG — Table 250.122 controls by the 25 A device rating.", distractorRationale: "The table read is right, but 250.122(A) caps the requirement at the ungrounded-conductor size (14 AWG). Motor circuits with 430.52-oversized devices are exactly where the cap bites." }
    - { id: c, text: "12 AWG — size from the 12 A computed conductor load rounded to a 20 A row.", distractorRationale: "There is no load-based row in Table 250.122, and no averaging rule — the cap in 250.122(A) sets 14 AWG." }
    - { id: d, text: "10 AWG — because the overload relay, not the breaker, is 25 A here.", distractorRationale: "The overload (430.32, from the 9.0 A nameplate) protects the motor, not the circuit; and regardless of which device you key on, 250.122(A) still caps the EGC at 14 AWG." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Chain: 430.250 FLC → 430.52 device (24 → 25 A) → Table 250.122 (10 AWG) → 250.122(A) cap at the 14 AWG ungrounded size. The last step reverses the table."
    codePath: ["Table 430.250 → 9.6 A", "430.52 → 9.6 × 2.5 = 24 A → 25 A", "Table 250.122 → 25 A → 10 AWG", "250.122(A) → capped at 14 AWG"]
    steps:
      - { text: "Branch device: 9.6 A × 250% = 24 A → next standard 25 A inverse-time breaker.", ref: "430.52 / 240.6(A)" }
      - { text: "Table 250.122 at 25 A reads 10 AWG.", ref: "Table 250.122" }
      - { text: "But the EGC is not required to be larger than the 14 AWG ungrounded conductors — 14 AWG copper governs.", ref: "250.122(A)" }
  trapIds: [table-column-selection, next-size-up-rounding]
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; 250.122(A) cap not modeled by egcSize calculator — keyed manually; SME-verify before live."

