- id: q-gnd-x024
  domainId: nec.grounding-bonding
  commonMistake: "If you kept 6 AWG, you applied only Table 250.122 and skipped the 250.122(B) upsize; if you chose 3 AWG, you stopped one size short of the 54,732 cmil requirement."
  skillIds: [nec.gnd.egc-sizing]
  type: single
  difficulty: 9
  stem: "A 200 A feeder was designed at the ampacity minimum, 3/0 copper (167,800 cmil), with a 6 AWG copper EGC (26,240 cmil). The install uses 350 kcmil copper (350,000 cmil) for voltage drop. Per 250.122(B), what is the minimum copper EGC? (Areas: 3 AWG = 52,620; 2 AWG = 66,360 cmil)"
  options:
    - { id: a, text: "6 AWG", distractorRationale: "6 AWG is only the Table 250.122 base for 200 A — the voltage-drop upsize triggers the 250.122(B) proportional increase." }
    - { id: b, text: "3 AWG", distractorRationale: "Required area = 26,240 × (350,000 ÷ 167,800) = 54,732 cmil; 3 AWG offers 52,620 — about 2,100 cmil short." }
    - { id: c, text: "2 AWG", isCorrect: true }
    - { id: d, text: "350 kcmil copper", distractorRationale: "Matching the phases is never required — the EGC grows only by the same circular-mil ratio." }
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "Base 6 AWG × ratio 2.0858 = 54,732 cmil required — past 3 AWG, so 2 AWG is the first size that qualifies."
    codePath: ["Table 250.122 → 200 A → 6 AWG (26,240 cmil)", "250.122(B) → ratio = 350,000 ÷ 167,800 = 2.0858", "26,240 × 2.0858 = 54,732 cmil → 2 AWG (66,360)"]
    steps:
      - { text: "Base EGC for a 200 A device: 6 AWG = 26,240 cmil.", ref: "Table 250.122" }
      - { text: "Ratio = 350,000 ÷ 167,800 = 2.0858.", ref: "Chapter 9, Table 8" }
      - { text: "Required area = 26,240 × 2.0858 ≈ 54,732 cmil → 3 AWG (52,620) fails; 2 AWG (66,360) is the minimum.", ref: "250.122(B)" }
  trapIds: [table-column-selection, unit-or-phase-confusion]
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier chain question (multi-calculator scenario, keyed as single); SME-verify before live."

- id: q-gnd-x025
  domainId: nec.grounding-bonding
  commonMistake: "Two ways to fail: forget the 125% factor when deriving the device (the base EGC row survives that here — a lucky decoy), or forget the 250.122(B) upsize entirely and hand in the bare 6 AWG."
  skillIds: [nec.gnd.egc-sizing]
  type: single
  difficulty: 9
  stem: "A feeder serves 152 A of continuous load; the OCPD is the minimum standard rating (152 × 1.25 = 190 → 200 A). Design conductors were 3/0 copper (167,800 cmil), but 250 kcmil copper (250,000 cmil) is installed for voltage drop. Per Table 250.122 and 250.122(B), what is the minimum copper EGC? (Areas: 6 AWG = 26,240; 4 AWG = 41,740 cmil)"
  options:
    - { id: a, text: "6 AWG", distractorRationale: "6 AWG is the correct Table 250.122 base for the 200 A device, but the story doesn't end there — 250.122(B) scales it by 250,000 ÷ 167,800." }
    - { id: b, text: "4 AWG", isCorrect: true }
    - { id: c, text: "3 AWG", distractorRationale: "3 AWG is the Table 250.122 row for devices over 300 A — a table-row answer applied where the proportional rule governs. Required area is 39,094 cmil, and 4 AWG (41,740) already covers it." }
    - { id: d, text: "2 AWG", distractorRationale: "This applies the cmil ratio to the PHASE-size row of Table 250.66 or over-rounds the requirement — 66,360 cmil is far beyond the computed 39,094 cmil." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Full chain: 125% continuous → 200 A device → 6 AWG base → ×1.49 ratio → 39,094 cmil → 4 AWG. Each skipped link produces a listed wrong answer."
    codePath: ["215.3 → 152 × 1.25 = 190 A → 200 A", "Table 250.122 → 200 A → 6 AWG (26,240 cmil)", "250.122(B) → ratio = 250,000 ÷ 167,800 = 1.49", "26,240 × 1.49 = 39,094 cmil → 4 AWG"]
    steps:
      - { text: "Device: 152 × 1.25 = 190 A → 200 A standard; base EGC = 6 AWG (26,240 cmil).", ref: "215.3 / Table 250.122" }
      - { text: "Ratio = 250,000 ÷ 167,800 = 1.49.", ref: "Chapter 9, Table 8" }
      - { text: "Required area = 26,240 × 1.49 ≈ 39,094 cmil → 4 AWG (41,740 cmil) is the smallest that qualifies.", ref: "250.122(B)" }
  trapIds: [continuous-load-125, table-column-selection]
  timeTargetSec: 300
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier chain question (multi-calculator scenario, keyed as single); SME-verify before live."

# ---- GEC vs EGC vs bonding-jumper rule adjudication ---------------------------
- id: q-gnd-x026
  domainId: nec.grounding-bonding
  commonMistake: "If you sized all three from one table, you missed that a service has THREE different grounding/bonding conductors, each with its own governing rule: 250.66 (GEC), 250.102(C) (supply-side bonding jumper), 250.122 (load-side EGC)."
  skillIds: [nec.gnd.bonding]
  type: single
  difficulty: 9
  stem: "At a 400 A service with 500 kcmil copper service-entrance conductors, three conductors must be sized: (1) the grounding electrode conductor to the water pipe, (2) the supply-side bonding jumper for the service raceway, and (3) the equipment grounding conductor of a 200 A feeder leaving the panel. Which pairing of rules is correct?"
  options:
    - { id: a, text: "(1) Table 250.66 by service-conductor size; (2) 250.102(C), also based on the service-conductor size; (3) Table 250.122 by the 200 A OCPD.", isCorrect: true }
    - { id: b, text: "All three from Table 250.66, since everything originates at the service.", distractorRationale: "The load-side feeder EGC is governed by 250.122 keyed to its 200 A device — Table 250.66 stops at the service disconnect." }
    - { id: c, text: "(1) Table 250.66; (2) Table 250.122 by the 400 A main; (3) Table 250.122 by the 200 A feeder device.", distractorRationale: "The supply-side bonding jumper is on the LINE side of the service device — 250.102(C) sizes it from the service conductors (250.66 basis), not from any OCPD, because no OCPD protects it." }
    - { id: d, text: "(1) 250.102(C); (2) Table 250.66; (3) Table 250.66 by the feeder conductor size.", distractorRationale: "This swaps every rule: the GEC is 250.66, the supply-side bonding jumper is 250.102(C), and the feeder EGC is 250.122 by device — none of them keys to feeder conductor size." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Pick the rule by the conductor's job: electrode connection → 250.66; line-side bonding → 250.102(C) (service-conductor based); load-side equipment grounding → 250.122 (OCPD based)."
    codePath: ["250.66 → GEC by service-entrance conductors", "250.102(C) → supply-side bonding jumper by service conductors", "250.122 → EGC by OCPD rating"]
    steps:
      - { text: "GEC to the water pipe: Table 250.66 entered with 500 kcmil → 1/0 Cu.", ref: "Table 250.66" }
      - { text: "Supply-side bonding jumper: 250.102(C) — sized from the service conductors because no OCPD exists on the line side.", ref: "250.102(C)" }
      - { text: "Feeder EGC: Table 250.122 entered with the 200 A device → 6 AWG Cu.", ref: "Table 250.122" }
  trapIds: [table-column-selection]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier rule-selection question; SME-verify before live."

- id: q-gnd-x027
  recompute: { calc: gecSize, inputs: { serviceSize: "4/0" } }
  domainId: nec.grounding-bonding
  commonMistake: "If you got 6 AWG, you applied the 250.66(A) rod cap — but the cap only covers a conductor whose SOLE connection is the rod. This conductor continues on to the water pipe, so full Table 250.66 sizing applies."
  skillIds: [nec.gnd.gec-sizing]
  type: single
  difficulty: 10
  stem: "A 225 A service has 4/0 copper service-entrance conductors. A single unspliced grounding electrode conductor leaves the service, lands FIRST on a driven ground rod, and CONTINUES to the metal water pipe electrode. What is its minimum copper size?"
  options:
    - { id: a, text: "2 AWG", isCorrect: true }
    - { id: b, text: "6 AWG", distractorRationale: "6 AWG invokes the 250.66(A) rod cap — but that cap requires the rod to be the conductor's SOLE termination. This conductor also serves the water pipe, which demands full Table 250.66 sizing over its whole length." }
    - { id: c, text: "4 AWG", distractorRationale: "4 AWG is the '2/0 or 3/0' row. 4/0 (211.6 kcmil) is over 3/0, in the 'through 350 kcmil' row → 2 AWG." }
    - { id: d, text: "4 AWG from the rod to the pipe, 6 AWG from the service to the rod", distractorRationale: "Backwards and unsupported: the portion nearest the service serves BOTH electrodes, and the whole unspliced conductor must meet the largest requirement — 2 AWG throughout." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "250.66(A) is a sole-connection allowance. The moment the conductor also feeds an electrode with no cap (water pipe), the full Table 250.66 size governs the entire run."
    codePath: ["250.66(A) → cap only for SOLE connection to a rod", "Table 250.66 → 4/0 Cu service (over 3/0 through 350 kcmil) → 2 AWG Cu"]
    steps:
      - { text: "The rod is not this conductor's sole destination, so the 6 AWG cap of 250.66(A) does not apply.", ref: "250.66(A)" }
      - { text: "4/0 = 211,600 cmil → 'over 3/0 through 350 kcmil' row → 2 AWG copper for the full length.", ref: "Table 250.66" }
  trapIds: [table-column-selection]
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier 250.66(A) collision question; SME-verify before live."

- id: q-gnd-x028
  domainId: nec.grounding-bonding
  commonMistake: "If you picked 1/0, you sized the rod's conductor from Table 250.66 for the 500 kcmil equivalent — 250.66(A) caps a SOLE-connection rod conductor at 6 AWG copper no matter how large the service is."
  skillIds: [nec.gnd.gec-sizing]
  type: single
  difficulty: 9
  stem: "A service uses two parallel sets of 250 kcmil copper per phase (500 kcmil equivalent). Its water-pipe GEC is correctly installed as 1/0 copper. A supplemental ground rod is added with its own conductor running ONLY to the rod. What is the minimum copper size for the rod's conductor?"
  options:
    - { id: a, text: "6 AWG", isCorrect: true }
    - { id: b, text: "1/0 AWG", distractorRationale: "1/0 is the Table 250.66 size for the 500 kcmil equivalent — correct for the water pipe, but the sole-connection rod conductor is capped at 6 AWG by 250.66(A): a rod cannot usefully carry more." }
    - { id: c, text: "2 AWG", distractorRationale: "2 AWG reads Table 250.66 for a single 250 kcmil conductor — wrong on two counts: parallel sets are summed, and the rod cap makes the table moot here anyway." }
    - { id: d, text: "It must match the 1/0 water-pipe GEC", distractorRationale: "Each electrode's conductor is sized for its own electrode; there is no matching rule, and 250.66(A) gives the rod its own 6 AWG ceiling." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Two sizing regimes in one electrode system: full Table 250.66 (with the parallel-sum note) for the water pipe, and the 250.66(A) 6 AWG cap for the sole-connection rod."
    codePath: ["Table 250.66, Note 1 → 2 × 250 = 500 kcmil → 1/0 for the water pipe", "250.66(A) → sole connection to a rod → 6 AWG Cu suffices"]
    steps:
      - { text: "The water-pipe GEC (1/0) confirms the 500 kcmil equivalent lookup — surplus data for this ask.", ref: "Table 250.66" }
      - { text: "The rod-only conductor never needs to exceed 6 AWG copper, regardless of service size.", ref: "250.66(A)" }
  trapIds: [table-column-selection]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier 250.66(A) rod-cap question; keyed manually (cap not modeled by gecSize); SME-verify before live."

- id: q-gnd-x029
  domainId: nec.grounding-bonding
  commonMistake: "If you picked 3/0, you stopped at Table 250.66's largest row — for service conductors OVER 1100 kcmil, the supply-side bonding jumper leaves the table and becomes 12.5% of the phase-conductor area (250.102(C)(1))."
  skillIds: [nec.gnd.bonding]
  type: single
  difficulty: 10
  stem: "A service is built with two parallel sets of 600 kcmil copper per phase (1200 kcmil equivalent). Two conductors must be sized: the grounding electrode conductor to building steel, and the supply-side bonding jumper for the common service raceway. Which pair is correct?"
  options:
    - { id: a, text: "GEC: 3/0 copper (Table 250.66 maximum); bonding jumper: 150 kcmil copper (12.5% of 1200 kcmil per 250.102(C)(1))", isCorrect: true }
    - { id: b, text: "Both 3/0 copper — Table 250.66 governs both conductors.", distractorRationale: "The GEC does cap at 3/0, but the supply-side bonding jumper has NO ceiling: over 1100 kcmil it must be at least 12.5% of the phase area = 150,000 cmil, and 3/0 (167,800 cmil) happens to pass — but by the 12.5% rule, not the table. The table alone is the wrong justification, and for larger services it undersizes." }
    - { id: c, text: "GEC: 150 kcmil (12.5% rule); bonding jumper: 3/0 (Table 250.66).", distractorRationale: "Swapped: the 12.5% rule in 250.102(C)(1) belongs to the bonding jumper. The GEC follows Table 250.66, which tops out at 3/0 copper." }
    - { id: d, text: "Both 2/0 copper — 1200 kcmil is in the 'through 1100' row.", distractorRationale: "1200 kcmil is OVER 1100 — past the 2/0 row for the GEC, and past the table entirely for the bonding jumper." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Above 1100 kcmil the two rules diverge: the GEC saturates at 3/0 copper, while the supply-side bonding jumper scales without limit at 12.5% of the largest phase conductor."
    codePath: ["Table 250.66 → over 1100 kcmil → 3/0 Cu (GEC maximum)", "250.102(C)(1) → 12.5% × 1,200,000 = 150,000 cmil → 150 kcmil Cu bonding jumper"]
    steps:
      - { text: "GEC: 1200 kcmil equivalent is over 1100 → 3/0 copper, the table's ceiling.", ref: "Table 250.66" }
      - { text: "Supply-side bonding jumper: service conductors exceed 1100 kcmil, so the jumper ≥ 12.5% of 1,200,000 cmil = 150,000 cmil → 150 kcmil copper.", ref: "250.102(C)(1)" }
  trapIds: [table-column-selection, unit-or-phase-confusion]
  timeTargetSec: 300
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier 250.102(C) vs 250.66 divergence question; SME-verify 12.5% computation before live."

