  domainId: nec.grounding-bonding
  commonMistake: "If any conductor got the wrong table: the feeder EGC keys to its 200 A device (250.122), the water-pipe GEC keys to the 3/0 service conductors (250.66), and the rod-only conductor is capped at 6 AWG (250.66(A))."
