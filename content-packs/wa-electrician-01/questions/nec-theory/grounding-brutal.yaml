  type: single
  difficulty: 10
  stem: "A feeder serving 256 A of continuous data-hall cooling load (no noncontinuous load) is run as two parallel sets of 500 kcmil copper in two PVC raceways. The OCPD is the minimum standard rating per 215.3 and 240.6(A), and a wire-type copper EGC is pulled in each raceway. Per 250.122(F) and Table 250.122, what is the minimum size of EACH equipment grounding conductor?"
  options:
    - { id: a, text: "3 AWG in each raceway", isCorrect: true }
    - { id: b, text: "4 AWG in each raceway", distractorRationale: "4 AWG comes from sizing the device at the raw 256 A load (→ 300 A, ≤300 row). The required device is 256 × 1.25 = 320 A → 350 A standard, which is over the 300 A row." }
    - { id: c, text: "6 AWG in each raceway", distractorRationale: "This splits the device between the two runs (175 A per raceway → ≤200 row). Each raceway's EGC must be sized for the FULL feeder OCPD — a fault returns on one raceway alone." }
    - { id: d, text: "2 AWG in each raceway", distractorRationale: "2 AWG is the ≤500 A row. A 350 A device sits in the ≤400 A row; this jumps a row." }
