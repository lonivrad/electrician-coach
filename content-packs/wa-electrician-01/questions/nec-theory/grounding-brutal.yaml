    codePath: ["215.3 → 256 × 1.25 = 320 A", "240.6(A) → 350 A standard", "250.122(F) → full-size EGC per raceway", "Table 250.122 → over 300 A, ≤400 A → 3 AWG Cu"]
    steps:
