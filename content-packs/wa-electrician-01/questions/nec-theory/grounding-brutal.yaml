    - { id: c, text: "6 AWG", distractorRationale: "This adds the neighboring circuit's 10 A into the calculation (58 × 1.25 = 72.5 → 80 A device). The receptacle circuit has its own OCPD — it is a decoy." }
    - { id: d, text: "12 AWG", distractorRationale: "12 AWG serves devices ≤20 A only; the raw 48 A load already rules this out." }
