    codePath: ["210.20(A) → (40 + 8) × 1.25 = 60 A", "240.6(A) → 60 A is standard", "Table 250.122 → not exceeding 60 A → 10 AWG Cu"]
    steps:
      - { text: "Continuous load on this circuit = 40 + 8 = 48 A; minimum OCPD = 48 × 1.25 = 60 A — already a standard rating.", ref: "210.20(A)" }
      - { text: "The other circuit's 10 A is protected by its own device and never enters this calculation.", ref: "240.6(A)" }
      - { text: "60 A does not exceed the 60 A row limit → 10 AWG copper EGC.", ref: "Table 250.122" }
