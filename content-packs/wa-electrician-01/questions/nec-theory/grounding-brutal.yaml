    steps:
      - { text: "Equivalent area per phase = 2 × 300 kcmil = 600 kcmil.", ref: "Table 250.66, Note 1" }
      - { text: "600 kcmil is the top of the 'over 350 through 600' row → 1/0 copper GEC; the main rating is irrelevant.", ref: "Table 250.66" }
