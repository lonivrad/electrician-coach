    - { id: d, text: "(1) 6 AWG, (2) 2 AWG, (3) 6 AWG", distractorRationale: "2 AWG reads the 'over 3/0 through 350 kcmil' row — but the service is exactly 3/0, which stays in the '2/0 or 3/0' row (4 AWG)." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Three conductors, three rules: 250.122 (by OCPD) for the EGC, 250.66 (by service conductor, inclusive row edges) for the GEC, and the 250.66(A) 6 AWG cap for a rod-only conductor."
    codePath: ["Table 250.122 → 200 A → 6 AWG", "Table 250.66 → 2/0 or 3/0 → 4 AWG", "250.66(A) → rod only → 6 AWG"]
    steps:
      - { text: "Feeder EGC: 200 A device → 6 AWG copper.", ref: "Table 250.122" }
      - { text: "Water-pipe GEC: 3/0 service conductors sit IN the '2/0 or 3/0' row → 4 AWG copper.", ref: "Table 250.66" }
      - { text: "Rod-only conductor: capped at 6 AWG copper regardless of service size.", ref: "250.66(A)" }
  trapIds: [table-column-selection]
  timeTargetSec: 270
