# ---- Table 220.42 demand on a stated total (first breakpoint only) ----------

- id: q-load-m004
  recompute: { calc: demandFactorStandard, inputs: { totalVA: 16500 } }
  domainId: nec.load-calc
  commonMistake: "If you got 5,775, you applied 35% to the entire 16,500 VA — the first 3,000 VA stays at 100%."
  skillIds: [nec.load.demand-factor]
  type: numeric
  difficulty: 5
  stem: "A dwelling's combined general-lighting, small-appliance, and laundry connected load totals 16,500 VA. Applying the Table 220.42 demand factors, what is the demand (VA)?"
  answer: { kind: numeric, value: 7725, unit: "VA", tolerance: 0 }
  solution:
    keyIdea: "Two tiers apply here: first 3,000 VA at 100%, everything above (up to 120,000 VA) at 35%."
    codePath: ["Table 220.42"]
    steps:
      - { text: "First 3,000 VA × 100% = 3,000 VA." }
      - { text: "Remaining 13,500 VA × 35% = 4,725 VA." }
      - { text: "Demand = 3,000 + 4,725 = 7,725 VA." }
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

