- id: q-load-m022
  domainId: nec.load-calc
  skillIds: [nec.load.demand-factor]
  type: single
  difficulty: 5
  stem: "A dwelling is wired with the two required 20 A small-appliance circuits and one laundry circuit. How many volt-amperes do these three circuits add to the general-lighting bucket before the Table 220.42 demand factors are applied?"
  options:
    - id: a
      text: "4,500 VA"
      isCorrect: true
    - id: b
      text: "3,000 VA"
      distractorRationale: "This counts only the two small-appliance circuits — 220.52(B) adds another 1,500 VA for the laundry circuit into the same bucket."
    - id: c
      text: "1,500 VA"
      distractorRationale: "This is the allowance for a single circuit; each of the three circuits (two SA + one laundry) contributes 1,500 VA."
    - id: d
      text: "6,000 VA"
      distractorRationale: "This assumes four circuits at 1,500 VA; the dwelling described has only three (two small-appliance plus one laundry)."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Each small-appliance circuit and each laundry circuit is computed at 1,500 VA, and all of them may be combined with the general-lighting load for the 220.42 factors."
    codePath: ["220.52(A)", "220.52(B)"]
    steps:
      - { text: "Small appliance: 2 × 1,500 = 3,000 VA.", ref: "220.52(A)" }
      - { text: "Laundry: 1 × 1,500 = 1,500 VA.", ref: "220.52(B)" }
      - { text: "Total added to the lighting bucket = 4,500 VA." }
  timeTargetSec: 75
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-load-m023
  domainId: nec.load-calc
  skillIds: [nec.load.demand-factor]
  type: single
  difficulty: 6
  stem: "In a standard-method dwelling calculation, which of the following loads is NOT permitted to be included in the bucket that receives the Table 220.42 general-lighting demand factors?"
  options:
    - id: a
      text: "The household electric range"
      isCorrect: true
    - id: b
      text: "The two required 20 A small-appliance circuits"
      distractorRationale: "220.52(A) expressly permits the small-appliance circuit load to be included with the general lighting load and made subject to the Table 220.42 factors."
    - id: c
      text: "The 1,500 VA laundry circuit"
      distractorRationale: "220.52(B) gives the laundry circuit the same treatment as the small-appliance circuits — it may ride in the 220.42 bucket."
    - id: d
      text: "The 3 VA/ft² general-lighting load itself"
      distractorRationale: "The general-lighting load is the core of the bucket — Table 220.42 exists precisely to reduce it."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Table 220.42 covers lighting plus the 220.52 circuit loads; cooking equipment has its own demand table (220.55) and is added separately."
    codePath: ["220.52(A)/(B)", "Table 220.42", "Table 220.55"]
    steps:
      - { text: "Lighting + small-appliance + laundry → one bucket → Table 220.42.", ref: "220.52" }
      - { text: "The range takes its demand from Table 220.55 Column C and is added afterward.", ref: "Table 220.55" }
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-load-m024
  domainId: nec.load-calc
  skillIds: [nec.load.service-size]
  type: single
  difficulty: 5
  stem: "Which of the following is treated as a CONTINUOUS load, requiring the 125% factor for conductor and overcurrent-device sizing?"
  options:
    - id: a
      text: "Warehouse high-bay lighting that stays on at full output for an entire 8-hour shift"
      isCorrect: true
    - id: b
      text: "A household range used for about an hour at dinnertime"
      distractorRationale: "The Article 100 definition requires the maximum current to persist for 3 hours or more; intermittent cooking never meets that threshold."
    - id: c
      text: "A sump pump that cycles on for a few minutes at a time"
      distractorRationale: "Short cycling is the opposite of continuous — the maximum current lasts minutes, not the 3 hours the definition requires."
    - id: d
      text: "A bathroom exhaust fan on a 30-minute timer"
      distractorRationale: "A 30-minute timed run is far short of the 3-hour continuous threshold in Article 100."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Continuous = maximum current expected to continue for 3 hours or more; shift-long lighting is the classic case."
    codePath: ["Art. 100 (continuous load)", "210.19(A)(1)", "210.20(A)"]
    steps:
      - { text: "8 hours at full output ≥ 3 hours → continuous.", ref: "Art. 100" }
      - { text: "Size conductors and OCPD from 125% of that load.", ref: "210.20(A)" }
  trapIds: [continuous-load-125]
  timeTargetSec: 75
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-load-m025
  domainId: nec.load-calc
  skillIds: [nec.load.dwelling-optional]
  type: single
  difficulty: 6
  stem: "In the optional dwelling calculation of 220.82, which portion of the load receives the 40% demand factor?"
  options:
    - id: a
      text: "The portion of the 220.82(B) general loads that exceeds 10 kVA"
      isCorrect: true
    - id: b
      text: "The entire calculated load, including heating and air conditioning"
      distractorRationale: "The heating/air-conditioning load is selected under 220.82(C) and added at its selected value — it never receives the 40% factor."
    - id: c
      text: "Only the appliance loads such as the range, dryer, and water heater"
      distractorRationale: "The 40% remainder factor applies to the whole general-load total above 10 kVA — lighting, small-appliance, laundry, and appliances alike, not a subset."
    - id: d
      text: "The first 10 kVA of general load"
      distractorRationale: "Backwards — the first 10 kVA is taken at 100%; it is the remainder above 10 kVA that is taken at 40%."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "220.82(B): first 10 kVA of general loads at 100%, remainder at 40%; 220.82(C) HVAC is layered on top untouched."
    codePath: ["220.82(B)", "220.82(C)"]
    steps:
      - { text: "Total all 220.82(B) general loads at nameplate.", ref: "220.82(B)" }
      - { text: "Apply 100% to the first 10 kVA and 40% to everything above it." }
      - { text: "Add the selected heating/air-conditioning value at 100%.", ref: "220.82(C)" }
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."
