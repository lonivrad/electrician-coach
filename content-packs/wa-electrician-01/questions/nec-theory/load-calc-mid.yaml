# Mid-tier load calculations (Article 220) — 220.12 lighting, Table 220.42 first-tier demand,
# two-component sums, optional method 220.82 with clean HVAC, Column C ranges, 125% continuous. 2020 NEC. DRAFT.

# ---- General lighting (220.12, 3 VA/ft²) ------------------------------------

- id: q-load-m001
  recompute: { calc: generalLighting, inputs: { areaFt2: 2600 } }
  domainId: nec.load-calc
  commonMistake: "If you got 9,000 or another figure, you may have folded the small-appliance circuits into the lighting number — 220.52 loads are added separately; this question asks only for the 3 VA/ft² lighting load."
  skillIds: [nec.load.general-lighting]
  type: numeric
  difficulty: 5
  stem: "A one-family dwelling has 2,600 ft² of habitable floor area and is wired with the two required 20 A small-appliance circuits. For the standard-method calculation, what general-lighting load (VA) is entered at 3 VA/ft²? (Lighting only — do not add the small-appliance load.)"
  answer: { kind: numeric, value: 7800, unit: "VA", tolerance: 0 }
  solution:
    keyIdea: "General lighting is simply the countable floor area times 3 VA/ft²; the 220.52 circuit loads are a separate line item."
    codePath: ["220.12", "Table 220.12 → dwelling 3 VA/ft²"]
    steps:
      - { text: "2,600 ft² × 3 VA/ft² = 7,800 VA.", ref: "Table 220.12" }
      - { text: "The two small-appliance circuits (3,000 VA) are added later under 220.52 — not part of this figure." }
  timeTargetSec: 75
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

