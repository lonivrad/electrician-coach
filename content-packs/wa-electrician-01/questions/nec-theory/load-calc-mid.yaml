      - { text: "Combined total = 6,300 + (2 × 1,500) = 9,300 VA.", ref: "220.52(A)" }
      - { text: "First 3,000 VA at 100% = 3,000; remaining 6,300 × 35% = 2,205.", ref: "Table 220.42" }
      - { text: "Demand = 3,000 + 2,205 = 5,205 VA." }
