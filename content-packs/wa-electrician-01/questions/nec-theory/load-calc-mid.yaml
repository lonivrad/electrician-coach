  commonMistake: "If you got 4,155, you applied the demand factors to the 6,300 VA lighting alone and then added the 3,000 VA — combine the loads FIRST, then apply Table 220.42 once."
  skillIds: [nec.load.general-lighting, nec.load.demand-factor]
  type: numeric
  difficulty: 5
  stem: "A dwelling has a 6,300 VA general-lighting load and the two required 20 A small-appliance circuits (1,500 VA each). No laundry circuit is installed. Applying the standard demand factors, what is the demand subtotal (VA) for this bucket?"
