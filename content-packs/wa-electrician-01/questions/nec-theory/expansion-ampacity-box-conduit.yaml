# Phase 2 expansion — ampacity / box fill / conduit fill. 2020 NEC. All DRAFT.

- id: q-amp-007
  recompute: { calc: ampacityDerating, inputs: { size: "3", tempColumn: 90, ambientC: 38, ccc: 4, terminationColumn: 75 } }
  domainId: nec.ampacity
  commonMistake: "If you got a higher number, you forgot to apply both the temperature correction and the adjustment factor together."
  skillIds: [nec.ampacity.combined, nec.ampacity.termination-limit]
  type: numeric
  difficulty: 3
  stem: "A 3 AWG THHN copper conductor (90°C) has 4 current-carrying conductors in the raceway at 38°C ambient and terminates on 75°C-rated equipment. The 90°C ampacity is 115 A and the 75°C ampacity is 100 A. Using a 0.91 temperature correction and a 0.80 adjustment factor, what final ampacity governs for overcurrent sizing? (amps)"
  answer: { kind: numeric, value: 83.7, unit: "A", tolerance: 2 }
  solution:
    keyIdea: "Derate off the 90°C column, then confirm the result does not exceed the 75°C termination limit."
    codePath: ["Table 310.16 → 3 AWG 90°C=115 A, 75°C=100 A", "Table 310.15(B)(1) → 36–40°C → 0.91", "310.15(C)(1) → 4–6 CCC → 0.80", "110.14(C)"]
    steps:
      - { text: "115 A × 0.91 (ambient) = 104.65 A." }
      - { text: "104.65 A × 0.80 (fill) = 83.7 A." }
      - { text: "83.7 A < 100 A (75°C termination limit), so the derated value governs.", ref: "110.14(C)" }
  trapIds: [adjusted-vs-corrected-ampacity, termination-temp-limit]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft: SME-verify table values/factors for 2020 NEC."

- id: q-amp-008
  recompute: { calc: continuousLoad, inputs: { current: 44 } }
  domainId: nec.ampacity
  commonMistake: "If you got 44, you used the meter reading directly and forgot the 125% continuous-load factor."
  skillIds: [nec.ampacity.table-lookup]
  type: numeric
  difficulty: 4
  stem: "A clamp meter reads 44 A on a feeder supplying a continuous load, with conductors terminating on 75°C lugs. Before any temperature/fill derating, what minimum conductor ampacity (from the 75°C column) must be provided for this continuous load? (amps)"
  answer: { kind: numeric, value: 55, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "A meter reading is the actual current; a continuous load requires conductors at 125% of that load."
    codePath: ["210.19(A)(1) / 215.2(A)(1) → continuous load 125%"]
    steps:
      - { text: "Measured continuous load = 44 A." }
      - { text: "44 A × 1.25 = 55 A minimum conductor ampacity." }
  trapIds: [continuous-load-125, meter-reading-vs-ampacity]
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft: SME-verify 2020 NEC continuous-load sizing citation."

- id: q-box-005
  recompute: { calc: boxFill, inputs: { conductors: { "12": 3, "14": 4 }, clampSize: "12", deviceCount: 1, deviceSize: "12" } }
  domainId: nec.box-fill
  commonMistake: "If you got a lower number, you sized the clamp and device on the 14 AWG instead of the largest conductor (12 AWG)."
  skillIds: [nec.box.conductor-count, nec.box.device-clamp-allowance, nec.box.largest-conductor]
  type: numeric
  difficulty: 4
  stem: "A box contains three 12 AWG and four 14 AWG insulated circuit conductors, one or more internal cable clamps, and one single-pole switch wired with 12 AWG. Volume allowances: 12 AWG = 2.25 in³, 14 AWG = 2.00 in³. What minimum box volume (in³) is required?"
  answer: { kind: numeric, value: 21.5, unit: "in³", tolerance: 0.01 }
  solution:
    keyIdea: "Clamps and the device yoke are sized on the LARGEST conductor involved — not the smallest."
    codePath: ["314.16(B)(1) conductors", "314.16(B)(2) clamps → largest conductor", "314.16(B)(4) device → 2× largest connected"]
    steps:
      - { text: "Conductors: 3 × 2.25 + 4 × 2.00 = 6.75 + 8.00 = 14.75 in³." }
      - { text: "Cable clamps = 1 × largest conductor (12 AWG) = 2.25 in³." }
      - { text: "Switch (device yoke) = 2 × largest connected (12 AWG) = 4.50 in³." }
      - { text: "Total = 14.75 + 2.25 + 4.50 = 21.5 in³." }
  trapIds: [table-column-selection]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Recompute-verified (boxFill); Table 314.16(B) allowances + largest-conductor clamp/device rule (314.16(B)(2),(4)) confirmed. Cleared needsReview 2026-07; SME wording pass pending before live."

