- id: q-cf-005
  recompute: { calc: conduitAreaUsed, inputs: { conductors: [ { size: "12", count: 3 }, { size: "10", count: 2 } ] } }
  domainId: nec.conduit-fill
  commonMistake: "If you were off, make sure you used each conductor's Table 5 area and summed all five conductors."
  skillIds: [nec.conduit.mixed-size]
  type: numeric
  difficulty: 3
  stem: "A 3/4 EMT has a 40% fill area of 0.213 in². It carries three 12 AWG THHN (0.0133 in² each) and two 10 AWG THHN (0.0211 in² each). What is the total conductor cross-sectional area (in²) used? (Compare to 0.213 in² to confirm it fits.)"
  answer: { kind: numeric, value: 0.0821, unit: "in²", tolerance: 0.001 }
  solution:
    keyIdea: "Mixed sizes use the area method — sum Chapter 9 Table 5 areas, compare to Table 4 (40%)."
    codePath: ["Chapter 9 Table 5 (conductor areas)", "Chapter 9 Table 4 → 3/4 EMT 40% = 0.213 in²"]
    steps:
      - { text: "12 AWG: 3 × 0.0133 = 0.0399 in²." }
      - { text: "10 AWG: 2 × 0.0211 = 0.0422 in²." }
      - { text: "Total = 0.0821 in² < 0.213 in² → fits." }
  trapIds: [table-column-selection]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Recompute-verified (conduitAreaUsed); Ch.9 Table 5 conductor areas + Table 4 (3/4 EMT 40%) web-verified (docs/nec-tables-audit.md). Cleared needsReview 2026-07."
