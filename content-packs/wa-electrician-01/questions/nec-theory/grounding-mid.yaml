# ---- EGC-vs-GEC which-table selection (obvious tell in the stem) --------------
- id: q-gnd-m012
  recompute: { calc: egcSize, inputs: { ocpd: 60 } }
  domainId: nec.grounding-bonding
  commonMistake: "If you got 8 AWG, you entered Table 250.66 with the 4 AWG conductors — a feeder EGC is sized from its 60 A OCPD in Table 250.122."
  skillIds: [nec.gnd.egc-sizing]
  type: single
  difficulty: 6
  stem: "A 60 A feeder breaker in a house panel supplies a detached-garage subpanel through 4 AWG copper conductors. What is the minimum copper EQUIPMENT GROUNDING conductor run with this feeder?"
  options:
    - { id: a, text: "10 AWG", isCorrect: true }
    - { id: b, text: "8 AWG", distractorRationale: "8 AWG is the Table 250.66 result for 4 AWG conductors — but 250.66 sizes grounding electrode conductors at services. A feeder EGC uses Table 250.122 by OCPD rating." }
    - { id: c, text: "6 AWG" }
    - { id: d, text: "4 AWG" }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "The word EQUIPMENT grounding conductor is the tell: use Table 250.122 keyed to the 60 A device, not Table 250.66 keyed to conductor size."
    codePath: ["250.122 → EGC sized from OCPD", "Table 250.122 → not exceeding 60 A → 10 AWG Cu"]
    steps:
      - { text: "This conductor bonds equipment on the load side — it is an EGC under 250.122.", ref: "250.122" }
      - { text: "60 A OCPD → 'not exceeding 60 A' row → 10 AWG copper EGC.", ref: "Table 250.122" }
  trapIds: [table-column-selection]
  timeTargetSec: 105
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; calculator-backed (egcSize); SME-verify before live."

