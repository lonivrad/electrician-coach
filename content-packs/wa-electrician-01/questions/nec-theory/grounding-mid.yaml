# ---- Basic bonding rules -------------------------------------------------------
- id: q-gnd-m016
  domainId: nec.grounding-bonding
  skillIds: [nec.gnd.bonding]
  type: single
  difficulty: 5
  stem: "At a service, what does the main bonding jumper connect?"
  options:
    - { id: a, text: "The grounded (neutral) service conductor to the equipment grounding conductors and the service-disconnect enclosure.", isCorrect: true }
    - { id: b, text: "The grounding electrode conductor to the ground rod.", distractorRationale: "The GEC itself lands on the electrode — that connection is not the main bonding jumper." }
    - { id: c, text: "The ungrounded (hot) conductors to the enclosure for fault detection.", distractorRationale: "Bonding an ungrounded conductor to the enclosure would create a direct fault, not a bonding connection." }
    - { id: d, text: "Two separate grounding electrodes to each other.", distractorRationale: "Electrodes are joined by bonding jumpers of the electrode system, not by the MAIN bonding jumper at the service disconnect." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "The main bonding jumper ties the grounded conductor to the equipment grounding system at the service disconnect, completing the fault-return path to the source."
    codePath: ["250.24(B)", "250.28"]
    steps:
      - { text: "At the service disconnect, the grounded conductor is bonded to the enclosure and EGC system via the main bonding jumper.", ref: "250.24(B)" }
      - { text: "This connection lets ground-fault current return to the source and open the OCPD.", ref: "250.28" }
  timeTargetSec: 75
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier bonding question; SME-verify before live."

- id: q-gnd-m017
  domainId: nec.grounding-bonding
  commonMistake: "If you bonded the neutral bar to the subpanel enclosure, you created a parallel path for neutral current on the EGC and metal parts — that bond belongs only at the service."
  skillIds: [nec.gnd.bonding]
  type: single
  difficulty: 6
  stem: "A 100 A feeder (with a wire EGC) supplies a subpanel in the same building as the service. How must the neutral and equipment grounding conductors be arranged in the subpanel?"
  options:
    - { id: a, text: "Neutral bar isolated from the enclosure; EGCs on a ground bar bonded to the enclosure.", isCorrect: true }
    - { id: b, text: "Neutral and ground bars bonded together, the same as at the service.", distractorRationale: "The neutral-to-enclosure bond is made only at the service disconnect — repeating it downstream puts neutral current on the EGC and metal parts (250.24(A)(5))." }
    - { id: c, text: "Neutral bar bonded to the enclosure; EGCs isolated from it.", distractorRationale: "This is backwards: the enclosure must be connected to the EGC system, and the neutral must float." }
    - { id: d, text: "Neutral and EGCs may share one bar as long as each wire has its own terminal.", distractorRationale: "Separate terminals do not fix the problem — a shared bar still bonds neutral to ground downstream of the service." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Downstream of the service, neutral and ground stay separated: the grounded conductor must not be re-bonded to enclosures or EGCs."
    codePath: ["250.24(A)(5)", "250.142(B)"]
    steps:
      - { text: "The grounded conductor may not be connected to normally non-current-carrying metal parts on the load side of the service.", ref: "250.24(A)(5)" }
