- id: q-mt-003
  domainId: nec.motors
  skillIds: [nec.motor.flc-table, nec.motor.conductor-125]
  type: single
  difficulty: 3
  stem: "A motor nameplate reads 26 A, but Table 430.250 lists 28 A for its HP/voltage. Which value is used to size the branch-circuit conductors?"
  options:
    - { id: a, text: "26 A (nameplate)", distractorRationale: "Nameplate current is used for overload sizing, not for conductor/branch sizing." }
    - { id: b, text: "28 A (table value)", isCorrect: true }
    - { id: c, text: "The average, 27 A" }
    - { id: d, text: "Either may be used" }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Conductor sizing uses the TABLE FLC (430.6(A)); the nameplate FLA is for overload protection."
    codePath: ["430.6(A)(1) → use table values for conductors", "Table 430.250"]
    steps:
      - { text: "430.6(A)(1): use Table 430.250 value (28 A) for conductor/ampacity sizing.", ref: "430.6(A)" }
      - { text: "The 26 A nameplate is reserved for overload device sizing (430.32)." }
  trapIds: [actual-current-vs-table, table-column-selection]
