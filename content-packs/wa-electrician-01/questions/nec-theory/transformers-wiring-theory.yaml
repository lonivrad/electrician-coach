# ---- Electrical theory ------------------------------------------------------
- id: q-th-001
  recompute: { calc: ohmsCurrent, inputs: { volts: 240, ohms: 20 } }
  domainId: nec.theory-general
  skillIds: [nec.theory.ohms-law]
  type: numeric
  difficulty: 1
  stem: "Using Ohm's law, what current (A) flows when 240 V is applied across a 20 Ω resistance?"
  answer: { kind: numeric, value: 12, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "I = V / R."
    codePath: ["Ohm's law: I = V / R"]
    steps:
      - { text: "240 V ÷ 20 Ω = 12 A." }
  timeTargetSec: 45
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "NEEDS_VERIFICATION."

- id: q-th-002
  recompute: { calc: power3ph, inputs: { volts: 480, amps: 20 } }
  domainId: nec.theory-general
  commonMistake: "If you got 9,600, you left out the √3 factor for three-phase power."
  skillIds: [nec.theory.three-phase, nec.theory.power]
  type: numeric
  difficulty: 3
  stem: "A balanced three-phase load draws 20 A at 480 V (line-to-line), power factor 1.0. What is the real power (W)? Use P = √3 × V × I × pf."
  answer: { kind: numeric, value: 16628, unit: "W", tolerance: 100 }
  solution:
    keyIdea: "Three-phase power includes the √3 factor — forgetting it is a classic trap."
    codePath: ["P = √3 × V_L × I_L × pf"]
    steps:
      - { text: "1.732 × 480 V × 20 A × 1.0 = 16,628 W (≈16.6 kW)." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "NEEDS_VERIFICATION."
