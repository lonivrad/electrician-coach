# Transformers (450), Wiring methods (Ch.3), and Electrical Theory. DRAFT.

# ---- Transformers -----------------------------------------------------------
- id: q-xf-001
  domainId: nec.transformers
  skillIds: [nec.xfmr.ocp-sizing]
  type: single
  difficulty: 2
  stem: "For a transformer 600 V or less with only primary protection and a primary current of 9 A or more, what is the maximum primary overcurrent device, as a percentage of rated primary current (Table 450.3(B))?"
  options:
    - { id: a, text: "100%" }
    - { id: b, text: "115%" }
    - { id: c, text: "125%", isCorrect: true }
    - { id: d, text: "250%" }
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "Primary-only protection (≥9 A primary) → 125% max (next size up permitted where 125% doesn't correspond to a standard rating)."
    codePath: ["Table 450.3(B) → primary ≥9 A, primary-only → 125%"]
    steps:
      - { text: "Primary-only protection at ≥9 A → 125% of primary FLC.", ref: "Table 450.3(B)" }
  timeTargetSec: 75
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "NEEDS_VERIFICATION."

- id: q-xf-002
  recompute: { calc: transformerCurrent, inputs: { kva: 45, volts: 208, phase: 3 } }
  domainId: nec.transformers
  commonMistake: "If you got a much larger number, you left out the √3 factor for three-phase."
  skillIds: [nec.xfmr.secondary]
  type: numeric
  difficulty: 3
  stem: "What is the full-load secondary current (A) of a 45 kVA, three-phase transformer with a 208 V secondary? Use I = VA / (√3 × V)."
  answer: { kind: numeric, value: 125, unit: "A", tolerance: 2 }
  solution:
    keyIdea: "Three-phase current uses the √3 factor — a common phase-confusion trap."
    codePath: ["I = VA / (√3 × V_line)"]
    steps:
      - { text: "45,000 VA ÷ (1.732 × 208 V) = 45,000 ÷ 360.3 ≈ 124.9 A." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "NEEDS_VERIFICATION."

# ---- Wiring methods ---------------------------------------------------------
- id: q-wm-001
  domainId: nec.wiring-methods
  skillIds: [nec.wm.burial-depth]
  type: single
  difficulty: 2
  stem: "Per Table 300.5, what minimum cover is permitted for a direct-buried residential branch circuit rated 120 V or less and 20 A, protected by GFCI?"
  options:
    - { id: a, text: "6 in" }
    - { id: b, text: "12 in", isCorrect: true }
    - { id: c, text: "18 in" }
    - { id: d, text: "24 in", distractorRationale: "24 in is the general direct-burial depth; the residential 120 V/20 A GFCI provision (Column 4) reduces it to 12 in." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "The ≤120 V, ≤20 A, GFCI-protected residential provision (Column 4) reduces the required cover to 12 in."
    codePath: ["Table 300.5, Column 4 → residential 120 V, 20 A, GFCI → 12 in"]
    steps:
      - { text: "GFCI-protected 120 V/≤20 A residential branch → 12 in cover.", ref: "Table 300.5" }
  trapIds: [table-column-selection]
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "SME-reviewed 2026-07: Table 300.5 Column 4 = 12 in. Clarified stem wording."

