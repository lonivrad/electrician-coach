# ---- Voltage drop: percent / minimum-size (single-choice) --------------------
- id: q-thry-h016
  domainId: nec.theory-general
  skillIds: [nec.theory.ohms-law]
  type: single
  difficulty: 8
  stem: >-
    A 120 V single-phase branch circuit carries 16 A on 12 AWG copper (6,530 cmil),
    90 ft one-way. Using K = 12.9, the voltage drop is what percent of nominal
    voltage?
  options:
    - { id: a, text: "≈ 4.7%", isCorrect: true }
    - { id: b, text: "≈ 2.4%", distractorRationale: "That drops the factor of 2 — single-phase current flows out and back, so both conductor lengths drop voltage." }
    - { id: c, text: "≈ 9.5%", distractorRationale: "That doubles the length to 180 ft AND keeps the factor of 2 — the 2 already accounts for the return conductor; use the one-way distance." }
    - { id: d, text: "≈ 3.0%", distractorRationale: "3% is the informational-note RECOMMENDATION for branch circuits, not the computed value for this run." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Compute VD = 2·K·I·D/cmil, then divide by the nominal voltage."
    codePath: ["VD = 2·K·I·D/cmil", "%VD = VD/Vnominal", "210.19(A) Informational Note (3% guide)"]
    steps:
      - { text: "VD = 2 × 12.9 × 16 × 90 ÷ 6,530 = 37,152 ÷ 6,530 = 5.69 V." }
      - { text: "Percent: 5.69 ÷ 120 = 0.0474 → ≈ 4.7% — above the 3% recommendation." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-thry-h017
  domainId: nec.theory-general
  skillIds: [nec.theory.ohms-law]
  type: single
  difficulty: 8
  stem: >-
    A 240 V single-phase circuit carries 50 A, 180 ft one-way, copper (K = 12.9).
    To keep the voltage drop at or under 3% of nominal, what is the minimum
    conductor size (by circular-mil area, Ch. 9 Table 8)?
  options:
    - { id: a, text: "8 AWG (16,510 cmil)", distractorRationale: "That solves cmil = K·I·D/VD without the factor of 2 (16,125 cmil) — the return conductor also drops voltage." }
    - { id: b, text: "6 AWG (26,240 cmil)", distractorRationale: "26,240 cmil is BELOW the required 32,250 cmil — a minimum means you round UP to the next size, never down." }
    - { id: c, text: "4 AWG (41,740 cmil)", isCorrect: true }
    - { id: d, text: "2 AWG (66,360 cmil)", distractorRationale: "That uses the 360 ft round-trip length together with the factor of 2 — double-counting the return path (64,500 cmil)." }
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "Solve the VD formula for cmil, then pick the next STANDARD size at or above it."
    codePath: ["VDmax = 3% × 240 = 7.2 V", "cmil = 2·K·I·D/VD", "Ch.9 Table 8"]
    steps:
      - { text: "Allowable drop: 0.03 × 240 = 7.2 V." }
      - { text: "Required cmil = 2 × 12.9 × 50 × 180 ÷ 7.2 = 232,200 ÷ 7.2 = 32,250 cmil." }
      - { text: "6 AWG (26,240) is too small; 4 AWG (41,740) is the first size ≥ 32,250 cmil." }
  trapIds: [unit-or-phase-confusion, next-size-up-rounding]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-thry-h018
  domainId: nec.theory-general
  skillIds: [nec.theory.three-phase]
  type: single
  difficulty: 7
  stem: >-
    A 480 V three-phase feeder carries 100 A per line, 250 ft one-way, copper
    (K = 12.9). To limit voltage drop to 2% of nominal, what is the minimum
    conductor size (Ch. 9 Table 8 circular mils)?
  options:
    - { id: a, text: "4 AWG (41,740 cmil)", distractorRationale: "That uses a 3% limit (14.4 V → 38,791 cmil) — the question specifies 2% for this feeder." }
    - { id: b, text: "3 AWG (52,620 cmil)", distractorRationale: "52,620 cmil is below the required 58,186 cmil — you rounded DOWN; a minimum requires the next size up." }
    - { id: c, text: "2 AWG (66,360 cmil)", isCorrect: true }
    - { id: d, text: "1 AWG (83,690 cmil)", distractorRationale: "That uses the single-phase factor of 2 instead of √3 (67,188 cmil required) — three-phase drops less for the same current." }
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "Three-phase: cmil = √3·K·I·D / VDmax, then round UP to a standard size."
    codePath: ["VDmax = 2% × 480 = 9.6 V", "cmil = √3·K·I·D/VD", "Ch.9 Table 8"]
    steps:
      - { text: "Allowable drop: 0.02 × 480 = 9.6 V." }
      - { text: "Required cmil = 1.732 × 12.9 × 100 × 250 ÷ 9.6 = 558,586 ÷ 9.6 = 58,186 cmil." }
      - { text: "3 AWG (52,620) falls short; 2 AWG (66,360) is the first size that qualifies." }
  trapIds: [unit-or-phase-confusion, next-size-up-rounding]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

# ---- Power factor: apparent vs real (numeric + single) -----------------------
- id: q-thry-h006
  recompute: { calc: power1ph, inputs: { volts: 240, amps: 26, pf: 0.82 } }
  domainId: nec.theory-general
  commonMistake: "If you got 6,240, that is the APPARENT power in VA — a wattmeter reads real power, V·I·pf."
  skillIds: [nec.theory.power]
  type: numeric
  difficulty: 7
  stem: >-
    A clamp meter reads 26 A on a 240 V single-phase circuit and a power-quality
    meter shows a power factor of 0.82. How much REAL power (W) is the load
    consuming?
  answer: { kind: numeric, value: 5116.8, unit: "W", tolerance: 5 }
  solution:
    keyIdea: "V × I gives volt-amperes; only V × I × pf is watts."
    codePath: ["S = V·I = 6,240 VA", "P = S·pf"]
    steps:
      - { text: "Apparent power: 240 × 26 = 6,240 VA." }
      - { text: "Real power: 6,240 × 0.82 = 5,117 W." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-thry-h007
  domainId: nec.theory-general
  skillIds: [nec.theory.three-phase, nec.theory.power]
  type: single
  difficulty: 8
  stem: >-
    A three-phase 480 V feeder must deliver 60 kW of REAL power to a load with a
    power factor of 0.80. What line current must the conductors carry?
  options:
    - { id: a, text: "≈ 90 A", isCorrect: true }
    - { id: b, text: "≈ 72 A", distractorRationale: "That divides 60,000 by √3·V only — treating the 60 kW as if it were kVA. Real power must be divided by the pf to get the current actually flowing." }
    - { id: c, text: "≈ 156 A", distractorRationale: "That is the single-phase result 60,000 ÷ (480 × 0.8) — a three-phase feeder splits the power across three lines via the √3 factor." }
    - { id: d, text: "≈ 125 A", distractorRationale: "That is 60,000 ÷ 480 — it ignores both the √3 factor and the power factor." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Conductors carry the APPARENT-power current: I = P / (√3·V·pf) — low pf means MORE amps for the same watts."
    codePath: ["P = √3·V·I·pf, solved for I"]
    steps:
      - { text: "I = 60,000 ÷ (1.732 × 480 × 0.80)." }
      - { text: "Denominator: 1.732 × 480 = 831.4; × 0.80 = 665.1." }
      - { text: "I = 60,000 ÷ 665.1 ≈ 90.2 A." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

