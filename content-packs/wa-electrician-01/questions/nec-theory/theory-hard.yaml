# ---- Efficiency chains (single-choice) ---------------------------------------
- id: q-thry-h011
  domainId: nec.theory-general
  skillIds: [nec.theory.power]
  type: single
  difficulty: 8
  stem: >-
    A single-phase 240 V motor delivers 10 hp (7,460 W) at the shaft. Its
    efficiency is 88% and its power factor is 0.85. What input current does it
    draw from the line?
  options:
    - { id: a, text: "≈ 41.6 A", isCorrect: true }
    - { id: b, text: "≈ 36.6 A", distractorRationale: "That skips efficiency — 7,460 W is the OUTPUT; the motor must draw 7,460 ÷ 0.88 = 8,477 W of input real power." }
    - { id: c, text: "≈ 35.3 A", distractorRationale: "That skips the power factor — real watts divided by volts alone understates the current; conductors carry the apparent-power current." }
    - { id: d, text: "≈ 31.1 A", distractorRationale: "That is 7,460 ÷ 240 — it ignores BOTH efficiency and power factor, the two losses stacked in this problem." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Chain output → input watts via efficiency, then input watts → amps via V·pf."
    codePath: ["Pin = Pout / eff", "I = Pin / (V·pf)"]
    steps:
      - { text: "Input power: 7,460 ÷ 0.88 = 8,477 W." }
      - { text: "Current: 8,477 ÷ (240 × 0.85) = 8,477 ÷ 204 = 41.6 A." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

# ---- Series-parallel resistance (numeric via ohmsCurrent + single) -----------
- id: q-thry-h012
  recompute: { calc: ohmsCurrent, inputs: { volts: 240, ohms: 48 } }
  domainId: nec.theory-general
  commonMistake: "Reduce the parallel pair FIRST (60∥30 = 20 Ω); adding all three in series (118 Ω) gives about 2 A."
  skillIds: [nec.theory.ohms-law]
  type: numeric
  difficulty: 7
  stem: >-
    A 240 V source feeds a 60 Ω resistor in parallel with a 30 Ω resistor; that
    combination is in series with a 28 Ω resistor. What total current (A) does
    the source supply?
  answer: { kind: numeric, value: 5, unit: "A", tolerance: 0.05 }
  solution:
    keyIdea: "Collapse the parallel branch to one equivalent, add the series element, then apply I = V/R."
    codePath: ["Rparallel = product/sum", "Rtotal = Rp + Rseries", "I = V/R"]
    steps:
      - { text: "60 ∥ 30 = (60 × 30) ÷ (60 + 30) = 20 Ω." }
      - { text: "Total: 20 + 28 = 48 Ω." }
      - { text: "I = 240 ÷ 48 = 5 A." }
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-thry-h013
  recompute: { calc: ohmsCurrent, inputs: { volts: 240, ohms: 24 } }
  domainId: nec.theory-general
  commonMistake: "Don't ignore the conductor resistance — the 4 Ω of wire is in series with the 20 Ω parallel bank, so the source sees 24 Ω, not 20."
  skillIds: [nec.theory.ohms-law]
  type: numeric
  difficulty: 8
  stem: >-
    A 240 V source feeds a remote load through conductors with a combined 4 Ω of
    resistance. At the load, a 60 Ω heater is in parallel with a series string of
    a 10 Ω and a 20 Ω element. What total current (A) flows from the source?
  answer: { kind: numeric, value: 10, unit: "A", tolerance: 0.05 }
  solution:
    keyIdea: "Build the network from the inside out: series inside a branch, then parallel, then the line resistance in series."
    codePath: ["branch = 10 + 20 = 30 Ω", "60 ∥ 30 = 20 Ω", "Rtotal = 20 + 4", "I = V/R"]
    steps:
      - { text: "Series branch: 10 + 20 = 30 Ω." }
      - { text: "Parallel bank: 60 ∥ 30 = (60 × 30) ÷ 90 = 20 Ω." }
      - { text: "Add the 4 Ω conductor resistance: 24 Ω total." }
      - { text: "I = 240 ÷ 24 = 10 A." }
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-thry-h014
  domainId: nec.theory-general
  skillIds: [nec.theory.ohms-law]
  type: single
  difficulty: 7
  stem: >-
    A 240 V source feeds a load bank through conductors totaling 2 Ω of
    resistance. The bank consists of a 24 Ω resistor in parallel with an 8 Ω
    resistor. What voltage appears ACROSS the load bank?
  options:
    - { id: a, text: "180 V", isCorrect: true }
    - { id: b, text: "240 V", distractorRationale: "That ignores the conductor resistance — the 2 Ω of wire drops voltage before the bank, exactly like a voltage-drop problem." }
    - { id: c, text: "60 V", distractorRationale: "60 V is the drop ACROSS THE CONDUCTORS (30 A × 2 Ω) — the question asks for what is left at the load." }
    - { id: d, text: "226 V", distractorRationale: "That adds 24 + 8 = 32 Ω as if the bank were in series; parallel resistances combine to LESS than the smallest branch (6 Ω here)." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "The circuit is a voltage divider: line resistance and load bank split the source voltage in proportion to their resistance."
    codePath: ["24 ∥ 8 = 6 Ω", "Rtotal = 8 Ω", "I = V/R", "Vload = I·Rbank"]
    steps:
      - { text: "Bank: 24 ∥ 8 = (24 × 8) ÷ 32 = 6 Ω." }
      - { text: "Total: 6 + 2 = 8 Ω → I = 240 ÷ 8 = 30 A." }
      - { text: "Load voltage: 30 × 6 = 180 V (the wire eats 60 V)." }
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-thry-h015
  domainId: nec.theory-general
  skillIds: [nec.theory.ohms-law]
  type: single
  difficulty: 7
  stem: >-
    A 120 V source feeds a 20 Ω resistor in series with a parallel pair: 30 Ω and
    60 Ω. What current flows through the 60 Ω resistor?
  options:
    - { id: a, text: "1 A", isCorrect: true }
    - { id: b, text: "2 A", distractorRationale: "2 A is either the 30 Ω branch current or 120 ÷ 60 — the 60 Ω resistor does NOT see the full 120 V; the series 20 Ω drops 60 V first." }
    - { id: c, text: "3 A", distractorRationale: "3 A is the TOTAL source current; it splits between the two parallel branches in inverse proportion to their resistance." }
    - { id: d, text: "6 A", distractorRationale: "That is 120 ÷ 20 — applying the full source voltage to the series resistor alone instead of solving the whole network." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Find the parallel-bank voltage first; branch current = bank voltage ÷ branch resistance."
    codePath: ["30 ∥ 60 = 20 Ω", "I total = 120/40 = 3 A", "Vbank = 3 × 20 = 60 V", "I60 = 60/60"]
    steps:
      - { text: "Bank: 30 ∥ 60 = 20 Ω; total R = 20 + 20 = 40 Ω." }
      - { text: "Total current: 120 ÷ 40 = 3 A." }
      - { text: "Bank voltage: 3 × 20 = 60 V." }
      - { text: "Through the 60 Ω branch: 60 ÷ 60 = 1 A (the other 2 A takes the 30 Ω path)." }
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

# ---- 3φ line vs phase relationships (single-choice) ---------------------------
- id: q-thry-h023
  domainId: nec.theory-general
  skillIds: [nec.theory.three-phase]
  type: single
  difficulty: 7
  stem: >-
    On a 208Y/120 V wye system, each of three balanced line-to-neutral loads
    draws 20 A. What current flows in each LINE conductor?
  options:
    - { id: a, text: "20 A", isCorrect: true }
    - { id: b, text: "34.6 A", distractorRationale: "That multiplies by √3 — in a WYE connection, line current EQUALS phase current; it is the voltages (208 vs 120) that differ by √3." }
    - { id: c, text: "11.5 A", distractorRationale: "That divides by √3 — the √3 divider applies to converting 208 V line-to-line down to 120 V line-to-neutral, not to the current." }
    - { id: d, text: "60 A", distractorRationale: "That sums the three phase currents — balanced phase currents are 120° apart and do NOT add arithmetically in any conductor." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Wye: I(line) = I(phase); V(line) = √3 × V(phase). The √3 lives on the voltage side."
    codePath: ["Wye relationships: IL = Iφ, VLL = √3·VLN"]
    steps:
      - { text: "Each load is line-to-neutral, so its 20 A flows directly in its line conductor." }
      - { text: "Check the voltage side: 120 × 1.732 = 208 V — that is where √3 appears in a wye." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-thry-h024
  domainId: nec.theory-general
  skillIds: [nec.theory.three-phase]
  type: single
  difficulty: 8
  stem: >-
    A balanced delta-connected heater bank on a 480 V system draws 30 A through
    each phase winding. What current do the LINE conductors feeding the bank
    carry?
  options:
    - { id: a, text: "≈ 52 A", isCorrect: true }
    - { id: b, text: "30 A", distractorRationale: "That applies the WYE rule (line = phase current). In a DELTA, each line conductor feeds two windings, so line current = √3 × phase current." }
    - { id: c, text: "≈ 17.3 A", distractorRationale: "That divides by √3 instead of multiplying — line current in a delta is always LARGER than the winding current." }
    - { id: d, text: "90 A", distractorRationale: "That adds two winding currents arithmetically (or triples one) — the two winding currents at each line terminal are 120° apart, so they combine to √3×, not 2× or 3×." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Delta: I(line) = √3 × I(phase); V(line) = V(phase). The √3 lives on the current side — the mirror of a wye."
    codePath: ["Delta relationships: IL = √3·Iφ, VLL = Vφ"]
    steps:
      - { text: "Each line terminal joins two windings whose currents are 120° apart." }
      - { text: "Vector sum: 30 × 1.732 ≈ 52 A per line conductor." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

# ---- Circular-mil ratios (250.122(B) proportional upsize) ---------------------
- id: q-thry-h019
  recompute: { calc: cmilRatio, inputs: { newSize: "3", origSize: "6" } }
  domainId: nec.theory-general
  commonMistake: "The ratio compares CIRCULAR-MIL areas (52,620 ÷ 26,240), not AWG numbers — '6 to 3' is not a ratio of 2 by gauge arithmetic, it just happens to double the area."
  skillIds: [nec.theory.ohms-law]
  type: numeric
  difficulty: 8
  stem: >-
    To control voltage drop, a feeder's copper circuit conductors are upsized from
    6 AWG (26,240 cmil) to 3 AWG (52,620 cmil). Per 250.122(B), the equipment
    grounding conductor must be increased by at least the same ratio of
    circular-mil areas. What is that ratio?
  answer: { kind: numeric, value: 2.01, unit: "ratio", tolerance: 0.02 }
  solution:
    keyIdea: "250.122(B): EGC upsizing is proportional to the circular-mil ratio of the ungrounded conductors."
    codePath: ["250.122(B)", "Ch.9 Table 8 (3 AWG = 52,620; 6 AWG = 26,240)"]
    steps:
      - { text: "Ratio = 52,620 ÷ 26,240 = 2.01.", ref: "250.122(B)" }
      - { text: "The EGC's cmil area must be multiplied by at least 2.01, then rounded up to a standard size." }
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-thry-h020
  recompute: { calc: cmilRatio, inputs: { newSize: "8", origSize: "12" } }
  domainId: nec.theory-general
  commonMistake: "Divide areas, not gauge numbers: 16,510 ÷ 6,530 — going two even sizes (12→8) roughly 2.5× the area, it does not simply double."
  skillIds: [nec.theory.ohms-law]
  type: numeric
  difficulty: 7
  stem: >-
    A long 20 A branch circuit is upsized from 12 AWG (6,530 cmil) to 8 AWG
    (16,510 cmil) copper for voltage drop. By what circular-mil ratio must the
    equipment grounding conductor be increased per 250.122(B)?
  answer: { kind: numeric, value: 2.53, unit: "ratio", tolerance: 0.02 }
  solution:
    keyIdea: "The upsize ratio is new cmil ÷ original cmil from Ch. 9 Table 8."
    codePath: ["250.122(B)", "Ch.9 Table 8 (8 AWG = 16,510; 12 AWG = 6,530)"]
    steps:
      - { text: "Ratio = 16,510 ÷ 6,530 = 2.53.", ref: "250.122(B)" }
      - { text: "Apply 2.53 to the EGC's cmil area and round up to the next standard conductor." }
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."
