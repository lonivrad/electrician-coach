- id: q-thry-h009
  domainId: nec.theory-general
  skillIds: [nec.theory.power, nec.theory.three-phase]
  type: single
  difficulty: 8
  stem: >-
    A facility's connected three-phase load totals 45 kW of real power at an
    overall power factor of 0.85. A standby generator is rated in kVA. Ignoring
    growth and starting loads, what is the minimum generator kVA that can serve
    this load?
  options:
    - { id: a, text: "≈ 52.9 kVA", isCorrect: true }
    - { id: b, text: "45 kVA", distractorRationale: "That assumes kW = kVA — true only at unity power factor. At pf 0.85 the generator must supply more apparent power than the real power consumed." }
    - { id: c, text: "≈ 38.3 kVA", distractorRationale: "That MULTIPLIES 45 by 0.85. kVA is kW DIVIDED by pf; apparent power is always ≥ real power." }
    - { id: d, text: "≈ 77.9 kVA", distractorRationale: "That multiplies by √3 — the √3 belongs inside the current formula, not the kW↔kVA conversion, which is pf alone." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "kVA = kW ÷ pf — generators and transformers are limited by apparent power, not watts."
    codePath: ["S = P / pf"]
    steps:
      - { text: "S = 45 ÷ 0.85 = 52.94 kVA." }
      - { text: "The next standard generator size at or above 52.9 kVA would be selected." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

