# Electrical theory — HARD tier (difficulty 4–5). Multi-step chains: VD → percent,
# apparent-vs-real power, 3φ line/phase, series-parallel. All DRAFT; K=12.9 Cu / 21.2 Al.

# ---- Voltage-drop chains (numeric: ask the drop in volts) --------------------
- id: q-thry-h001
  recompute: { calc: voltageDrop, inputs: { phase: 1, k: 12.9, current: 40, oneWayFt: 120, size: "8" } }
  domainId: nec.theory-general
  commonMistake: "If you got 3.75 V, you dropped the factor of 2 — a single-phase circuit drops voltage on the way out AND back."
  skillIds: [nec.theory.ohms-law, nec.theory.power]
  type: numeric
  difficulty: 8
  stem: >-
    A 9,600 W resistance heater (unity power factor) is fed at 240 V single-phase
    through 8 AWG copper (16,510 cmil), 120 ft one-way. Using K = 12.9, estimate
    the voltage drop (V) at the heater.
  answer: { kind: numeric, value: 7.5, unit: "V", tolerance: 0.15 }
  solution:
    keyIdea: "Derive the current from the load first, then VD = 2·K·I·D / cmil."
    codePath: ["I = P/V (resistive load)", "VD = 2·K·I·D/cmil", "Ch.9 Table 8 (8 AWG = 16,510 cmil)"]
    steps:
      - { text: "Load current: 9,600 W ÷ 240 V = 40 A (pf = 1, so W = VA)." }
      - { text: "VD = 2 × 12.9 × 40 × 120 ÷ 16,510 = 123,840 ÷ 16,510 = 7.50 V." }
      - { text: "Sanity check: 7.5 V is 3.1% of 240 V — above the 3% recommendation." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

