  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-ocp-h005
  recompute: { calc: ampacityDerating, inputs: { size: "3/0", tempColumn: 90, ambientC: 35, ccc: 6, terminationColumn: 75 } }
  domainId: nec.overcurrent
  commonMistake: "If you got 200 you jumped straight to the 75°C termination value; if you got 216 you applied the correction but skipped the 6-conductor adjustment."
  skillIds: [nec.ocp.next-size-up]
  type: numeric
  difficulty: 4
  stem: "A feeder uses 3/0 THHN/THWN-2 copper in a raceway with 6 current-carrying conductors, passing through a 35°C mechanical space. Breaker and panel terminations are rated 75°C. Before selecting the feeder OCPD, what is the final allowable ampacity (A) of each 3/0 conductor?"
  answer: { kind: numeric, value: 172.8, unit: "A", tolerance: 1.0 }
  solution:
    keyIdea: "Derate from the 90°C column, then compare against the 75°C termination value and take the LOWER."
    codePath: ["Table 310.16 → 3/0 Cu @90°C = 225 A", "0.96 × 0.80 factors", "110.14(C) → 75°C cap = 200 A"]
    steps:
      - { text: "3/0 Cu at 90°C = 225 A.", ref: "Table 310.16" }
      - { text: "35°C ambient → 0.96; 6 CCC → 0.80: 225 × 0.96 × 0.80 = 172.8 A.", ref: "310.15" }
      - { text: "75°C termination cap = 200 A; 172.8 < 200, so the derated value governs.", ref: "110.14(C)" }
  trapIds: [termination-temp-limit, adjusted-vs-corrected-ampacity]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-ocp-h006
  recompute: { calc: nextStandardSize, inputs: { value: 141.96 } }
  domainId: nec.overcurrent
  commonMistake: "If you got 175 you protected at the 75°C table value (175 A) without derating; if you got 125 you rounded the 141.96 A result DOWN — 240.4(B) permits the next size UP here."
  skillIds: [nec.ocp.next-size-up]
  type: numeric
  difficulty: 5
  stem: "A 2/0 THHN/THWN-2 copper feeder shares a raceway with 4 current-carrying conductors through a 40°C space; terminations are 75°C. It supplies a 130 A noncontinuous load with no receptacle outlets. Working the full chain — derate, check terminations, then apply 240.4(B) — what is the maximum standard OCPD rating (A) permitted?"
  answer: { kind: numeric, value: 150, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "The OCPD is chosen from the FINAL derated ampacity, and 240.4(B) then permits the next standard size up because all three conditions are met."
    codePath: ["Table 310.16 → 2/0 Cu @90°C = 195 A", "195 × 0.91 × 0.80 = 141.96 A", "110.14(C) → 175 A cap (not binding)", "240.4(B) + 240.6(A) → 150 A"]
    steps:
      - { text: "2/0 Cu at 90°C = 195 A; 40°C → 0.91; 4 CCC → 0.80: 195 × 0.91 × 0.80 = 141.96 A.", ref: "310.15" }
      - { text: "75°C termination value 175 A is higher, so 141.96 A governs.", ref: "110.14(C)" }
      - { text: "Load 130 A ≤ 141.96 A; no receptacles; result ≤ 800 A → 240.4(B) conditions met.", ref: "240.4(B)" }
      - { text: "Next standard size above 141.96 A is 150 A.", ref: "240.6(A)" }
  trapIds: [next-size-up-rounding, termination-temp-limit, adjusted-vs-corrected-ampacity]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live. Recompute covers the final 240.6(A) step; intermediate 141.96 A derives from Tables 310.16/310.15 as shown in steps."

# ---- Mixed continuous / noncontinuous chains ---------------------------------
- id: q-ocp-h007
  recompute: { calc: ocpdMixedLoad, inputs: { continuous: 52, noncontinuous: 27, standardize: 1 } }
  domainId: nec.overcurrent
  commonMistake: "If you got 80, you added 52 + 27 = 79 and standardized without the 125% factor on the continuous portion."
  skillIds: [nec.ocp.standard-ratings]
  type: numeric
  difficulty: 4
  stem: "A retail feeder carries 52 A of show-window lighting that runs all business day (continuous) plus 27 A of noncontinuous receptacle load. Per 210.20(A)/215.3, using a standard rating, what minimum OCPD (A) is required?"
  answer: { kind: numeric, value: 100, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "Only the continuous portion is multiplied by 125%; the sum is then taken to a standard rating."
    codePath: ["215.3 / 210.20(A)", "240.6(A)"]
    steps:
      - { text: "52 × 1.25 = 65 A; + 27 A = 92 A.", ref: "215.3" }
      - { text: "92 A is not standard → next standard size is 100 A.", ref: "240.6(A)" }
  trapIds: [continuous-load-125, next-size-up-rounding]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

