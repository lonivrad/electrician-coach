  type: single
  difficulty: 4
  stem: "An inspector walks a panel schedule. Which conductor/breaker pairing is a 240.4(D) violation (no 240.4(E)/(G) application applies)?"
  options:
    - { id: a, text: "14 AWG copper on a 20 A breaker", isCorrect: true }
    - { id: b, text: "12 AWG aluminum on a 15 A breaker", distractorRationale: "15 A is exactly the 240.4(D) limit for 12 AWG aluminum — compliant." }
    - { id: c, text: "10 AWG copper on a 30 A breaker", distractorRationale: "30 A is exactly the 240.4(D) limit for 10 AWG copper — compliant." }
    - { id: d, text: "12 AWG copper on a 20 A breaker", distractorRationale: "20 A is exactly the 240.4(D) limit for 12 AWG copper — compliant." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Each small-conductor size/material has a hard OCPD ceiling; 14 AWG copper tops out at 15 A."
    codePath: ["240.4(D) → 14 Cu = 15 A; 12 Cu = 20 A / 12 Al = 15 A; 10 Cu = 30 A"]
    steps:
      - { text: "14 AWG copper is capped at 15 A — a 20 A breaker violates 240.4(D).", ref: "240.4(D)" }
