# Overcurrent protection (Article 240 / 210.20 / 240.21) — HARD tier (difficulty 4–5). 2020 NEC. DRAFT.
# Multi-step chains: derating → 240.4(D) cap → 240.4(B) next-size-up (permitted vs forbidden), mixed loads, tap rules.

# ---- Derating chains feeding an OCPD decision -------------------------------
- id: q-ocp-h001
  recompute: { calc: ampacityDerating, inputs: { size: "10", tempColumn: 90, ambientC: 50, ccc: 8 } }
  domainId: nec.overcurrent
  commonMistake: "If you got 32.8, you applied the ambient correction but skipped the 8-conductor adjustment; if you got 28, you started from the 75°C column instead of the 90°C insulation rating."
  skillIds: [nec.ocp.small-conductor]
  type: numeric
  difficulty: 4
  stem: "Eight current-carrying 10 AWG THHN/THWN-2 copper conductors share one EMT run through a 50°C boiler room. Before you can pick the branch breaker, what is the corrected and adjusted ampacity (A) of each conductor?"
  answer: { kind: numeric, value: 22.96, unit: "A", tolerance: 0.5 }
  solution:
    keyIdea: "Start from the 90°C cell for derating, then multiply BOTH the ambient correction and the >3 CCC adjustment."
    codePath: ["Table 310.16 → 10 AWG Cu @90°C = 40 A", "Table 310.15(B)(1) → 50°C @90°C col = 0.82", "Table 310.15(C)(1) → 8 CCC = 0.70"]
    steps:
      - { text: "10 AWG Cu, 90°C column = 40 A.", ref: "Table 310.16" }
      - { text: "Ambient 50°C, 90°C conductor → 0.82: 40 × 0.82 = 32.8 A.", ref: "Table 310.15(B)(1)" }
      - { text: "8 current-carrying conductors → 0.70: 32.8 × 0.70 = 22.96 A.", ref: "Table 310.15(C)(1)" }
      - { text: "This 22.96 A — not the 240.4(D) 30 A cap — is what the breaker choice must start from." }
  trapIds: [adjusted-vs-corrected-ampacity, table-column-selection]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-ocp-h002
  domainId: nec.overcurrent
  commonMistake: "240.4(D) is a CEILING (30 A for 10 AWG Cu), not the answer — once derating drops the ampacity below the cap, you size from the derated value and may round up per 240.4(B)."
  skillIds: [nec.ocp.small-conductor, nec.ocp.next-size-up]
  type: single
  difficulty: 5
  stem: "The 10 AWG THHN/THWN-2 copper conductors above (8 CCC in one raceway, 50°C ambient, 75°C terminations) end up with a corrected/adjusted ampacity of 22.96 A. They feed a fixed 22 A noncontinuous load — not a multioutlet receptacle circuit. What is the maximum standard breaker permitted?"
  options:
    - { id: a, text: "20 A", distractorRationale: "Rounding down is not required here: 240.4(B) permits the next standard size above 22.96 A because the circuit is not a multioutlet receptacle circuit and the result stays under the 240.4(D) cap." }
    - { id: b, text: "25 A", isCorrect: true }
    - { id: c, text: "30 A", distractorRationale: "This applies the 240.4(D) cap as the rating without checking the derated ampacity — 30 A would leave the conductor protected above its 22.96 A ampacity with no 240.4(B) basis." }
    - { id: d, text: "35 A", distractorRationale: "This is 40 × 0.82 = 32.8 A rounded up — the 8-conductor adjustment factor (0.70) was skipped." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Derated ampacity governs when it is BELOW the 240.4(D) cap; next-size-up is then permitted as long as the result does not exceed the cap."
    codePath: ["310.15 → 22.96 A", "240.4(B) → next standard size", "240.6(A) → 25 A", "240.4(D) → 30 A ceiling (not exceeded)"]
    steps:
      - { text: "Corrected/adjusted ampacity = 22.96 A; load (22 A) does not exceed it." }
      - { text: "22.96 A matches no standard rating; conditions of 240.4(B) are met → next standard size.", ref: "240.4(B)" }
      - { text: "Next standard size above 22.96 A is 25 A.", ref: "240.6(A)" }
      - { text: "25 A ≤ the 30 A small-conductor ceiling for 10 AWG Cu → 25 A stands.", ref: "240.4(D)" }
  trapIds: [next-size-up-rounding, adjusted-vs-corrected-ampacity]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-ocp-h003
  recompute: { calc: smallConductorMaxOCPD, inputs: { size: "10" } }
  domainId: nec.overcurrent
  commonMistake: "If you got 40 you used the 90°C table cell; if you got 35 you corrected 40 × 0.96 and rounded — 240.4(D) overrides both when the derated ampacity is still above 30 A."
  skillIds: [nec.ocp.small-conductor]
  type: numeric
  difficulty: 4
  stem: "A 10 AWG THHN copper circuit runs with only 3 current-carrying conductors through a 35°C attic, so its corrected 90°C ampacity works out to 38.4 A — comfortably high. It supplies a fixed noncontinuous load. What is the maximum overcurrent device rating (A) actually permitted for this conductor?"
  answer: { kind: numeric, value: 30, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "When derating leaves the ampacity ABOVE the small-conductor cap, 240.4(D) — not the derated value — sets the maximum OCPD."
    codePath: ["Table 310.16 + 310.15(B)(1) → 40 × 0.96 = 38.4 A", "240.4(D) → 10 AWG Cu capped at 30 A"]
    steps:
      - { text: "Corrected ampacity: 40 × 0.96 = 38.4 A — the conductor could carry more than 30 A." }
      - { text: "240.4(D) still caps the OCPD for 10 AWG copper at 30 A unless a listed exception (240.4(E)/(G)) applies.", ref: "240.4(D)" }
      - { text: "Maximum device = 30 A; the higher derated ampacity does not unlock a larger breaker." }
  trapIds: [next-size-up-rounding, actual-current-vs-table]
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-ocp-h004
  recompute: { calc: smallConductorMaxOCPD, inputs: { size: "12", material: "al" } }
  domainId: nec.overcurrent
  commonMistake: "If you got 20 A you used the copper limit — the aluminum 240.4(D) caps are one step lower (12 AWG Al = 15 A)."
  skillIds: [nec.ocp.small-conductor]
  type: numeric
  difficulty: 4
  stem: "A remodel uses 12 AWG aluminum MC cable for a lighting circuit. The apprentice notes 12 AWG is 'a 20-amp wire' and lands it on a 20 A breaker. Per 240.4(D), what is the maximum breaker rating (A) actually permitted for 12 AWG aluminum?"
  answer: { kind: numeric, value: 15, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "The 240.4(D) small-conductor caps are material-specific; aluminum limits sit below the familiar copper values."
    codePath: ["240.4(D) → 12 AWG Al = 15 A (Cu would be 20 A)"]
    steps:
      - { text: "The '12 AWG = 20 A' habit is a COPPER rule.", ref: "240.4(D)" }
      - { text: "12 AWG aluminum / copper-clad aluminum is capped at 15 A.", ref: "240.4(D)" }
  trapIds: [table-column-selection]
  timeTargetSec: 120
