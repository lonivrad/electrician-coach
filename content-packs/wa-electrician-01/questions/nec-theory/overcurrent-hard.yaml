# ---- Tap rules (240.21) ------------------------------------------------------
- id: q-ocp-h018
  domainId: nec.overcurrent
  commonMistake: "The 1/10 fraction belongs to the 10-ft rule; 1/3 belongs to the 25-ft rule — mixing them is the classic tap error."
  skillIds: [nec.ocp.tap-rules]
  type: single
  difficulty: 4
  stem: "In an existing plant, an 8-ft field-installed tap is made from a feeder protected by a 400 A breaker to supply a panelboard, meeting all the enclosure and termination conditions of the 10-ft rule. What is the minimum ampacity the tap conductors must have relative to the feeder OCPD (assume the calculated load is smaller)?"
  options:
    - { id: a, text: "40 A — not less than 1/10 of the 400 A device", isCorrect: true }
    - { id: b, text: "133 1/3 A — not less than 1/3 of the 400 A device", distractorRationale: "The 1/3 fraction is the 25-ft rule (240.21(B)(2)); this 8-ft tap qualifies for the 10-ft rule's 1/10 minimum for field installations." }
    - { id: c, text: "400 A — equal to the feeder device", distractorRationale: "Requiring full feeder ampacity would erase the tap allowance entirely; the tap rules exist to permit smaller conductors under defined conditions." }
    - { id: d, text: "100 A — not less than 1/4 of the 400 A device", distractorRationale: "There is no 1/4 fraction in the 240.21(B) tap rules — it is 1/10 (10 ft, field-installed) or 1/3 (25 ft)." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Under the 10-ft rule, field-installed tap conductors need ampacity ≥ the load AND ≥ 1/10 of the feeder OCPD."
    codePath: ["240.21(B)(1) → 10-ft tap, 1/10 of device rating for field installations", "400 ÷ 10 = 40 A"]
    steps:
      - { text: "Tap ≤ 10 ft and conditions met → 240.21(B)(1) applies.", ref: "240.21(B)(1)" }
      - { text: "Field-installed: ampacity ≥ 1/10 × 400 A = 40 A, and never less than the calculated load.", ref: "240.21(B)(1)" }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-ocp-h019
  domainId: nec.overcurrent
  skillIds: [nec.ocp.tap-rules]
  type: single
  difficulty: 4
  stem: "A 22-ft tap is run from a feeder protected at 600 A to a fused disconnect, with the conductors protected from physical damage. Under the 25-ft tap rule, what is the minimum ampacity required for the tap conductors, and how must they terminate?"
  options:
    - { id: a, text: "200 A minimum, terminating in a single OCPD rated no more than the tap ampacity", isCorrect: true }
    - { id: b, text: "60 A minimum, terminating in a single OCPD", distractorRationale: "60 A is 1/10 of 600 A — the 10-ft rule fraction. A tap over 10 ft must satisfy the 25-ft rule's 1/3 minimum." }
    - { id: c, text: "600 A minimum, with no termination requirement", distractorRationale: "Full feeder ampacity is not required; the 25-ft rule permits 1/3 — but it adds the single-OCPD termination condition this option drops." }
    - { id: d, text: "300 A minimum, terminating in up to two OCPDs", distractorRationale: "There is no 1/2 fraction and no two-device allowance — 240.21(B)(2) requires 1/3 of the device rating and termination in a SINGLE set of overcurrent devices." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "The 25-ft rule pairs a 1/3-of-device ampacity floor with a mandatory single-OCPD termination sized to the tap."
    codePath: ["240.21(B)(2) → 1/3 × 600 A = 200 A + single OCPD ≤ tap ampacity"]
    steps:
      - { text: "Tap is over 10 ft but ≤ 25 ft → 240.21(B)(2).", ref: "240.21(B)(2)" }
      - { text: "Minimum ampacity = 600 ÷ 3 = 200 A." }
      - { text: "The tap must end in a single circuit breaker or set of fuses rated no more than the tap-conductor ampacity.", ref: "240.21(B)(2)" }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-ocp-h020
  domainId: nec.overcurrent
  commonMistake: "Judge a tap against the rule its LENGTH selects — a 20-ft tap is evaluated under the 25-ft rule, not rejected for exceeding 10 ft."
  skillIds: [nec.ocp.tap-rules]
  type: single
  difficulty: 5
  stem: "A 20-ft tap from a feeder protected at 400 A uses conductors with a 135 A allowable ampacity, is protected from physical damage, and terminates in a single 125 A circuit breaker. Which statement is correct?"
  options:
    - { id: a, text: "Compliant — it satisfies the 25-ft rule: ampacity ≥ 1/3 of 400 A and it terminates in a single OCPD not exceeding 135 A", isCorrect: true }
    - { id: b, text: "Not compliant — a tap longer than 10 ft is not permitted without overcurrent protection at the tap point", distractorRationale: "The 10-ft rule is not the only tap allowance; 240.21(B)(2) permits taps up to 25 ft under its own conditions, which this installation meets." }
    - { id: c, text: "Not compliant — tap conductors must have an ampacity of at least 400 A to match the feeder device", distractorRationale: "That would nullify the tap rules; 240.21(B)(2) requires only 1/3 of the device rating (133 1/3 A), and 135 A satisfies it." }
    - { id: d, text: "Not compliant — the terminating breaker should be 150 A, the next standard size above 135 A", distractorRationale: "Next-size-up has no place here: 240.21(B)(2) requires the terminating device to be rated NO MORE than the tap ampacity, so 150 A would itself create a violation." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Work the 25-ft checklist: length ≤ 25 ft, ampacity ≥ 1/3 of the device, protected from damage, single OCPD ≤ tap ampacity."
    codePath: ["240.21(B)(2)", "400 ÷ 3 = 133.33 A ≤ 135 A", "125 A device ≤ 135 A tap ampacity"]
    steps:
      - { text: "20 ft ≤ 25 ft → evaluate under 240.21(B)(2), not the 10-ft rule.", ref: "240.21(B)(2)" }
      - { text: "1/3 × 400 A = 133 1/3 A; the 135 A conductors qualify." }
      - { text: "The single 125 A breaker does not exceed the 135 A tap ampacity → compliant." }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-ocp-h021
  domainId: nec.overcurrent
  commonMistake: "240.21 opens by prohibiting the 240.4(B) next-size-up allowance for tap conductors — the tap ampacity minimums are hard floors."
  skillIds: [nec.ocp.tap-rules, nec.ocp.next-size-up]
  type: single
  difficulty: 5
  stem: "A 25-ft tap from a feeder protected at 450 A needs a minimum tap-conductor ampacity of 150 A (1/3 of 450 A). The journeyman proposes conductors with a derated ampacity of 140 A, arguing 'next-size-up gets me there.' Which statement is correct?"
  options:
    - { id: a, text: "Not permitted — 240.21 prohibits applying the 240.4(B) next-size-up allowance to tap conductors, so the ampacity must be at least 150 A", isCorrect: true }
    - { id: b, text: "Permitted — 240.4(B) allows the next standard size up whenever the ampacity does not match a standard rating", distractorRationale: "240.21 expressly withholds the 240.4(B) allowance from tap conductors; the 1/3 minimum must be met by actual ampacity." }
    - { id: c, text: "Permitted — as long as the calculated load is 140 A or less, the tap ampacity is adequate", distractorRationale: "Meeting the load is necessary but not sufficient: the 1/3-of-device floor (150 A) applies regardless of how small the load is." }
    - { id: d, text: "Not permitted — tap conductors must always match the full 450 A feeder protection", distractorRationale: "Over-strict: the 25-ft rule allows 1/3 of the device rating (150 A); full feeder ampacity is not required." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Tap minimums are absolute floors — no rounding up from a lower ampacity via 240.4(B)."
    codePath: ["240.21 (opening text) → 240.4(B) not permitted for tap conductors", "240.21(B)(2) → ≥ 1/3 × 450 A = 150 A"]
    steps:
      - { text: "Required tap ampacity: 450 ÷ 3 = 150 A.", ref: "240.21(B)(2)" }
      - { text: "140 A < 150 A, and 240.21 bars using next-size-up to bridge the gap — larger conductors are required.", ref: "240.21" }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

# ---- Which-rule-first ordering & max-vs-min ----------------------------------
- id: q-ocp-h022
  domainId: nec.overcurrent
  skillIds: [nec.ocp.next-size-up, nec.ocp.small-conductor]
  type: single
  difficulty: 4
  stem: "You are sizing the conductor and breaker for a continuous load in a hot, crowded raceway using 90°C-insulated small copper conductors with 75°C terminations. Which sequence of checks is correct?"
  options:
    - { id: a, text: "Load × 125% → derate from the 90°C column → cap at the 75°C termination value → check the 240.4(D) small-conductor ceiling → select the OCPD, using 240.4(B) next-size-up only if its conditions are met", isCorrect: true }
    - { id: b, text: "Load × 125% → derate from the 75°C column → apply 240.4(B) → then check 240.4(D)", distractorRationale: "Derating starts from the insulation rating (90°C column); and selecting a next-size-up device before checking 240.4(D) can land you above the small-conductor ceiling." }
    - { id: c, text: "Derate from the 90°C column → load × 125% of the derated value → select the OCPD", distractorRationale: "The 125% factor applies to the LOAD to set the required minimum, not as a multiplier on the derated ampacity — and the 110.14(C)/240.4(D) checks are missing." }
    - { id: d, text: "Cap at the 75°C termination value first → derate that value → select the OCPD with next-size-up always allowed", distractorRationale: "Correction/adjustment start from the 90°C insulation value, with the 75°C termination applied as a separate cap on the result; and next-size-up is conditional, never automatic." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Requirement (125% load) → derated ampacity (90°C basis) → termination cap → 240.4(D) ceiling → conditional 240.4(B)."
    codePath: ["210.19/210.20 → 125% continuous", "310.15 from Table 310.16 90°C column", "110.14(C)", "240.4(D)", "240.4(B)/240.6(A)"]
    steps:
      - { text: "Compute the required ampacity: continuous load × 125% (plus any noncontinuous at 100%).", ref: "210.19(A)" }
      - { text: "Derate the 90°C table value by ambient correction and CCC adjustment; then take the lower of that and the 75°C termination value.", ref: "110.14(C)" }
      - { text: "Check the 240.4(D) ceiling for small conductors, then pick the device — next-size-up only if 240.4(B)'s conditions hold.", ref: "240.4(D)" }
  trapIds: [continuous-load-125, termination-temp-limit, next-size-up-rounding]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-ocp-h023
  domainId: nec.overcurrent
  commonMistake: "The 125%-continuous calculation gives the MINIMUM device; the conductor ampacity gives the MAXIMUM — and when the ampacity IS a standard rating, there is no next-size-up beyond it."
  skillIds: [nec.ocp.standard-ratings, nec.ocp.next-size-up]
  type: single
  difficulty: 5
  stem: "A feeder serves 50 A of continuous load and 25 A of noncontinuous load using 3 AWG copper conductors at 75°C (allowable ampacity 100 A, no derating required). The minimum OCPD works out to 90 A. What is the MAXIMUM standard rating permitted for this feeder's overcurrent device?"
  options:
    - { id: a, text: "90 A", distractorRationale: "90 A is the MINIMUM from 125% × 50 + 25 = 87.5 A standardized — the question asks how large the device may go while still protecting the 100 A conductors." }
    - { id: b, text: "100 A", isCorrect: true }
    - { id: c, text: "110 A", distractorRationale: "Next-size-up applies only when the ampacity does NOT correspond to a standard rating; 100 A is itself standard, so the device cannot exceed it." }
    - { id: d, text: "125 A", distractorRationale: "This rounds up twice — from 100 A conductor ampacity past 110 A — with no code basis; protection may never exceed a standard-matching ampacity." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Anything from the 90 A minimum up to the conductors' 100 A ampacity is legal; 100 A being a standard rating closes the next-size-up door."
    codePath: ["215.3 → minimum 90 A", "240.4 → device ≤ conductor ampacity", "240.4(B) → inapplicable when ampacity = standard rating"]
    steps:
      - { text: "Minimum: 50 × 1.25 + 25 = 87.5 A → 90 A standard.", ref: "215.3" }
      - { text: "Maximum: conductors are protected at their 100 A ampacity.", ref: "240.4" }
      - { text: "100 A is a standard 240.6(A) rating, so 240.4(B) cannot justify 110 A.", ref: "240.4(B)" }
  trapIds: [continuous-load-125, next-size-up-rounding]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."
