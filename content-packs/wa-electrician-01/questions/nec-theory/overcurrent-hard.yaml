# ---- 240.4(B) permitted vs FORBIDDEN ----------------------------------------
- id: q-ocp-h012
  domainId: nec.overcurrent
  commonMistake: "Above 800 A the next-size-up allowance disappears: the conductor ampacity must be at least the device rating, so you round the DEVICE down, never the protection up."
  skillIds: [nec.ocp.next-size-up, nec.ocp.standard-ratings]
  type: single
  difficulty: 5
  stem: "Parallel service-lateral conductors have a combined allowable ampacity of 830 A and supply a 780 A noncontinuous load. The engineer pencils in a 1000 A main. What is the maximum standard overcurrent device rating actually permitted to protect these conductors?"
  options:
    - { id: a, text: "800 A", isCorrect: true }
    - { id: b, text: "1000 A", distractorRationale: "This applies the 240.4(B) next-size-up allowance, which is only available where the device does not exceed 800 A — above that, the ampacity must be at least the device rating." }
    - { id: c, text: "830 A", distractorRationale: "830 A is the conductor ampacity, not a standard 240.6(A) device rating; the device must be a standard (or listed adjustable) rating not exceeding the ampacity." }
    - { id: d, text: "900 A", distractorRationale: "900 A is not a standard rating in 240.6(A) — the list jumps from 800 A to 1000 A." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Over 800 A, 240.4(C) flips the rule: conductor ampacity ≥ device rating, so the device rounds DOWN to 800 A."
    codePath: ["240.4(B) → allowance limited to devices ≤ 800 A", "240.4(C) → ampacity ≥ rating above 800 A", "240.6(A) → 800 A is the largest standard rating ≤ 830 A"]
    steps:
      - { text: "Next standard size above 830 A would be 1000 A — but 1000 > 800, so 240.4(B) cannot be used.", ref: "240.4(B)" }
      - { text: "For a device over 800 A, the conductor ampacity (830 A) must be ≥ the device rating — 1000 A fails.", ref: "240.4(C)" }
      - { text: "Largest standard rating not exceeding 830 A is 800 A.", ref: "240.6(A)" }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-ocp-h013
  domainId: nec.overcurrent
  skillIds: [nec.ocp.next-size-up]
  type: single
  difficulty: 4
  stem: "Four circuits each have a conductor ampacity that falls between standard OCPD ratings. For which one is the 240.4(B) next-size-up allowance NOT available?"
  options:
    - { id: a, text: "A feeder to fixed electric space heating, conductor ampacity 96 A", distractorRationale: "A feeder to fixed equipment has no cord-and-plug receptacle outlets, so 240.4(B) is available (next size 100 A)." }
    - { id: b, text: "A branch circuit supplying multiple general-use receptacles, conductor ampacity 27 A", isCorrect: true }
    - { id: c, text: "A feeder to a single fixed appliance, conductor ampacity 57 A", distractorRationale: "A dedicated feeder to fixed equipment meets the 240.4(B) conditions (next size 60 A)." }
    - { id: d, text: "An 8 AWG copper circuit to fixed equipment with a derated ampacity of 44 A", distractorRationale: "8 AWG is above the 240.4(D) small-conductor sizes, and fixed equipment has no receptacle outlets — next size 45 A is permitted." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "240.4(B)(1) bars next-size-up on multioutlet branch circuits supplying receptacles for cord-and-plug-connected portable loads."
    codePath: ["240.4(B)(1)–(3)"]
    steps:
      - { text: "The allowance requires: no multioutlet receptacle circuit, ampacity not matching a standard rating, and a device ≤ 800 A.", ref: "240.4(B)" }
      - { text: "Only the multiple-receptacle branch circuit fails a condition — its OCPD must round DOWN.", ref: "240.4(B)(1)" }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-ocp-h014
  domainId: nec.overcurrent
  commonMistake: "Above 800 A there is no rounding in either direction on the protection side — the CONDUCTOR must rise to meet the device."
  skillIds: [nec.ocp.standard-ratings, nec.ocp.next-size-up]
  type: single
  difficulty: 4
  stem: "A switchboard main is specified as a 1200 A circuit breaker. Under 240.4(C), what is the minimum allowable ampacity of the feeder conductors it protects?"
  options:
    - { id: a, text: "1200 A", isCorrect: true }
    - { id: b, text: "1000 A", distractorRationale: "This treats the next standard rating BELOW the device as acceptable — 240.4(C) requires the ampacity to be at least the device rating, with no next-size-up allowance." }
    - { id: c, text: "1500 A", distractorRationale: "This applies a 125% factor that belongs to continuous-load sizing (215.3), not to the 240.4(C) ampacity-vs-device comparison." }
    - { id: d, text: "960 A", distractorRationale: "This is 80% of the device rating — an inverted continuous-load factor; no such reduction exists in 240.4(C)." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "For devices over 800 A, the conductor ampacity must be greater than or equal to the device rating — full stop."
    codePath: ["240.4(C)"]
    steps:
      - { text: "1200 A > 800 A, so 240.4(B) is off the table.", ref: "240.4(B)" }
      - { text: "The conductors must have an allowable ampacity of at least 1200 A.", ref: "240.4(C)" }
  trapIds: [next-size-up-rounding, continuous-load-125]
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-ocp-h015
  domainId: nec.overcurrent
  commonMistake: "Both 240.4(B) and 240.4(D) are in play here: next-size-up is fine, but only up to the small-conductor ceiling."
  skillIds: [nec.ocp.small-conductor, nec.ocp.next-size-up]
  type: single
  difficulty: 5
  stem: "A 12 AWG THHN/THWN-2 copper circuit runs with 9 current-carrying conductors through a 40°C ceiling space (75°C terminations) and feeds a fixed 18 A noncontinuous load with no receptacles. Its corrected and adjusted ampacity computes to 19.11 A. What is the maximum standard breaker permitted?"
  options:
    - { id: a, text: "15 A", distractorRationale: "This rounds down on the assumption that small conductors can never use 240.4(B) — the allowance applies as long as the result does not exceed the 240.4(D) cap, and 20 A equals the cap exactly." }
    - { id: b, text: "20 A", isCorrect: true }
    - { id: c, text: "25 A", distractorRationale: "This is the 75°C table value used as the limit with no derating and no 240.4(D) check — 25 A exceeds the 20 A cap for 12 AWG Cu." }
    - { id: d, text: "30 A", distractorRationale: "This is the raw 90°C table cell (30 A) with derating and the small-conductor cap both ignored." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Next-size-up from the derated ampacity is permitted, and here it lands exactly on the 240.4(D) ceiling."
    codePath: ["Table 310.16 → 12 Cu @90°C = 30 A", "30 × 0.91 × 0.70 = 19.11 A", "240.4(B) + 240.6(A) → 20 A", "240.4(D) → 20 A cap (met, not exceeded)"]
    steps:
      - { text: "Derated ampacity: 30 × 0.91 (40°C) × 0.70 (9 CCC) = 19.11 A; load 18 A fits.", ref: "310.15" }
      - { text: "Next standard size above 19.11 A is 20 A.", ref: "240.4(B)" }
      - { text: "20 A does not exceed the 240.4(D) cap for 12 AWG Cu → 20 A is the maximum.", ref: "240.4(D)" }
  trapIds: [next-size-up-rounding, adjusted-vs-corrected-ampacity, termination-temp-limit]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
