- id: q-ocp-h016
  domainId: nec.overcurrent
  commonMistake: "When the next standard size ABOVE the derated ampacity would exceed the 240.4(D) cap, the cap wins and the breaker drops to the cap value."
  skillIds: [nec.ocp.small-conductor, nec.ocp.next-size-up]
  type: single
  difficulty: 5
  stem: "A 14 AWG THHN/THWN-2 copper control-power circuit shares a raceway with 5 current-carrying conductors through a 45°C area and supplies a fixed 14 A noncontinuous load. Its corrected and adjusted ampacity computes to 17.4 A. What is the maximum standard breaker permitted?"
  options:
    - { id: a, text: "20 A", distractorRationale: "20 A is the 240.4(B) next size above 17.4 A, but it exceeds the 15 A small-conductor cap for 14 AWG Cu — 240.4(B) cannot carry you past 240.4(D)." }
    - { id: b, text: "15 A", isCorrect: true }
    - { id: c, text: "25 A", distractorRationale: "This is the raw 90°C table cell for 14 AWG Cu with derating and the 240.4(D) cap both ignored." }
    - { id: d, text: "30 A", distractorRationale: "This confuses 14 AWG with the 10 AWG copper cap (30 A) from 240.4(D)." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "240.4(B) can round up only within the 240.4(D) ceiling — here the ceiling (15 A) is below the would-be next size (20 A)."
    codePath: ["Table 310.16 → 14 Cu @90°C = 25 A", "25 × 0.87 × 0.80 = 17.4 A", "240.4(B) would give 20 A", "240.4(D) → 15 A ceiling governs"]
    steps:
      - { text: "Derated ampacity: 25 × 0.87 (45°C) × 0.80 (5 CCC) = 17.4 A; the 14 A load fits.", ref: "310.15" }
      - { text: "Next standard size above 17.4 A is 20 A — but 240.4(D) caps 14 AWG Cu at 15 A.", ref: "240.4(D)" }
      - { text: "Maximum breaker = 15 A; 17.4 A ampacity still exceeds the 15 A device, so the install works.", ref: "240.4(D)" }
  trapIds: [next-size-up-rounding, adjusted-vs-corrected-ampacity]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-ocp-h017
  domainId: nec.overcurrent
