- id: q-box-h014
  domainId: nec.box-fill
  skillIds: [nec.box.egc-allowance, nec.box.device-clamp-allowance]
  type: single
  difficulty: 8
  stem: "A box marked 18.0 in³ contains six 12 AWG circuit conductors (all spliced), internal cable clamps, and three 12 AWG equipment grounding conductors joined together. No devices are installed. Does this installation comply with 314.16?"
  options:
    - id: a
      text: "Yes — the required fill is exactly 18.0 in³, and fill equal to the marked volume is permitted."
      isCorrect: true
    - id: b
      text: "No — the required fill is 22.5 in³ because each of the three EGCs takes its own allowance."
      distractorRationale: "All EGCs together contribute ONE allowance (2.25 in³), not one each; counting them separately adds a phantom 4.5 in³."
    - id: c
      text: "No — the calculated fill equals the box volume, and the box must always be larger than the calculated fill."
      distractorRationale: "314.16 requires the box volume to be NOT LESS THAN the total fill; equal is compliant. There is no next-size-up rule for boxes."
    - id: d
      text: "Yes — only the six circuit conductors count (13.5 in³); clamps and EGCs never add volume."
      distractorRationale: "Internal clamps add one allowance and the EGCs add one allowance; the compliant total is 18.0 in³, not 13.5 in³."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Fill = 18.0 in³ (6 × 2.25 + clamp 2.25 + one EGC allowance 2.25); a box volume equal to the required fill complies."
    codePath: ["314.16(B)(1)", "314.16(B)(2)", "314.16(B)(5)", "314.16(A)"]
    steps:
      - { text: "Conductors: 6 × 2.25 = 13.50 in³." }
      - { text: "Clamps = 2.25 in³; all three EGCs = one allowance = 2.25 in³." }
      - { text: "Total = 18.00 in³ = marked volume → compliant (volume must be ≥ fill).", ref: "314.16(A)" }
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-box-h015
  recompute: { calc: boxFill, inputs: { conductors: { "12": 8 }, clampSize: "12", deviceCount: 3, deviceSize: "12", egcSize: "12" } }
  domainId: nec.box-fill
  commonMistake: "If you got 27.0, you counted only one double allowance for the three switches. EACH yoke gets its own 2× allowance: 3 × 2 × 2.25 = 13.5 in³."
  skillIds: [nec.box.device-clamp-allowance, nec.box.conductor-count, nec.box.egc-allowance]
  type: numeric
  difficulty: 7
  stem: "A three-gang box with internal cable clamps contains eight 12 AWG circuit conductors and three single-pole switches, each on its own yoke with 12 AWG conductors landed on it. Equipment grounding conductors are all 12 AWG. What minimum box volume (in³) is required?"
  answer: { kind: numeric, value: 36.0, unit: "in³", tolerance: 0.01 }
  solution:
    keyIdea: "Device fill is per yoke: three yokes = three double allowances, while clamps and EGCs each stay at one allowance total."
    codePath: ["314.16(B)(1)", "314.16(B)(2)", "314.16(B)(4)", "314.16(B)(5)"]
    steps:
      - { text: "Conductors: 8 × 2.25 = 18.00 in³." }
      - { text: "Clamps = one allowance = 2.25 in³." }
      - { text: "Three yokes: 3 × 2 × 2.25 = 13.50 in³.", ref: "314.16(B)(4)" }
      - { text: "All EGCs = one allowance = 2.25 in³." }
      - { text: "Total = 18.00 + 2.25 + 13.50 + 2.25 = 36.00 in³." }
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-box-h016
  domainId: nec.box-fill
  skillIds: [nec.box.conductor-count]
  type: single
  difficulty: 7
  stem: "Which of the following items in a box MUST be assigned a volume allowance under 314.16(B)?"
  options:
    - id: a
      text: "A 12 AWG conductor passing through unbroken with a 30 in. loop where 300.14 requires 6 in. of free conductor."
      isCorrect: true
    - id: b
      text: "A 12 AWG pigtail from a splice to a receptacle."
      distractorRationale: "Conductors that originate and terminate within the box (pigtails) are excluded from the count by 314.16(B)(1)."
    - id: c
      text: "Wire connectors (wirenuts) on the splices."
      distractorRationale: "Small fittings such as wire connectors, locknuts, and bushings are not counted in box fill."
    - id: d
      text: "A cable connector with its clamping mechanism outside the box."
      distractorRationale: "314.16(B)(2) exempts clamp assemblies located outside the box; only internal clamps take an allowance."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "A long-looped unbroken conductor not only counts — it counts twice when the loop is at least twice the 300.14 minimum."
    codePath: ["314.16(B)(1)", "314.16(B)(2)", "300.14"]
    steps:
      - { text: "30 in. loop ≥ 2 × 6 in. minimum → the conductor counts (as two allowances).", ref: "314.16(B)(1)" }
      - { text: "Pigtails, wirenuts, and external clamps are all excluded from the count." }
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-box-h017
  recompute: { calc: boxFill, inputs: { conductors: { "10": 4, "12": 2 }, clampSize: "10", deviceCount: 1, deviceSize: "12", egcSize: "10" } }
  domainId: nec.box-fill
  commonMistake: "If you got 24.5, you counted the receptacle yoke at 10 AWG because 10 AWG is the largest conductor in the box. The yoke allowance uses the largest conductor CONNECTED TO THE YOKE — only 12 AWG lands on the receptacle."
  skillIds: [nec.box.largest-conductor, nec.box.device-clamp-allowance, nec.box.egc-allowance]
  type: numeric
  difficulty: 8
  stem: "A box with internal cable clamps contains four 10 AWG feeder conductors that are spliced through, two 12 AWG conductors serving a receptacle, and equipment grounding conductors of 10 AWG and 12 AWG. Only the 12 AWG conductors are landed on the receptacle yoke. What minimum box volume (in³) does 314.16(B) require?"
  answer: { kind: numeric, value: 24.0, unit: "in³", tolerance: 0.01 }
  solution:
    keyIdea: "The yoke counts at 12 AWG (largest connected to it); the clamps count at 10 AWG (largest in box); the EGCs count once at 10 AWG (largest EGC)."
    codePath: ["314.16(B)(1)", "314.16(B)(2)", "314.16(B)(4)", "314.16(B)(5)", "Table 314.16(B)"]
    steps:
      - { text: "Conductors: 4 × 2.50 + 2 × 2.25 = 10.00 + 4.50 = 14.50 in³." }
      - { text: "Clamps = one 10 AWG allowance = 2.50 in³." }
      - { text: "Receptacle yoke = 2 × 2.25 = 4.50 in³ — only 12 AWG is connected to it.", ref: "314.16(B)(4)" }
      - { text: "All EGCs = one 10 AWG allowance = 2.50 in³ (largest EGC)." }
      - { text: "Total = 14.50 + 2.50 + 4.50 + 2.50 = 24.00 in³." }
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-box-h018
  recompute: { calc: boxFill, inputs: { conductors: { "12": 4, "10": 2 }, clampSize: "10", egcSize: "10" } }
  domainId: nec.box-fill
  commonMistake: "If you got 18.75, you sized the EGC allowance at 12 AWG. With both 12 AWG and 10 AWG EGCs present, the single EGC allowance is based on the LARGEST EGC (10 AWG = 2.5 in³)."
  skillIds: [nec.box.egc-allowance, nec.box.largest-conductor]
  type: numeric
  difficulty: 7
  stem: "A splice box with internal cable clamps contains four 12 AWG and two 10 AWG circuit conductors, plus equipment grounding conductors of both 12 AWG and 10 AWG joined together. There are no devices. What minimum box volume (in³) is required?"
  answer: { kind: numeric, value: 19.0, unit: "in³", tolerance: 0.01 }
  solution:
    keyIdea: "One EGC allowance for all EGCs, sized by the largest EGC in the box (10 AWG)."
    codePath: ["314.16(B)(1)", "314.16(B)(2)", "314.16(B)(5)", "Table 314.16(B)"]
    steps:
      - { text: "Conductors: 4 × 2.25 + 2 × 2.50 = 9.00 + 5.00 = 14.00 in³." }
      - { text: "Clamps = one 10 AWG allowance = 2.50 in³ (largest conductor in box)." }
      - { text: "All EGCs = one 10 AWG allowance = 2.50 in³ (largest EGC present).", ref: "314.16(B)(5)" }
      - { text: "Total = 14.00 + 2.50 + 2.50 = 19.00 in³." }
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-box-h019
  domainId: nec.box-fill
  skillIds: [nec.box.largest-conductor, nec.box.device-clamp-allowance]
  type: single
  difficulty: 8
  stem: "An installer plans to use a box marked 22.5 in³ for this arrangement: four 10 AWG conductors spliced through, two 12 AWG conductors landed on a receptacle, internal cable clamps, and 10 AWG plus 12 AWG equipment grounding conductors. Is the 22.5 in³ box acceptable?"
  options:
    - id: a
      text: "No — the required fill is 24.0 in³, so the box is 1.5 in³ too small."
      isCorrect: true
    - id: b
      text: "Yes — the required fill is 21.5 in³, which fits."
      distractorRationale: "This total omits the internal clamp allowance (one 10 AWG allowance, 2.5 in³). With it, the fill is 24.0 in³."
    - id: c
      text: "No — the required fill is 24.5 in³ because the yoke counts at 10 AWG, the largest conductor in the box."
      distractorRationale: "The conclusion happens to be 'no', but the fill is wrong: the yoke counts at the largest conductor CONNECTED to it (12 AWG → 4.5 in³), giving 24.0, not 24.5. On an exam the exact fill matters."
    - id: d
      text: "Yes — 19.5 in³, because the EGCs share one allowance with the clamps."
      distractorRationale: "Clamps and EGCs are separate categories: one allowance for all clamps (314.16(B)(2)) PLUS one allowance for all EGCs (314.16(B)(5))."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Work every allowance category on its own basis, total it, then compare against the marked volume."
    codePath: ["314.16(B)(1)-(5)", "314.16(A)", "Table 314.16(B)"]
    steps:
      - { text: "Conductors: 4 × 2.50 + 2 × 2.25 = 14.50 in³." }
      - { text: "Clamps 2.50 (largest in box) + yoke 2 × 2.25 = 4.50 (largest connected) + EGCs 2.50 (largest EGC) = 9.50 in³." }
      - { text: "Required = 24.00 in³ > 22.5 in³ marked → box too small.", ref: "314.16(A)" }
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-box-h020
  domainId: nec.box-fill
  skillIds: [nec.box.device-clamp-allowance, nec.box.largest-conductor]
  type: single
  difficulty: 7
  stem: "Four NM cables enter a box through four separate internal cable clamps. The box contains 10 AWG and 14 AWG conductors. What clamp allowance is required in the fill calculation?"
  options:
    - id: a
      text: "One allowance of 2.5 in³ (a single allowance based on the largest conductor in the box)."
      isCorrect: true
    - id: b
      text: "Four allowances of 2.5 in³ each (one per clamp)."
      distractorRationale: "314.16(B)(2) assigns a SINGLE allowance no matter how many internal clamps the box contains."
    - id: c
      text: "One allowance of 2.0 in³, based on the smallest conductor."
      distractorRationale: "The clamp allowance is based on the LARGEST conductor in the box (10 AWG = 2.5 in³), not the smallest."
    - id: d
      text: "No allowance — clamps are fittings and fittings are never counted."
      distractorRationale: "Fittings like locknuts and bushings aren't counted, but internal cable clamps specifically take one allowance under 314.16(B)(2)."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Any number of internal clamps = exactly one allowance, at the largest conductor in the box."
    codePath: ["314.16(B)(2)", "Table 314.16(B) → 10 AWG = 2.5 in³"]
    steps:
      - { text: "Internal clamps present → add one allowance total.", ref: "314.16(B)(2)" }
      - { text: "Largest conductor in the box is 10 AWG → 2.5 in³." }
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-box-h021
  recompute: { calc: boxFill, inputs: { conductors: { "12": 9, "14": 2 }, clampSize: "12", deviceCount: 2, deviceSize: "12", egcSize: "12" } }
  domainId: nec.box-fill
  commonMistake: "If you got 42.25, you counted the two pigtails and gave each EGC its own allowance. Pigtails count zero, and all EGCs share one 2.25 in³ allowance."
  skillIds: [nec.box.conductor-count, nec.box.device-clamp-allowance, nec.box.egc-allowance, nec.box.largest-conductor]
  type: numeric
  difficulty: 8
  stem: "A kitchen two-gang box with internal cable clamps contains nine 12 AWG circuit conductors and two 14 AWG switch-leg conductors. Two devices are installed: a receptacle with 12 AWG landed on it, and a switch with a 12 AWG feed plus a 14 AWG leg landed on it. Two 12 AWG pigtails run from splices to the devices, and all equipment grounding conductors are 12 AWG. What minimum box volume (in³) is required?"
  answer: { kind: numeric, value: 37.75, unit: "in³", tolerance: 0.01 }
  solution:
    keyIdea: "Ignore the pigtails, take each yoke at the largest conductor connected to it (both 12 AWG), and give clamps and EGCs one allowance each."
    codePath: ["314.16(B)(1)-(5)", "Table 314.16(B)"]
    steps:
      - { text: "Conductors: 9 × 2.25 + 2 × 2.00 = 20.25 + 4.00 = 24.25 in³ (pigtails = 0)." }
      - { text: "Clamps = one 12 AWG allowance = 2.25 in³." }
      - { text: "Two yokes, both with 12 AWG connected: 2 × 2 × 2.25 = 9.00 in³.", ref: "314.16(B)(4)" }
      - { text: "All EGCs = one 12 AWG allowance = 2.25 in³." }
      - { text: "Total = 24.25 + 2.25 + 9.00 + 2.25 = 37.75 in³." }
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-box-h022
  domainId: nec.box-fill
  skillIds: [nec.box.conductor-count]
  type: single
  difficulty: 7
  stem: "During a fill calculation for a crowded device box, an apprentice adds one allowance for each of the three 12 AWG pigtails connecting the splices to the receptacle. What is the correct treatment of those pigtails?"
  options:
    - id: a
      text: "They count as zero allowances — conductors that originate and terminate inside the box are excluded."
      isCorrect: true
    - id: b
      text: "One allowance each, like any other conductor in the box."
      distractorRationale: "314.16(B)(1) counts conductors that ORIGINATE OUTSIDE the box; a pigtail begins at a splice and ends at the device, both inside, so it is excluded."
    - id: c
      text: "Half an allowance each, since they are shorter than the conductors entering the box."
      distractorRationale: "There is no half-allowance concept in 314.16(B); conductors either count in whole allowances or not at all."
    - id: d
      text: "Zero allowances, but only when the pigtails are shorter than 6 in."
      distractorRationale: "The exclusion has no length condition — pigtails of any length are uncounted (300.14 governs minimum free length, not fill)."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Pigtails never add fill; they exist entirely within the box."
    codePath: ["314.16(B)(1)"]
    steps:
      - { text: "A conductor with no part leaving the box takes no volume allowance, regardless of length.", ref: "314.16(B)(1)" }
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."
