      - { text: "All internal clamps together = one allowance at the largest conductor in the box: 2.25 in³.", ref: "314.16(B)(2)" }
      - { text: "Receptacle yoke = 2 allowances at the largest conductor CONNECTED TO IT (12 AWG): 2 × 2.25 = 4.50 in³.", ref: "314.16(B)(4)" }
      - { text: "All EGCs together = one allowance at the largest EGC (12 AWG): 2.25 in³.", ref: "314.16(B)(5)" }
