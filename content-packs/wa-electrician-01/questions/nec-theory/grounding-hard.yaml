# ---- 250.122(B) proportional upsizing (numeric, cmilRatio) -------------------
- id: q-gnd-h013
  recompute: { calc: cmilRatio, inputs: { newSize: "8", origSize: "12" } }
  domainId: nec.grounding-bonding
  commonMistake: "If you got 0.40, you divided original by new. The multiplier is new ÷ original: 16,510 ÷ 6,530."
  skillIds: [nec.gnd.egc-sizing]
