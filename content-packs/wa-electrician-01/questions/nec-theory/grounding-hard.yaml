# ---- Parallel-run EGCs (250.122(F): full size in each raceway) --------------
- id: q-gnd-h005
  recompute: { calc: egcSize, inputs: { ocpd: 450 } }
  domainId: nec.grounding-bonding
  commonMistake: "If you divided 450 A by the two runs and looked up 225 A, remember: each raceway's EGC is sized for the FULL rating of the feeder OCPD."
  skillIds: [nec.gnd.egc-sizing]
  type: single
  difficulty: 8
  stem: "A 450 A feeder is run as two parallel sets of conductors in two separate PVC raceways, with a wire-type copper EGC in each raceway. Per 250.122(F) and Table 250.122, what is the minimum size of EACH equipment grounding conductor?"
  options:
    - { id: a, text: "2 AWG in each raceway", isCorrect: true }
    - { id: b, text: "4 AWG in each raceway", distractorRationale: "This divides 450 A by the two runs (225 A → 4 AWG). A fault can return through one raceway alone, so each EGC must be sized for the full 450 A device." }
    - { id: c, text: "3 AWG in each raceway", distractorRationale: "3 AWG is the ≤400 A row. A 450 A device is over that edge — the ≤500 A row (2 AWG) governs." }
    - { id: d, text: "One 2 AWG EGC in either raceway is sufficient", distractorRationale: "250.122(F) requires an EGC in EACH raceway of a parallel run, not one shared conductor." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Parallel runs need a full-size EGC (per the total OCPD rating) in every raceway, because fault current may return on only one path."
    codePath: ["250.122(F) → EGC in each raceway, sized per Table 250.122", "Table 250.122 → 450 A → ≤500 A row → 2 AWG Cu"]
    steps:
      - { text: "Each raceway of a parallel feeder must contain a wire EGC sized for the feeder OCPD.", ref: "250.122(F)" }
      - { text: "450 A is over 400 A → ≤500 A row → 2 AWG copper in each raceway.", ref: "Table 250.122" }
  trapIds: [table-column-selection]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

