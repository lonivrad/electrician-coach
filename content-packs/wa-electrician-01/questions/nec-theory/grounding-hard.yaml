# ---- Conceptual rule-selection / bonding (single, no recompute) --------------
- id: q-gnd-h020
  domainId: nec.grounding-bonding
  commonMistake: "If you thought the EGCs could share the fault duty, remember: a ground fault in one raceway returns on THAT raceway's EGC alone."
  skillIds: [nec.gnd.bonding]
  type: single
  difficulty: 8
  stem: "Why does 250.122(F) require the wire-type EGC in EACH raceway of a parallel feeder to be full-sized from the feeder OCPD rating, rather than letting the parallel EGCs share the required circular-mil area?"
  options:
    - { id: a, text: "Because a ground fault in one raceway may have only that raceway's EGC as its low-impedance return path, and it must carry enough fault current to open the full-size OCPD.", isCorrect: true }
    - { id: b, text: "Because parallel EGCs must match the ungrounded conductors' size in each raceway.", distractorRationale: "EGCs are sized from Table 250.122 by OCPD, not by matching the phase conductors (though they never need to be larger than them)." }
    - { id: c, text: "Because splitting the EGC area is only prohibited in nonmetallic raceways.", distractorRationale: "The each-raceway rule applies to wire-type EGCs in parallel runs generally — it is about the fault-return path, not the raceway material." }
    - { id: d, text: "Because the NEC requires all conductors of a circuit, including EGCs, to be identical in every parallel raceway.", distractorRationale: "The conductors must be grouped per raceway, but the EGC size comes from Table 250.122 — 'identical everywhere' is not the reason and overstates the rule." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Effective ground-fault current path: each raceway's EGC must alone clear the full OCPD, since a fault sees only its own raceway's return."
    codePath: ["250.122(F)", "250.4(A)(5) → effective ground-fault current path"]
    steps:
      - { text: "A phase-to-ground fault inside one raceway returns primarily on that raceway's EGC.", ref: "250.4(A)(5)" }
      - { text: "So each parallel raceway carries an EGC sized from the full feeder OCPD per Table 250.122.", ref: "250.122(F)" }
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier conceptual question; SME-verify before live."

