# ---- Full 250.122(B) chains (conceptual single; exceeds one calculator) ------
- id: q-gnd-h016
  domainId: nec.grounding-bonding
  commonMistake: "If you picked 8 AWG, you ignored 250.122(B) — upsizing the phase conductors for voltage drop forces a proportional EGC upsize."
  skillIds: [nec.gnd.egc-sizing]
  type: single
  difficulty: 8
  stem: "A 100 A feeder was designed with 3 AWG copper (52,620 cmil) and an 8 AWG copper EGC (16,510 cmil). For voltage drop, the ungrounded conductors are installed as 1/0 AWG (105,600 cmil). Per 250.122(B), what is the minimum copper EGC? (6 AWG = 26,240 cmil; 4 AWG = 41,740 cmil)"
  options:
    - { id: a, text: "8 AWG", distractorRationale: "8 AWG is the Table 250.122 base for a 100 A device, but 250.122(B) requires a proportional increase whenever the ungrounded conductors are upsized for voltage drop." }
    - { id: b, text: "6 AWG", distractorRationale: "Bumping the EGC 'one size like the phases moved one row' is not the rule — 16,510 × (105,600 ÷ 52,620) ≈ 33,132 cmil, and 6 AWG (26,240 cmil) falls short." }
    - { id: c, text: "4 AWG", isCorrect: true }
    - { id: d, text: "1/0 AWG", distractorRationale: "The EGC does not have to match the new phase-conductor size — only grow by the same circular-mil ratio." }
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "Chain: base EGC from Table 250.122 → cmil ratio of the upsize → smallest standard conductor meeting the required area."
    codePath: ["Table 250.122 → 100 A → 8 AWG (16,510 cmil)", "250.122(B) → ratio = 105,600 ÷ 52,620 = 2.01", "16,510 × 2.01 ≈ 33,132 cmil → 4 AWG"]
    steps:
      - { text: "Base EGC for a 100 A OCPD is 8 AWG = 16,510 cmil.", ref: "Table 250.122" }
      - { text: "Upsize ratio = 105,600 ÷ 52,620 = 2.01.", ref: "Chapter 9, Table 8" }
      - { text: "Required EGC area = 16,510 × 2.01 ≈ 33,132 cmil. 6 AWG (26,240) is too small; 4 AWG (41,740) is the minimum.", ref: "250.122(B)" }
  trapIds: [table-column-selection]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier chain question (multi-calculator scenario, keyed as single); SME-verify before live."

