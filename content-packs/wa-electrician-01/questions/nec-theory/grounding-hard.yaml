# ---- EGC via a derived OCPD (chain: load → 240.6 → Table 250.122) -----------
- id: q-gnd-h001
  recompute: { calc: egcSize, inputs: { ocpd: 110 } }
  domainId: nec.grounding-bonding
  commonMistake: "If you got 8 AWG, you skipped the 125% continuous factor: 88 A × 1.25 = 110 A OCPD, which is over the 100 A row."
  skillIds: [nec.gnd.egc-sizing]
  type: single
  difficulty: 7
  stem: "A feeder serves an 88 A continuous load (no noncontinuous load). The OCPD is sized at the minimum standard rating permitted by 215.3 and 240.6(A). What is the minimum copper equipment grounding conductor for this feeder per Table 250.122?"
  options:
    - { id: a, text: "8 AWG", distractorRationale: "Sizing the OCPD at 88 A (forgetting the 125% continuous factor) lands in the ≤100 A row. The required OCPD is 88 × 1.25 = 110 A." }
    - { id: b, text: "6 AWG", isCorrect: true }
    - { id: c, text: "10 AWG", distractorRationale: "10 AWG is the EGC for a ≤60 A device — this reads the wrong row entirely." }
    - { id: d, text: "4 AWG", distractorRationale: "4 AWG applies above 200 A. Skipping ahead a row overshoots the 110 A device." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "The EGC follows the OCPD rating you actually install — derive the OCPD first (125% of continuous), then read Table 250.122."
    codePath: ["215.3 → 88 A × 1.25 = 110 A", "240.6(A) → 110 A standard", "Table 250.122 → over 100 A, ≤200 A → 6 AWG Cu"]
    steps:
      - { text: "Minimum OCPD = 88 A × 1.25 = 110 A, a standard 240.6(A) rating.", ref: "215.3" }
      - { text: "110 A exceeds the 100 A row, so use the ≤200 A row → 6 AWG copper EGC.", ref: "Table 250.122" }
  trapIds: [continuous-load-125, table-column-selection]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

