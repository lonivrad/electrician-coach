- id: q-wm-h011
  domainId: nec.wiring-methods
  commonMistake: "The interior of a raceway installed underground is a WET location — insulation must be wet-rated no matter how well the conduit is glued."
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 5
  stem: "An apprentice proposes pulling THHN-only (not dual-rated) conductors through underground Schedule 40 PVC between two buildings, arguing the glued conduit will keep them dry. Which statement is correct?"
  options:
    - { id: a, text: "Acceptable — a solvent-welded PVC system is considered a dry location", distractorRationale: "The Code presumes water WILL enter underground raceways; tight joints do not change the wet-location classification." }
    - { id: b, text: "Acceptable if the conduit is sloped to drain", distractorRationale: "Drainage does not reclassify the raceway interior; 300.5(B) declares it wet regardless of installation care." }
    - { id: c, text: "Not acceptable — the interior of an underground raceway is a wet location, so conductors must be listed for wet locations (e.g., THWN)", isCorrect: true }
    - { id: d, text: "Not acceptable — conductors may never be installed in underground PVC; only UF cable may be used underground", distractorRationale: "Underground PVC with wet-rated conductors is a standard, fully compliant method; the defect here is the insulation rating, not the raceway." }
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "300.5(B): the interior of enclosures and raceways installed underground is a wet location, so every conductor inside must be wet-rated."
    codePath: ["300.5(B) → underground raceway interior = wet location", "310.10(C) → wet locations require listed wet-location insulation"]
    steps:
      - { text: "Classify the environment: underground raceway interior is defined as a wet location.", ref: "300.5(B)" }
      - { text: "Wet locations require insulation listed for wet use — THWN, XHHW, or dual-rated THHN/THWN; plain THHN is dry/damp only.", ref: "310.10(C)" }
      - { text: "The fix is dual-rated conductors, not a tighter glue joint." }
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

