# ---- Burial-depth column selection (calculator-backed numerics) -------------
- id: q-wm-h001
  recompute: { calc: burialDepth, inputs: { method: directBurial } }
  domainId: nec.wiring-methods
  commonMistake: "If you got 12 in, you applied the Column 4 reduced cover — that column requires 120 V or less AND 20 A or less. A 240 V, 30 A circuit fails both limits even with GFCI protection."
  skillIds: [nec.wm.burial-depth]
  type: numeric
  difficulty: 5
  stem: "A residential well pump is fed by a 240 V, 30 A branch circuit using direct-buried UF cable across the back yard (no other cover conditions apply). The breaker is a GFCI type. Per Table 300.5, what minimum cover (inches) is required?"
  answer: { kind: numeric, value: 24, unit: "in", tolerance: 0 }
  solution:
    keyIdea: "GFCI protection alone does not buy the 12 in column — Column 4 also caps the circuit at 120 V and 20 A."
    codePath: ["Table 300.5, Column 4 conditions → not met (240 V, 30 A)", "Table 300.5, Column 1 (direct burial) → 24 in"]
    steps:
      - { text: "Check the reduced-cover column: it applies only to residential branch circuits rated 120 V or less, protected at 20 A or less, with GFCI protection.", ref: "Table 300.5" }
      - { text: "This circuit is 240 V and 30 A — two of the three conditions fail, so the reduction is unavailable despite the GFCI breaker." }
      - { text: "Fall back to the wiring-method column: direct-buried cable → 24 in minimum cover.", ref: "Table 300.5, Column 1" }
  trapIds: [table-column-selection]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

