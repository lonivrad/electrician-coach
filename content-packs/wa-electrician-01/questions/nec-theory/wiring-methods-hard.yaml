  stem: "NM cable enters a single-gang nonmetallic device box that has no internal cable clamps (the sheath extends into the box as required). To use this clamp-less box legally, the cable must be secured within what distance of the box?"
  options:
    - { id: a, text: "12 in", distractorRationale: "12 in is the general 334.30 securing distance where the box has clamps; the clamp-less single-gang allowance tightens this to 8 in." }
    - { id: b, text: "8 in", isCorrect: true }
    - { id: c, text: "4.5 ft", distractorRationale: "4½ ft is the run's support INTERVAL, not the securing distance at a box." }
    - { id: d, text: "No securing is required at nonmetallic boxes", distractorRationale: "The opposite — omitting the clamp is only allowed because a nearby (8 in) external securing point substitutes for it." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "The clamp-less single-gang nonmetallic box trade-off: no internal clamp is permitted only if the cable is secured within 8 in of the box."
    codePath: ["314.17(C) → single-gang nonmetallic box without clamps: secure within 8 in", "Compare 334.30 general → 12 in where the box has clamps"]
    steps:
      - { text: "General NM rule: secured within 12 in of every box or fitting with clamps.", ref: "334.30" }
      - { text: "Single-gang nonmetallic boxes may omit clamps only where the cable is secured within 8 in of the box, measured along the sheath.", ref: "314.17(C)" }
      - { text: "So the governing distance for this box is 8 in, the stricter, box-specific rule." }
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-wm-h017
  domainId: nec.wiring-methods
  commonMistake: "300.4(A) protection (1¼ in setback or steel plate) is for WOOD members; metal framing instead requires listed bushings/grommets per 300.4(B)."
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 4
  stem: "NM cable is run through factory punchouts in steel studs of a townhouse wall. The holes are more than 1¼ in from the stud edges, so the installer adds nothing. What does 300.4 require here?"
  options:
    - { id: a, text: "Nothing further — the 1¼ in setback satisfies 300.4", distractorRationale: "The 1¼ in setback rule addresses screws/nails in WOOD framing; steel-stud openings cut the sheath and need listed grommets regardless of setback." }
    - { id: b, text: "Listed bushings or grommets covering the metal edges, installed before the cable is pulled", isCorrect: true }
    - { id: c, text: "A steel plate at least 1/16 in thick over each stud", distractorRationale: "Steel plates are the WOOD-framing remedy where the setback cannot be met — they do nothing for the sharp edges of a metal punchout." }
    - { id: d, text: "The cable must be re-run in EMT, since NM is prohibited in steel-stud walls", distractorRationale: "NM is permitted in metal framing; it simply needs edge protection at each opening per 300.4(B)(1)." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Two similar rules compete: 300.4(A) (wood — setback or plate) vs 300.4(B) (metal framing — listed bushings/grommets); metal studs always take grommets."
    codePath: ["300.4(B)(1) → NM through metal framing: listed bushing/grommet secured in the opening"]
    steps:
      - { text: "Identify the framing type: steel studs → 300.4(B), not the wood-member rule.", ref: "300.4(B)" }
      - { text: "NM through metal-framing openings requires listed bushings or grommets protecting the cable, in place before installation.", ref: "300.4(B)(1)" }
      - { text: "The 1¼ in setback protects against fasteners in wood and does not address sheared metal edges." }
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-wm-h018
  domainId: nec.wiring-methods
  commonMistake: "Only one of these NM uses survives Article 334's use rules — test each location against 334.10/334.12, not against habit."
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 5
  stem: "Which of the following proposed uses of NM-B cable is PERMITTED by Article 334?"
  options:
    - { id: a, text: "Embedded in the poured concrete of a residential slab as a shortcut between walls", distractorRationale: "334.12 prohibits NM embedded in poured cement, concrete, or aggregate — the wet, corrosive pour attacks the cable." }
    - { id: b, text: "Run exposed along the surface of an unfinished basement wall subject to physical damage, unprotected", distractorRationale: "334.12 prohibits NM where exposed to physical damage unless protected; an unprotected damage-prone run fails." }
    - { id: c, text: "Concealed in the wall cavities of a normal, dry, one-family dwelling", isCorrect: true }
    - { id: d, text: "Direct-buried 24 in deep to a yard light", distractorRationale: "Depth cannot cure the cable type — direct earth burial is a wet location and NM is not listed for it; UF cable is the direct-burial cousin." }
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "NM lives in dry, concealed or protected locations of permitted buildings; concrete, damage exposure, and earth burial are all on the prohibited list."
    codePath: ["334.10 → permitted in one/two-family dwellings (concealed dry spaces)", "334.12 → prohibited: embedded in concrete, exposed to damage unprotected, wet locations/direct burial"]
    steps:
      - { text: "Option-by-option against 334.12: concrete embedment — prohibited; unprotected damage exposure — prohibited; direct burial (wet) — prohibited.", ref: "334.12" }
      - { text: "Concealed dry wall cavities of a dwelling are the core permitted use.", ref: "334.10" }
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

# ---- EMT vs PVC use and support (358 / 352) ----------------------------------
- id: q-wm-h019
  domainId: nec.wiring-methods
  commonMistake: "EMT's support rule has two parts — every 10 ft AND within 3 ft of each box/termination. A run can pass the 10 ft test and still fail at the box."
  skillIds: [nec.wm.support]
  type: single
  difficulty: 4
  stem: "An exposed EMT run across a warehouse ceiling is strapped every 9 ft, but the first strap after leaving a junction box is 4 ft from the box. Per 358.30(A), this installation is:"
  options:
    - { id: a, text: "Compliant — straps every 9 ft beat the 10 ft maximum", distractorRationale: "The interval passes, but 358.30(A) separately requires a fastening within 3 ft of every box, cabinet, or termination — 4 ft fails that clause." }
    - { id: b, text: "A violation — EMT must be strapped within 3 ft of each box, and 4 ft exceeds that", isCorrect: true }
    - { id: c, text: "A violation — EMT must be strapped every 4.5 ft like cable", distractorRationale: "4½ ft is the NM/AC CABLE interval (334.30/320.30); EMT's raceway interval is 10 ft." }
    - { id: d, text: "Compliant — the 3 ft rule applies only to vertical risers", distractorRationale: "The within-3-ft-of-a-box requirement applies to every termination point, horizontal or vertical." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "358.30(A) is two tests: intervals not exceeding 10 ft, plus a securing point within 3 ft of every box or termination."
    codePath: ["358.30(A) → ≤10 ft intervals AND within 3 ft of each box"]
    steps:
      - { text: "Interval check: 9 ft ≤ 10 ft — passes.", ref: "358.30(A)" }
      - { text: "Termination check: first strap must be within 3 ft of the box; 4 ft — fails." }
      - { text: "One failed clause makes the run non-compliant; move the first strap to within 3 ft." }
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-wm-h020
  domainId: nec.wiring-methods
  commonMistake: "PVC support spacing depends on trade size (Table 352.30) — a spacing legal for the 3 in section can be illegal for the 1 in section of the same run."
  skillIds: [nec.wm.support]
  type: single
  difficulty: 5
  stem: "A rigid PVC run transitions from 3 in. trade size to 1 in. trade size at a pull box. Both sections are strapped uniformly every 5 ft. Per Table 352.30, which statement is correct?"
  options:
    - { id: a, text: "Both sections comply — 5 ft is the universal PVC spacing", distractorRationale: "There is no universal PVC spacing; Table 352.30 scales with trade size (3 ft for ½–1 in., 5 ft for 1¼–2 in., 6 ft for 2½–3 in.)." }
    - { id: b, text: "The 3 in. section complies (6 ft allowed), but the 1 in. section violates its 3 ft maximum", isCorrect: true }
    - { id: c, text: "The 1 in. section complies, but the 3 in. section must be strapped every 3 ft", distractorRationale: "Backwards — larger PVC is stiffer and gets LONGER allowable spacing, not shorter." }
    - { id: d, text: "Both sections violate — PVC must be supported every 3 ft regardless of size", distractorRationale: "3 ft applies only to the ½–1 in. sizes; 2½–3 in. PVC is permitted 6 ft spacing." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Table 352.30 gives size-dependent maximums: 1 in. PVC → 3 ft; 3 in. PVC → 6 ft. A uniform 5 ft spacing passes the big pipe and fails the small one."
    codePath: ["Table 352.30 → ½–1 in.: 3 ft", "Table 352.30 → 2½–3 in.: 6 ft"]
    steps:
      - { text: "Small section: 1 in. PVC maximum support spacing = 3 ft; 5 ft spacing is a violation.", ref: "Table 352.30" }
      - { text: "Large section: 3 in. PVC maximum = 6 ft; 5 ft spacing complies.", ref: "Table 352.30" }
      - { text: "Also secure within 3 ft of each box or termination per 352.30." }
  trapIds: [table-column-selection]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-wm-h021
  domainId: nec.wiring-methods
  commonMistake: "Of the common raceways, only PVC ordinarily needs expansion fittings on long exposed runs — its coefficient of thermal expansion is several times that of steel."
  skillIds: [nec.wm.method-rules, nec.wm.support]
  type: single
  difficulty: 4
  stem: "A 150 ft straight raceway run is installed outdoors on a building face that sees a 100°F seasonal temperature swing. For which wiring method does Article 352 specifically require evaluating and, in this case, installing expansion fittings?"
  options:
    - { id: a, text: "EMT, because thin-wall tubing expands the most", distractorRationale: "Steel EMT expands far less than PVC; Article 358 has no equivalent blanket expansion-fitting demand for a run like this." }
    - { id: b, text: "Rigid PVC conduit, where the expected length change is 1/4 in. or greater", isCorrect: true }
    - { id: c, text: "RMC, because its mass amplifies thermal movement", distractorRationale: "RMC's steel expansion is small and its couplings/supports normally absorb it; 352.44 targets PVC, not RMC." }
    - { id: d, text: "None — expansion fittings are only a manufacturer recommendation, never a Code requirement", distractorRationale: "352.44 is mandatory: PVC runs must have expansion fittings where thermal length change is expected to be ¼ in. or greater." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "352.44 requires expansion fittings for rigid PVC wherever the expected thermal length change is ¼ in. or more — a 150 ft outdoor run over a 100°F swing far exceeds that."
    codePath: ["352.44 + Table 352.44 → PVC expansion characteristics", "Compare: steel raceways expand roughly one-fifth as much"]
    steps:
      - { text: "PVC's high coefficient of expansion makes long outdoor runs grow and shrink noticeably with temperature.", ref: "352.44" }
      - { text: "Where the computed change (Table 352.44 length-change values × run length) is ¼ in. or greater, expansion fittings are mandatory." }
      - { text: "A 150 ft run across a 100°F swing changes length by several inches — fittings required; supports must also allow the movement." }
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-wm-h022
  domainId: nec.wiring-methods
  commonMistake: "Severe physical damage knocks EMT out (358.12); of the remaining candidates, Schedule 80 PVC and RMC are the identified methods for damage-prone areas."
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 5
  stem: "A raceway must run exposed along the lower wall of a truck-loading dock — a wet location subject to severe physical damage from carts and forklifts. Which method selection is Code-compliant?"
  options:
    - { id: a, text: "EMT with raintight compression fittings", distractorRationale: "The fittings solve the wet location, but 358.12 prohibits EMT where subject to severe physical damage — the forklift traffic disqualifies it." }
    - { id: b, text: "Schedule 40 PVC", distractorRationale: "Schedule 40 PVC handles the wet location but is not the PVC type identified for physical-damage areas — that is extra-heavy-wall Schedule 80." }
    - { id: c, text: "Rigid metal conduit (or Schedule 80 PVC)", isCorrect: true }
    - { id: d, text: "NM cable sleeved in ENT", distractorRationale: "Fails twice: NM is prohibited in wet locations (334.12), and ENT is itself prohibited where subject to physical damage." }
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "Stack the conditions: wet location AND severe physical damage → EMT and Schedule 40 PVC drop out; RMC (or Schedule 80 PVC identified for the purpose) survives both tests."
    codePath: ["358.12 → EMT not where subject to severe physical damage", "352.10(F)/352.12 → PVC exposed to damage must be Schedule 80", "344.10 → RMC permitted in all atmospheric conditions and occupancies"]
    steps:
      - { text: "Condition 1 — wet location: EMT, PVC, and RMC can each be installed wet with proper fittings/conductors.", ref: "300.9" }
      - { text: "Condition 2 — severe physical damage: EMT is expressly not permitted; Schedule 40 PVC is not identified for damage areas.", ref: "358.12" }
      - { text: "RMC withstands severe damage and wet conditions; Schedule 80 PVC is the nonmetallic alternative identified for physical damage.", ref: "344.10 / 352.10(F)" }
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-wm-h023
  domainId: nec.wiring-methods
  commonMistake: "In a corrosive environment the metal raceways need supplementary protection or get eliminated — nonmetallic PVC is the method identified for chemical/corrosive areas."
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 4
  stem: "A raceway must be run through the chemical-storage room of a pool facility, where chlorine vapor severely corrodes ferrous metal. Protected from physical damage, which method is the most directly Code-supported choice?"
  options:
    - { id: a, text: "Standard EMT with setscrew fittings", distractorRationale: "358.12 prohibits EMT where subject to severe corrosive influences unless suitably protected — bare steel tubing in chlorine vapor fails." }
    - { id: b, text: "Rigid PVC conduit", isCorrect: true }
    - { id: c, text: "Plain-steel RMC without supplementary corrosion protection", distractorRationale: "344.10 allows RMC in corrosive environments only where protected by corrosion protection judged suitable — unprotected steel is not." }
    - { id: d, text: "Type AC cable run exposed", distractorRationale: "Type AC's uses do not include corrosive locations; its galvanized armor corrodes just as EMT does." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "352.10 identifies rigid PVC for locations subject to severe corrosive influences and specific chemicals — the environment that disqualifies unprotected steel methods."
    codePath: ["352.10 → PVC permitted in corrosive/chemical environments", "358.12 → EMT restricted under severe corrosive influence", "344.10 → RMC needs suitable corrosion protection there"]
    steps:
      - { text: "Chlorine vapor is a severe corrosive influence for ferrous raceways.", ref: "352.10" }
      - { text: "EMT and unprotected RMC/AC armor are restricted or require supplementary corrosion protection in that environment.", ref: "358.12 / 344.10" }
      - { text: "Rigid PVC is inherently corrosion-resistant and expressly identified for chemical exposure — the direct choice." }
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-wm-h024
  domainId: nec.wiring-methods
  commonMistake: "Cables under a building are a different rule from cables under open earth: beneath the structure the cable must be in a raceway, and the raceway must extend past the building lines."
  skillIds: [nec.wm.burial-depth, nec.wm.method-rules]
  type: single
  difficulty: 5
  stem: "A direct-burial UF feeder route passes beneath the slab of a new detached garage on its way to a panel at the far wall. Per 300.5(C), what does the Code require for the portion under the building?"
  options:
    - { id: a, text: "Nothing extra, provided 24 in of cover is maintained below the slab", distractorRationale: "Depth does not satisfy 300.5(C) — under a building, the cable itself must be inside a raceway, not merely deep." }
    - { id: b, text: "The cable must be installed in a raceway that extends beyond the outside walls of the building", isCorrect: true }
    - { id: c, text: "The cable must be concrete-encased for the width of the building", distractorRationale: "Concrete encasement is a Table 300.5 depth-reduction technique, not the under-building requirement — 300.5(C) demands a raceway extending past the walls." }
    - { id: d, text: "Underground cable may never pass under a building; the route must be redesigned", distractorRationale: "The route is fine — 300.5(C) permits it once the under-building portion is sleeved in a raceway extending beyond the building lines." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "300.5(C): underground cable installed under a building must be in a raceway, and the raceway must extend beyond the outside walls."
    codePath: ["300.5(C) → cable under building in raceway extended past building lines"]
    steps:
      - { text: "Identify the special condition: the burial path crosses beneath the structure itself.", ref: "300.5(C)" }
      - { text: "Under-building cable must be enclosed in a raceway; the raceway must run past the outside walls so the cable is never directly buried beneath the footprint." }
      - { text: "Cover depth rules still apply outside the building, but depth alone cannot substitute for the raceway under it." }
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-wm-h025
  domainId: nec.wiring-methods
  commonMistake: "Support intervals travel with the wiring METHOD, not the job: the same ceiling can legally have EMT at 10 ft, AC cable at 4½ ft, and 2 in PVC at 5 ft."
  skillIds: [nec.wm.support]
  type: single
  difficulty: 5
  stem: "Three parallel horizontal runs cross a mechanical-room ceiling: EMT, Type AC cable, and 2 in. rigid PVC. The installer wants to land every support on the same uniform spacing for all three runs. What is the largest uniform spacing that keeps ALL three compliant?"
  options:
    - { id: a, text: "10 ft", distractorRationale: "10 ft satisfies only the EMT (358.30(A)); it more than doubles AC cable's 4½ ft limit and exceeds 2 in. PVC's 5 ft limit." }
    - { id: b, text: "6 ft", distractorRationale: "6 ft belongs to 2½–3 in. PVC; it still exceeds both the 2 in. PVC limit (5 ft) and AC cable's 4½ ft." }
    - { id: c, text: "5 ft", distractorRationale: "5 ft satisfies the 2 in. PVC (Table 352.30) and the EMT, but AC cable must be secured at intervals not exceeding 4½ ft." }
    - { id: d, text: "4.5 ft", isCorrect: true }
  answer: { kind: single, optionId: d }
  solution:
    keyIdea: "A shared support line must satisfy the most restrictive method — here Type AC's 4½ ft interval, tighter than 2 in. PVC (5 ft) or EMT (10 ft)."
    codePath: ["320.30(B) → AC cable ≤ 4½ ft", "Table 352.30 → 2 in. PVC ≤ 5 ft", "358.30(A) → EMT ≤ 10 ft"]
    steps:
      - { text: "List each method's maximum interval: EMT 10 ft; 2 in. PVC 5 ft; Type AC 4½ ft.", ref: "358.30(A) / Table 352.30 / 320.30(B)" }
      - { text: "A single uniform spacing must be ≤ the smallest of these — 4½ ft." }
      - { text: "Each run must also be secured near its boxes (12 in for AC, 3 ft for EMT and PVC)." }
  trapIds: [table-column-selection]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-wm-h026
  domainId: nec.wiring-methods
  commonMistake: "Order the analysis: classify the LOCATION first (wet/dry, damage, occupancy), then pick the method, then apply that method's depth or support numbers — numbers chosen before classification are guesses."
  skillIds: [nec.wm.method-rules, nec.wm.burial-depth]
  type: single
  difficulty: 4
  stem: "When selecting an underground wiring method and its trench depth, which sequence correctly orders the Code decisions?"
  options:
    - { id: a, text: "Pick the cheapest raceway, dig to 18 in, then check the conductor type", distractorRationale: "Depth is a function of the method and location row of Table 300.5 — digging first commits you before either input is known." }
    - { id: b, text: "Classify the location and conditions, select a wiring method permitted there, then read that method's column and location row in Table 300.5, and use wet-rated conductors in the raceway", isCorrect: true }
    - { id: c, text: "Read Table 300.5 first — whatever column gives the shallowest depth determines which method to buy", distractorRationale: "Depth shopping skips the use-permission articles (334/352/358); a method must first be PERMITTED in the location before its column can be used." }
    - { id: d, text: "Choose the conductor insulation first; the raceway and depth follow automatically", distractorRationale: "Insulation rating is a consequence of the wet-location classification, not the driver of method or depth selection." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Chapter 3 logic runs location → permitted method → that method's numbers; Table 300.5 is applied last, with 300.5(B) forcing wet-rated conductors in any underground raceway."
    codePath: ["Article 3xx .10/.12 use rules → is the method permitted here?", "Table 300.5 → column by method, row by location", "300.5(B)/310.10(C) → wet-rated conductors"]
    steps:
      - { text: "Step 1: classify the install — occupancy, wet/corrosive exposure, vehicular traffic, physical damage." }
      - { text: "Step 2: screen candidate methods against their .10 (uses permitted) and .12 (uses not permitted) sections.", ref: "334.12 / 352.10 / 358.12" }
      - { text: "Step 3: enter Table 300.5 with the chosen method's column and the location's row; then satisfy 300.5(B) with wet-rated conductors.", ref: "Table 300.5" }
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."
