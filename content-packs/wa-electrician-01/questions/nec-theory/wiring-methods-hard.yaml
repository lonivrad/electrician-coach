  version: 1
  note: "Draft hard-tier question; SME-verify before live."

# ---- NM cable use, support, and securing (Article 334) -----------------------
- id: q-wm-h013
  domainId: nec.wiring-methods
  commonMistake: "NM inside underground conduit is still NM in a wet location — putting a dry-location cable in a raceway does not make the location dry."
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 5
  stem: "To feed a detached shop, an installer sleeves NM-B cable through buried Schedule 40 PVC for the underground portion, reasoning the conduit protects the cable. Why does this violate Article 334?"
  options:
    - { id: a, text: "NM cable may not be installed in any raceway", distractorRationale: "NM may be sleeved in raceway for protection in permitted (dry) locations; the raceway itself is not the violation." }
    - { id: b, text: "The interior of the underground raceway is a wet location, and NM cable is not permitted in wet locations", isCorrect: true }
    - { id: c, text: "PVC may not be used underground; the sleeve must be RMC", distractorRationale: "Schedule 40 PVC is a standard underground raceway — the raceway choice is fine; the cable type is the problem." }
    - { id: d, text: "It is compliant, because 300.5 only regulates burial depth, not cable type", distractorRationale: "300.5(B) also classifies the raceway interior as wet, and 334.12 then prohibits NM there — depth is only one requirement." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Two rules chain: 300.5(B) makes the underground raceway interior a wet location, and 334.12 prohibits NM in wet or damp locations."
    codePath: ["300.5(B) → underground raceway interior = wet location", "334.12 → NM not permitted in wet locations", "Fix: UF cable or wet-rated conductors in the PVC"]
    steps:
      - { text: "Classify: buried PVC interior is a wet location by definition.", ref: "300.5(B)" }
      - { text: "NM cable is limited to dry locations; wet or damp locations are among its prohibited uses.", ref: "334.12" }
      - { text: "Compliant alternatives: Type UF cable (listed for direct burial and wet locations) or individual THWN conductors in the PVC." }
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-wm-h014
  domainId: nec.wiring-methods
  commonMistake: "Passing through bored holes counts as SUPPORT, but the cable must still be SECURED within 12 in of every box that has cable clamps — support and securing are separate demands."
  skillIds: [nec.wm.support]
  type: single
  difficulty: 5
  stem: "A horizontal run of NM cable passes through bored holes in studs every 16 in, then travels 30 in from the last stud hole to a metal device box with internal cable clamps, with no staple in that last stretch. Which statement about 334.30 compliance is correct?"
  options:
    - { id: a, text: "Compliant — the bored holes support the cable for the entire run", distractorRationale: "The holes satisfy the 4½ ft support interval, but securing within 12 in of the box is an independent requirement the last 30 in stretch fails." }
    - { id: b, text: "Violation — cables may never rely on bored holes for support", distractorRationale: "334.30 explicitly treats cable run through framing holes as supported; the defect is at the box, not in the field of the run." }
    - { id: c, text: "Violation — the cable is not secured within 12 in of the box", isCorrect: true }
    - { id: d, text: "Compliant — securing at the box is not required when a run is otherwise supported every 4½ ft", distractorRationale: "The interval rule and the within-12-in-of-box rule are cumulative; meeting one never waives the other." }
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "334.30 imposes two separate requirements — intervals not exceeding 4½ ft AND securing within 12 in of every box/fitting — and both must be met."
    codePath: ["334.30 → secured within 12 in of box + intervals ≤ 4½ ft", "Holes in framing = supported, but last 30 in to the box is unsecured"]
    steps:
      - { text: "Field of the run: passing through bored holes every 16 in satisfies the 4½ ft support interval.", ref: "334.30" }
      - { text: "At the termination: NM must be secured within 12 in of the box; the last staple (or the securing point) is 30 in away — a violation." }
      - { text: "Fix: staple the cable within 12 in of the box (an 8 in limit applies instead to certain single-gang nonmetallic boxes without clamps, per 314.17(C))." }
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

