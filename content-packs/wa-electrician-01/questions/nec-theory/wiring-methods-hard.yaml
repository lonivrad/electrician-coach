      - { text: "The fished-cable allowance applies: concealed finished wall, securing impracticable → unsupported run permitted.", ref: "334.30(B)(1)" }
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

