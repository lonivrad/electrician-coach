  domainId: nec.overcurrent
  commonMistake: "If you answered 20, you used the 14 AWG Cu 75°C table ampacity (20 A) as the breaker limit — 240.4(D) caps the DEVICE at 15 A regardless of that table value."
  skillIds: [nec.ocp.small-conductor]
  type: numeric
  difficulty: 5
  stem: "A 14 AWG THWN copper lighting circuit shows a 75°C table ampacity of 20 A, and the journeyman wants to land it on a 20 A breaker to match. Per 240.4(D), what maximum overcurrent device rating (A) is actually permitted for 14 AWG copper?"
  answer: { kind: numeric, value: 15, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "For 14 AWG copper the 240.4(D) small-conductor cap — not the ampacity table — sets the maximum OCPD."
