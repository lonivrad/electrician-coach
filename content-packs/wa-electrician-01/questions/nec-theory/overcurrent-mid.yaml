  skillIds: [nec.ocp.next-size-up]
  type: numeric
  difficulty: 5
  stem: "A feeder to a fixed process heater has conductors with a stated allowable ampacity of 117 A and serves a 105 A noncontinuous load with no receptacle outlets. What is the maximum standard overcurrent device rating (A) permitted under 240.4(B)?"
