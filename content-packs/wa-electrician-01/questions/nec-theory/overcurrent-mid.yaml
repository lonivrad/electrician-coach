# ---- Tap-conductor basics (240.21(B)) — one condition each --------------------
- id: q-ocp-m022
  domainId: nec.overcurrent
  commonMistake: "The 10-ft rule's field-installation floor is 1/10 of the feeder device rating — the 1/3 fraction belongs to the 25-ft rule."
  skillIds: [nec.ocp.tap-rules]
  type: single
  difficulty: 5
  stem: "A 6-ft field-installed tap is made from a feeder protected by a 200 A breaker to feed a small panelboard, and all other 10-ft-rule conditions are met. Ignoring the calculated load, what minimum tap-conductor ampacity does 240.21(B)(1) require relative to the feeder device?"
  options:
    - { id: a, text: "20 A — not less than 1/10 of the 200 A device", isCorrect: true }
    - { id: b, text: "66.7 A — not less than 1/3 of the 200 A device", distractorRationale: "The 1/3 fraction is the 25-ft rule (240.21(B)(2)); a tap of 10 ft or less uses the 1/10 floor for field installations." }
    - { id: c, text: "200 A — equal to the feeder device rating", distractorRationale: "Requiring full feeder ampacity would defeat the tap allowance — 240.21(B)(1) permits much smaller conductors under its conditions." }
    - { id: d, text: "100 A — not less than 1/2 of the 200 A device", distractorRationale: "There is no 1/2 fraction in the 240.21(B) tap rules — the floors are 1/10 (10-ft rule, field-installed) and 1/3 (25-ft rule)." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Under the 10-ft rule, field-installed tap conductors need ampacity of at least 1/10 of the feeder OCPD rating (and never less than the load)."
    codePath: ["240.21(B)(1) → 200 ÷ 10 = 20 A"]
    steps:
      - { text: "Tap length 6 ft ≤ 10 ft → 240.21(B)(1) applies.", ref: "240.21(B)(1)" }
      - { text: "Field installation → ampacity ≥ 1/10 × 200 A = 20 A.", ref: "240.21(B)(1)" }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 100
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-ocp-m023
  domainId: nec.overcurrent
  commonMistake: "A tap between 10 ft and 25 ft is judged under the 25-ft rule's 1/3 floor — not rejected for exceeding 10 ft, and not given the 10-ft rule's 1/10 floor."
  skillIds: [nec.ocp.tap-rules]
  type: single
  difficulty: 6
  stem: "An 18-ft tap is made from a feeder protected at 300 A, with the tap conductors protected from physical damage. Under the 25-ft tap rule of 240.21(B)(2), what is the minimum ampacity required for the tap conductors?"
  options:
    - { id: a, text: "100 A — not less than 1/3 of the 300 A device", isCorrect: true }
    - { id: b, text: "30 A — not less than 1/10 of the 300 A device", distractorRationale: "1/10 is the 10-ft rule floor; a tap longer than 10 ft must meet the 25-ft rule's 1/3 minimum." }
    - { id: c, text: "300 A — equal to the feeder device rating", distractorRationale: "Full feeder ampacity is not required — the 25-ft rule permits 1/3 of the device rating under its conditions." }
    - { id: d, text: "150 A — not less than 1/2 of the 300 A device", distractorRationale: "No 1/2 fraction exists in 240.21(B); the 25-ft rule floor is 1/3 of the protecting device's rating." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "The 25-ft rule sets a hard ampacity floor of 1/3 of the feeder overcurrent device rating."
    codePath: ["240.21(B)(2) → 300 ÷ 3 = 100 A"]
    steps:
      - { text: "18 ft is over 10 ft but not over 25 ft → 240.21(B)(2) applies.", ref: "240.21(B)(2)" }
      - { text: "Minimum tap ampacity = 1/3 × 300 A = 100 A.", ref: "240.21(B)(2)" }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 100
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-ocp-m024
  domainId: nec.overcurrent
  commonMistake: "The 25-ft rule doesn't let the tap dead-end unprotected — it must land on a single OCPD (breaker or fuse set) rated no more than the tap-conductor ampacity."
  skillIds: [nec.ocp.tap-rules]
  type: single
  difficulty: 6
  stem: "A 15-ft feeder tap qualifies for the 25-ft rule on length, ampacity, and physical protection. How must the tap conductors TERMINATE to satisfy 240.21(B)(2)?"
  options:
    - { id: a, text: "In a single circuit breaker or single set of fuses rated no more than the tap-conductor ampacity", isCorrect: true }
    - { id: b, text: "Directly on the panelboard bus, with protection provided by the upstream feeder breaker", distractorRationale: "The upstream feeder device does not protect the smaller tap conductors — 240.21(B)(2) requires the tap itself to end in a single OCPD sized to the tap ampacity." }
    - { id: c, text: "In any number of branch-circuit breakers whose ratings total no more than the tap ampacity", distractorRationale: "Summing multiple device ratings is not permitted — the rule requires a SINGLE circuit breaker or single set of fuses." }
    - { id: d, text: "In a single OCPD rated at the next standard size above the tap ampacity", distractorRationale: "Rounding up is backwards here — the terminating device must be rated NO MORE than the tap-conductor ampacity." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "The 25-ft rule pairs its 1/3 ampacity floor with a mandatory termination in one OCPD rated no more than the tap ampacity."
    codePath: ["240.21(B)(2)"]
    steps:
      - { text: "Length, 1/3 ampacity, and physical protection are only part of the rule.", ref: "240.21(B)(2)" }
      - { text: "The tap must terminate in a single circuit breaker or single set of fuses that does not exceed the tap-conductor ampacity.", ref: "240.21(B)(2)" }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 100
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

# ---- 240.4(B) condition check: multioutlet receptacle circuit -----------------
- id: q-ocp-m025
  domainId: nec.overcurrent
  commonMistake: "Next-size-up dies at condition (1): a branch circuit supplying multiple receptacles for cord-and-plug loads must round the OCPD DOWN, not up."
  skillIds: [nec.ocp.next-size-up]
  type: single
  difficulty: 6
  stem: "A branch circuit supplying several general-use receptacles for cord-and-plug-connected loads ends up with a conductor ampacity of 27 A after adjustment. What is the maximum overcurrent device rating permitted?"
  options:
    - { id: a, text: "25 A", isCorrect: true }
    - { id: b, text: "30 A", distractorRationale: "30 A is the 240.4(B) next size up — but that allowance is unavailable on a multioutlet branch circuit supplying receptacles for cord-and-plug loads, per 240.4(B)(1)." }
    - { id: c, text: "27 A", distractorRationale: "27 A is the conductor ampacity, not a 240.6(A) standard device rating — the OCPD must be a standard rating." }
    - { id: d, text: "20 A", distractorRationale: "Dropping two sizes is over-strict — the largest standard rating not exceeding 27 A is 25 A, which is fully compliant." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "When 240.4(B)(1) blocks next-size-up, the device must be the largest standard rating that does NOT exceed the conductor ampacity."
    codePath: ["240.4(B)(1) → allowance unavailable for multioutlet receptacle circuits", "240.6(A) → largest standard rating ≤ 27 A is 25 A"]
    steps:
      - { text: "The circuit supplies multiple receptacles for cord-and-plug loads → 240.4(B) cannot be used.", ref: "240.4(B)(1)" }
      - { text: "The device must not exceed the 27 A ampacity: the largest standard rating at or below it is 25 A.", ref: "240.6(A)" }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 100
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."
