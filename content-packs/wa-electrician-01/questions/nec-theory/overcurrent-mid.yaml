# ---- Mixed continuous + noncontinuous loads, VA given (210.20(A)/215.3) -------
- id: q-ocp-m011
  recompute: { calc: ocpdMixedLoad, inputs: { continuous: 30, noncontinuous: 22, standardize: 1 } }
  domainId: nec.overcurrent
  commonMistake: "If you got 60 by summing 30 + 22 = 52 and standardizing, the arithmetic coincidentally lands right — but check your method: only the CONTINUOUS 30 A gets the 125% factor (37.5 + 22 = 59.5 A → 60 A)."
  skillIds: [nec.ocp.standard-ratings]
  type: numeric
  difficulty: 5
  stem: "A 240 V single-phase branch circuit supplies 7,200 VA of continuous lighting and 5,280 VA of noncontinuous load. Per 210.20(A), using a standard rating, what minimum OCPD (A) is required?"
  answer: { kind: numeric, value: 60, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "Convert VA to amperes at the circuit voltage, apply 125% only to the continuous portion, then take a standard rating."
    codePath: ["7,200 ÷ 240 = 30 A; 5,280 ÷ 240 = 22 A", "210.20(A) → 30 × 1.25 + 22", "240.6(A)"]
    steps:
      - { text: "Continuous: 7,200 VA ÷ 240 V = 30 A. Noncontinuous: 5,280 VA ÷ 240 V = 22 A." }
      - { text: "30 × 1.25 = 37.5 A; + 22 A = 59.5 A.", ref: "210.20(A)" }
      - { text: "Next standard rating at or above 59.5 A is 60 A.", ref: "240.6(A)" }
  trapIds: [continuous-load-125, next-size-up-rounding]
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live. Recompute inputs are the amperes derived from the stated VA at 240 V."

