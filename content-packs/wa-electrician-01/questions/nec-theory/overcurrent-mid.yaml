# Overcurrent protection (Article 240 / 210.20 / 240.21) — MID tier (difficulty 5–6). 2020 NEC. DRAFT.
# Two-step applied problems: 240.4(B) next-size-up from a stated ampacity, 240.4(D) lookups, mixed continuous/noncontinuous VA, 240.6(A) standard ratings, single-rule tap basics.

# ---- Next-size-up from one stated ampacity (240.4(B)) ------------------------
- id: q-ocp-m001
  recompute: { calc: nextStandardSize, inputs: { value: 91 } }
  domainId: nec.overcurrent
  commonMistake: "If you answered 90, you rounded DOWN — 240.4(B) permits the next standard size ABOVE 91 A when the circuit has no receptacles and the device is 800 A or less."
  skillIds: [nec.ocp.next-size-up]
  type: numeric
  difficulty: 5
  stem: "A feeder to a fixed rooftop HVAC unit uses conductors with a final allowable ampacity of 91 A. It serves an 82 A noncontinuous load and supplies no receptacle outlets. Per 240.4(B), what is the maximum standard OCPD rating (A) permitted?"
  answer: { kind: numeric, value: 100, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "When the ampacity doesn't match a standard rating and the 240.4(B) conditions are met, the next standard size UP is permitted."
    codePath: ["240.4(B)", "240.6(A) → next standard above 91 A = 100 A"]
    steps:
      - { text: "91 A falls between the standard ratings 90 A and 100 A.", ref: "240.6(A)" }
      - { text: "No receptacles, load (82 A) ≤ ampacity, device ≤ 800 A → 240.4(B) conditions met.", ref: "240.4(B)" }
      - { text: "Next standard size above 91 A is 100 A." }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

