# ---- Standard vs optional method — comparison / which-rule (single) ---------

- id: q-load-h017
  domainId: nec.load-calc
  skillIds: [nec.load.dwelling-optional, nec.load.demand-factor]
  type: single
  difficulty: 8
  stem: "A 2,400 ft² dwelling has two small-appliance circuits, one laundry circuit, a 12 kW range, a 5 kW dryer, a 4.5 kW water heater, and a 5 kVA air conditioner (no electric heat). Comparing the standard method (Part III) with the optional method (220.82), which statement is correct?"
  options:
    - id: a
      text: "The optional method gives the smaller calculated load — about 24.3 kVA versus about 28.5 kVA by the standard method."
      isCorrect: true
    - id: b
      text: "The standard method gives the smaller load, because it takes the range at only 8 kW from Column C while the optional method must use the 12 kW nameplate."
      distractorRationale: "Compares only the range treatment. The optional method's 40% factor on everything above 10 kVA more than offsets counting the range at nameplate: 220.82 yields ≈24.3 kVA vs ≈28.5 kVA standard."
    - id: c
      text: "Both methods produce the same result, because demand factors are only a bookkeeping convenience."
      distractorRationale: "The two methods use entirely different factor structures (Table 220.42 tiers + Column C vs 100%/40% + HVAC rules) and rarely agree; here they differ by roughly 4 kVA."
    - id: d
      text: "The optional method cannot be used because the dwelling has an air conditioner but no electric heat."
      distractorRationale: "220.82 has no such restriction — it requires a 120/240 V (or 208Y/120 V) 3-wire service/feeder of 100 A or greater; A/C without electric heat is handled by 220.82(C)."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Work both methods: the optional method's flat 40% on the remainder usually undercuts the standard method's stacked category loads."
    codePath: ["Table 220.42", "Table 220.55 Col C", "220.54", "220.82(B)/(C)"]
    steps:
      - { text: "Standard, lighting bucket: 7,200 + 3,000 + 1,500 = 11,700 → 3,000 + 8,700 × 35% = 6,045 VA.", ref: "Table 220.42" }
      - { text: "Standard, other loads: WH 4,500 + dryer 5,000 + range (Col C) 8,000 + A/C 5,000.", ref: "220.53–220.55" }
      - { text: "Standard total ≈ 6,045 + 22,500 = 28,545 VA." }
      - { text: "Optional general loads: 11,700 + 4,500 + 5,000 + 12,000 (range nameplate) = 33,200 VA.", ref: "220.82(B)" }
      - { text: "Optional: 10,000 + 23,200 × 40% = 19,280; + A/C 5,000 = 24,280 VA.", ref: "220.82(C)(1)" }
      - { text: "24.3 kVA (optional) < 28.5 kVA (standard) → option a." }
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-load-h018
  domainId: nec.load-calc
  skillIds: [nec.load.demand-factor]
  type: single
  difficulty: 7
  stem: "In a standard-method service calculation for an apartment building, an apprentice adds the general lighting, small-appliance, laundry, AND all range nameplates into one total, then applies the Table 220.42 factors to that grand total. What is wrong with this approach?"
  options:
    - id: a
      text: "Nothing — Table 220.42 applies to the total connected load of the building."
      distractorRationale: "Table 220.42 is limited to the general-lighting load (which 220.52 lets you combine with small-appliance and laundry); it never covers cooking equipment."
    - id: b
      text: "Ranges must be removed from that bucket; their demand comes separately from Table 220.55, and the two demand results are then added."
      isCorrect: true
    - id: c
      text: "The laundry circuits must also be removed, because demand factors never apply to laundry loads."
      distractorRationale: "220.52(B) expressly permits the laundry-circuit load to be included with the general lighting load and made subject to the Table 220.42 factors."
    - id: d
      text: "The error is only that the ranges should first be reduced by Column C and then the reduced value run through Table 220.42 as well."
      distractorRationale: "That double-dips the demand factors. The Column C result is a final demand value added directly to the 220.42 result — it is not discounted again."
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Each demand table has its own scope: 220.42 covers lighting/SA/laundry; 220.55 covers cooking appliances; the results are summed afterward."
    codePath: ["220.52(A)/(B)", "Table 220.42", "Table 220.55"]
    steps:
      - { text: "Combine lighting + SA + laundry and apply Table 220.42 to that subtotal only.", ref: "220.52" }
      - { text: "Compute range demand separately from Table 220.55 Column C.", ref: "Table 220.55" }
      - { text: "Add the two demand results (plus dryers, appliances, HVAC, etc.) to build the service load." }
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-load-h019
  domainId: nec.load-calc
  skillIds: [nec.load.dwelling-optional]
  type: single
  difficulty: 7
  stem: "Under the optional method (220.82), a dwelling has 10 kW of central electric space heating and a 6 kVA air-conditioning load. What value is included in the calculation for heating and air conditioning?"
  options:
    - id: a
      text: "6.5 kVA — the central heat at 65% governs because it exceeds the air conditioning at 100%."
      isCorrect: true
    - id: b
      text: "6.0 kVA — air conditioning is always taken because it is listed first in 220.82(C)."
      distractorRationale: "220.82(C) requires the LARGEST of the listed options; heat at 65% (10 × 0.65 = 6.5 kVA) beats the 6 kVA A/C, so the heat value is used."
    - id: c
      text: "10 kVA — electric space heating is always included at 100% of nameplate."
      distractorRationale: "Central electric space heating (fewer than four separately controlled units) enters at 65%, not 100%, under 220.82(C)(4)."
    - id: d
      text: "12.5 kVA — both loads are added since either could operate."
      distractorRationale: "Heating and cooling are noncoincident; 220.82(C) selects only the single largest option, never the sum."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "220.82(C) is a largest-of-list selection: A/C at 100% vs central heat at 65% — pick one, drop the other."
    codePath: ["220.82(C)(1)", "220.82(C)(4)", "220.60"]
    steps:
      - { text: "A/C option: 6 kVA × 100% = 6.0 kVA.", ref: "220.82(C)(1)" }
      - { text: "Heat option: 10 kW × 65% = 6.5 kVA.", ref: "220.82(C)(4)" }
      - { text: "Include the larger, 6.5 kVA." }
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-load-h020
  domainId: nec.load-calc
  skillIds: [nec.load.dwelling-optional, nec.load.service-size]
  type: single
  difficulty: 7
  stem: "Which of the following dwellings is NOT permitted to be calculated using the optional method of 220.82?"
  options:
    - id: a
      text: "A dwelling served at 120/240 V, 3-wire, with a 100 A service and a gas furnace."
      distractorRationale: "This meets 220.82(A): a 120/240 V 3-wire service rated 100 A or greater. Gas heat simply means less HVAC load under 220.82(C)."
    - id: b
      text: "A dwelling served by a 120/240 V, 3-wire feeder rated 200 A where the total connected load exceeds 100 A."
      distractorRationale: "220.82 applies to services OR feeders of 100 A or greater; a heavily loaded 200 A feeder is exactly the intended case."
    - id: c
      text: "A dwelling supplied by a 120/240 V, 3-wire, 60 A service."
      isCorrect: true
    - id: d
      text: "A dwelling with air conditioning but no electric heat."
      distractorRationale: "220.82(C) handles any mix of heating and cooling, including A/C only — nothing requires electric heat to use the optional method."
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "220.82 is limited to dwellings whose total load is served by a 120/240 V or 208Y/120 V, 3-wire service or feeder rated 100 A or greater."
    codePath: ["220.82(A)"]
    steps:
      - { text: "Check the 220.82(A) threshold: service/feeder must be 100 A or greater.", ref: "220.82(A)" }
      - { text: "A 60 A service fails the threshold, so the standard method (Part III) must be used." }
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-load-h021
  domainId: nec.load-calc
  skillIds: [nec.load.dwelling-optional, nec.load.demand-factor]
  type: single
  difficulty: 7
  stem: "A 12 kW household range appears in both a standard-method and an optional-method calculation for the same dwelling. Which statement correctly contrasts how the range is counted BEFORE any final factors are applied?"
  options:
    - id: a
      text: "Standard: 8 kW from Table 220.55 Column C, added as a finished demand value. Optional: 12 kW nameplate, included with the general loads that receive the 100%/40% treatment."
      isCorrect: true
    - id: b
      text: "Both methods take the range at the 8 kW Column C value; the optional method then applies 40% to it."
      distractorRationale: "220.82(B)(3) uses the NAMEPLATE rating of ranges in the optional method; Column C is a standard-method (Part III) tool."
    - id: c
      text: "Both methods take the range at the 12 kW nameplate; only the standard method may reduce it."
      distractorRationale: "Backwards on the standard side: the standard method reduces a ≤12 kW range to the Column C demand (8 kW for one range) — it does not carry the nameplate."
    - id: d
      text: "Standard: 12 kW nameplate. Optional: 8 kW Column C, because the optional method always uses the smaller value."
      distractorRationale: "This swaps the two methods. Column C belongs to the standard method; the optional method lists appliance NAMEPLATES and relies on its 40% remainder factor instead."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Standard method reduces the range via Table 220.55; the optional method feeds the raw nameplate into the 10 kVA + 40% machine."
    codePath: ["Table 220.55, Column C", "220.82(B)(3)"]
    steps:
      - { text: "Standard: one range ≤12 kW → Column C demand of 8 kW, added after the lighting demand.", ref: "Table 220.55" }
      - { text: "Optional: range at 12 kW nameplate joins lighting, SA, laundry, and appliances in the general-load total.", ref: "220.82(B)(3)" }
      - { text: "That total then gets first 10 kVA at 100% and the remainder at 40%." }
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-load-h022
  domainId: nec.load-calc
  skillIds: [nec.load.demand-factor, nec.load.service-size]
  type: single
  difficulty: 8
  stem: "In a standard-method dwelling service calculation, a single 12 kW range carries an 8 kW demand from Table 220.55 Column C. For sizing the service NEUTRAL, what range load is used?"
  options:
    - id: a
      text: "5.6 kW — 70% of the 8 kW Column C demand per 220.61(B)."
      isCorrect: true
    - id: b
      text: "8 kW — the neutral carries the same demand as the ungrounded conductors."
      distractorRationale: "220.61(B) permits the feeder/service neutral for ranges to be taken at 70% of the Column C demand, because range loads are largely line-to-line."
    - id: c
      text: "8.4 kW — 70% of the 12 kW nameplate."
      distractorRationale: "The 70% is applied to the Table 220.55 DEMAND value (8 kW), not to the nameplate; 12 × 0.70 double-counts load the demand table already removed."
    - id: d
      text: "12 kW — neutral conductors are always sized to the full connected load."
      distractorRationale: "This ignores both the Column C demand reduction and the 70% neutral factor of 220.61(B); it produces a neutral more than twice the required size basis."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Neutral demand for ranges = Column C demand × 70%: apply the demand table first, then the 220.61(B) reduction."
    codePath: ["Table 220.55, Column C", "220.61(B)(1)"]
    steps:
      - { text: "Ungrounded-conductor demand: 8 kW from Column C.", ref: "Table 220.55" }
      - { text: "Neutral: 8 kW × 70% = 5.6 kW.", ref: "220.61(B)(1)" }
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."
