# ---- Multi-dwelling general-lighting demand chains (220.12 → 220.52 → Table 220.42) ----

- id: q-load-h001
  recompute: { calc: sumThenStandardDemand, inputs: { components: [30240, 36000, 18000] } }
  domainId: nec.load-calc
  commonMistake: "If you got 29,484, you skipped the 12 laundry circuits — 220.52(B) puts 1,500 VA per unit into the same bucket as general lighting before Table 220.42 is applied."
  skillIds: [nec.load.general-lighting, nec.load.demand-factor]
  type: numeric
  difficulty: 8
  stem: "A 12-unit apartment building has dwelling units of 840 ft² each. Each unit gets the required two 20 A small-appliance circuits and one laundry circuit. Using the standard method, what is the demand (VA) for the combined general-lighting, small-appliance, and laundry load after applying the Table 220.42 factors?"
  answer: { kind: numeric, value: 31434, unit: "VA", tolerance: 1 }
  solution:
    keyIdea: "Build the connected total for ALL units first (lighting + SA + laundry), then run the whole total through the 220.42 tiers once."
    codePath: ["Table 220.12 → 3 VA/ft²", "220.52(A)/(B) → 1,500 VA per circuit", "Table 220.42"]
    steps:
      - { text: "Lighting: 12 × 840 ft² × 3 VA/ft² = 30,240 VA.", ref: "220.12" }
      - { text: "Small appliance: 12 × 2 × 1,500 = 36,000 VA; laundry: 12 × 1,500 = 18,000 VA.", ref: "220.52" }
      - { text: "Connected total = 30,240 + 36,000 + 18,000 = 84,240 VA." }
      - { text: "First 3,000 VA at 100% = 3,000; remaining 81,240 VA × 35% = 28,434.", ref: "Table 220.42" }
      - { text: "Demand = 3,000 + 28,434 = 31,434 VA." }
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

