# ---- Optional method (220.82) with HVAC selection ---------------------------

- id: q-load-h012
  recompute: { calc: optionalMethod, inputs: { totalKVA: 28, hvacKVA: 7 } }
  domainId: nec.load-calc
  commonMistake: "If you got 23.05, you took the 9 kW heat at 65% (5.85 kVA) — 220.82(C) uses the LARGER of the A/C at 100% or the central heat at 65%, which is the 7 kVA air conditioner here."
  skillIds: [nec.load.dwelling-optional]
  type: numeric
  difficulty: 8
  stem: "Optional method (220.82): a dwelling's general loads per 220.82(B) total 28 kVA. The dwelling has a 7 kVA air-conditioning load and 9 kW of central electric space heating. What is the total calculated demand (kVA)?"
  answer: { kind: numeric, value: 24.2, unit: "kVA", tolerance: 0.05 }
  solution:
    keyIdea: "Apply 100%/40% to the general loads, then add only the LARGEST 220.82(C) heating/cooling option — A/C at 100% vs central heat at 65%."
    codePath: ["220.82(B)", "220.82(C)(1) vs 220.82(C)(4)", "220.60 (noncoincident loads)"]
    steps:
      - { text: "General loads: 10 kVA at 100% + 18 kVA × 40% = 10 + 7.2 = 17.2 kVA.", ref: "220.82(B)" }
      - { text: "HVAC candidates: A/C 7 kVA × 100% = 7 kVA; central heat 9 kW × 65% = 5.85 kVA.", ref: "220.82(C)" }
      - { text: "Use the larger: 7 kVA." }
      - { text: "Total = 17.2 + 7 = 24.2 kVA." }
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-load-h013
  recompute: { calc: optionalMethod, inputs: { totalKVA: 32, hvacKVA: 9.1 } }
  domainId: nec.load-calc
  commonMistake: "If you got 26.8, you added the 8 kVA A/C — here the central heat at 65% (14 × 0.65 = 9.1 kVA) is larger, so the heat governs and the A/C is dropped as noncoincident."
  skillIds: [nec.load.dwelling-optional]
  type: numeric
  difficulty: 8
  stem: "Optional method (220.82): a dwelling's general loads total 32 kVA. It has an 8 kVA air conditioner and 14 kW of central electric space heating. What is the total calculated demand (kVA)?"
  answer: { kind: numeric, value: 27.9, unit: "kVA", tolerance: 0.05 }
  solution:
    keyIdea: "Compare A/C at 100% against central heat at 65% and add only the larger to the 100%/40% general-load demand."
    codePath: ["220.82(B)", "220.82(C)(1) vs 220.82(C)(4)"]
    steps:
      - { text: "General loads: 10 + (32 − 10) × 40% = 10 + 8.8 = 18.8 kVA.", ref: "220.82(B)" }
      - { text: "HVAC: A/C = 8 kVA at 100%; central heat = 14 × 65% = 9.1 kVA.", ref: "220.82(C)" }
      - { text: "Heat governs (9.1 > 8)." }
      - { text: "Total = 18.8 + 9.1 = 27.9 kVA." }
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

