  type: single
  difficulty: 2
  stem: "Type NM cable must be secured at intervals not exceeding what distance?"
  options:
    - { id: a, text: "3 ft" }
    - { id: b, text: "4.5 ft", isCorrect: true }
    - { id: c, text: "6 ft" }
    - { id: d, text: "10 ft" }
