  difficulty: 2
  stem: "Between pull points, a raceway run may contain no more than the equivalent of how many degrees of bends?"
  options:
    - { id: a, text: "180°" }
    - { id: b, text: "270°" }
    - { id: c, text: "360°", isCorrect: true }
    - { id: d, text: "450°" }
