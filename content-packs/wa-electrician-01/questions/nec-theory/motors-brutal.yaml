  commonMistake: "If you got 62.5, you rounded SF 1.14 up to 1.15 or treated 41°C as close enough to 40°C. Both gates are hard boundaries: SF must be not less than 1.15 and rise not over 40°C — this motor misses each by the smallest margin and gets 115%."
