# ---- Overload selection (430.32): route the number AND pick 115 vs 125% ------
- id: q-mot-x007
  recompute: { calc: motorOverload, inputs: { nameplateFLA: 23 } }
  domainId: nec.motors
  commonMistake: "If you got 26.45, you used 115% because the service factor is below 1.15 — but the marked temperature rise of 40°C independently qualifies the motor for 125% (either condition is enough). If you got 30, you took 125% of the 24 A table FLC instead of the nameplate."
  skillIds: [nec.motor.overload, nec.motor.flc-table]
  type: numeric
  difficulty: 10
  stem: "A continuous-duty 2 HP, 115 V, single-phase motor (Table 430.248: 24 A) carries a nameplate reading FLA 23 A, service factor 1.12, temperature rise 40°C. A clamp meter shows 21 A under load. What maximum selection (A) does 430.32(A)(1) permit for its separate overload device?"
  answer: { kind: numeric, value: 28.75, unit: "A", tolerance: 0.1 }
  solution:
    keyIdea: "125% applies if SF ≥ 1.15 OR marked rise ≤ 40°C — a rise of exactly 40°C passes even though SF 1.12 fails."
    codePath: ["430.6(A)(2) → nameplate 23 A", "430.32(A)(1) → rise 40°C ≤ 40°C → 125%", "23 × 1.25 = 28.75 A"]
    steps:
      - { text: "Overload sizing uses the 23 A nameplate; the 24 A table value and the 21 A reading are decoys here.", ref: "430.6(A)(2)" }
      - { text: "Test both 125% gates: SF 1.12 < 1.15 fails, but rise 40°C is 'not over 40°C' — it passes.", ref: "430.32(A)(1)" }
      - { text: "23 × 1.25 = 28.75 A maximum overload selection." }
  trapIds: [table-column-selection, actual-current-vs-table, meter-reading-vs-ampacity]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

