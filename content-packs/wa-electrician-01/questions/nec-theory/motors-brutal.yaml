- id: q-mot-x030
  domainId: nec.motors
  skillIds: [nec.motor.branch-protection, nec.motor.conductor-125, nec.motor.overload]
  type: single
  difficulty: 9
  stem: "An apprentice flags a 5 HP, 115 V, single-phase motor circuit (Table FLC 56 A): conductors rated 70 A, a 150 A inverse-time breaker, and an overload relay set at 59.8 A from the 52 A nameplate. Which analysis is correct?"
  options:
    - { id: a, text: "Compliant: conductors meet 430.22 (56 × 1.25 = 70 A); the breaker is at the 430.52 maximum (56 × 250% = 140 → 150 A); the overload at 52 × 115% protects against sustained overcurrent", isCorrect: true }
    - { id: b, text: "Violation: a 150 A breaker cannot protect 70 A conductors under 240.4", distractorRationale: "240.4(G) sends motor circuits to Article 430, where the branch device protects against faults only and routinely exceeds conductor ampacity — the overload device covers overloads." }
    - { id: c, text: "Violation: the breaker may not exceed 140 A because next-size-up is limited to feeder devices", distractorRationale: "Backwards — the round-up permission (430.52(C)(1) Ex.1) belongs to BRANCH devices like this one; it is the FEEDER device (430.62) that must round down." }
    - { id: d, text: "Violation: the overload must be 125% of the table FLC (70 A), so 59.8 A is set too low", distractorRationale: "Overloads come from the NAMEPLATE (430.6(A)(2)) and a lower setting is always permitted — 430.32 states maximums, not minimums; 56 × 1.25 is the conductor calculation." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Motor circuits split the protection job: 430.52 device for faults (can dwarf the conductor rating), 430.32 overload for heat — all three installed values sit exactly at their limits."
    codePath: ["430.22 → 56 × 1.25 = 70 A conductors", "Table 430.52 + Exc. 1 → 56 × 2.5 = 140 → 150 A breaker", "430.32(A)(1) → 52 × 1.15 = 59.8 A overload"]
    steps:
      - { text: "Conductors: 56 × 1.25 = 70 A — met exactly.", ref: "430.22" }
      - { text: "Breaker: 56 × 250% = 140 A, not standard, next size up = 150 A — the maximum, and lawful above the conductor ampacity per 240.4(G).", ref: "430.52(C)(1) Exc. 1" }
      - { text: "Overload: nameplate 52 × 115% = 59.8 A keeps the 70 A conductors from sustained overload.", ref: "430.32(A)(1)" }
  trapIds: [next-size-up-rounding, continuous-load-125, actual-current-vs-table]
  timeTargetSec: 280
  modes: [diagnostic, board, overtrain]
