  type: single
  difficulty: 9
  stem: "A 10 HP, 230 V, three-phase motor: Table 430.250 lists 28 A; nameplate reads FLA 26 A, SF 1.0, rise 50°C; a clamp meter shows 24 A. Which set of design values is entirely correct?"
  options:
    - { id: a, text: "Conductors ≥ 35 A (28 × 1.25); inverse-time breaker ≤ 70 A (28 × 250%); overload ≤ 29.9 A (26 × 115%)", isCorrect: true }
    - { id: b, text: "Conductors ≥ 35 A; breaker ≤ 70 A; overload ≤ 32.5 A (26 × 125%)", distractorRationale: "SF 1.0 with a 50°C rise fails both 125% gates of 430.32(A)(1) — the overload multiplier is 115%, so 32.5 A is oversized." }
    - { id: c, text: "Conductors ≥ 32.5 A (26 × 1.25); breaker ≤ 65 A (26 × 250%); overload ≤ 29.9 A", distractorRationale: "Conductors and the branch device are built from the 28 A TABLE FLC (430.6(A)(1)), not the 26 A nameplate — and 65 A is not even a standard rating." }
    - { id: d, text: "Conductors ≥ 30 A (24 × 1.25); breaker ≤ 60 A (24 × 250%); overload ≤ 27.6 A (24 × 115%)", distractorRationale: "The 24 A clamp reading is a field measurement with no role in any 430 calculation — every value here is built on the wrong current." }
  answer: { kind: single, optionId: a }
