# ---- Branch SC/GF protection (430.52): device column + Ex.1 round-up ---------
- id: q-mot-x012
  recompute: { calc: motorBranchOCPD, inputs: { flc: 14, pct: 8 } }
  domainId: nec.motors
  commonMistake: "If you got 35, you used the 250% inverse-time-breaker column — an instantaneous-trip breaker in a listed combination controller may go to 800% of FLC. If you got 110, you rounded 112 A down instead of up per 430.52(C)(1) Ex.1."
  skillIds: [nec.motor.branch-protection, nec.motor.flc-table]
  type: numeric
  difficulty: 10
  stem: "A 10 HP, 460 V, three-phase motor (nameplate 12.6 A, SF 1.15) is protected by an instantaneous-trip breaker in a listed combination motor controller, sized at the Table 430.52 maximum of 800% with the next standard size up permitted. What breaker rating (A) results?"
  answer: { kind: numeric, value: 125, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "Each device has its own 430.52 column — instantaneous-trip breakers run to 800% of the TABLE FLC, then round up to a standard rating."
    codePath: ["Table 430.250 → 10 HP, 460 V = 14 A", "Table 430.52 → instantaneous-trip breaker 800%", "14 × 8.0 = 112 → next standard = 125 A"]
    steps:
      - { text: "Use the 14 A table FLC, not the 12.6 A nameplate.", ref: "430.6(A)(1)" }
      - { text: "Instantaneous-trip column: 14 × 800% = 112 A.", ref: "Table 430.52" }
      - { text: "112 A is not a standard rating; the next standard size up is 125 A.", ref: "430.52(C)(1) Exc. 1 / 240.6" }
  trapIds: [table-column-selection, next-size-up-rounding, actual-current-vs-table]
