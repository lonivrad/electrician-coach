  type: numeric
  difficulty: 10
  stem: "A 20 HP, 230 V, three-phase motor (Table 430.250: 54 A) carries a nameplate reading FLA 50 A, service factor 1.14, temperature rise 41°C, ambient 40°C. What is the maximum separate overload device selection (A) per 430.32(A)(1)?"
  answer: { kind: numeric, value: 57.5, unit: "A", tolerance: 0.1 }
  solution:
    keyIdea: "430.32(A)(1) has no rounding: SF 1.14 fails 'not less than 1.15' and rise 41°C fails 'not over 40°C' — 115% governs."
    codePath: ["430.6(A)(2) → nameplate 50 A", "430.32(A)(1) → SF 1.14 < 1.15 AND rise 41 > 40 → 115%", "50 × 1.15 = 57.5 A"]
    steps:
      - { text: "Route the overload to the 50 A nameplate, not the 54 A table value.", ref: "430.6(A)(2)" }
      - { text: "SF 1.14 misses the 1.15 threshold and 41°C misses the 40°C threshold — both by a hair, and both fail.", ref: "430.32(A)(1)" }
      - { text: "50 × 1.15 = 57.5 A maximum overload selection. (The 40°C ambient marking is surplus data.)" }
  trapIds: [table-column-selection, actual-current-vs-table]
  timeTargetSec: 240
