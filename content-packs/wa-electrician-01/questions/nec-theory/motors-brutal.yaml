- id: q-mot-x029
  domainId: nec.motors
  skillIds: [nec.motor.conductor-125, nec.motor.flc-table]
  type: single
  difficulty: 9
  stem: "Two motors on one feeder each have a table FLC of exactly 34 A: a 3 HP, 115 V, single-phase unit and a 25 HP, 460 V, three-phase unit. How is the 430.24 feeder conductor calculation performed?"
  options:
    - { id: a, text: "Apply 125% to ONE of the 34 A motors and add the other at 100%: 34 × 1.25 + 34 = 76.5 A", isCorrect: true }
    - { id: b, text: "Apply 125% to both, since both are 'the largest': (34 + 34) × 1.25 = 85 A", distractorRationale: "430.24 increases the single highest-rated motor only; a tie does not multiply the allowance — pick either one." }
    - { id: c, text: "Apply 125% to the 25 HP motor's current twice-removed nameplate and add the 1φ motor at 100%", distractorRationale: "Nameplates never enter feeder conductor sizing; 430.6(A)(1) requires the table values, which here happen to tie." }
    - { id: d, text: "Add both at 100% (68 A) because neither is larger than the other, so no 125% applies", distractorRationale: "The 125% term is mandatory — 430.24 always increases one motor's FLC; a tie changes which motor you may call largest, not whether the multiplier exists." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "'The highest-rated motor' is singular even in a tie — exactly one 125% term, chosen from either tied motor."
    codePath: ["Table 430.248 / 430.250 → both = 34 A", "430.24 → 34 × 1.25 + 34 = 76.5 A"]
    steps:
      - { text: "Both motors list 34 A; designate either as the largest.", ref: "430.24" }
      - { text: "34 × 1.25 = 42.5; 42.5 + 34 = 76.5 A minimum feeder ampacity — never 85 A and never 68 A." }
