      - { text: "Inverse-time breaker: 28 × 250% = 70 A maximum (standard rating, no round-up needed).", ref: "Table 430.52" }
      - { text: "Overload: SF 1.0 and 50°C rise → 115% of nameplate: 26 × 1.15 = 29.9 A maximum.", ref: "430.32(A)(1)" }
