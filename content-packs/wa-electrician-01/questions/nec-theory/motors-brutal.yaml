# Motors (Article 430) — BRUTAL tier (difficulty 9–10). 2020 NEC. All DRAFT.
# Mixed-phase/voltage feeders where largest FLC ≠ largest HP, 430.6 current-source routing,
# 430.32 115/125% boundary flips, 430.52 device columns + Ex.1/Ex.2, and 430.62 feeder OCPD.

# ---- Feeders (430.24) where the largest FLC is NOT the largest HP ------------
- id: q-mot-x001
  recompute: { calc: motorFeeder, inputs: { largestFLC: 56, otherSum: 66 } }
  domainId: nec.motors
  commonMistake: "If you got 135, you gave the 125% to the 40 HP motor because it has the most horsepower (52 × 1.25 + 56 + 14). 430.24's 'largest' means largest FLC — the 5 HP single-phase 115 V motor at 56 A. If you got 131.4, you built the feeder from the nameplates; 430.6(A)(1) requires the table values."
  skillIds: [nec.motor.conductor-125, nec.motor.flc-table]
  type: numeric
  difficulty: 10
  stem: "One feeder supplies three continuous-duty motors: a 40 HP, 460 V, three-phase compressor (nameplate 48 A FLA, SF 1.15), a 10 HP, 460 V, three-phase fan (nameplate 13.1 A FLA, SF 1.15), and a 5 HP, 115 V, single-phase sump pump (nameplate 53 A FLA, SF 1.0, temp rise 50°C). All conductors are 75°C copper THWN. Per 430.24, what minimum feeder conductor ampacity (A) is required?"
  answer: { kind: numeric, value: 136, unit: "A", tolerance: 0.5 }
  solution:
    keyIdea: "430.24 keys the 125% to the highest-FLC motor — the low-voltage single-phase 5 HP unit (56 A) beats the 40 HP, 460 V unit (52 A)."
    codePath: ["430.6(A)(1) → table values, not nameplates", "Table 430.248 → 5 HP, 115 V, 1φ = 56 A", "Table 430.250 → 40 HP, 460 V = 52 A; 10 HP, 460 V = 14 A", "430.24 → 56 × 1.25 + 52 + 14 = 136 A"]
    steps:
      - { text: "Discard all three nameplates and the SF/temp-rise data — feeder conductors come from the tables (SF and rise matter only for the 430.32 overloads).", ref: "430.6(A)(1)" }
      - { text: "Table FLCs: 5 HP 1φ 115 V = 56 A; 40 HP 3φ 460 V = 52 A; 10 HP 3φ 460 V = 14 A.", ref: "Tables 430.248 / 430.250" }
      - { text: "Largest FLC is the 5 HP motor's 56 A, not the 40 HP motor: 56 × 1.25 = 70 A.", ref: "430.24" }
      - { text: "70 + 52 + 14 = 136 A minimum feeder ampacity." }
  trapIds: [unit-or-phase-confusion, actual-current-vs-table, continuous-load-125]
  timeTargetSec: 280
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

