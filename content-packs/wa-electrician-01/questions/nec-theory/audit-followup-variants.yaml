# ---- Motor overload at 115% for SF < 1.15 (430.32(A)(1)) --------------------
- id: q-mt-151
  recompute: { calc: motorOverload, inputs: { nameplateFLA: 20, factor: 1.15 } }
  domainId: nec.motors
  commonMistake: "A service factor under 1.15 uses 115%, not the 125% used for SF ≥ 1.15."
  skillIds: [nec.motor.overload]
  type: numeric
  difficulty: 3
  stem: "A continuous-duty motor with a service factor of 1.0 has a nameplate FLA of 20 A. Per 430.32(A)(1), what is the maximum overload protection rating (A) at 115%?"
  answer: { kind: numeric, value: 23, unit: "A", tolerance: 0.05 }
  solution:
    keyIdea: "SF < 1.15 (and rise > 40 °C) → overload at 115% of the NAMEPLATE FLA."
    codePath: ["430.32(A)(1)"]
    steps:
      - { text: "20 A × 1.15 = 23 A." }
  trapIds: [actual-current-vs-table]
  timeTargetSec: 75
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Calculator-backed (motorOverload, 115%); 430.32(A)(1) web-verified."

