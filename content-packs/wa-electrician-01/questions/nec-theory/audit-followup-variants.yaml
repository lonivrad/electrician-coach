  skillIds: [nec.xfmr.ocp-sizing]
  type: numeric
  difficulty: 5
  stem: "A 3 kVA, single-phase, 480 V transformer has primary-only protection (primary current between 2 A and 9 A). Per Table 450.3(B), what is the maximum primary overcurrent device rating (A)?"
  answer: { kind: numeric, value: 10.44, unit: "A", tolerance: 0.05 }
  solution:
    keyIdea: "Primary-only, 2–9 A → up to 167% of primary current."
    codePath: ["Table 450.3(B) → primary-only, 2–9 A → 167%"]
    steps:
      - { text: "Primary FLC = 3,000 ÷ 480 = 6.25 A." }
      - { text: "6.25 A × 167% = 10.44 A (maximum permitted)." }
  trapIds: [table-column-selection]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Calculator-backed (transformerPrimaryMaxOCP); 450.3(B) 2–9 A = 167% web-verified."

