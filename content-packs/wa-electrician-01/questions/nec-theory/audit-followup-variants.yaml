# ---- Transformer primary-only OCP, <9 A cases (Table 450.3(B)) --------------
- id: q-xf-121
  recompute: { calc: transformerPrimaryMaxOCP, inputs: { kva: 0.5, volts: 480, phase: 1 } }
  domainId: nec.transformers
  commonMistake: "Below 2 A the ceiling is 300% — not the 125% used for 9 A and up."
  skillIds: [nec.xfmr.ocp-sizing]
  type: numeric
  difficulty: 5
  stem: "A 0.5 kVA, single-phase, 480 V control transformer has primary-only protection and a primary current under 2 A. Per Table 450.3(B), what is the maximum primary overcurrent device rating (A)?"
  answer: { kind: numeric, value: 3.13, unit: "A", tolerance: 0.05 }
  solution:
    keyIdea: "Primary-only, <2 A → up to 300% of primary current (a ceiling, not rounded up)."
    codePath: ["Table 450.3(B) → primary-only, <2 A → 300%"]
    steps:
      - { text: "Primary FLC = 500 ÷ 480 = 1.04 A." }
      - { text: "1.04 A × 300% = 3.13 A (maximum permitted)." }
  trapIds: [table-column-selection]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Calculator-backed (transformerPrimaryMaxOCP); 450.3(B) <2 A = 300% web-verified."

