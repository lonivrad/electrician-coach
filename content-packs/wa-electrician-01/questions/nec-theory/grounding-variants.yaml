  skillIds: [nec.gnd.gec-sizing]
  type: single
  difficulty: 2
  stem: "A service uses 4/0 AWG copper service-entrance conductors. Per Table 250.66, what is the minimum copper grounding electrode conductor (to an electrode other than a ground rod)?"
  options:
    - { id: a, text: "4 AWG" }
    - { id: b, text: "2 AWG", isCorrect: true }
    - { id: c, text: "1 AWG" }
    - { id: d, text: "1/0 AWG" }
