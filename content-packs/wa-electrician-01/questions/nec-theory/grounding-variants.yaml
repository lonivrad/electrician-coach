# ---- Equipment grounding conductor — Table 250.122 (by OCPD rating) --------
- id: q-gb-101
  recompute: { calc: egcSize, inputs: { ocpd: 30 } }
  domainId: nec.grounding-bonding
  skillIds: [nec.gnd.egc-sizing]
  type: single
  difficulty: 1
  stem: "Per Table 250.122, what is the minimum copper equipment grounding conductor for a circuit protected by a 30 A overcurrent device?"
  options:
    - { id: a, text: "14 AWG" }
    - { id: b, text: "12 AWG" }
    - { id: c, text: "10 AWG", isCorrect: true }
    - { id: d, text: "8 AWG" }
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "EGC is sized by the OCPD rating (Table 250.122), not the conductor ampacity."
    codePath: ["Table 250.122 → not exceeding 60 A → 10 AWG Cu"]
    steps:
      - { text: "A 30 A OCPD falls in the 'not exceeding 60 A' row → 10 AWG copper.", ref: "Table 250.122" }
  trapIds: [table-column-selection]
  timeTargetSec: 45
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Calculator-backed (egcSize); value from verified Table 250.122."

