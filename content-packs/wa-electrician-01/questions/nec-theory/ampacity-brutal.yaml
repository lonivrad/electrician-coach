- id: q-amp-x004
  recompute: { calc: ampacityDerating, inputs: { size: "6", tempColumn: 90, ambientC: 45, ccc: 6, terminationColumn: 75 } }
  domainId: nec.ampacity
  commonMistake: "If you got 49.2, you used the 46–50°C row (0.82) — exactly 45°C is still in the 41–45°C band. If you got 45.68, you dropped the 3-wire circuit's neutral: two phases plus the neutral of a wye system make the neutral a counted conductor (310.15(E)(2))."
  skillIds: [nec.ampacity.fill-adjustment, nec.ampacity.temp-correction, nec.ampacity.combined]
  type: numeric
  difficulty: 9
  stem: "A conduit crossing a foundry wall (design ambient exactly 45°C) contains a 3-phase, 3-wire delta feeder and a 3-wire branch circuit made up of two phase conductors plus the neutral, supplied from a 208Y/120 V panel. A bare EGC is also present. The conductor of interest is 6 AWG THHN copper on 75°C terminations; the circuit is 130 ft long. What ampacity (A) governs?"
  answer: { kind: numeric, value: 52.2, unit: "A", tolerance: 0.5 }
  solution:
    keyIdea: "A neutral shared by only TWO phases of a wye system carries about the same current as the phases — it counts. 3 + 3 = 6 CCC, and 45°C holds the 41–45°C row."
    codePath: ["310.15(E)(2) → 2-phases-plus-neutral wye neutral counts", "Table 310.16 → 6 AWG Cu 90°C = 75 A", "310.15(B)(1) → 41–45°C, 90°C → 0.87", "310.15(C)(1) → 4–6 → 0.80", "110.14(C) → 75°C cap = 65 A"]
    steps:
      - { text: "Delta feeder = 3 CCC. The 3-wire wye circuit (two phases + neutral) = 3 CCC because that neutral carries phase-level current. EGC excluded. Total 6.", ref: "310.15(E)(2)" }
      - { text: "Exactly 45°C → 41–45°C row → 0.87 for 90°C insulation.", ref: "310.15(B)(1)" }
      - { text: "75 × 0.87 × 0.80 = 52.2 A." }
      - { text: "52.2 A ≤ 65 A (75°C cap), so the derated value governs. The 130 ft length is surplus here.", ref: "110.14(C)" }
  trapIds: [adjusted-vs-corrected-ampacity]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

# ---- Termination cap collides with a favorable derate -----------------------
- id: q-amp-x005
  recompute: { calc: ampacityDerating, inputs: { size: "3", tempColumn: 90, ambientC: 20, ccc: 4, terminationColumn: 60 } }
  domainId: nec.ampacity
  commonMistake: "If you got 99.36, you finished the derating and stopped — this ≤100 A circuit lands on UNMARKED terminations, so 110.14(C)(1)(a) forces the 60°C column (85 A), which caps the answer. If you got 100, you defaulted to the 75°C column out of habit."
  skillIds: [nec.ampacity.termination-limit, nec.ampacity.temp-correction, nec.ampacity.combined]
  type: numeric
  difficulty: 10
  stem: "A 3 AWG THHN copper circuit runs through a walk-in cooler corridor held at 20°C, sharing its raceway with one other 2-wire circuit (4 current-carrying conductors total). It terminates in a 1968-vintage fusible disconnect whose terminations carry no temperature marking and which is not listed for higher-rated conductors; the circuit is rated 90 A. What ampacity (A) may the conductor be used at?"
  answer: { kind: numeric, value: 85, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "A cold ambient can push the derated value ABOVE the table — but unmarked terminations on a ≤100 A circuit cap everything at the 60°C column."
    codePath: ["Table 310.16 → 3 AWG Cu 90°C = 115 A", "310.15(B)(1) → 16–20°C, 90°C → 1.08", "310.15(C)(1) → 4–6 → 0.80", "110.14(C)(1)(a) → 60°C cap = 85 A"]
    steps:
      - { text: "Derate from the 90°C column: 115 × 1.08 × 0.80 = 99.36 A — the cold ambient gives a factor above 1.00.", ref: "310.15(B)(1)" }
      - { text: "Unmarked, unlisted terminations on a circuit ≤100 A default to the 60°C column: 3 AWG Cu = 85 A.", ref: "110.14(C)(1)(a)" }
      - { text: "min(99.36, 85) = 85 A." }
  trapIds: [termination-temp-limit, adjusted-vs-corrected-ampacity]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

