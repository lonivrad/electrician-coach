      - { text: "1/0 Al → min(135 × 0.80 = 108, 120) = 108 A — fails by 2 A.", ref: "Table 310.16" }
      - { text: "2/0 Al → min(150 × 0.80 = 120, 135) = 120 A ≥ 110 A — passes." }
