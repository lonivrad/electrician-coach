      text: "2/0 AWG aluminum"
      isCorrect: true
    - id: c
      text: "3/0 AWG aluminum"
      distractorRationale: "This is the answer if you wrongly apply the 0.80 adjustment to the 75°C column (135 × 0.80 = 108 fails → jump to 3/0). Adjustment applies to the 90°C base; the 75°C value is only an un-derated cap."
    - id: d
      text: "1 AWG aluminum"
      distractorRationale: "Checking only the 90°C table value (115 A ≥ 110) ignores both the adjustment (115 × 0.80 = 92 A) and the 75°C termination cap (100 A) — it fails both real tests."
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Usable ampacity = min(90°C base × 0.80, 75°C value). Walk up the aluminum column until both numbers clear 110 A."
