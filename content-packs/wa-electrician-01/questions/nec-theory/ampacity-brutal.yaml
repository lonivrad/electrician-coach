    keyIdea: "Everything keys off the insulation actually installed: THWN = 75°C base AND the 75°C correction column. Count CCC: 3 (balanced wye, neutral excluded) + 2 = 5, plus the feeder... the raceway total is what matters for its row."
    codePath: ["Table 310.16 → 4 AWG Cu 75°C = 85 A", "310.15(E)(1) → balanced wye neutral excluded", "310.15(B)(1) → 51–55°C, 75°C → 0.67", "310.15(C)(1) → 4–6 → 0.80"]
