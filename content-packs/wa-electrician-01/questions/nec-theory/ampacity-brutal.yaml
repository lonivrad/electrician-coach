# ---- Single-choice: rule collisions and counting -----------------------------
- id: q-amp-x021
  domainId: nec.ampacity
  skillIds: [nec.ampacity.combined, nec.ampacity.fill-adjustment]
  type: single
  difficulty: 10
  stem: "A 6 AWG THHN copper conductor supplies a MULTIOUTLET receptacle branch circuit in a shop. Its raceway holds 4 current-carrying conductors and passes through a 35°C space; terminations are 75°C. The adjusted ampacity works out to 75 × 0.96 × 0.80 = 57.6 A. What is the maximum standard OCPD rating permitted?"
  options:
    - id: a
      text: "50 A — the OCPD may not exceed 57.6 A, and 240.4(B) is unavailable for multioutlet receptacle branch circuits."
      isCorrect: true
    - id: b
      text: "60 A — 57.6 A is not a standard rating, so 240.4(B) allows the next size up."
      distractorRationale: "240.4(B)(1) expressly excludes branch circuits supplying more than one receptacle for cord-and-plug loads — next-size-up is off the table, so the OCPD must round DOWN."
    - id: c
      text: "45 A — the derated ampacity is 65 × 0.96 × 0.80 = 49.9 A, and the next standard size down is 45 A."
      distractorRationale: "This derates from the 75°C column (65 A). With 90°C insulation, correction and adjustment start from the 90°C base of 75 A; the 75°C value is only a final cap."
    - id: d
      text: "70 A — 6 AWG is good for 65 A at 75°C, and the next standard size up is 70 A."
      distractorRationale: "This skips both derating factors AND misapplies 240.4(B) on a multioutlet receptacle circuit — two compounding errors."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "When 240.4(B) is unavailable (multioutlet receptacle circuit), the OCPD must not exceed the conductor's ampacity — round DOWN to 50 A."
    codePath: ["310.15 → 75 × 0.96 × 0.80 = 57.6 A", "240.4(B)(1) → exclusion for multioutlet receptacle circuits", "240.6(A) → largest standard rating ≤ 57.6 A = 50 A"]
    steps:
      - { text: "Adjusted/corrected ampacity: 57.6 A (below the 65 A termination cap).", ref: "310.15, 110.14(C)" }
      - { text: "Because the circuit supplies multiple receptacles for cord-and-plug equipment, next-size-up is prohibited.", ref: "240.4(B)(1)" }
      - { text: "The largest standard rating not exceeding 57.6 A is 50 A.", ref: "240.6(A)" }
  trapIds: [next-size-up-rounding, table-column-selection]
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-amp-x022
  domainId: nec.ampacity
  skillIds: [nec.ampacity.fill-adjustment]
  type: single
  difficulty: 9
  stem: "One conduit from a 208Y/120 V panel contains: two 3-phase, 4-wire wye circuits feeding VFD-driven equipment (nonlinear); one 3-wire circuit made of two phase conductors and the neutral; two spare THHN conductors capped at both ends; and one equipment grounding conductor. How many current-carrying conductors are counted for Table 310.15(C)(1)?"
  options:
    - id: a
      text: "11 — each VFD circuit counts 4 (nonlinear neutral counts), the 2-phase-plus-neutral circuit counts 3, and spares and the EGC count zero."
      isCorrect: true
    - id: b
      text: "8 — neutrals are never counted as current-carrying conductors."
      distractorRationale: "Two neutral rules are violated at once: a wye neutral serving nonlinear load counts (310.15(E)(3)), and a neutral shared by only two phases of a wye counts (310.15(E)(2))."
    - id: c
      text: "13 — the two spares must be counted because they occupy the raceway."
      distractorRationale: "Adjustment is about HEAT, not fill. Conductors terminated on nothing carry no current and are not counted — raceway occupancy is a Chapter 9 fill question, not a 310.15 one."
    - id: d
      text: "14 — every conductor in the raceway counts, including spares and the EGC."
      distractorRationale: "EGCs carry current only during faults and are never counted; dead spares carry none at all. Counting everything overshoots by three."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Count by current, not by presence: 4 + 4 + 3 = 11; spares and EGC contribute nothing."
    codePath: ["310.15(E)(3) → nonlinear wye neutrals count", "310.15(E)(2) → 2-phases+neutral counts", "310.15(C)(1) → 10–20 CCC → 0.50"]
    steps:
      - { text: "VFD circuits: 3 phases + counted neutral = 4 each → 8.", ref: "310.15(E)(3)" }
      - { text: "The 3-wire two-phases-plus-neutral circuit: all 3 count.", ref: "310.15(E)(2)" }
      - { text: "Spares (no termination) and the EGC are excluded. Total 11 → the 10–20 row → 0.50 adjustment.", ref: "310.15(C)(1)" }
  trapIds: [adjusted-vs-corrected-ampacity]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-amp-x023
  domainId: nec.ampacity
  skillIds: [nec.ampacity.table-lookup, nec.ampacity.fill-adjustment, nec.ampacity.termination-limit]
  type: single
  difficulty: 9
  stem: "A feeder must deliver a usable ampacity of at least 110 A. It will run in a raceway with 6 current-carrying conductors (0.80 adjustment), normal 30°C ambient, on 75°C terminations, using XHHW-2 ALUMINUM. What is the SMALLEST aluminum conductor that qualifies?"
  options:
