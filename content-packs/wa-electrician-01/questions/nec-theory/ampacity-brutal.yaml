      - { text: "THWN is 75°C insulation: base 85 A, and the correction factor must come from the 75°C column — exactly 55°C → 0.67.", ref: "310.15(B)(1)" }
      - { text: "85 × 0.67 × 0.80 = 45.56 A; the 75°C termination value (85 A) does not bind.", ref: "110.14(C)" }
