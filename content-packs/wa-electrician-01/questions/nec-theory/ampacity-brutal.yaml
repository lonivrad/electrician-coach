# Conductor ampacity — BRUTAL tier (difficulty 9–10). Multi-article chains: CCC counting from
# described raceways → correction-row boundaries → 110.14(C) caps → 240.4(B)/(D) OCPD. 2020 NEC. DRAFT.

# ---- CCC count derived from a described raceway + boundary ambient -----------
- id: q-amp-x001
  recompute: { calc: ampacityDerating, inputs: { size: "1/0", tempColumn: 90, ambientC: 40, ccc: 12, terminationColumn: 75 } }
  domainId: nec.ampacity
  commonMistake: "If you got 108.3, you excluded the lighting-circuit neutrals (9 CCC → 0.70) — LED drivers are nonlinear loads, so each wye neutral carries harmonic current and counts (310.15(E)(3)). If you got 73.95, you used the 41–45°C row for a 40°C ambient."
  skillIds: [nec.ampacity.fill-adjustment, nec.ampacity.combined, nec.ampacity.termination-limit]
  type: numeric
  difficulty: 10
  stem: "A 90-ft EMT run through a warehouse mezzanine (design ambient exactly 40°C) contains three 3-phase, 4-wire wye multiwire branch circuits feeding LED high-bay lighting (nonlinear loads), plus one full-size equipment grounding conductor and two spare THHN conductors capped at both ends. A 1/0 AWG THHN copper feeder in the same raceway lands on 75°C-rated lugs at a panel whose bus is rated 225 A. What ampacity (A) may the 1/0 feeder be used at?"
  answer: { kind: numeric, value: 77.35, unit: "A", tolerance: 1.0 }
  solution:
    keyIdea: "Count the CCC yourself: nonlinear-load wye neutrals count, EGCs and dead spares never do. Then 40°C is the TOP of the 36–40°C band, not the bottom of 41–45°C."
    codePath: ["310.15(E)(3) → nonlinear wye neutrals count", "3×4 + 1 feeder... = 12 CCC (EGC/spares excluded)", "Table 310.16 → 1/0 Cu 90°C = 170 A", "310.15(B)(1) → 36–40°C, 90°C → 0.91", "310.15(C)(1) → 10–20 CCC → 0.50", "110.14(C) → 75°C cap = 150 A"]
    steps:
      - { text: "Each lighting MWBC = 3 phases + 1 counted neutral (nonlinear load) = 4; three circuits = 12 CCC. The EGC and unterminated spares carry no current and are not counted.", ref: "310.15(E)(3)" }
      - { text: "12 CCC falls in the 10–20 row → 0.50 adjustment.", ref: "310.15(C)(1)" }
      - { text: "Ambient exactly 40°C is still the 36–40°C row → 0.91 for 90°C insulation.", ref: "310.15(B)(1)" }
      - { text: "170 × 0.91 × 0.50 = 77.35 A." }
      - { text: "77.35 A ≤ 150 A (75°C termination), so 77.35 A governs. The 225 A bus rating is surplus data.", ref: "110.14(C)" }
  trapIds: [adjusted-vs-corrected-ampacity, table-column-selection]
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-amp-x002
  recompute: { calc: ampacityDerating, inputs: { size: "8", tempColumn: 90, ambientC: 35, ccc: 6, terminationColumn: 75 } }
  domainId: nec.ampacity
  commonMistake: "If you got 39.9, you used the 36–40°C row (0.91) — a 35°C ambient is the top of the 31–35°C row (0.96). If you got 36.96, you also counted the two MWBC neutrals: on a 120/240 V single-phase 3-wire circuit the neutral carries only unbalance and is NOT counted (310.15(E)(1))."
  skillIds: [nec.ampacity.fill-adjustment, nec.ampacity.combined]
  type: numeric
  difficulty: 9
  stem: "An EMT raceway in a boiler-room ceiling (design ambient exactly 35°C) carries two 120/240 V single-phase 3-wire multiwire branch circuits serving balanced linear loads, one 2-wire 120 V circuit, and a wire-type EGC. One conductor of interest is 8 AWG THHN copper landing on 75°C terminations; the connected equipment nameplate reads 27 A. What is the conductor's usable ampacity (A)?"
  answer: { kind: numeric, value: 42.24, unit: "A", tolerance: 0.5 }
  solution:
    keyIdea: "MWBC neutrals on a 1φ 3-wire system don't count; the 2-wire circuit's neutral DOES. Then hold the 31–35°C row at exactly 35°C."
    codePath: ["310.15(E)(1) → 1φ 3-wire MWBC neutral not counted", "2+2+2 = 6 CCC", "Table 310.16 → 8 AWG Cu 90°C = 55 A", "310.15(B)(1) → 31–35°C, 90°C → 0.96", "310.15(C)(1) → 4–6 CCC → 0.80", "110.14(C) → 75°C cap = 50 A"]
    steps:
      - { text: "Each 1φ 3-wire MWBC: 2 hots count, the shared neutral (unbalance only) does not = 2 each. The 2-wire circuit contributes both conductors = 2. Total 6 CCC; the EGC never counts.", ref: "310.15(E)(1)" }
      - { text: "Exactly 35°C → 31–35°C row → 0.96; six CCC → 0.80.", ref: "310.15(B)(1), 310.15(C)(1)" }
      - { text: "55 × 0.96 × 0.80 = 42.24 A." }
      - { text: "42.24 A ≤ 50 A (75°C cap), so it governs. The 27 A nameplate is surplus — the question asks ampacity, not load compliance.", ref: "110.14(C)" }
  trapIds: [adjusted-vs-corrected-ampacity, meter-reading-vs-ampacity]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-amp-x003
  recompute: { calc: ampacityDerating, inputs: { material: "al", size: "4/0", tempColumn: 90, ambientC: 30, ccc: 10, terminationColumn: 75 } }
  domainId: nec.ampacity
  commonMistake: "If you got 143.5, you counted 9 CCC (0.70) by dropping the VFD circuit's neutral — a wye neutral serving a nonlinear load counts, pushing the total to 10 and the factor to 0.50. If you got 130, you used the copper 4/0 base of 260 A."
  skillIds: [nec.ampacity.fill-adjustment, nec.ampacity.combined, nec.ampacity.termination-limit]
  type: numeric
  difficulty: 10
  stem: "A single conduit contains: two 3-phase, 4-wire wye circuits serving balanced three-phase resistance heaters (linear), one 3-phase, 4-wire wye circuit serving a VFD lineup (nonlinear), an insulated EGC, and a 4/0 AWG XHHW-2 ALUMINUM feeder of interest. The space is held at exactly 30°C, the feeder lands on 75°C lugs, and the upstream breaker is currently 200 A. What ampacity (A) may the 4/0 aluminum feeder be used at?"
  answer: { kind: numeric, value: 102.5, unit: "A", tolerance: 1.0 }
  solution:
    keyIdea: "The whole question is the CCC count: 3+3 (balanced-linear neutrals excluded) + 4 (nonlinear neutral counted) = 10 — one conductor over the 7–9 row."
    codePath: ["310.15(E)(1)/(E)(3) → which neutrals count", "6 + 4 = 10 CCC → 0.50", "Table 310.16 → 4/0 Al 90°C = 205 A", "310.15(B)(1) → 30°C → 1.00", "310.15(C)(1) → 10–20 → 0.50", "110.14(C) → 75°C Al cap = 180 A"]
    steps:
      - { text: "Heater circuits: neutrals of balanced linear wye loads are excluded → 3 CCC each = 6.", ref: "310.15(E)(1)" }
      - { text: "VFD circuit: nonlinear load → neutral counts → 4 CCC. EGC excluded. Total = 10.", ref: "310.15(E)(3)" }
      - { text: "10 CCC lands in the 10–20 row → 0.50, not the 7–9 row's 0.70.", ref: "310.15(C)(1)" }
      - { text: "Exactly 30°C is the table's reference ambient → 1.00 correction." }
      - { text: "205 × 1.00 × 0.50 = 102.5 A ≤ 180 A (75°C Al cap) — the derated value governs. The 200 A breaker is surplus data.", ref: "110.14(C)" }
  trapIds: [adjusted-vs-corrected-ampacity, table-column-selection]
  timeTargetSec: 300
