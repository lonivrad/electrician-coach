- id: q-amp-x024
  domainId: nec.ampacity
  skillIds: [nec.ampacity.temp-correction]
  type: single
  difficulty: 9
  stem: "A 30 m (100 ft) feeder run is at 30°C for its whole length except for a 3.0 m (10 ft) pass through a 55°C boiler room. The two ampacities therefore differ along the run. Per 310.15(A)(2) and its exception, which ampacity applies to the feeder?"
  options:
    - id: a
      text: "The 30°C ampacity — the hotter portion is not longer than 3.0 m AND not more than 10 percent of the total run, so the exception lets the higher ampacity stand."
      isCorrect: true
    - id: b
      text: "The 55°C-corrected ampacity — where more than one ampacity applies, the lowest always governs, no exceptions."
      distractorRationale: "That is the general rule, but 310.15(A)(2) Exception carves out short pass-throughs: ≤10 ft AND ≤10% of the run. Here the boiler-room segment sits exactly at both limits and the exception applies."
    - id: c
      text: "The 55°C-corrected ampacity — 3.0 m is exactly 10 percent of 30 m, and 'exactly at the limit' fails the exception."
      distractorRationale: "The exception reads 'not more than' — a segment exactly at 3.0 m and exactly 10% still qualifies. Boundary values that land ON a limit satisfy a not-more-than condition."
    - id: d
      text: "A length-weighted average of the two ampacities."
      distractorRationale: "No NEC provision averages ampacities along a run — the choice is binary: the lowest governs unless the short-segment exception removes it."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "310.15(A)(2) Exception: if the lower-ampacity portion is ≤10 ft and ≤10% of the circuit, the higher ampacity may be used — and both limits are 'not more than', so landing exactly on them qualifies."
    codePath: ["310.15(A)(2) → lowest ampacity governs", "310.15(A)(2) Exception → ≤3.0 m and ≤10%"]
    steps:
      - { text: "Hot segment: 3.0 m; limit is 'not more than 3.0 m' — satisfied exactly at the boundary." }
      - { text: "3.0 / 30 = 10%; limit is 'not more than 10%' — also satisfied exactly." }
      - { text: "Both conditions met → the 30°C ampacity applies to the whole run.", ref: "310.15(A)(2) Exception" }
  trapIds: [adjusted-vs-corrected-ampacity]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
