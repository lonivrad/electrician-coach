- id: q-amp-x025
  domainId: nec.ampacity
  skillIds: [nec.ampacity.combined, nec.ampacity.fill-adjustment, nec.ampacity.termination-limit]
  type: single
  difficulty: 10
  stem: "A 50 A continuous load is served by THHN copper in a raceway with 8 current-carrying conductors (0.70 adjustment), 30°C ambient, 75°C terminations. Per 210.19(A)(1), the conductor must satisfy BOTH sizing tests. What is the smallest THHN copper conductor that complies?"
  options:
    - id: a
      text: "8 AWG — 50 A at 75°C covers the 50 A load."
      distractorRationale: "Fails both tests: the 75°C value (50 A) is below 125% of the load (62.5 A), and the adjusted ampacity 55 × 0.70 = 38.5 A is below the 50 A load."
    - id: b
      text: "6 AWG"
      isCorrect: true
    - id: c
      text: "4 AWG — the adjusted ampacity must be at least 62.5 A, and 6 AWG only reaches 52.5 A."
      distractorRationale: "This applies 125% to the DERATED value — double-counting. The derated ampacity must cover 100% of the load (50 A); the 125% test is applied to the pre-adjustment ampacity."
    - id: d
      text: "3 AWG — combine both requirements: 100 A at 75°C × 0.70 = 70 A ≥ 62.5 A."
      distractorRationale: "This merges the two tests into one (derated 75°C value vs 125% load). The tests are separate — merging them overshoots the size by two AWG steps."
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Test (a): ampacity per the termination column ≥ 62.5 A → 6 AWG (65 A at 75°C). Test (b): adjusted 90°C ampacity ≥ 50 A → 75 × 0.70 = 52.5 A. 6 AWG passes both."
    codePath: ["210.19(A)(1) → 50 × 1.25 = 62.5 A pre-derate test", "Table 310.16 → 6 AWG Cu 75°C = 65 A, 90°C = 75 A", "310.15(C)(1) → 0.70", "110.14(C)"]
    steps:
      - { text: "Test 1: minimum ampacity before adjustment = 62.5 A; 6 AWG at 75°C = 65 A ≥ 62.5 A.", ref: "210.19(A)(1)" }
      - { text: "Test 2: adjusted ampacity = 75 × 0.70 = 52.5 A ≥ 50 A load." }
      - { text: "6 AWG satisfies both tests; nothing smaller does, and nothing larger is required." }
  trapIds: [continuous-load-125, adjusted-vs-corrected-ampacity]
  timeTargetSec: 300
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-amp-x026
  domainId: nec.ampacity
  skillIds: [nec.ampacity.fill-adjustment]
  type: single
  difficulty: 9
  stem: "Twelve current-carrying conductors pass between two adjacent panelboards through a 22 in. EMT nipple; the room ambient is 43°C. Which derating actually applies to these conductors in the nipple?"
  options:
    - id: a
      text: "Only the ambient correction for 43°C — the >3-CCC adjustment factors do not apply in a raceway 24 in. or shorter."
      isCorrect: true
    - id: b
      text: "Both the 0.50 adjustment (10–20 CCC) and the 43°C correction."
      distractorRationale: "310.15(C)(1) exempts conductors in raceways not exceeding 24 in. — a 22 in. nipple never triggers the CCC adjustment, regardless of the count."
    - id: c
      text: "Neither factor — nipples are exempt from all of 310.15."
      distractorRationale: "The nipple allowance waives only the CONDUCTOR-COUNT adjustment; ambient temperature heats the conductors no matter how short the raceway, so the 43°C correction still applies."
    - id: d
      text: "Only the 0.50 adjustment — temperature correction is waived because the nipple is shorter than 10 ft."
      distractorRationale: "Backwards: the length-based waiver belongs to the adjustment factors (≤24 in.), not to ambient correction. There is no 10 ft ambient waiver for raceways."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "The ≤24 in. nipple allowance kills the CCC adjustment only; ambient correction survives."
    codePath: ["310.15(C)(1) → adjustment not applied in raceways ≤ 600 mm (24 in.)", "310.15(B)(1) → 43°C correction still applies"]
    steps:
      - { text: "22 in. ≤ 24 in. → no Table 310.15(C)(1) adjustment even with 12 CCC.", ref: "310.15(C)(1)" }
      - { text: "The 41–45°C ambient correction still applies to the conductors' insulation column.", ref: "310.15(B)(1)" }
      - { text: "(Related but separate: Chapter 9 Note 4 also permits 60% fill in such nipples — a fill rule, not an ampacity rule.)" }
  trapIds: [adjusted-vs-corrected-ampacity]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-amp-x027
  domainId: nec.ampacity
  skillIds: [nec.ampacity.combined, nec.ampacity.fill-adjustment]
  type: single
  difficulty: 9
  stem: "A 10 AWG THHN copper circuit serves a 29 A noncontinuous appliance load (not a motor, not one of the 240.4(E)/(G) exceptions). Its raceway carries 5 current-carrying conductors, giving an adjusted ampacity of 40 × 0.80 = 32 A. What is the maximum OCPD rating permitted?"
  options:
    - id: a
      text: "30 A — 240.4(D) caps 10 AWG copper at 30 A regardless of the 32 A adjusted ampacity."
      isCorrect: true
    - id: b
      text: "35 A — the 32 A ampacity is not a standard rating, so 240.4(B) allows the next size up."
      distractorRationale: "240.4(B) yields to 240.4(D) for small conductors: 10 AWG copper is capped at 30 A unless a specific (E)/(G) exception applies — and none does here."
    - id: c
      text: "32 A — the OCPD may equal the adjusted ampacity."
      distractorRationale: "32 A is not a 240.6(A) standard rating, and the small-conductor cap of 30 A would still control even if it were."
    - id: d
      text: "40 A — 10 AWG THHN is a 40 A conductor at 90°C."
      distractorRationale: "The 90°C value is a derating start point only; it is unusable for OCPD selection past both the adjustment result (32 A) and the 240.4(D) cap (30 A)."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Rule collision: 240.4(B) says round up from 32 A, 240.4(D) says never exceed 30 A on 10 AWG Cu — (D) governs for small conductors."
    codePath: ["310.15(C)(1) → 40 × 0.80 = 32 A", "240.4(D)(7) → 10 AWG Cu max 30 A", "240.4(B) unavailable where (D) applies"]
    steps:
      - { text: "Adjusted ampacity 32 A would invite a 35 A breaker under 240.4(B)...", ref: "240.4(B)" }
      - { text: "...but 240.4(D) caps 10 AWG copper at 30 A unless 240.4(E) or (G) applies (motors, taps, etc.), which it does not.", ref: "240.4(D)(7)" }
      - { text: "Maximum OCPD = 30 A; the 29 A load still fits." }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-amp-x028
  domainId: nec.ampacity
  skillIds: [nec.ampacity.combined, nec.ampacity.fill-adjustment, nec.ampacity.termination-limit]
  type: single
  difficulty: 10
  stem: "A branch circuit carries 24 A continuous plus 30 A noncontinuous load on 6 AWG THHN copper, 75°C terminations, through a raceway with 8 current-carrying conductors (0.70 adjustment) at 30°C, protected at 60 A. Evaluate the CONDUCTOR under 210.19(A)(1). Which statement is correct?"
  options:
    - id: a
      text: "Compliant — 6 AWG provides 65 A at 75°C, which exceeds the required 24 × 1.25 + 30 = 60 A."
      distractorRationale: "This passes test (a) but never runs test (b): the adjusted ampacity (75 × 0.70 = 52.5 A) must also cover the actual 54 A load, and it does not."
    - id: b
      text: "Not compliant — the adjusted ampacity is 75 × 0.70 = 52.5 A, less than the 54 A of actual connected load."
      isCorrect: true
    - id: c
      text: "Not compliant — the adjusted ampacity of 52.5 A is less than the 60 A computed with the 125 percent factor."
      distractorRationale: "Right verdict, wrong test: the 125% factor applies to the PRE-adjustment check, not to the derated value. The derated ampacity only has to cover the 54 A real load — which it still fails, but by 1.5 A, not 7.5 A."
    - id: d
      text: "Compliant — 240.4(B) permits the 52.5 A conductor to be protected at the next standard size, 60 A."
      distractorRationale: "240.4(B) is about OCPD-to-conductor coordination; it cannot cure a conductor whose ampacity is below the load itself. The load (54 A) exceeding ampacity (52.5 A) kills 240.4(B)'s own conditions too."
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Assemble the mixed load twice: 60 A (with 125%) against the pre-derate 65 A — passes; 54 A (actual) against the derated 52.5 A — fails. Both must pass."
    codePath: ["210.19(A)(1)(a) → 24 × 1.25 + 30 = 60 ≤ 65 A", "210.19(A)(1)(b) → derated 52.5 A < 54 A load", "310.15(C)(1) → 0.70"]
    steps:
      - { text: "Test (a): required 60 A vs 6 AWG at 75°C = 65 A — passes.", ref: "210.19(A)(1)" }
      - { text: "Test (b): adjusted ampacity 75 × 0.70 = 52.5 A vs actual load 24 + 30 = 54 A — fails by 1.5 A." }
      - { text: "The conductor must be upsized (4 AWG: 95 × 0.70 = 66.5 A) even though the un-derated numbers looked fine." }
  trapIds: [continuous-load-125, adjusted-vs-corrected-ampacity]
  timeTargetSec: 300
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-amp-x029
  domainId: nec.ampacity
  skillIds: [nec.ampacity.fill-adjustment]
  type: single
  difficulty: 9
  stem: "Four raceways each contain one circuit plus its neutral. In which raceway must the NEUTRAL be counted as a current-carrying conductor for Table 310.15(C)(1)?"
  options:
    - id: a
      text: "A 3-wire circuit consisting of two phase conductors and the neutral, supplied from a 208Y/120 V wye system, serving linear loads."
      isCorrect: true
    - id: b
      text: "A 3-wire, 120/240 V single-phase multiwire circuit serving balanced linear loads."
      distractorRationale: "On a 1φ 3-wire system the neutral carries only the IMBALANCE of the two hots — with balanced loads it approaches zero and is not counted (310.15(E)(1))."
    - id: c
      text: "A 4-wire, 3-phase wye circuit serving balanced linear resistance heating."
      distractorRationale: "A fully loaded wye neutral on balanced LINEAR load carries only unbalanced current — excluded by 310.15(E)(1). It would count only if the load were mostly nonlinear."
    - id: d
      text: "A 2-wire circuit whose grounded conductor is also used as the equipment bond at the outlet."
      distractorRationale: "In a 2-wire circuit BOTH conductors always count — but not because of any bonding role; this option's reasoning is a distraction, and misusing the grounded conductor for bonding is its own violation (250.142)."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Two phases + neutral from a wye: the neutral sees roughly phase-magnitude current even when balanced — it always counts (310.15(E)(2))."
    codePath: ["310.15(E)(2) → 2-phases+neutral wye neutral counts", "310.15(E)(1) → unbalance-only neutrals excluded", "310.15(E)(3) → nonlinear wye neutrals count"]
    steps:
      - { text: "With only two phases of a wye plus the neutral, the neutral current does not cancel — it is comparable to the phase currents.", ref: "310.15(E)(2)" }
      - { text: "The 1φ MWBC and balanced 4-wire wye neutrals carry only unbalance → excluded.", ref: "310.15(E)(1)" }
      - { text: "A 2-wire circuit's grounded conductor counts because it carries the full circuit current — no special rule needed." }
  trapIds: [adjusted-vs-corrected-ampacity]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-amp-x030
  domainId: nec.ampacity
  skillIds: [nec.ampacity.temp-correction]
  type: single
  difficulty: 10
  stem: "THHN-2-equivalent 90°C copper conductors run in EMT laid in direct sunlight 3/4 in. above a flat roof in a city whose outdoor design ambient is 34°C. Per 310.15(B)(2) (2020 NEC), what correction factor applies?"
  options:
    - id: a
      text: "0.58 — add the 33°C rooftop adder (raceway less than 7/8 in. above the roof): 34 + 33 = 67°C → the 66–70°C row of the 90°C column."
      isCorrect: true
    - id: b
      text: "0.96 — use the 34°C outdoor ambient directly; the 31–35°C row applies."
      distractorRationale: "Sunlit raceways less than 7/8 in. above a rooftop must add 33°C (60°F) to the ambient under 310.15(B)(2) — skipping the adder overstates ampacity by roughly 40 percent here."
    - id: c
      text: "0.71 — add the old height-based adder of 26°C from the earlier code cycle: 34 + 26 = 60°C."
      distractorRationale: "The graduated height-based adder table was deleted; in the 2020 NEC a single 33°C adder applies, and only when the raceway is less than 7/8 in. above the roof."
    - id: d
      text: "0.65 — add 30°C (half of the 60°F adder): 34 + 30 = 64°C → the 61–65°C row."
      distractorRationale: "The adder is 33°C OR 60°F — they are the same temperature difference expressed in two scales, not values to be halved or converted again."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Under 7/8 in. above a sunlit roof → add 33°C to the design ambient BEFORE entering Table 310.15(B)(1)."
    codePath: ["310.15(B)(2) → +33°C (60°F) for sunlit raceways < 7/8 in. above roof", "310.15(B)(1) → 66–70°C, 90°C → 0.58"]
    steps:
      - { text: "3/4 in. < 7/8 in. → the rooftop adder applies: 34 + 33 = 67°C effective ambient.", ref: "310.15(B)(2)" }
      - { text: "67°C falls in the 66–70°C band; 90°C column → 0.58.", ref: "310.15(B)(1)" }
      - { text: "Had the raceway been 1 in. above the roof, no adder would apply and the factor would be 0.96 — the mounting height is the whole question." }
  trapIds: [adjusted-vs-corrected-ampacity, table-column-selection]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."
