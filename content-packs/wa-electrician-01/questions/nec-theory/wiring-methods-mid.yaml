# ---- Method permission — one stated condition ---------------------------------
- id: q-wm-m016
  domainId: nec.wiring-methods
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 6
  stem: "A branch circuit must run exposed along the exterior wall of a building where it is exposed to rain (a wet location, not subject to severe physical damage). May EMT be used?"
  options:
    - { id: a, text: "Yes — EMT is permitted in wet locations, using fittings suitable for wet locations and wet-rated conductors", isCorrect: true }
    - { id: b, text: "No — EMT is limited to dry indoor locations", distractorRationale: "358.10 permits EMT in wet locations; it is severe physical damage and certain corrosive conditions that restrict it, not rain." }
    - { id: c, text: "Yes, and ordinary setscrew fittings and THHN conductors are fine as-is", distractorRationale: "The method is permitted, but the installation must use fittings suitable for wet locations and wet-rated insulation (e.g., THWN) — the raceway interior is a wet location per 300.9." }
    - { id: d, text: "No — only rigid PVC may be installed outdoors", distractorRationale: "Several methods are permitted outdoors (EMT, RMC, IMC, PVC, and others); PVC has no outdoor monopoly." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "358.10 permits EMT in wet locations; the conditions travel with the location — raintight/wet-location fittings and wet-rated conductors inside."
    codePath: ["358.10 → EMT permitted in wet locations", "300.9 → raceway interior in a wet location is wet", "310.10(C) → wet-rated insulation"]
    steps:
      - { text: "Method permission: EMT may be installed in wet locations (protected from corrosion as required).", ref: "358.10" }
      - { text: "The raceway interior on the rain-exposed wall is itself a wet location, so conductors must be wet-rated.", ref: "300.9" }
      - { text: "Use fittings suitable for wet locations at every coupling and connector." }
  timeTargetSec: 110
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-wm-m017
  domainId: nec.wiring-methods
