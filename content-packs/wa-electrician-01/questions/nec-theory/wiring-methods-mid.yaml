  type: single
  difficulty: 5
  stem: "A homeowner asks for NM-B cable to be run exposed along an outdoor fence line to a shed light, arguing it is 'just low along the fence.' Per Article 334, this is:"
  options:
    - { id: a, text: "Not permitted — outdoors exposed to weather is a wet location, and NM is not permitted in wet or damp locations", isCorrect: true }
    - { id: b, text: "Permitted if the cable is kept at least 8 ft above grade", distractorRationale: "Height changes physical-damage exposure, not the wet-location classification — NM stays prohibited outdoors either way." }
    - { id: c, text: "Permitted because NM-B has a moisture-resistant jacket", distractorRationale: "The PVC jacket does not make NM wet-rated; 334.12 prohibits the cable type in wet or damp locations regardless of jacket." }
    - { id: d, text: "Not permitted — NM may never leave the interior of the panel's own room", distractorRationale: "NM can run throughout permitted dry locations of a dwelling; the restriction here is the wet outdoor location, not distance from the panel." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "One condition decides it: outdoors exposed to weather is a wet location, and 334.12 puts wet and damp locations on NM's prohibited list."
    codePath: ["Outdoor exposure → wet location", "334.12 → NM not permitted in wet or damp locations"]
    steps:
      - { text: "Classify the location: exposed to weather along a fence = wet location." }
      - { text: "NM cable is limited to dry locations; wet or damp locations are prohibited uses.", ref: "334.12" }
      - { text: "Compliant alternatives: UF cable or wet-rated conductors in a raceway suitable for the location." }
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-wm-m018
  domainId: nec.wiring-methods
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 5
  stem: "A raceway must run exposed on the wet-side wall of a dairy wash-down room (a wet location, protected from physical damage). May Schedule 40 rigid PVC be used?"
  options:
    - { id: a, text: "Yes — rigid PVC is permitted in wet locations, with wet-rated conductors inside", isCorrect: true }
    - { id: b, text: "No — PVC is limited to underground use", distractorRationale: "352.10 permits rigid PVC in many above-ground uses, including wet and corrosive locations; underground is only one of them." }
    - { id: c, text: "Yes, but only if it is Schedule 80", distractorRationale: "Schedule 80 is required where the conduit is subject to physical damage — this wall is protected, so Schedule 40 is fine." }
    - { id: d, text: "No — nonmetallic raceways cannot be used where water contacts the raceway", distractorRationale: "The opposite is true: PVC is corrosion-immune and expressly suited to wet locations; the conductors just have to be wet-rated." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "352.10 permits rigid PVC in wet locations; since the raceway interior is wet, the conductors must be wet-rated."
    codePath: ["352.10 → PVC permitted in wet locations", "300.9/310.10(C) → wet-rated conductors inside"]
    steps:
      - { text: "Method permission: rigid PVC is identified for wet and corrosive locations.", ref: "352.10" }
      - { text: "Protected from damage, Schedule 40 suffices; Schedule 80 is only for damage-prone areas." }
      - { text: "Use wet-rated insulation (THWN, XHHW) inside the raceway.", ref: "310.10(C)" }
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-wm-m019
  domainId: nec.wiring-methods
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 5
  stem: "Conductors must be pulled through a raceway installed in a wet location. Which insulation type listed below is permitted there?"
  options:
    - { id: a, text: "THWN", isCorrect: true }
    - { id: b, text: "THHN (not dual-rated)", distractorRationale: "Plain THHN is listed for dry and damp locations only; the W in a wet rating is exactly what it lacks." }
    - { id: c, text: "Any 90°C conductor, since heat rating covers moisture", distractorRationale: "Temperature rating and moisture rating are independent listings — a 90°C dry-location conductor is still prohibited in wet locations." }
    - { id: d, text: "Any conductor, provided the raceway joints are sealed watertight", distractorRationale: "The Code presumes water enters raceways in wet locations; sealing does not reclassify the interior, so the insulation itself must be wet-rated." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Wet locations require insulation listed for wet use — THWN, XHHW, or dual-rated THHN/THWN; the W is the wet listing."
    codePath: ["310.10(C) → wet locations require listed wet-location insulation"]
    steps:
      - { text: "Classify: the raceway is in a wet location, so its interior is wet." }
      - { text: "Only insulation listed for wet locations is permitted — THWN qualifies; plain THHN does not.", ref: "310.10(C)" }
  timeTargetSec: 80
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-wm-m020
  domainId: nec.wiring-methods
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 6
  stem: "An installer wants to reuse leftover Type AC (armored) cable for an exposed run down an exterior wall that is exposed to rain. Per Article 320, this use is:"
  options:
    - { id: a, text: "Not permitted — Type AC is prohibited in damp or wet locations", isCorrect: true }
    - { id: b, text: "Permitted — the interlocked steel armor is weatherproof", distractorRationale: "The spiral armor is not a watertight jacket; water tracks through it, which is why 320.12 prohibits AC in damp or wet locations." }
    - { id: c, text: "Permitted if the run is GFCI protected", distractorRationale: "GFCI protection addresses shock, not the cable's listing — it cannot make a dry-location cable legal in a wet location." }
    - { id: d, text: "Not permitted — Type AC may only be installed in raceways", distractorRationale: "AC cable is routinely installed exposed or fished without raceways in permitted dry locations; the defect here is the wet location." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "One condition decides it: the rain-exposed wall is a wet location, and 320.12 prohibits Type AC in damp or wet locations."
    codePath: ["Exterior rain exposure → wet location", "320.12 → AC cable not permitted in damp or wet locations"]
    steps:
      - { text: "Classify the location: exposed to rain = wet." }
      - { text: "Type AC's prohibited uses include damp or wet locations.", ref: "320.12" }
      - { text: "Use a wet-location method instead (e.g., wet-rated conductors in EMT/PVC, or a cable listed for the location)." }
  timeTargetSec: 95
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

# ---- 300.4 protection at framing — one framing detail --------------------------
- id: q-wm-m021
  domainId: nec.wiring-methods
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 5
  stem: "NM cable passes through a bored hole in a wood stud, and the edge of the hole is 1 in. from the nearest edge of the stud. Per 300.4(A)(1), what is required?"
  options:
    - { id: a, text: "A steel plate at least 1/16 in. thick protecting the cable at that stud", isCorrect: true }
    - { id: b, text: "Nothing — 1 in. of edge distance is sufficient", distractorRationale: "The required edge distance is 1¼ in.; at 1 in. the cable is within nail range and must be plated." }
    - { id: c, text: "The hole must be re-bored dead center and the cable re-pulled", distractorRationale: "Re-boring is one cure, but the Code's stated remedy is a 1/16 in. steel plate (or bushing) — nothing requires abandoning the existing hole." }
    - { id: d, text: "A listed grommet in the hole", distractorRationale: "Grommets are the METAL-framing remedy (300.4(B)); wood framing with a short edge distance takes a steel plate." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "300.4(A)(1): keep the hole edge at least 1¼ in. from the stud edge, or protect the cable with a steel plate at least 1/16 in. thick."
    codePath: ["300.4(A)(1) → edge distance < 1¼ in. → 1/16 in. steel plate required"]
    steps:
      - { text: "Measure the edge distance: 1 in. < 1¼ in. — the cable is within reach of drywall screws and trim nails.", ref: "300.4(A)(1)" }
      - { text: "Remedy: a steel plate or bushing at least 1/16 in. thick, covering the area of the wiring, at that framing member." }
  timeTargetSec: 85
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-wm-m022
  domainId: nec.wiring-methods
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 6
  stem: "An inspector checks a bored hole in a 2×4 wood stud carrying NM cable and measures exactly 1¼ in. from the edge of the hole to each face of the stud. Per 300.4(A)(1), what protection is required at this stud?"
  options:
    - { id: a, text: "None — the 1¼ in. edge distance itself satisfies the rule", isCorrect: true }
    - { id: b, text: "A 1/16 in. steel plate on each face of the stud", distractorRationale: "Plates are required only where the edge distance is LESS than 1¼ in.; meeting the setback is the alternative to plating." }
    - { id: c, text: "A listed bushing in the bored hole", distractorRationale: "Bushings/grommets are the metal-stud remedy of 300.4(B); a compliant wood-stud hole needs nothing added." }
    - { id: d, text: "The cable must be sleeved in EMT through the hole", distractorRationale: "No raceway sleeve is required through wood framing — the setback (or a plate) is the entire requirement." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "300.4(A)(1) is an either/or: at least 1¼ in. of edge distance OR a 1/16 in. steel plate. Exactly 1¼ in. meets the setback, so no plate is needed."
    codePath: ["300.4(A)(1) → edge distance ≥ 1¼ in. → no additional protection"]
    steps:
      - { text: "The rule requires the hole edge to be not less than 1¼ in. from the nearest edge of the wood member.", ref: "300.4(A)(1)" }
      - { text: "Exactly 1¼ in. satisfies 'not less than' — the setback alone protects the cable, and no plate is required." }
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-wm-m023
  domainId: nec.wiring-methods
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 6
  stem: "Rather than bore holes, a framer cuts a shallow notch across the face of several wood studs and the electrician lays NM cable in the notches. Per 300.4(A)(2), what does laying cable in a notch require?"
  options:
    - { id: a, text: "A steel plate at least 1/16 in. thick covering the cable at each notch, before the wall finish is applied", isCorrect: true }
    - { id: b, text: "Nothing, provided the notch keeps the cable 1¼ in. from the stud edge", distractorRationale: "A notch opens onto the stud face, so the 1¼ in. setback logic of bored holes cannot be met — notched cable must be plated." }
    - { id: c, text: "Notching is prohibited; the cable must be re-routed through bored holes", distractorRationale: "300.4(A)(2) permits cables laid in notches when protected by a 1/16 in. steel plate (framing rules in building codes still limit notch size)." }
    - { id: d, text: "A listed grommet lining each notch", distractorRationale: "Grommets protect cable at METAL-framing openings (300.4(B)); notched wood framing takes a steel plate." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "300.4(A)(2): cable laid in notches in wood studs must be protected by a steel plate at least 1/16 in. thick installed before the finish is applied."
    codePath: ["300.4(A)(2) → notched framing → 1/16 in. steel plate over the cable"]
    steps:
      - { text: "A notch exposes the cable at the stud face where drywall screws and trim nails land.", ref: "300.4(A)(2)" }
      - { text: "Protection: a steel plate at least 1/16 in. thick covering the wiring at each notch, installed before the building finish." }
  timeTargetSec: 95
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-wm-m024
  domainId: nec.wiring-methods
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 5
  stem: "An apprentice must plate a stud where an NM cable's bored hole is too close to the edge. Per 300.4(A)(1), the protective steel plate must be at least how thick?"
  options:
    - { id: a, text: "1/16 in.", isCorrect: true }
    - { id: b, text: "1/32 in.", distractorRationale: "1/32 in. is thinner than the Code minimum; a nail can drive through it — 300.4 requires at least 1/16 in." }
    - { id: c, text: "1/8 in.", distractorRationale: "1/8 in. certainly works, but the stated MINIMUM in 300.4(A)(1) is 1/16 in." }
    - { id: d, text: "1/4 in.", distractorRationale: "1/4 in. plate is far beyond the requirement; the Code minimum is 1/16 in." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "The 300.4 steel plate (or bushing) must be at least 1/16 in. thick and cover the area of the wiring."
    codePath: ["300.4(A)(1) → steel plate ≥ 1/16 in. thick"]
    steps:
      - { text: "Where the 1¼ in. edge distance cannot be met, the cable is protected by a steel plate or bushing.", ref: "300.4(A)(1)" }
      - { text: "Minimum plate thickness = 1/16 in., appropriate length and width to cover the wiring area." }
  timeTargetSec: 75
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

# ---- Table 300.5 mechanics ------------------------------------------------------
- id: q-wm-m025
  domainId: nec.wiring-methods
  skillIds: [nec.wm.burial-depth]
  type: single
  difficulty: 6
  stem: "A crew buries a 2 in. PVC conduit requiring 18 in. of cover. Per the definition used by Table 300.5, from which points is that 18 in. measured?"
  options:
    - { id: a, text: "From the top surface of the conduit to the finished grade surface", isCorrect: true }
    - { id: b, text: "From the bottom of the trench to the finished grade surface", distractorRationale: "Measuring from the trench bottom would count the conduit's own diameter as cover; cover starts at the TOP of the buried raceway." }
    - { id: c, text: "From the centerline of the conduit to the finished grade surface", distractorRationale: "Table 300.5's note defines cover from the top surface of the wiring method, not its centerline." }
    - { id: d, text: "From the top of the conduit to the bottom of the topsoil layer", distractorRationale: "Cover runs all the way to the top surface of finished grade (or concrete, or similar cover), not to a soil-layer boundary." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "'Cover' in Table 300.5 is the shortest distance between the top surface of the buried cable/raceway and the top surface of finished grade."
    codePath: ["Table 300.5, Note 1 (definition of cover) → top of raceway to finished grade"]
    steps:
      - { text: "Cover is defined as the shortest distance from the top surface of the buried wiring method to the finished grade (or concrete or similar) above it.", ref: "Table 300.5, Note 1" }
      - { text: "So an 18 in. cover requirement for 2 in. conduit needs a trench at least 20 in. deep to the trench bottom." }
  timeTargetSec: 95
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."
