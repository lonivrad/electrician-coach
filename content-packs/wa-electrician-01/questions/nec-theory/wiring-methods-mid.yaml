  domainId: nec.wiring-methods
  skillIds: [nec.wm.support]
  type: single
  difficulty: 6
  stem: "A 42 ft exposed EMT run connects two junction boxes across a warehouse wall. The installer places a strap 3 ft from each box and wants to space the remaining field straps as far apart as 358.30(A) allows. What is the maximum spacing for those field straps?"
  options:
    - { id: a, text: "10 ft", isCorrect: true }
    - { id: b, text: "4½ ft", distractorRationale: "4½ ft is the securing interval for NM and AC CABLE; EMT is a raceway with a 10 ft interval." }
    - { id: c, text: "6 ft", distractorRationale: "6 ft is the Table 352.30 spacing for 2½–3 in. PVC, not an EMT value." }
    - { id: d, text: "3 ft", distractorRationale: "3 ft is the required distance from each BOX, not the maximum interval along the run." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "358.30(A): once each box has a fastening within 3 ft, the run may be strapped at intervals not exceeding 10 ft."
    codePath: ["358.30(A) → within 3 ft of each box, then intervals ≤ 10 ft"]
    steps:
      - { text: "The within-3-ft-of-box requirement is already met at both ends.", ref: "358.30(A)" }
      - { text: "Between those points, EMT must be securely fastened at least every 10 ft." }
      - { text: "Maximum field spacing = 10 ft." }
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

