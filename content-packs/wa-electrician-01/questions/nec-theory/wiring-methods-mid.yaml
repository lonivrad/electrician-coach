# ---- NM cable support and securing (334.30) — single-rule scenarios ----------
- id: q-wm-m006
  domainId: nec.wiring-methods
  skillIds: [nec.wm.support]
  type: single
  difficulty: 5
  stem: "In new construction, NM cable is run along the sides of exposed joists, stapled every 4 ft, with the last staple 10 in from the metal box (with clamps) it enters. Per 334.30, this run is:"
  options:
    - { id: a, text: "Compliant — the intervals are within 4½ ft and the cable is secured within 12 in of the box", isCorrect: true }
    - { id: b, text: "A violation — NM must be stapled every 3 ft", distractorRationale: "3 ft is not the NM interval; 334.30 allows intervals up to 4½ ft, so 4 ft spacing passes." }
    - { id: c, text: "A violation — the last staple must be within 8 in of the box", distractorRationale: "The 8 in distance applies only at single-gang nonmetallic boxes WITHOUT clamps (314.17(C)); a box with clamps uses the general 12 in rule." }
    - { id: d, text: "Compliant only if the staples are replaced with listed cable ties", distractorRationale: "Staples designed for the cable are an approved securing means; nothing in 334.30 prefers cable ties." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "334.30 sets two numbers: intervals not exceeding 4½ ft, and securing within 12 in of every box or fitting — this run meets both."
    codePath: ["334.30 → intervals ≤ 4½ ft AND secured within 12 in of the box"]
    steps:
      - { text: "Interval check: staples every 4 ft ≤ 4½ ft — passes.", ref: "334.30" }
      - { text: "Box check: last staple 10 in from the box ≤ 12 in — passes." }
      - { text: "Both requirements met, so the run is compliant." }
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-wm-m007
  domainId: nec.wiring-methods
  skillIds: [nec.wm.support]
  type: single
  difficulty: 5
  stem: "NM cable drops down a wall to a metal device box that has internal cable clamps. The nearest staple is 20 in above the box; the rest of the run is stapled every 4 ft. What does 334.30 say about this installation?"
  options:
    - { id: a, text: "Compliant — the 4 ft intervals satisfy the support rule", distractorRationale: "The interval rule passes, but securing within 12 in of every box is a separate requirement that the 20 in gap fails." }
    - { id: b, text: "Violation — the cable must be secured within 12 in of the box", isCorrect: true }
    - { id: c, text: "Violation — the cable must be secured within 3 ft of the box", distractorRationale: "3 ft is the raceway securing distance for EMT and PVC (358.30/352.30); NM cable uses 12 in." }
    - { id: d, text: "Compliant — the box's internal clamps count as the securing point", distractorRationale: "The clamp grips the cable at the box, but 334.30 still requires an external securing point within 12 in of the box." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "NM must be secured within 12 in of every box, cabinet, or fitting; 20 in is a violation regardless of the field intervals."
    codePath: ["334.30 → secured within 12 in of the box"]
    steps:
      - { text: "Field intervals of 4 ft satisfy the 4½ ft rule.", ref: "334.30" }
      - { text: "At the box, the securing point must be within 12 in — 20 in fails." }
      - { text: "Fix: add a staple within 12 in of the box." }
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-wm-m008
  domainId: nec.wiring-methods
  skillIds: [nec.wm.support]
  type: single
  difficulty: 5
  stem: "Across an unfinished basement ceiling, NM cable is stapled to the bottom of a running board every 6 ft, and within 12 in of each box. Which statement about 334.30 is correct?"
  options:
    - { id: a, text: "Compliant — 6 ft is within the NM support limit", distractorRationale: "The NM interval limit is 4½ ft, not 6 ft; 6 ft is a PVC value (2½–3 in. trade sizes)." }
    - { id: b, text: "Violation — NM must be secured at intervals not exceeding 4½ ft", isCorrect: true }
    - { id: c, text: "Violation — NM may never be run across a basement ceiling", distractorRationale: "NM is permitted in dwellings' unfinished basements when properly supported and protected; the location is not the defect." }
    - { id: d, text: "Compliant — securing near the boxes waives the interval requirement", distractorRationale: "The within-12-in-of-box rule and the 4½ ft interval rule are cumulative; meeting one never waives the other." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "334.30 caps NM securing intervals at 4½ ft; a uniform 6 ft spacing violates the rule even though the box securing is correct."
    codePath: ["334.30 → intervals ≤ 4½ ft"]
    steps:
      - { text: "Box securing: within 12 in — passes.", ref: "334.30" }
      - { text: "Interval: 6 ft exceeds the 4½ ft maximum — violation." }
      - { text: "Fix: add staples so no interval exceeds 4½ ft." }
  timeTargetSec: 85
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-wm-m009
  domainId: nec.wiring-methods
  skillIds: [nec.wm.support]
  type: single
  difficulty: 6
  stem: "A horizontal run of NM cable passes through bored holes in wood studs spaced 16 in on center, with no staples anywhere in the field of the run (the cable is properly secured near its boxes). How does 334.30 treat the field of this run?"
  options:
    - { id: a, text: "It violates the 4½ ft rule — staples are required between the studs", distractorRationale: "334.30 states that cable run through holes in framing members is considered supported and secured; no field staples are needed." }
    - { id: b, text: "It is compliant — cable run through framing holes is considered supported and secured", isCorrect: true }
    - { id: c, text: "It is compliant only if a running board is added below the cable", distractorRationale: "Running boards are a technique for exposed work on surfaces, not a condition for framing-hole support." }
    - { id: d, text: "It violates 300.4 — NM may not pass through bored holes", distractorRationale: "Bored holes are the standard NM route; 300.4 only adds edge-distance or plate protection, not a prohibition." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "334.30 expressly counts passage through framing holes as both support and securing, so a hole every 16 in more than satisfies the 4½ ft interval."
    codePath: ["334.30 → cable through framing holes = supported and secured", "Holes every 16 in ≪ 4½ ft interval"]
    steps:
      - { text: "The support interval rule (4½ ft) applies to the field of the run.", ref: "334.30" }
      - { text: "Cable installed through bored holes in framing is deemed supported and secured — the studs themselves are the support means." }
      - { text: "Securing within 12 in of each box remains a separate requirement, which this run meets." }
  timeTargetSec: 100
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-wm-m010
  domainId: nec.wiring-methods
  skillIds: [nec.wm.support, nec.wm.method-rules]
  type: single
  difficulty: 6
  stem: "To fit a tight stud bay, an installer turns two-conductor (flat) NM cable on its edge and staples it that way every 4 ft. Per 334.30, this practice is:"
  options:
    - { id: a, text: "Permitted — orientation is not regulated as long as the intervals are met", distractorRationale: "334.30 regulates more than spacing: flat cables shall not be stapled on edge, because the staple crushes the conductors." }
    - { id: b, text: "A violation — flat NM cables shall not be stapled on edge", isCorrect: true }
    - { id: c, text: "Permitted if the staples are driven only hand-tight", distractorRationale: "Staple tension is not the issue; the on-edge orientation itself is prohibited for flat cables." }
    - { id: d, text: "A violation — NM may only be secured with cable ties, never staples", distractorRationale: "Staples designed for the purpose are a standard securing means; the defect is the on-edge orientation, not the staple." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "334.30 prohibits stapling flat NM cables on edge — the fastener bears on the conductor edges instead of the broad face."
    codePath: ["334.30 → flat cables shall not be stapled on edge"]
    steps:
      - { text: "The 4 ft intervals satisfy the spacing rule.", ref: "334.30" }
      - { text: "But 334.30 separately prohibits stapling flat cables on edge — the orientation is the violation." }
      - { text: "Fix: staple the cable on its flat face, or use listed stackers/straps that support it without deformation." }
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

# ---- EMT support (358.30) -----------------------------------------------------
- id: q-wm-m011
  domainId: nec.wiring-methods
  skillIds: [nec.wm.support]
  type: single
  difficulty: 5
  stem: "An exposed EMT run across a shop ceiling is strapped every 8 ft, with the first strap 2 ft from each box it enters. Per 358.30(A), this installation is:"
  options:
    - { id: a, text: "Compliant — intervals are within 10 ft and each box has a strap within 3 ft", isCorrect: true }
    - { id: b, text: "A violation — EMT must be strapped every 4½ ft", distractorRationale: "4½ ft is the NM/AC cable interval; EMT's raceway interval is 10 ft." }
    - { id: c, text: "A violation — the first strap must be within 12 in of each box", distractorRationale: "12 in is the cable securing distance at boxes; EMT uses 3 ft (358.30(A))." }
    - { id: d, text: "Compliant only if the straps are two-hole type", distractorRationale: "358.30(A) requires secure fastening at the stated spacings; it does not dictate one-hole versus two-hole straps." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "358.30(A) is two tests — intervals not exceeding 10 ft and a fastening within 3 ft of each box or termination — and this run passes both."
    codePath: ["358.30(A) → ≤ 10 ft intervals AND within 3 ft of each box"]
    steps:
      - { text: "Interval check: 8 ft ≤ 10 ft — passes.", ref: "358.30(A)" }
      - { text: "Termination check: 2 ft ≤ 3 ft — passes." }
      - { text: "Both clauses satisfied — compliant." }
  timeTargetSec: 85
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

