      - { text: "EMT: ≤ 360° total bends between pull points.", ref: "358.26" }
  timeTargetSec: 60
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft: SME-verify 2020 NEC 358.26."

