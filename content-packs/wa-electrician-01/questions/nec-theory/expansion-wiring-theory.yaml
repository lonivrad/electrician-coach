- id: q-wm-007
  domainId: nec.wiring-methods
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 4
  stem: "In a metal wireway, the total cross-sectional area of all contained conductors at any cross section must not exceed what percentage of the interior cross-sectional area of the wireway?"
  options:
    - { id: a, text: "20%", isCorrect: true }
    - { id: b, text: "31%" }
    - { id: c, text: "40%" }
    - { id: d, text: "53%" }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Wireway conductor fill is limited to 20% of the interior area (distinct from the 40% conduit rule)."
    codePath: ["376.22(A)"]
    steps:
      - { text: "Metal wireway max conductor fill = 20% of interior area.", ref: "376.22(A)" }
  trapIds: [table-column-selection]
  timeTargetSec: 75
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft: SME-verify 2020 NEC 376.22(A)."

- id: q-th-003
  recompute: { calc: power1ph, inputs: { volts: 120, amps: 10 } }
  domainId: nec.theory-general
  skillIds: [nec.theory.power]
  type: numeric
  difficulty: 1
  stem: "What real power (W) is dissipated by a purely resistive load drawing 10 A at 120 V?"
  answer: { kind: numeric, value: 1200, unit: "W", tolerance: 0 }
  solution:
    keyIdea: "For a resistive (unity power factor) load, P = V × I."
    codePath: ["P = V × I"]
    steps:
      - { text: "120 V × 10 A = 1,200 W." }
  timeTargetSec: 45
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft: SME-verify."

- id: q-th-004
  recompute: { calc: voltageDrop, inputs: { k: 12.9, current: 20, oneWayFt: 100, cmil: 6530, phase: 1 } }
  domainId: nec.theory-general
  commonMistake: "If your answer was about half, you forgot to double the one-way length (the 2 in the formula)."
  skillIds: [nec.theory.ohms-law]
  type: numeric
  difficulty: 2
  stem: "Estimate the voltage drop (V) on a single-phase, 2-wire copper circuit using VD = 2 × K × I × D / cmil, with K = 12.9, I = 20 A, one-way length D = 100 ft, and a 12 AWG conductor (6,530 cmil)."
  answer: { kind: numeric, value: 7.9, unit: "V", tolerance: 0.3 }
  solution:
    keyIdea: "Single-phase VD uses 2× the one-way length; K ≈ 12.9 for copper."
    codePath: ["VD = 2·K·I·D / cmil (Cu K≈12.9)", "Chapter 9 Table 8 → 12 AWG = 6,530 cmil"]
    steps:
      - { text: "VD = (2 × 12.9 × 20 × 100) / 6,530 = 51,600 / 6,530 ≈ 7.9 V." }
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  needsReview: true
  note: "Draft/needsReview: K is an approximation; confirm cmil (Chapter 9 Table 8) and method for exam context."
