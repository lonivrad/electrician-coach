  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 3
  stem: "Per 358.26, what is the maximum total degrees of bends permitted between pull points (e.g., between an outlet and a fitting) in an EMT run?"
  options:
    - { id: a, text: "180°" }
    - { id: b, text: "270°" }
    - { id: c, text: "360°", isCorrect: true }
    - { id: d, text: "720°" }
