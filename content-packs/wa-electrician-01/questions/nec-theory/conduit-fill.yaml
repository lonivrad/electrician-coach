- id: q-cf-003
  domainId: nec.conduit-fill
  skillIds: [nec.conduit.mixed-size]
  type: single
  difficulty: 3
  stem: "When a raceway contains conductors of DIFFERENT sizes, which tables are used to compute fill?"
  options:
    - { id: a, text: "Annex C only" }
    - { id: b, text: "Chapter 9 Table 4 (raceway area) and Table 5 (conductor area)", isCorrect: true }
    - { id: c, text: "Table 310.16 and Table 314.16(B)" }
    - { id: d, text: "Table 250.66 and Table 250.122" }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Annex C shortcuts apply only to same-size conductors; mixed sizes require the area method."
    codePath: ["Chapter 9 Table 5 (conductor area)", "Chapter 9 Table 4 (raceway 40% area)"]
    steps:
      - { text: "Sum each conductor's area from Table 5." }
      - { text: "Compare to the 40% column of Table 4 for the raceway.", ref: "Chapter 9 Table 4" }
  trapIds: [table-column-selection]
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "NEEDS_VERIFICATION."
