  domainId: nec.grounding-bonding
  recompute: { calc: egcSize, inputs: { ocpd: 100 } }
  skillIds: [nec.gnd.egc-sizing]
  type: single
  difficulty: 2
  stem: "Per Table 250.122, what is the minimum copper equipment grounding conductor for a circuit protected at 100 A?"
  options:
    - { id: a, text: "10 AWG" }
    - { id: b, text: "8 AWG", isCorrect: true }
    - { id: c, text: "6 AWG" }
    - { id: d, text: "4 AWG" }
  answer: { kind: single, optionId: b }
