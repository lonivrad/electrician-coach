# Phase 2 expansion — load calc / grounding & bonding. 2020 NEC. All DRAFT.

- id: q-lc-005
  domainId: nec.load-calc
  skillIds: [nec.load.general-lighting]
  type: single
  difficulty: 1
  stem: "In a dwelling service calculation, each small-appliance branch circuit and the laundry branch circuit is counted at what minimum volt-ampere value?"
  options:
    - { id: a, text: "1,000 VA" }
    - { id: b, text: "1,200 VA" }
    - { id: c, text: "1,500 VA", isCorrect: true }
    - { id: d, text: "1,800 VA" }
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "1,500 VA per small-appliance circuit and per laundry circuit."
    codePath: ["220.52(A)", "220.52(B)"]
    steps:
      - { text: "Each small-appliance and laundry circuit = 1,500 VA.", ref: "220.52" }
  timeTargetSec: 40
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft: SME-verify 2020 NEC 220.52."

- id: q-lc-006
  recompute: { calc: rangeDemandC, inputs: { count: 1 } }
  domainId: nec.load-calc
  commonMistake: "If you got 12, you used the nameplate rating instead of the Column C demand value."
  skillIds: [nec.load.demand-factor]
  type: numeric
  difficulty: 2
  stem: "Using Table 220.55 Column C, what demand load (kW) is used for a single household electric range rated 12 kW?"
  answer: { kind: numeric, value: 8, unit: "kW", tolerance: 0 }
  solution:
    keyIdea: "Table 220.55 Column C: one appliance not over 12 kW → 8 kW demand."
    codePath: ["Table 220.55, Column C → 1 appliance = 8 kW"]
    steps:
      - { text: "One range ≤ 12 kW → 8 kW demand.", ref: "Table 220.55" }
  timeTargetSec: 60
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft: SME-verify 2020 Table 220.55 Column C."

- id: q-lc-007
  recompute: { calc: demandFactorStandard, inputs: { totalVA: 10500 } }
  domainId: nec.load-calc
  commonMistake: "If you were off, add the general-lighting, small-appliance, and laundry loads together BEFORE applying the demand factors."
  skillIds: [nec.load.demand-factor]
  type: numeric
  difficulty: 3
  stem: "A dwelling has 6,000 VA general lighting, two 1,500 VA small-appliance circuits, and one 1,500 VA laundry circuit. Applying the standard demand factors (first 3,000 VA at 100%, remainder at 35%), what is the demand subtotal (VA)?"
  answer: { kind: numeric, value: 5625, unit: "VA", tolerance: 0 }
  solution:
    keyIdea: "Add general lighting + small-appliance + laundry, THEN apply the demand factors."
    codePath: ["220.52 (SA/laundry at 1,500 VA)", "Table 220.42 demand factors"]
    steps:
      - { text: "Total connected = 6,000 + (2 × 1,500) + 1,500 = 10,500 VA." }
      - { text: "First 3,000 VA × 100% = 3,000 VA." }
      - { text: "Remaining 7,500 VA × 35% = 2,625 VA." }
      - { text: "3,000 + 2,625 = 5,625 VA." }
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft: general-lighting/SA/laundry demand subtotal only, not a full service calc."

- id: q-lc-008
  recompute: { calc: optionalMethod, inputs: { totalKVA: 40 } }
  domainId: nec.load-calc
  commonMistake: "If you got 16, you applied 40% to the whole load — the first 10 kVA is taken at 100%."
  skillIds: [nec.load.dwelling-optional]
  type: numeric
  difficulty: 5
  stem: "Using the optional calculation method for a dwelling (220.82), the total connected load other than heating/air-conditioning is 40 kVA. Applying the optional demand (first 10 kVA at 100%, remainder at 40%), what is the demand (kVA) for this portion?"
  answer: { kind: numeric, value: 22, unit: "kVA", tolerance: 0 }
  solution:
    keyIdea: "Optional method (220.82(B)): first 10 kVA at 100%, remainder at 40% (HVAC added separately per 220.82(C))."
    codePath: ["220.82(B)"]
    steps:
      - { text: "First 10 kVA × 100% = 10 kVA." }
      - { text: "Remaining 30 kVA × 40% = 12 kVA." }
      - { text: "10 + 12 = 22 kVA (HVAC load added separately)." }
  trapIds: [table-column-selection]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Recompute-verified (optionalMethod); 220.82(B) first 10 kVA @100% / remainder @40% confirmed (docs/nec-tables-audit.md). Cleared needsReview 2026-07."

- id: q-gb-004
  domainId: nec.grounding-bonding
  skillIds: [nec.gnd.egc-sizing]
  type: single
  difficulty: 1
  stem: "Which table sizes the equipment grounding conductor (EGC) based on the overcurrent device rating?"
  options:
    - { id: a, text: "Table 250.66" }
    - { id: b, text: "Table 250.122", isCorrect: true }
    - { id: c, text: "Table 310.16" }
    - { id: d, text: "Table 220.55" }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "EGC → Table 250.122 (by OCPD); GEC → Table 250.66 (by service conductor). Don't swap them."
    codePath: ["Table 250.122"]
    steps:
      - { text: "EGC size comes from Table 250.122, indexed by OCPD rating.", ref: "Table 250.122" }
  trapIds: [table-column-selection]
  timeTargetSec: 40
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft: SME-verify."

