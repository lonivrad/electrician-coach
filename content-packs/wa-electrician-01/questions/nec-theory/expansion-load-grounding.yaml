      - { text: "100 A OCPD → 8 AWG copper EGC.", ref: "Table 250.122" }
  timeTargetSec: 60
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft: SME-verify 2020 Table 250.122."

- id: q-gb-006
  domainId: nec.grounding-bonding
  recompute: { calc: gecSize, inputs: { serviceSize: "3/0" } }
  skillIds: [nec.gnd.gec-sizing]
  type: single
  difficulty: 3
  stem: "A 200 A service uses 3/0 AWG copper service-entrance conductors. Per Table 250.66, what is the minimum copper grounding electrode conductor (to an electrode other than a ground rod or concrete-encased electrode)?"
  options:
    - { id: a, text: "6 AWG", distractorRationale: "6 AWG is the cap for a connection to a ground rod (250.66(A)), not the general Table 250.66 value here." }
    - { id: b, text: "4 AWG", isCorrect: true }
    - { id: c, text: "2 AWG" }
    - { id: d, text: "1/0 AWG" }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "GEC is sized from the service-conductor size; note the 6 AWG cap to a rod (250.66(A)) and 4 AWG cap to a concrete-encased electrode (250.66(B))."
    codePath: ["Table 250.66 → 2/0–3/0 Cu → 4 AWG", "250.66(A)/(B) electrode caps"]
    steps:
      - { text: "3/0 Cu service conductors → 4 AWG copper GEC.", ref: "Table 250.66" }
  trapIds: [table-column-selection]
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft: SME-verify 2020 Table 250.66 row and electrode caps."

- id: q-gb-007
  recompute: { calc: cmilRatio, inputs: { newSize: "6", origSize: "8" } }
  domainId: nec.grounding-bonding
  commonMistake: "If you got a factor below 1, you divided the smaller area by the larger — divide the new area by the original (26,240 ÷ 16,510)."
  skillIds: [nec.gnd.egc-sizing]
  type: numeric
  difficulty: 5
  stem: "A 40 A branch circuit normally uses 8 AWG (16,510 cmil) ungrounded conductors with a 10 AWG copper EGC. The ungrounded conductors are increased to 6 AWG (26,240 cmil) for voltage drop. Per 250.122(B), by what factor must the EGC circular-mil area be increased? (round to 2 decimals)"
  answer: { kind: numeric, value: 1.59, unit: "ratio", tolerance: 0.05 }
  solution:
    keyIdea: "250.122(B): upsize the EGC in the same proportion as the ungrounded conductors' circular-mil increase."
    codePath: ["250.122(B)", "Chapter 9 Table 8 (circular mils)"]
    steps:
      - { text: "Ratio = 26,240 cmil ÷ 16,510 cmil = 1.59." }
      - { text: "The EGC's circular-mil area is multiplied by 1.59 (10 AWG → 8 AWG)." }
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Recompute-verified (cmilRatio); Ch.9 Table 8 circular mils + 250.122(B) proportional-upsize method confirmed. Cleared needsReview 2026-07."
