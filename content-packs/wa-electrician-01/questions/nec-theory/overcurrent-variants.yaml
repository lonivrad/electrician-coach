# ---- Continuous + noncontinuous load OCPD (210.20(A)) -----------------------
- id: q-oc-111
  recompute: { calc: ocpdMixedLoad, inputs: { continuous: 40, noncontinuous: 20, standardize: 1 } }
  domainId: nec.overcurrent
  commonMistake: "Continuous load is taken at 125%; noncontinuous stays at 100%."
  skillIds: [nec.ocp.standard-ratings]
  type: numeric
  difficulty: 2
  stem: "A branch circuit supplies a 40 A continuous load and a 20 A noncontinuous load. Per 210.20(A), the OCPD must be at least 125% of the continuous plus 100% of the noncontinuous load. Using a standard size, what rating (A) is required?"
  answer: { kind: numeric, value: 70, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "125% × continuous + 100% × noncontinuous, then a standard size."
    codePath: ["210.20(A)", "240.6(A)"]
    steps:
      - { text: "40 × 1.25 = 50; + 20 = 70 A (a standard size)." }
  trapIds: [continuous-load-125]
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Calculator-backed (ocpdMixedLoad)."

