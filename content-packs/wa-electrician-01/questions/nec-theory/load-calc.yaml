- id: q-lc-003
  domainId: nec.load-calc
  skillIds: [nec.load.demand-factor]
  type: numeric
  difficulty: 3
  stem: "Standard method: a dwelling has 9,000 VA of combined general-lighting and small-appliance load. Applying the demand factors (first 3,000 VA at 100%, remainder at 35%), what is the general-lighting/small-appliance demand SUBTOTAL in VA? (This is only that subtotal — not a complete service calculation, which would then add fixed appliances, range, dryer, HVAC, etc.)"
  answer: { kind: numeric, value: 5100, unit: "VA", tolerance: 0 }
  solution:
    keyIdea: "Apply the 3,000 VA at 100%, the rest at 35%."
    codePath: ["Table 220.42 (general lighting demand factors)"]
    steps:
      - { text: "First 3,000 VA × 100% = 3,000 VA." }
      - { text: "Remaining 6,000 VA × 35% = 2,100 VA." }
      - { text: "3,000 + 2,100 = 5,100 VA." }
  trapIds: [continuous-load-125]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "NEEDS_VERIFICATION."

