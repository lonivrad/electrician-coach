# ---- Max same-size conductors (40% fill) -----------------------------------
- id: q-cf-101
  recompute: { calc: conduitMaxSameSize, inputs: { raceway: "EMT", tradeSize: "3/4", size: "12" } }
  domainId: nec.conduit-fill
  skillIds: [nec.conduit.same-size]
  type: numeric
  difficulty: 2
  stem: "How many 12 AWG THHN conductors are permitted in a 3/4 in. EMT at the 40% fill limit?"
  answer: { kind: numeric, value: 16, unit: "conductors", tolerance: 0 }
  solution:
    keyIdea: "Raceway area × 40% ÷ conductor area; round down unless the decimal ≥ 0.8."
    codePath: ["Ch.9 Table 4 (EMT 3/4 = 0.533 in²)", "Ch.9 Table 5 (12 THHN = 0.0133 in²)", "Ch.9 Table 1"]
    steps:
      - { text: "0.533 × 0.40 = 0.2132 in²; ÷ 0.0133 = 16.03 → 16." }
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Calculator-backed (conduitMaxSameSize)."

