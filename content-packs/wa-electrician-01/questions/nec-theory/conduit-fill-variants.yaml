# ---- Total conductor area used (in²) ---------------------------------------
- id: q-cf-111
  recompute:
    { calc: conduitAreaUsed, inputs: { conductors: [{ size: "12", count: 3 }, { size: "10", count: 1 }] } }
  domainId: nec.conduit-fill
  skillIds: [nec.conduit.mixed-size]
  type: numeric
  difficulty: 2
  stem: "What total conductor cross-sectional area (in²) is used by three 12 AWG THHN and one 10 AWG THHN conductor?"
  answer: { kind: numeric, value: 0.061, unit: "in²", tolerance: 0.001 }
  solution:
    keyIdea: "Sum each conductor's Table 5 area × its count."
    codePath: ["Ch.9 Table 5 (12 THHN = 0.0133, 10 THHN = 0.0211)"]
    steps:
      - { text: "3 × 0.0133 + 1 × 0.0211 = 0.0399 + 0.0211 = 0.0610 in²." }
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Calculator-backed (conduitAreaUsed)."

