- id: q-box-m001
  recompute: { calc: boxFill, inputs: { conductors: { "14": 6 }, deviceCount: 1, deviceSize: "14" } }
  domainId: nec.box-fill
  commonMistake: "If you got 14.0, you counted the receptacle yoke as a single allowance. 314.16(B)(4) requires a DOUBLE allowance per yoke: 2 × 2.00 = 4.00 in³."
  skillIds: [nec.box.conductor-count, nec.box.device-clamp-allowance]
  type: numeric
  difficulty: 5
  stem: "A device box (no internal clamps) contains six 14 AWG insulated circuit conductors and one duplex receptacle with 14 AWG conductors landed on it. What minimum box volume (in³) does 314.16(B) require?"
  answer: { kind: numeric, value: 16.0, unit: "in³", tolerance: 0.01 }
  solution:
    keyIdea: "A device yoke adds two allowances of the largest conductor connected to it."
    codePath: ["314.16(B)(1)", "314.16(B)(4)", "Table 314.16(B) → 14 AWG = 2.00 in³"]
    steps:
      - { text: "Conductors: 6 × 2.00 = 12.00 in³." }
      - { text: "Receptacle yoke: 2 × 2.00 = 4.00 in³.", ref: "314.16(B)(4)" }
      - { text: "Total = 12.00 + 4.00 = 16.00 in³." }
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

