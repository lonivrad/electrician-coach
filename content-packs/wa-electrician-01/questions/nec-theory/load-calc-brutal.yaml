# ---- Multi-dwelling buckets crossing the 220.42 breakpoints ------------------

- id: q-load-x006
  recompute: { calc: sumThenStandardDemand, inputs: { components: [30000, 60000, 30000] } }
  domainId: nec.load-calc
  commonMistake: "If you got 42,000, you applied 35% to the whole total — the first 3,000 VA stays at 100%. If you shaved anything at 25%, note the third tier applies only to load OVER 120,000 VA, and this total lands exactly on the breakpoint."
  skillIds: [nec.load.general-lighting, nec.load.demand-factor]
  type: numeric
  difficulty: 9
  stem: "A 20-unit studio apartment building has 500 ft² dwelling units, each with the two required small-appliance circuits and one laundry circuit. The service is 208Y/120 V, 3-phase. Using the standard method, what is the Table 220.42 demand (VA) for the combined general-lighting, small-appliance, and laundry load?"
  answer: { kind: numeric, value: 43950, unit: "VA", tolerance: 1 }
  solution:
    keyIdea: "The connected total lands EXACTLY on 120,000 VA — the 25% tier never engages, because it applies only to the remainder over 120,000."
    codePath: ["Table 220.12", "220.52(A)/(B)", "Table 220.42 (breakpoint)"]
    steps:
      - { text: "Lighting: 20 × 500 × 3 = 30,000 VA; SA: 20 × 3,000 = 60,000 VA; laundry: 20 × 1,500 = 30,000 VA.", ref: "220.12 / 220.52" }
      - { text: "Connected total = 120,000 VA exactly." }
      - { text: "First 3,000 at 100% = 3,000; remaining 117,000 × 35% = 40,950; nothing exceeds 120,000, so no 25% slice.", ref: "Table 220.42" }
      - { text: "Demand = 43,950 VA." }
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

