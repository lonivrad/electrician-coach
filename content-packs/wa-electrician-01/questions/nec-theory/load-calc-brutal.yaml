# ---- Multi-range Column C where the COUNT is the trap (Table 220.55) ---------

- id: q-load-x012
  recompute: { calc: rangeDemandC, inputs: { count: 5 } }
  domainId: nec.load-calc
  commonMistake: "If you got 21, you counted six ranges — the unit with the gas range contributes nothing to Table 220.55. If you got 59, you summed the nameplates."
  skillIds: [nec.load.demand-factor]
  type: numeric
  difficulty: 9
  stem: "A 6-unit apartment building is served by one service. Five units have 11.8 kW household electric ranges; the sixth unit has a gas range. Using Table 220.55 Column C, what range demand (kW) is used in the service calculation?"
  answer: { kind: numeric, value: 20, unit: "kW", tolerance: 0 }
  solution:
    keyIdea: "Column C is entered at the number of ELECTRIC ranges on the calculated conductors — the gas unit drops the count from 6 to 5, flipping the table row."
    codePath: ["Table 220.55, Column C → 5 appliances"]
    steps:
      - { text: "Only the five electric ranges (each ≤12 kW) count; the gas range is not an electrical load.", ref: "Table 220.55" }
      - { text: "Column C at 5 appliances → 20 kW total demand (not 21 kW for 6)." }
  trapIds: [table-column-selection]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

