- id: q-load-x029
  domainId: nec.load-calc
  skillIds: [nec.load.demand-factor, nec.load.service-size]
  type: single
  difficulty: 10
  stem: "A 10-unit building has one 11.5 kW range per unit. Two riser feeders each serve five units, and both feeders come from one service. Using Table 220.55 Column C, which set of range demands is correct?"
  options:
    - id: a
      text: "Each feeder 20 kW; service 40 kW (the sum of the two feeder demands)."
      distractorRationale: "The service demand is found by entering Column C ONCE at the total number of ranges it supplies (10 → 25 kW). Summing feeder demands (40 kW) forfeits the diversity the table grants at higher counts."
    - id: b
      text: "Each feeder 12.5 kW (half of the service's 25 kW); service 25 kW."
      distractorRationale: "A feeder's demand is read from Column C at the number of ranges on THAT feeder — 5 ranges → 20 kW — not as a pro-rata share of the service figure."
    - id: c
      text: "Each feeder 25 kW, matching the service, since all ranges share one service."
      distractorRationale: "Each feeder sees only its own five ranges, so each is entered in Column C at 5 (20 kW); only the service, which supplies all ten, is entered at 10 (25 kW)."
    - id: d
      text: "Each feeder 20 kW (Column C at 5); service 25 kW (Column C at 10)."
      isCorrect: true
  answer: { kind: single, optionId: d }
  solution:
    keyIdea: "Column C is entered separately for each conductor set, at the count of ranges THAT conductor supplies — 5, 5, and 10 give 20, 20, and 25 kW."
    codePath: ["Table 220.55, Column C (5 → 20 kW; 10 → 25 kW)"]
    steps:
      - { text: "Feeder A: 5 ranges → Column C = 20 kW. Feeder B: same, 20 kW.", ref: "Table 220.55" }
      - { text: "Service: 10 ranges → Column C = 25 kW — NOT 20 + 20 = 40 kW.", ref: "Table 220.55" }
      - { text: "The nonlinearity of Column C is the point: more ranges on one conductor set means more diversity, not additive demand." }
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-load-x030
  domainId: nec.load-calc
  skillIds: [nec.load.service-size]
  type: single
  difficulty: 9
  stem: "A dwelling's optional-method (220.82) calculated load is 26,880 VA on a 120/240 V single-phase service. What is the minimum standard ampere rating for the service overcurrent device?"
  options:
    - id: a
      text: "100 A — dwellings only ever require the 230.79(C) minimum."
      distractorRationale: "230.79(C)'s 100 A is a floor, not a ceiling: the disconnect must also be at least the calculated load, and 26,880 / 240 = 112 A exceeds 100 A."
    - id: b
      text: "110 A — the standard rating nearest the calculated 112 A."
      distractorRationale: "110 A is BELOW the 112 A calculated load; the device must be at least the load, so you must move UP the 240.6(A) list, not to the nearest value."
    - id: c
      text: "125 A — the smallest 240.6(A) standard rating not less than 26,880 VA ÷ 240 V = 112 A."
      isCorrect: true
    - id: d
      text: "150 A — services must carry one full standard size of spare capacity."
      distractorRationale: "No such spare-capacity rule exists; 125 A already equals or exceeds the 112 A calculated load, so 150 A is not the MINIMUM."
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "Convert VA to amps at 240 V, check the 230.79(C) 100 A floor, then climb to the first 240.6(A) standard rating at or above the load."
    codePath: ["220.82", "230.79(C)", "240.6(A)"]
    steps:
      - { text: "26,880 VA ÷ 240 V = 112 A calculated load.", ref: "220.82" }
      - { text: "112 A > the 100 A dwelling minimum, so the load governs.", ref: "230.79(C)" }
      - { text: "Standard ratings: 110 A is too small; the next is 125 A → minimum standard rating 125 A.", ref: "240.6(A)" }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."
