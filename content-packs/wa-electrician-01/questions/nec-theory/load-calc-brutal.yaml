    - id: c
      text: "No optional method may be used anywhere in a multifamily building."
      distractorRationale: "220.84 is written precisely for multifamily services and feeders (three or more units meeting its conditions), and 220.82 remains available for each individual unit's qualifying feeder."
    - id: d
      text: "Use 220.84 for each unit feeder and 220.82 for the building service."
      distractorRationale: "This swaps the scopes: 220.84 is the MULTIFAMILY (3+ units) method for the common service/feeder; 220.82 is the single-dwelling-unit method."
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Match each optional method to its scope: 220.82 = one dwelling unit on a ≥100 A 3-wire supply; 220.84 = the whole multifamily service."
    codePath: ["220.82(A)", "220.84"]
    steps:
      - { text: "Each 125 A unit feeder meets 220.82(A) (120/240 V, 3-wire, ≥100 A, one dwelling unit).", ref: "220.82(A)" }
      - { text: "The building service is calculated under Part III, or under 220.84 if its conditions are met — never by summing per-unit 220.82 results.", ref: "220.84" }
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
