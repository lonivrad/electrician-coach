# ---- General-lighting floor area assembled from a plan (220.12 exclusions) ---

- id: q-load-x001
  recompute: { calc: generalLighting, inputs: { areaFt2: 3400 } }
  domainId: nec.load-calc
  commonMistake: "If you got 7,800, you excluded the walk-out basement — 220.12 excludes only unfinished spaces NOT adaptable for future use; a basement with full-height ceilings, egress, and rough-in is adaptable and counts. If you got 12,000, you also counted the garage and open porch."
  skillIds: [nec.load.general-lighting]
  type: numeric
  difficulty: 9
  stem: "A single-story dwelling has 2,600 ft² of finished living space over an unfinished walk-out basement of 800 ft² with full-height ceilings, egress windows, and roughed-in plumbing for a future rec room. Attached are a 480 ft² garage and a 120 ft² open porch. The plan also lists a 12 kW range and a 5 kW dryer. What general-lighting load (VA) is computed at 3 VA/ft²?"
  answer: { kind: numeric, value: 10200, unit: "VA", tolerance: 1 }
  solution:
    keyIdea: "220.12 excludes open porches, garages, and unfinished spaces not adaptable for future use — an ADAPTABLE unfinished basement stays IN the count."
    codePath: ["220.12 (floor-area rule)", "Table 220.12 → dwelling 3 VA/ft²"]
    steps:
      - { text: "Finished space 2,600 ft² counts; the basement is unfinished but adaptable (headroom, egress, rough-in), so its 800 ft² also counts.", ref: "220.12" }
      - { text: "Garage (480) and open porch (120) are excluded; the range and dryer nameplates are irrelevant to the lighting load." }
      - { text: "Countable area = 2,600 + 800 = 3,400 ft²; 3,400 × 3 = 10,200 VA." }
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-load-x002
  recompute: { calc: generalLighting, inputs: { areaFt2: 2656 } }
  domainId: nec.load-calc
  commonMistake: "If you got 9,768, you multiplied the full two-story footprint (3,256 ft²) by 3 without pulling out the garage and open porch that sit INSIDE the outside-dimension footprint."
  skillIds: [nec.load.general-lighting]
  type: numeric
  difficulty: 9
  stem: "A two-story dwelling has an L-shaped footprint measured to outside dimensions: a 44 ft × 28 ft main rectangle plus an 18 ft × 22 ft wing, identical on both floors. Within the first-floor footprint are a 20 ft × 24 ft garage and a 6 ft × 20 ft covered open porch; everything else on both floors is habitable. A 140 ft² detached shed sits at the rear property line. What general-lighting load (VA) is computed at 3 VA/ft²?"
  answer: { kind: numeric, value: 7968, unit: "VA", tolerance: 1 }
  solution:
    keyIdea: "Build the area from the plan geometry for BOTH floors, then subtract the in-footprint garage and open porch; the detached shed is never in the dwelling's floor area."
    codePath: ["220.12 (outside dimensions; exclusions)", "Table 220.12 → 3 VA/ft²"]
    steps:
      - { text: "Per floor: 44 × 28 = 1,232 ft² plus 18 × 22 = 396 ft² → 1,628 ft²; two floors = 3,256 ft²." }
      - { text: "Exclude the garage 20 × 24 = 480 ft² and open porch 6 × 20 = 120 ft² (first floor only).", ref: "220.12" }
      - { text: "Countable area = 3,256 − 480 − 120 = 2,656 ft²; 2,656 × 3 = 7,968 VA." }
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

# ---- Single-dwelling lighting bucket: floor plan + circuit counts → 220.42 ---

- id: q-load-x003
  recompute: { calc: sumThenStandardDemand, inputs: { components: [8640, 4500, 1500] } }
  domainId: nec.load-calc
  commonMistake: "If you got 6,549, you counted only the two required small-appliance circuits — 220.52(A) takes 1,500 VA for EACH installed 20 A small-appliance circuit, and this kitchen has three. If your area came out larger, you counted the garage, open porch, or the non-adaptable attic."
  skillIds: [nec.load.general-lighting, nec.load.demand-factor]
  type: numeric
  difficulty: 9
  stem: "A two-story dwelling measures 30 ft × 48 ft per floor to outside dimensions, both floors fully habitable. It also has a 576 ft² attached garage, a 200 ft² open porch, and a 400 ft² unfinished attic with 4 ft headroom not adaptable for future use. The kitchen was wired with three 20 A small-appliance branch circuits (one more than required) and there is one laundry circuit. Using the standard method, what is the Table 220.42 demand (VA) for the general-lighting, small-appliance, and laundry load?"
  answer: { kind: numeric, value: 7074, unit: "VA", tolerance: 1 }
  solution:
    keyIdea: "Derive the countable area from the plan (excluding garage/porch/attic), count every INSTALLED small-appliance circuit, then run one total through the 220.42 tiers."
    codePath: ["220.12", "220.52(A)/(B)", "Table 220.42"]
    steps:
      - { text: "Area = 30 × 48 × 2 = 2,880 ft² (garage, open porch, and non-adaptable attic excluded); lighting = 2,880 × 3 = 8,640 VA.", ref: "220.12" }
      - { text: "Small appliance: 3 × 1,500 = 4,500 VA; laundry: 1,500 VA.", ref: "220.52" }
      - { text: "Connected total = 8,640 + 4,500 + 1,500 = 14,640 VA." }
      - { text: "3,000 at 100% + 11,640 × 35% = 3,000 + 4,074 = 7,074 VA.", ref: "Table 220.42" }
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

