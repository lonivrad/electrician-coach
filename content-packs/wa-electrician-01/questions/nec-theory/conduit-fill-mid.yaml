  difficulty: 5
  stem: "A branch-circuit consolidation uses 10 AWG THHN conductors in a full-length run of 1-1/4 in. EMT. Using the Chapter 9 area method, how many 10 AWG THHN conductors are permitted at the 40% fill limit? (conductors)"
  answer: { kind: numeric, value: 28, unit: "conductors", tolerance: 0 }
