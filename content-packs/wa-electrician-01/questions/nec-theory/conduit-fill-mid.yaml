    keyIdea: "40% of the Table 4 EMT area divided by the Table 5 conductor area, then round down."
    codePath: ["Ch.9 Table 4 (1-1/4 in. EMT = 1.496 in²)", "Ch.9 Table 5 (10 THHN = 0.0211 in²)", "Ch.9 Table 1"]
