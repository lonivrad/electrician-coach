      - { text: "Usable area: 1.496 × 0.40 = 0.5984 in².", ref: "Ch.9 Table 4" }
      - { text: "0.5984 ÷ 0.0211 = 28.36 conductors.", ref: "Ch.9 Table 5" }
      - { text: "Decimal 0.36 < 0.8 → round down to 28.", ref: "Ch.9 Table 1 Note" }
