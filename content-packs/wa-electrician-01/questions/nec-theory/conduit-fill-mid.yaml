      isCorrect: true
    - id: b
      text: "No — 1.10 in² exceeds the 40% limit of 0.8144 in²."
      distractorRationale: "The 40% limit applies to full-length runs; a raceway not exceeding 24 in. between enclosures is a nipple and may be filled to 60%."
    - id: c
      text: "Yes — 1.10 in² is less than the full 2.036 in² internal area."
      distractorRationale: "Conductors are never permitted to occupy the full internal area; the comparison must use the applicable fill percentage."
    - id: d
      text: "No — nipples are limited to 31% fill."
      distractorRationale: "31% is the Table 1 row for exactly two conductors in a raceway; the nipple allowance is 60%."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "At 20 in. the raceway qualifies as a nipple, so 60% (not 40%) of the Table 4 area is usable."
    codePath: ["Ch.9 Notes to Tables, Note 4 (nipple = 60%)", "Ch.9 Table 4 (1-1/2 in. EMT = 2.036 in²)"]
