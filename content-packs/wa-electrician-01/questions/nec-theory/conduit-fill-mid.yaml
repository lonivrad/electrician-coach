    keyIdea: "Fill percentage is uniform across raceway types; the Table 4 internal area is what differs, and EMT's is slightly larger than Schedule 40 PVC's."
    codePath: ["Ch.9 Table 1", "Ch.9 Table 4 (EMT vs PVC-40 columns)"]
