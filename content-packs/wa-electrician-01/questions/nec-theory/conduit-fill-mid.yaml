# ---- 40%-of-Table-4 comparisons (areas given) -----------------------------------
- id: q-cond-m020
  domainId: nec.conduit-fill
  skillIds: [nec.conduit.mixed-size, nec.conduit.percent-fill]
  type: single
  difficulty: 5
  stem: "A full-length EMT run will carry conductors totaling 0.5193 in². Table 4 lists 1 in. EMT at 0.864 in² and 1-1/4 in. EMT at 1.496 in² internal area. What is the minimum EMT trade size at the 40% fill limit?"
  options:
    - id: a
      text: "1 in."
      distractorRationale: "Compares the 0.5193 in² conductor area to the FULL 0.864 in² internal area instead of its 40% usable area (0.3456 in²)."
    - id: b
      text: "1-1/4 in."
      isCorrect: true
    - id: c
      text: "1-1/2 in."
      distractorRationale: "Jumps a size 'to be safe' — 1-1/4 in. EMT already provides 0.5984 in² of usable area at 40%."
    - id: d
      text: "2 in."
      distractorRationale: "Applies far more margin than the code minimum requires; the question asks the smallest compliant trade size."
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Multiply each Table 4 area by 40% and pick the smallest size whose usable area covers the conductor total."
    codePath: ["Ch.9 Table 1 (>2 conductors = 40%)", "Ch.9 Table 4 (EMT rows)"]
    steps:
      - { text: "1 in. EMT: 0.864 × 0.40 = 0.3456 in² < 0.5193 — fails.", ref: "Ch.9 Table 4" }
      - { text: "1-1/4 in. EMT: 1.496 × 0.40 = 0.5984 in² ≥ 0.5193 — minimum is 1-1/4 in.", ref: "Ch.9 Table 4" }
  trapIds: [table-column-selection]
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

