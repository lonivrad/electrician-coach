- id: q-gb-003
  domainId: nec.grounding-bonding
  skillIds: [nec.gnd.egc-sizing]
  type: single
  difficulty: 3
  stem: "If ungrounded conductors are increased in size to compensate for voltage drop, what must happen to the equipment grounding conductor?"
  options:
    - { id: a, text: "It stays the same size based on the OCPD." }
    - { id: b, text: "It must be increased proportionally to the ungrounded conductor increase.", isCorrect: true }
    - { id: c, text: "It may be reduced one size." }
    - { id: d, text: "It is no longer required." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Upsizing the phase conductors requires proportional upsizing of the EGC."
    codePath: ["250.122(B)"]
    steps:
      - { text: "EGC increased in proportion to the circular-mil increase of the ungrounded conductors.", ref: "250.122(B)" }
  timeTargetSec: 75
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "NEEDS_VERIFICATION."
