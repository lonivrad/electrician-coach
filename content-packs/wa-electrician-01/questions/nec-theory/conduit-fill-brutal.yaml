# ---- Nipple-vs-raceway adjudication at the 24 in. boundary ---------------------
- id: q-cond-x005
  recompute: { calc: conduitMaxSameSize, inputs: { raceway: "EMT", tradeSize: "1", size: "10", fillPercent: 60 } }
  domainId: nec.conduit-fill
  commonMistake: "If you got 16, you applied the 40% full-run limit — a raceway measuring exactly 24 in. between enclosures does NOT exceed 24 in., so it is a nipple and 60% fill applies (Ch.9 Note 4)."
  skillIds: [nec.conduit.same-size, nec.conduit.percent-fill]
  type: numeric
  difficulty: 9
  stem: "Two side-by-side panelboards in a 40°C mechanical room are joined by a length of 1 in. EMT that measures exactly 24 in. between the enclosures. Ignoring ampacity adjustment, how many 10 AWG THHN conductors may be pulled through this connection under the Chapter 9 fill rules? (conductors)"
  answer: { kind: numeric, value: 24, unit: "conductors", tolerance: 0 }
  solution:
    keyIdea: "The nipple allowance reads 'not exceeding 24 in.' — exactly 24 in. still qualifies, so 60% (not 40%) governs."
    codePath: ["Ch.9 Notes to Tables, Note 4 (nipple = 60%)", "Ch.9 Table 4 (1 in. EMT = 0.864 in²)", "Ch.9 Table 5 (10 THHN = 0.0211 in²)", "Ch.9 Table 1 Note"]
    steps:
      - { text: "24 in. ≤ 24 in. → the raceway is a nipple; 60% fill applies.", ref: "Ch.9 Note 4" }
      - { text: "Usable area: 0.864 × 0.60 = 0.5184 in².", ref: "Ch.9 Table 4" }
      - { text: "0.5184 ÷ 0.0211 = 24.57 → decimal 0.57 < 0.8, round down to 24.", ref: "Ch.9 Table 1 Note" }
      - { text: "At 40% the answer would have been 0.3456 ÷ 0.0211 = 16.38 → 16 — the boundary call changes the answer by 8 conductors." }
  trapIds: [table-column-selection, next-size-up-rounding]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

