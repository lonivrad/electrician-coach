# ---- Same-size max counts on the 0.8 rounding knife edge ----------------------
- id: q-cond-x001
  recompute: { calc: conduitMaxSameSize, inputs: { raceway: "EMT", tradeSize: "2", size: "3" } }
  domainId: nec.conduit-fill
  commonMistake: "If you got 14, you rounded 13.7965 up — the decimal is 0.7965, just UNDER the 0.8 threshold of the Chapter 9 Table 1 note, so you must round down. The 90 ft length, ambient, and breaker rating play no part in a fill calculation."
  skillIds: [nec.conduit.same-size, nec.conduit.percent-fill]
  type: numeric
  difficulty: 9
  stem: "A 90 ft surface run of 2 in. EMT leaves a 400 A distribution panel across a 38°C boiler room to feed several 100 A subpanels. The installer wants to combine the feeders as 3 AWG THHN copper conductors (75°C terminations) in the one raceway. Ignoring ampacity adjustment, what is the maximum number of 3 AWG THHN conductors the raceway may contain at the Chapter 9 fill limit? (conductors)"
  answer: { kind: numeric, value: 13, unit: "conductors", tolerance: 0 }
  solution:
    keyIdea: "Only the raceway type/size and conductor area matter; 13.7965 misses the 0.8 round-up threshold by 0.0035 and must be rounded down."
    codePath: ["Ch.9 Table 1 (>2 conductors = 40%)", "Ch.9 Table 4 (2 in. EMT = 3.356 in²)", "Ch.9 Table 5 (3 THHN = 0.0973 in²)", "Ch.9 Table 1 Note"]
    steps:
      - { text: "Strip the decoys: length, ambient, and OCPD ratings do not enter a fill calculation.", ref: "Ch.9 Table 1" }
      - { text: "Usable area: 3.356 × 0.40 = 1.3424 in².", ref: "Ch.9 Table 4" }
      - { text: "1.3424 ÷ 0.0973 = 13.7965 conductors.", ref: "Ch.9 Table 5" }
      - { text: "Decimal 0.7965 < 0.8 → round DOWN to 13.", ref: "Ch.9 Table 1 Note" }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

