      - { text: "Usable area: 0.495 × 0.53 = 0.2624 in².", ref: "Ch.9 Table 4" }
      - { text: "0.2624 ÷ 0.3237 = 0.8105; decimal ≥ 0.8 → round up to 1: the sleeve just complies.", ref: "Ch.9 Table 1 Note" }
      - { text: "At the 40% column the result is 0.198 ÷ 0.3237 = 0.61 → 0, which would wrongly fail the install." }
