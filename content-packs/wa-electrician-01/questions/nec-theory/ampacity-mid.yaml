  skillIds: [nec.ampacity.temp-correction]
  type: numeric
  difficulty: 5
  stem: "A 4 AWG THHN copper conductor (90°C insulation) runs through a mechanical space with a 43°C design ambient, 3 current-carrying conductors. Per Table 310.16 and Table 310.15(B)(1), what is the corrected ampacity (A)?"
