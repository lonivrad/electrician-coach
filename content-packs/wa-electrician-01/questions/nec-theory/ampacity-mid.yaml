# ---- Applied single-choice ----------------------------------------------------
- id: q-amp-m023
  domainId: nec.ampacity
  skillIds: [nec.ampacity.termination-limit, nec.ampacity.table-lookup]
  type: single
  difficulty: 5
  stem: "An 8 AWG THHN copper conductor (90°C insulation) supplies a noncontinuous load at normal ambient with 3 current-carrying conductors, terminating on a breaker with 75°C-rated lugs. What ampacity may be used to size the overcurrent protection?"
  options:
    - id: a
      text: "55 A, from the 90°C column matching the THHN insulation."
      distractorRationale: "The 90°C column is only a starting point for derating math — with no derating in play, it never becomes the usable ampacity at a 75°C lug."
    - id: b
      text: "50 A, from the 75°C column matching the termination rating."
      isCorrect: true
    - id: c
      text: "40 A, from the 60°C column as the conservative default."
      distractorRationale: "The 60°C default applies only when terminations are unmarked and unlisted — these lugs are marked 75°C, so the 75°C column applies."
    - id: d
      text: "44 A, the 90°C value multiplied by 0.80."
      distractorRationale: "No adjustment factor applies with only 3 current-carrying conductors — the 0.80 factor starts at the fourth conductor."
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "With no derating, the termination temperature rating selects the column — 75°C lugs mean the 75°C value."
    codePath: ["110.14(C)", "Table 310.16 → 8 AWG Cu 75°C = 50 A"]
    steps:
      - { text: "Marked 75°C terminations → the 75°C column governs.", ref: "110.14(C)" }
      - { text: "8 AWG copper at 75°C = 50 A.", ref: "Table 310.16" }
  trapIds: [termination-temp-limit, table-column-selection]
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-amp-m024
  domainId: nec.ampacity
  skillIds: [nec.ampacity.fill-adjustment]
  type: single
  difficulty: 6
  stem: "One raceway contains two 120/240 V single-phase 3-wire multiwire branch circuits serving balanced linear loads (each circuit: two ungrounded conductors and a neutral), plus equipment grounding conductors. Which Table 310.15(C)(1) adjustment factor applies?"
  options:
    - id: a
      text: "0.80 — four current-carrying conductors: the balanced MWBC neutrals and the EGCs are not counted."
      isCorrect: true
    - id: b
      text: "0.70 — six current-carrying conductors: both neutrals count."
      distractorRationale: "A 3-wire single-phase MWBC neutral carries only the unbalanced current — with balanced linear loads it is NOT counted (310.15(E)(1))."
    - id: c
      text: "1.00 — only three or fewer conductors per circuit, so no adjustment applies."
      distractorRationale: "The adjustment counts ALL current-carrying conductors in the raceway together, not per circuit — four ungrounded conductors share this raceway."
    - id: d
      text: "0.70 — eight conductors counting the EGCs."
      distractorRationale: "Equipment grounding conductors carry current only during faults and are never counted for adjustment."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Count ungrounded conductors across the whole raceway; balanced MWBC neutrals and EGCs are excluded."
    codePath: ["310.15(E)(1) → MWBC neutral excluded", "310.15(C)(1) → 4–6 CCC → 0.80"]
    steps:
      - { text: "Each MWBC: 2 ungrounded conductors count; the balanced neutral does not.", ref: "310.15(E)(1)" }
      - { text: "Total = 4 current-carrying conductors → 4–6 row → 0.80.", ref: "310.15(C)(1)" }
  trapIds: [adjusted-vs-corrected-ampacity]
  timeTargetSec: 135
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-amp-m025
  domainId: nec.ampacity
  skillIds: [nec.ampacity.table-lookup, nec.ampacity.termination-limit]
  type: single
  difficulty: 6
  stem: "A 60 A feeder with 75°C terminations and no derating is being wired in ALUMINUM. Per Table 310.16, what is the SMALLEST aluminum conductor that provides at least 60 A at the 75°C column?"
  options:
    - id: a
      text: "8 AWG aluminum"
      distractorRationale: "8 AWG aluminum is only 40 A at 75°C — reading the copper row (50 A) or the 90°C column makes it look closer than it is."
    - id: b
      text: "6 AWG aluminum"
      distractorRationale: "6 AWG works for 60 A in COPPER (65 A at 75°C), but 6 AWG aluminum is only 50 A — aluminum needs a larger size for the same ampacity."
    - id: c
      text: "4 AWG aluminum"
      isCorrect: true
    - id: d
      text: "3 AWG aluminum"
      distractorRationale: "3 AWG aluminum (75 A) works but is not the SMALLEST size reaching 60 A — 4 AWG already provides 65 A."
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "Enter Table 310.16 on the aluminum side and find the first size whose 75°C value is at least 60 A."
    codePath: ["Table 310.16 (Al, 75°C) → 8 AWG = 40, 6 AWG = 50, 4 AWG = 65"]
    steps:
      - { text: "Aluminum 75°C values: 8 AWG = 40 A, 6 AWG = 50 A, 4 AWG = 65 A.", ref: "Table 310.16" }
      - { text: "4 AWG aluminum is the smallest size meeting the 60 A requirement." }
  trapIds: [table-column-selection]
  timeTargetSec: 105
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft mid-tier question; SME-verify before live."
