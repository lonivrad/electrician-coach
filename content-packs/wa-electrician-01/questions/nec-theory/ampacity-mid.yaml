      - { text: "Base ampacity at 90°C: 95 A.", ref: "Table 310.16" }
      - { text: "43°C falls in the 41–45°C band → factor 0.87.", ref: "310.15(B)(1)" }
      - { text: "95 × 0.87 = 82.65 A." }
