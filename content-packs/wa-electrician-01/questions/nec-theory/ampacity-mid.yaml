    keyIdea: "Look up the 90°C base, then multiply by the correction factor for the ambient bracket."
    codePath: ["Table 310.16 → 4 AWG Cu 90°C = 95 A", "Table 310.15(B)(1) → 41–45°C, 90°C → 0.87"]
