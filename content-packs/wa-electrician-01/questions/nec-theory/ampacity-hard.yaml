# Conductor ampacity — HARD tier (difficulty 4–5). Full chains: base → correction × adjustment
# → 110.14(C) termination cap → OCPD/load compare. 2020 NEC. All DRAFT; SME-verify before live.

# ---- Full derating chains, cap does NOT bind --------------------------------
- id: q-amp-h001
  recompute: { calc: ampacityDerating, inputs: { size: "1", tempColumn: 90, ambientC: 43, ccc: 8, terminationColumn: 75 } }
  domainId: nec.ampacity
  commonMistake: "If you got 84.9, you derated off the 75°C column (0.82 factor) instead of starting from the 90°C column with its own 0.87 factor."
  skillIds: [nec.ampacity.combined, nec.ampacity.termination-limit]
  type: numeric
  difficulty: 8
  stem: "A 1 AWG THHN copper feeder runs through a mechanical room with a 43°C ambient in a raceway carrying 8 current-carrying conductors, and lands on 75°C-rated lugs. What ampacity (A) may this conductor be used at?"
  answer: { kind: numeric, value: 88.3, unit: "A", tolerance: 1.0 }
  solution:
    keyIdea: "Derate from the 90°C column, then confirm the result against the 75°C termination value — the lower governs."
    codePath: ["Table 310.16 → 1 AWG Cu 90°C = 145 A", "Table 310.15(B)(1) → 41–45°C, 90°C → 0.87", "Table 310.15(C)(1) → 7–9 CCC → 0.70", "110.14(C) → 75°C cap = 130 A"]
    steps:
      - { text: "Base ampacity from the 90°C column: 145 A.", ref: "Table 310.16" }
      - { text: "Ambient 43°C → 0.87; eight CCC → 0.70.", ref: "310.15(B)(1), 310.15(C)(1)" }
      - { text: "145 × 0.87 × 0.70 = 88.3 A." }
      - { text: "88.3 A ≤ 130 A (75°C termination), so 88.3 A governs.", ref: "110.14(C)" }
  trapIds: [adjusted-vs-corrected-ampacity, termination-temp-limit]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

