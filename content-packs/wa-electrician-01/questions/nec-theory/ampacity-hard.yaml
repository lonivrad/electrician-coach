# ---- Which-rule / ordering (single-choice) ----------------------------------
- id: q-amp-h016
  domainId: nec.ampacity
  skillIds: [nec.ampacity.combined, nec.ampacity.termination-limit]
  type: single
  difficulty: 8
  stem: "A 90°C-insulated copper conductor needs correction (high ambient) AND adjustment (raceway fill), and terminates on 75°C lugs. Which sequence correctly determines the ampacity that may be used?"
  options:
    - id: a
      text: "Start from the 90°C column, multiply by both the correction and adjustment factors, then use the lower of that result and the 75°C column value."
      isCorrect: true
    - id: b
      text: "Start from the 75°C column, multiply by both factors, and use that result."
      distractorRationale: "Derating may start from the conductor's insulation column (90°C) — starting from 75°C throws away headroom the code allows and uses the wrong correction factors."
    - id: c
      text: "Take the 75°C column value first, then multiply it by the 90°C-column correction and adjustment factors."
      distractorRationale: "This mixes columns: it applies 90°C-column factors to a 75°C base. The cap is a comparison at the END, not a starting value to derate."
    - id: d
      text: "Start from the 90°C column, multiply by both factors, then use the HIGHER of that result and the 75°C column value."
      distractorRationale: "Taking the higher value defeats the purpose — both derating and the termination limit are ceilings, so the LOWER result always governs."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Derate from the insulation column; the termination-column value is a final cap compared at the end — lower governs."
    codePath: ["310.15(B)(1), 310.15(C)(1) applied to the 90°C base", "110.14(C) final comparison"]
    steps:
      - { text: "The 90°C column may be used as the starting point for correction and adjustment because the insulation is rated 90°C.", ref: "110.14(C)" }
      - { text: "After derating, compare with the 75°C column value; the lower of the two is the usable ampacity." }
  trapIds: [termination-temp-limit, adjusted-vs-corrected-ampacity]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-amp-h017
  domainId: nec.ampacity
  skillIds: [nec.ampacity.termination-limit, nec.ampacity.table-lookup]
  type: single
  difficulty: 8
  stem: "A 60 A circuit lands in a disconnect whose terminations carry no temperature rating, and the equipment is not listed for higher-rated conductors. The conductors are 6 AWG THHN copper. Which Table 310.16 column sets the conductor's usable ampacity at these terminations?"
  options:
    - id: a
      text: "The 60°C column (55 A), because unmarked terminations on circuits rated 100 A or less default to 60°C."
      isCorrect: true
    - id: b
      text: "The 75°C column (65 A), because most modern equipment is 75°C-rated."
      distractorRationale: "\"Most equipment is 75°C\" is a field habit, not code — without a marking or listing, 110.14(C)(1)(a) forces the 60°C column for circuits ≤100 A."
    - id: c
      text: "The 90°C column (75 A), because THHN is 90°C insulation."
      distractorRationale: "The insulation rating sets the derating starting point, never the termination rating — the weakest link at the lug governs."
    - id: d
      text: "Either 60°C or 75°C, at the installer's discretion."
      distractorRationale: "110.14(C) is not discretionary — with no marking and no listing, the 60°C column is mandatory for this circuit."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Circuits ≤100 A with unmarked, unlisted terminations default to the 60°C column regardless of insulation."
    codePath: ["110.14(C)(1)(a)", "Table 310.16 → 6 AWG Cu 60°C = 55 A"]
    steps:
      - { text: "No temperature marking and no listing for higher-rated conductors → 60°C column applies.", ref: "110.14(C)(1)(a)" }
      - { text: "6 AWG copper at 60°C = 55 A usable at these terminations.", ref: "Table 310.16" }
  trapIds: [termination-temp-limit, table-column-selection]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-amp-h018
  domainId: nec.ampacity
  skillIds: [nec.ampacity.temp-correction]
  type: single
  difficulty: 7
  stem: "A raceway runs through a space with a design ambient of exactly 30°C. The conductors are 90°C-insulated. What correction factor from Table 310.15(B)(1) applies?"
  options:
    - id: a
      text: "1.00 — 30°C is the table's reference ambient, so no correction is needed."
      isCorrect: true
    - id: b
      text: "0.96 — 30°C falls in the 31–35°C row."
      distractorRationale: "The 31–35°C row starts ABOVE 30°C; exactly 30°C is still the 26–30°C row (factor 1.00). Off-by-one row selection is the classic error here."
    - id: c
      text: "1.04 — 30°C gets the below-ambient bonus."
      distractorRationale: "1.04 is the 21–25°C row. The bonus applies only when the ambient is BELOW the 26–30°C reference band."
    - id: d
      text: "No factor exists; interpolation between rows is required."
      distractorRationale: "Table 310.15(B)(1) rows are bands, not points — every ambient in a band takes that band's factor with no interpolation."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Table 310.15(B)(1) is banded — 30°C sits at the top of the reference band, factor 1.00."
    codePath: ["Table 310.15(B)(1) → 26–30°C row → 1.00"]
    steps:
      - { text: "30°C is the basis ambient of Table 310.16; the 26–30°C row gives 1.00.", ref: "310.15(B)(1)" }
      - { text: "Only ambients of 31°C and above (or 25°C and below) change the factor." }
  trapIds: [adjusted-vs-corrected-ampacity]
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-amp-h019
  domainId: nec.ampacity
  skillIds: [nec.ampacity.fill-adjustment]
  type: single
  difficulty: 7
  stem: "One raceway contains two 3-phase, 4-wire wye branch circuits. Circuit 1 feeds electric-discharge lighting (a nonlinear load); circuit 2 feeds resistance heating (linear, balanced). Equipment grounding conductors are also present. How many current-carrying conductors are counted for Table 310.15(C)(1)?"
  options:
    - id: a
      text: "7 — circuit 1 counts its neutral (nonlinear load, harmonic current), circuit 2's balanced neutral does not, and EGCs never count."
      isCorrect: true
    - id: b
      text: "8 — every conductor except the EGCs counts."
      distractorRationale: "A wye neutral carrying only unbalanced current from balanced linear loads is NOT counted (310.15(E)) — circuit 2's neutral drops out."
    - id: c
      text: "6 — neutrals never count as current-carrying conductors."
      distractorRationale: "A wye neutral serving a load that is mostly nonlinear DOES count because it carries harmonic current even when the phases are balanced (310.15(E)(3))."
    - id: d
      text: "9 — all conductors in the raceway count, including EGCs."
      distractorRationale: "Equipment grounding conductors carry current only during faults and are never counted for adjustment (310.15(E))."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Count phases always, neutrals only when they actually carry current (unbalance or harmonics), EGCs never."
    codePath: ["310.15(E) → neutral counting rules", "310.15(C)(1) → adjustment by CCC count"]
    steps:
      - { text: "Circuit 1: 3 phases + neutral (nonlinear load → harmonic current on the neutral) = 4.", ref: "310.15(E)(3)" }
      - { text: "Circuit 2: 3 phases; the balanced-linear-load wye neutral is excluded = 3.", ref: "310.15(E)(1)" }
      - { text: "EGCs are not current-carrying. Total = 7 → 7–9 row → 0.70 adjustment.", ref: "310.15(C)(1)" }
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-amp-h020
  domainId: nec.ampacity
  skillIds: [nec.ampacity.table-lookup, nec.ampacity.termination-limit]
  type: single
  difficulty: 8
  stem: "A 100 A feeder was designed with 3 AWG copper (75°C column, 100 A). To cut cost, the contractor switches to aluminum, keeping 75°C terminations and no derating. What is the SMALLEST aluminum conductor from Table 310.16 that still provides 100 A?"
  options:
    - id: a
      text: "3 AWG aluminum"
      distractorRationale: "Same-size substitution: 3 AWG aluminum is only 75 A at 75°C — aluminum always needs a larger size than copper for the same ampacity."
    - id: b
      text: "2 AWG aluminum"
      distractorRationale: "One trade size up feels safe, but 2 AWG aluminum is 90 A at 75°C — still short of 100 A."
    - id: c
      text: "1 AWG aluminum"
      isCorrect: true
    - id: d
      text: "1/0 AWG aluminum"
      distractorRationale: "1/0 aluminum (120 A) works but is not the SMALLEST size that reaches 100 A — 1 AWG already provides exactly 100 A."
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "Re-enter Table 310.16 on the aluminum side and find the first size whose 75°C value is ≥100 A."
    codePath: ["Table 310.16 (Al) → 3 AWG=75, 2 AWG=90, 1 AWG=100 at 75°C"]
    steps:
      - { text: "Aluminum 75°C values: 3 AWG = 75 A, 2 AWG = 90 A, 1 AWG = 100 A.", ref: "Table 310.16" }
      - { text: "1 AWG aluminum is the smallest size meeting 100 A at 75°C terminations." }
  trapIds: [table-column-selection]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-amp-h021
  domainId: nec.ampacity
  skillIds: [nec.ampacity.combined]
  type: single
  difficulty: 8
  stem: "A feeder serves a 40 A continuous load and requires derating for conduit fill. Which statement correctly describes how the 125% continuous factor and the derating factors interact under 210.19(A)(1)?"
  options:
    - id: a
      text: "The conductor's Table 310.16 ampacity (before derating) must be at least 50 A, AND its derated ampacity must be at least 40 A — the conductor must satisfy both checks."
      isCorrect: true
    - id: b
      text: "The derated ampacity itself must be at least 50 A (125% of the load)."
      distractorRationale: "Over-applying 125% to the derated value double-penalizes the conductor — the code requires the derated (adjusted/corrected) ampacity to cover 100% of the load, not 125%."
    - id: c
      text: "The 125% factor applies only to the overcurrent device; conductors are sized at 100% of the load."
      distractorRationale: "210.19(A)(1) applies the 125% continuous factor to CONDUCTOR sizing too, not just to the OCPD in 210.20(A)."
    - id: d
      text: "Only one check applies: whichever of the two calculations gives the smaller conductor."
      distractorRationale: "Picking the smaller result inverts the rule — the conductor must pass BOTH tests, so the more demanding one governs."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Two independent tests: table ampacity ≥ 125% of continuous load, and derated ampacity ≥ 100% of the load — the worse case sets the size."
    codePath: ["210.19(A)(1)(a) → 125% before adjustment", "210.19(A)(1)(b) → derated ampacity ≥ load"]
    steps:
      - { text: "Test 1: allowable ampacity before derating ≥ 40 × 1.25 = 50 A.", ref: "210.19(A)(1)" }
      - { text: "Test 2: ampacity after correction/adjustment ≥ 40 A." }
      - { text: "The conductor must satisfy both; whichever test demands the larger conductor governs." }
  trapIds: [continuous-load-125, adjusted-vs-corrected-ampacity]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-amp-h022
  domainId: nec.ampacity
  skillIds: [nec.ampacity.temp-correction, nec.ampacity.termination-limit]
  type: single
  difficulty: 7
  stem: "Conductors pass through a walk-in freezer where the ambient is 10°C. The engineer wants to take credit for the cold ambient to increase the circuit's capacity. Which statement is correct?"
  options:
    - id: a
      text: "The corrected ampacity may exceed the Table 310.16 value (factor above 1.00), but the terminations at each end still cap the final usable ampacity."
      isCorrect: true
    - id: b
      text: "Correction factors can only reduce ampacity; anything above 1.00 is a misprint."
      distractorRationale: "Table 310.15(B)(1) genuinely lists factors above 1.00 for ambients below 26°C — cold ambients add real capacity to the conductor itself."
    - id: c
      text: "The corrected ampacity may be used directly for OCPD sizing with no other limit."
      distractorRationale: "This skips 110.14(C) — the lugs sit in equipment at room temperature, and the termination-column value still caps the answer."
    - id: d
      text: "No credit is allowed because part of the run is outside the freezer."
      distractorRationale: "This confuses the concept: where a run passes through different ambients, 310.15(A)(2) governs which segment's ampacity applies — it does not flatly prohibit the credit."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Cold-ambient correction can raise ampacity above the table value, but 110.14(C) termination limits always apply."
    codePath: ["Table 310.15(B)(1) → ≤10°C, factors > 1.00", "110.14(C) termination cap", "310.15(A)(2) for mixed ambients"]
    steps:
      - { text: "At 10°C the 90°C-column factor is 1.15 — a real increase.", ref: "310.15(B)(1)" }
      - { text: "The equipment terminations still limit the final ampacity to the 60/75°C column value.", ref: "110.14(C)" }
  trapIds: [termination-temp-limit]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-amp-h023
  domainId: nec.ampacity
  skillIds: [nec.ampacity.temp-correction, nec.ampacity.table-lookup]
  type: single
  difficulty: 7
  stem: "A designer proposes running TW (60°C) copper conductors through a boiler-room ceiling space with a 58°C design ambient. Per Table 310.15(B)(1), what is the consequence?"
  options:
    - id: a
      text: "The 60°C conductor is not permitted at all — the table gives no 60°C correction factor above 55°C ambient."
      isCorrect: true
    - id: b
      text: "Apply the 0.41 factor from the 51–55°C row."
      distractorRationale: "That row stops at 55°C; a 58°C ambient falls in the 56–60°C band, where the 60°C column is blank — you cannot borrow the previous row."
    - id: c
      text: "Apply the 0.58 factor from the 75°C column."
      distractorRationale: "Reading across to the 75°C column requires a 75°C-insulated conductor — TW is 60°C insulation and cannot use another column's factor."
    - id: d
      text: "No correction is needed because the boiler runs intermittently."
      distractorRationale: "Correction is based on the design ambient of the space, not the duty cycle of what heats it."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "When the ambient approaches the insulation rating, the correction column goes blank — the conductor simply cannot be used there."
    codePath: ["Table 310.15(B)(1) → 56–60°C row, 60°C column = (none)"]
    steps:
      - { text: "At 56–60°C ambient the 60°C column has no factor: a 60°C conductor has essentially no capacity left.", ref: "310.15(B)(1)" }
      - { text: "The fix is higher-rated insulation (THWN 75°C → 0.58, or THHN 90°C → 0.71 at this ambient)." }
  trapIds: [table-column-selection]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."
