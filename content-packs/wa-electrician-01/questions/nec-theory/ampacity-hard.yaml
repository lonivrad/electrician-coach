# ---- Continuous load in the sizing chain ------------------------------------
- id: q-amp-h011
  recompute: { calc: continuousLoad, inputs: { current: 42 } }
  domainId: nec.ampacity
  commonMistake: "If you got 47.5, you multiplied the 38 A clamp reading by 125% — sizing uses the DESIGN continuous load (42 A), not what the meter happens to read today."
  skillIds: [nec.ampacity.combined]
  type: numeric
  difficulty: 7
  stem: "An EV charging circuit has a design continuous load of 42 A. During commissioning a clamp meter reads 38 A on the phase conductor. Per 210.19(A)(1), what minimum conductor ampacity (A) is required before any correction or adjustment factors are considered?"
  answer: { kind: numeric, value: 52.5, unit: "A", tolerance: 0.5 }
  solution:
    keyIdea: "Continuous loads are sized at 125% of the DESIGN load — the meter reading is surplus information."
    codePath: ["210.19(A)(1) → 125% of continuous load", "42 A × 1.25"]
    steps:
      - { text: "The 38 A reading is a snapshot, not the design load — discard it.", ref: "210.19(A)(1)" }
      - { text: "42 × 1.25 = 52.5 A minimum conductor ampacity." }
  trapIds: [continuous-load-125, meter-reading-vs-ampacity]
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

