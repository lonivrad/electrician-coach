# ---- Chains where the termination cap BINDS ---------------------------------
- id: q-amp-h004
  recompute: { calc: ampacityDerating, inputs: { size: "1/0", tempColumn: 90, ambientC: 25, terminationColumn: 75 } }
  domainId: nec.ampacity
  commonMistake: "If you got 176.8, you applied the cold-ambient correction (1.04) and stopped — the 75°C termination value of 150 A still caps the final answer."
  skillIds: [nec.ampacity.termination-limit, nec.ampacity.temp-correction]
  type: numeric
  difficulty: 8
  stem: "A 1/0 THHN copper conductor runs alone (3 current-carrying conductors) through a space held at 25°C, landing on standard 75°C lugs. Applying Table 310.15(B)(1), what ampacity (A) may the conductor actually be used at?"
  answer: { kind: numeric, value: 150, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "A below-30°C ambient RAISES the corrected ampacity, but 110.14(C) still caps the result at the termination-column value."
    codePath: ["Table 310.16 → 1/0 Cu 90°C = 170 A", "310.15(B)(1) → 21–25°C, 90°C → 1.04", "110.14(C) → 75°C cap = 150 A"]
    steps:
      - { text: "170 × 1.04 = 176.8 A corrected — correction factors above 1.00 are real.", ref: "310.15(B)(1)" }
      - { text: "The 75°C termination limits the usable ampacity to 150 A.", ref: "110.14(C)" }
      - { text: "min(176.8, 150) = 150 A." }
  trapIds: [termination-temp-limit, adjusted-vs-corrected-ampacity]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

