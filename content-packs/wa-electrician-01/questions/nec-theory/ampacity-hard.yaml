# ---- Chains ending at the OCPD (240.6 / 240.4(B)) ---------------------------
- id: q-amp-h013
  recompute: { calc: nextStandardSize, inputs: { value: 83.72 } }
  domainId: nec.ampacity
  commonMistake: "If you answered 80, you rounded DOWN — 240.4(B) permits the next standard size UP when the derated ampacity (83.7 A) doesn't match a standard rating and the other conditions are met."
  skillIds: [nec.ampacity.combined, nec.ampacity.termination-limit]
  type: numeric
  difficulty: 8
  stem: "A 3 AWG THHN copper feeder (90°C, base 115 A) runs with 4 current-carrying conductors in a 38°C ambient and lands on 75°C lugs (75°C value 100 A). The derated ampacity works out to 115 × 0.91 × 0.80 = 83.7 A, the load is noncontinuous and under 80 A, and the circuit is not a multi-outlet branch circuit. Per 240.4(B) and 240.6(A), what is the maximum standard OCPD rating (A)?"
  answer: { kind: numeric, value: 90, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "After the full derating chain, 240.4(B) allows rounding UP to the next standard OCPD (≤800 A) when conditions are met."
    codePath: ["Table 310.16 + 310.15 → 83.7 A derated", "110.14(C) → 100 A cap (not binding)", "240.4(B) → next size up", "240.6(A) → 90 A"]
    steps:
      - { text: "Derated ampacity: 115 × 0.91 × 0.80 = 83.7 A; below the 100 A termination cap, so it governs." }
      - { text: "83.7 A is not a standard rating; conditions of 240.4(B) are met.", ref: "240.4(B)" }
      - { text: "Next standard size above 83.7 A is 90 A.", ref: "240.6(A)" }
  trapIds: [next-size-up-rounding, adjusted-vs-corrected-ampacity]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
