      - { text: "The 10 AWG conductor size is surplus data — the column condition reads the overcurrent device rating, not the wire." }
      - { text: "Fall back to the installed method: Schedule 40 PVC is a nonmetallic raceway → 18 in.", ref: "Table 300.5, Column 3" }
