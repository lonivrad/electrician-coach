  options:
    - { id: a, text: "Trench 1 only — a warning ribbon placed in the backfill at least 12 in above the service conductors", isCorrect: true }
    - { id: b, text: "Both trenches — every underground run deeper than 12 in requires a ribbon 6 in below finished grade", distractorRationale: "The ribbon rule targets underground SERVICE conductors not under exclusive utility control; ordinary feeders don't owe one, and the ribbon's position is keyed to the conductors (12 in above), not to grade." }
    - { id: c, text: "Trench 1 only — a ribbon laid directly on top of the conductors so locators find it immediately", distractorRationale: "Directly on the conductors defeats the purpose: the ribbon must be 12 in ABOVE them so an excavator hits the warning a full shovel-depth before the live conductors." }
    - { id: d, text: "Neither trench — warning ribbon is required only for conductors buried less than 18 in", distractorRationale: "There is no shallow-burial trigger; the requirement follows the conductor's role (non-utility-controlled service conductors), and these are buried 30 in with the ribbon at 18 in." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "300.5(D)(3): underground service conductors not under the exclusive control of the utility, buried 18 in or more, require a warning ribbon in the trench at least 12 in above them. The feeder trench has no ribbon requirement."
    codePath: ["300.5(D)(3) → service conductors, ≥18 in deep, not utility-controlled → warning ribbon 12 in above", "Feeder in trench 2 → outside the rule's scope"]
    steps:
      - { text: "Scope the rule: it reaches underground SERVICE conductors that the serving utility does not exclusively control — trench 1 qualifies; the 480 V feeder in trench 2 does not.", ref: "300.5(D)(3)" }
      - { text: "Depth trigger: the service conductors are 30 in deep (≥18 in), so the ribbon is mandatory." }
      - { text: "Placement geometry: the ribbon lies in the backfill at least 12 in above the conductors — here no deeper than 18 in below grade — so digging equipment uncovers the warning before the conductors." }
      - { text: "Trench 2's PVC feeder needs its 18 in of cover and nothing more from this rule." }
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x023
  domainId: nec.wiring-methods
  commonMistake: "Underground splices flip the usual box instinct: a buried junction box violates accessibility, while a boxless splice with listed direct-burial splicing means is expressly permitted by 300.5(E)/300.15(G)."
  skillIds: [nec.wm.method-rules, nec.wm.burial-depth]
  type: single
  difficulty: 9
  stem: "A backhoe nicks a direct-buried UF feeder mid-span, 30 ft from any structure. The electrician proposes two repairs: option 1 — cut in a standard PVC junction box, splice inside it, and bury the box at the cable's depth; option 2 — splice the cable with a listed underground splice kit identified for direct burial, no box, and backfill. Which repair is Code-compliant?"
  options:
    - { id: a, text: "Option 1 only — all splices must be enclosed in a box", distractorRationale: "300.15(G) expressly waives the box for direct-buried splices made with identified methods; meanwhile burying a standard box makes it inaccessible, its own violation." }
    - { id: b, text: "Option 2 only — a listed direct-burial splice needs no box, while a buried standard junction box would be an inaccessible enclosure", isCorrect: true }
    - { id: c, text: "Both — underground work is exempt from splice rules entirely", distractorRationale: "Hardly exempt: the boxless splice is legal only because the splicing means is LISTED and identified for direct burial; the buried standard box still fails accessibility." }
    - { id: d, text: "Neither — a damaged direct-buried cable must be replaced end-to-end with no splice", distractorRationale: "Full replacement is never demanded; 300.5(E) exists precisely to let direct-buried conductors be spliced in the trench with identified means." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "300.5(E) permits direct-buried splices without a box when made per 300.15(G) with splicing means identified for the purpose; a conventional junction box buried in the yard violates the accessibility required of boxes."
    codePath: ["300.5(E) → direct-buried conductors may be spliced without a splice box", "300.15(G) → splicing devices identified for direct burial", "314.29 → boxes must remain accessible — a buried standard box fails"]
    steps:
      - { text: "Option 2: the listed direct-burial splice kit is exactly the 'identified means' contemplated — boxless underground splice permitted, backfill and done.", ref: "300.5(E) / 300.15(G)" }
      - { text: "Option 1: a standard junction box under 24 in of soil cannot be reached without excavation — boxes and their splices must remain accessible, so the buried box is itself a violation.", ref: "314.29" }
      - { text: "The exam trap is the reflex that 'a box is always safer' — underground, the identified boxless splice is the compliant path." }
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x024
  domainId: nec.wiring-methods
  commonMistake: "Cover is measured from the TOP SURFACE of the raceway or cable to finished grade — not from the trench bottom. A '20 in trench' holding a 2 in conduit yields only 18 in of cover, which passes PVC exactly and fails direct-buried cable by 6 in."
  skillIds: [nec.wm.burial-depth]
  type: single
  difficulty: 10
  stem: "A trench is excavated exactly 20 in deep across a lawn (general location). Two installations are proposed for the SAME trench depth on separate jobs: (1) a 2 in. Schedule 40 PVC conduit laid on the trench bottom carrying a 480 V feeder; (2) a direct-buried UF cable (roughly ½ in thick) laid on the same bottom, for a 240 V, 30 A circuit. Using Table 300.5's definition of cover, which proposal complies?"
  options:
    - { id: a, text: "Proposal 1 only — the PVC ends up with exactly 18 in of cover (20 − 2), meeting Column 3; the UF has about 19.5 in, short of its 24 in", isCorrect: true }
    - { id: b, text: "Both — the trench is 20 in deep, which exceeds PVC's 18 in and rounds to the UF's 24 in", distractorRationale: "Cover is the distance from the conduit or cable TOP to grade, not the trench depth, and nothing rounds 19.5 up to 24 — the UF fails by roughly 4.5 in." }
    - { id: c, text: "Proposal 2 only — cable needs less cover than rigid conduit because it flexes under load", distractorRationale: "Backwards: direct-buried cable takes the DEEPEST column (24 in) precisely because it has no raceway wall; PVC's column is 18 in." }
    - { id: d, text: "Neither — a 20 in trench cannot produce 18 in of cover once bedding sand is added", distractorRationale: "The stem places the conduit on the trench bottom; 20 in minus the 2 in conduit height is exactly 18 in of cover — landing exactly on a minimum is compliant." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Table 300.5's Note defines cover as the shortest distance from the TOP of the buried raceway/cable to finished grade. The same 20 in trench gives a 2 in conduit exactly 18 in (passes Column 3 on the boundary) and a thin cable ~19.5 in (fails Column 1's 24 in)."
    codePath: ["Table 300.5, Note 1 → cover measured from top surface to finished grade", "Column 3 (nonmetallic raceway) → 18 in: 20 − 2 = 18, compliant at the boundary", "Column 1 (direct burial) → 24 in: ~19.5 in falls short"]
    steps:
      - { text: "Apply the definition: cover = grade elevation minus the elevation of the conduit/cable TOP — trench depth alone answers nothing.", ref: "Table 300.5, Note 1" }
      - { text: "Proposal 1: top of the 2 in conduit sits at 20 − 2 = 18 in below grade → exactly the 18 in Column 3 minimum; equal to the limit is compliant.", ref: "Table 300.5, Column 3" }
      - { text: "Proposal 2: top of the ½ in cable sits ≈19.5 in below grade, but Column 1 demands 24 in — the trench must be deepened about 4½ in for the cable.", ref: "Table 300.5, Column 1" }
      - { text: "Same hole, opposite verdicts — the geometry of the measurement, not the excavation, decides." }
  trapIds: [table-column-selection]
  timeTargetSec: 300
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x025
  domainId: nec.wiring-methods
  commonMistake: "Solid rock rewrites the depth rules rather than waiving them: the run must go into a raceway suitable for burial and take a 2 in concrete cover down to rock — direct-buried cable simply laid on the rock at reduced depth is never an option."
  skillIds: [nec.wm.burial-depth, nec.wm.method-rules]
  type: single
  difficulty: 10
  stem: "Trenching for a direct-buried UF circuit (required cover 24 in) hits solid ledge rock 10 in below grade for a 30 ft stretch; blasting is not an option. Per the notes to Table 300.5, what is the compliant way to cross the rock section?"
  options:
    - { id: a, text: "Lay the UF directly on the rock at 10 in and mark the route with warning ribbon", distractorRationale: "Ribbon never substitutes for cover, and the rock allowance is available only to wiring installed in a RACEWAY — bare cable on rock at 10 in stays a violation." }
    - { id: b, text: "Install the conductors in a raceway permitted for burial, laid on or in the rock, and cover it with at least 2 in of concrete extending down to the rock", isCorrect: true }
    - { id: c, text: "The circuit cannot cross the rock underground; it must be rerouted or run overhead", distractorRationale: "The table's own notes provide the rock workaround (raceway + 2 in concrete) — no reroute is forced." }
    - { id: d, text: "Switch to RMC on top of the rock with no concrete, since RMC's column is only 6 in anyway", distractorRationale: "RMC's 6 in still means 6 in of COVER, and at 10 in of soil the run above the rock may qualify normally — but the specific rock provision, where cover cannot be achieved, pairs the raceway WITH the 2 in concrete envelope; bare conduit at reduced cover on rock does not invoke it." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Table 300.5's notes handle solid rock: where the required cover is unobtainable, the wiring goes in a raceway permitted for burial, protected by a minimum 2 in of concrete extending down to the rock — the cable column disappears as an option."
    codePath: ["Table 300.5, Notes → solid rock: raceway for burial + ≥2 in concrete to rock", "Direct-buried cable column unavailable where its 24 in cannot be achieved"]
    steps:
      - { text: "Recognize the condition: required cover (24 in for direct-buried cable) is physically unobtainable over the ledge — the general columns cannot be satisfied.", ref: "Table 300.5" }
      - { text: "Apply the rock note: conductors must be installed in a raceway permitted for burial (metal or nonmetallic) across the rock section.", ref: "Table 300.5, Notes" }
      - { text: "Add the envelope: at least 2 in of concrete over the raceway, extending down to the rock surface, replaces the missing earth cover." }
      - { text: "Transition back to the normal direct-burial depth on both sides of the ledge where soil resumes." }
  trapIds: [table-column-selection]
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x026
  domainId: nec.wiring-methods
  commonMistake: "Frost heave and settlement are addressed by SLACK, not depth: 300.5(J) wants 'S' loops or equivalent flexibility where buried runs enter buildings or rise to equipment, so earth movement doesn't shear the conductors at the rigid termination."
  skillIds: [nec.wm.burial-depth, nec.wm.method-rules]
  type: single
  difficulty: 9
  stem: "In a region with deep frost and settling backfill, a direct-buried feeder rises out of the trench into a conduit stub at a building wall. The trench meets every Table 300.5 depth. Per 300.5(J), what additional measure is required at the transition, and why?"
  options:
    - { id: a, text: "Nothing — meeting the burial-depth table fully satisfies underground requirements", distractorRationale: "Depth protects against dig-ins, not ground movement; 300.5(J) is a separate demand that the installation tolerate settlement and frost without damage." }
    - { id: b, text: "Slack in the conductors (such as an 'S' loop) or other arrangements at the entry, so earth movement cannot strain or damage them", isCorrect: true }
    - { id: c, text: "A concrete anchor block clamping the cable rigidly to the foundation so it cannot move", distractorRationale: "Rigid anchorage is the OPPOSITE of the remedy — fixing the cable hard to the structure concentrates the strain the rule is trying to relieve." }
    - { id: d, text: "Doubling the burial depth through the frost zone", distractorRationale: "Extra depth may reduce frost exposure but is not what 300.5(J) requires — the rule targets flexibility at terminations, not deeper trenches." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "300.5(J): direct-buried conductors, cables, or raceways subject to earth movement from settlement or frost must be arranged — typically with 'S' loops of slack — to prevent damage."
    codePath: ["300.5(J) → earth movement: slack/'S' loops or equivalent arrangements", "Depth (Table 300.5) and movement protection are independent requirements"]
    steps:
      - { text: "Identify the hazard the depth table does NOT cover: frost heave and settling backfill move the earth around the buried run, straining it where it terminates rigidly at the building.", ref: "300.5(J)" }
      - { text: "Apply the remedy: leave slack — an 'S' loop at the entry — or use expansion/deflection arrangements so the run can move with the earth." }
      - { text: "Reject rigid clamping and extra depth: neither provides the required freedom of movement at the transition." }
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x027
  domainId: nec.wiring-methods
  commonMistake: "A raceway is not a cable tray: 300.11(C) forbids using raceways as a means of support for other cables or raceways unless identified for the purpose — however convenient the existing EMT rack looks."
  skillIds: [nec.wm.support, nec.wm.method-rules]
  type: single
  difficulty: 9
  stem: "To avoid new supports, an installer zip-ties a new NM cable along the top of an existing EMT run for 25 ft across a basement ceiling, then also drapes a low-voltage thermostat cable over the same conduit. Neither the EMT nor its fittings are identified as a support means. Per 300.11(C), which statement is correct?"
  options:
    - { id: a, text: "Compliant — the EMT is secured every 10 ft, so anything attached to it is equally well supported", distractorRationale: "The EMT's own compliance doesn't transfer: 300.11(C) prohibits raceways being USED AS SUPPORT for other cables unless identified for it — the quality of the borrowed support is irrelevant." }
    - { id: b, text: "Violation — the raceway may not serve as a means of support for the cables unless it is identified for that use; both attached cables must be independently supported", isCorrect: true }
    - { id: c, text: "Violation for the NM only — Class 2 thermostat cable is exempt from all support rules", distractorRationale: "The prohibition in 300.11(C) is on the RACEWAY being used as support; it applies to the low-voltage cable draped on it just as it does to the NM." }
    - { id: d, text: "Compliant if the zip ties are listed and spaced within 4½ ft", distractorRationale: "Listed ties at NM's own interval don't cure the defect — the structure the ties attach to (a raceway not identified for support) is what the rule prohibits." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "300.11(C): raceways shall not be used as a means of support for other raceways, cables, or nonelectric equipment, except where the raceway or means is identified for the purpose — so both piggybacked cables violate."
    codePath: ["300.11(C) → raceways as support: prohibited unless identified", "334.30 → the NM must be independently secured to structure", "Fix: separate straps/staples to the building structure"]
    steps:
      - { text: "Identify what carries what: the EMT (a raceway) is being used as the supporting means for an NM cable and a thermostat cable.", ref: "300.11(C)" }
      - { text: "Test the exception: neither the EMT nor any attachment fitting is identified as a support means — the exception fails, so both attachments are violations regardless of tie quality or spacing." }
      - { text: "Correct design: support each cable independently from the structure (staples/straps for the NM at its 334.30 spacing; appropriate supports for the thermostat cable)." }
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x028
  domainId: nec.wiring-methods
  commonMistake: "EMT's 3 ft box-proximity rule carries its own relief valve: where structural members make fastening within 3 ft impracticable, the exception stretches the distance to 5 ft — but only for that reason, and never past 5 ft."
  skillIds: [nec.wm.support]
  type: single
  difficulty: 10
  stem: "An EMT run terminates at a junction box mounted between roof trusses spaced so that the NEAREST structural member capable of taking a strap is 4½ ft from the box; nothing closer can accept a fastener. The installer straps the EMT at that member (4½ ft) and every 10 ft thereafter. A second, identical box elsewhere has a usable member 2 ft away, but the installer strapped at 4½ ft there too, for symmetry. Which assessment is correct?"
  options:
    - { id: a, text: "Both locations violate — 358.30(A) allows no strap farther than 3 ft from a box under any circumstances", distractorRationale: "The exception to 358.30(A) permits up to 5 ft where structural members do not readily permit fastening within 3 ft — the first box qualifies for exactly that relief." }
    - { id: b, text: "The first box complies under the exception (no member within 3 ft, strap at 4½ ft ≤ 5 ft); the second violates because a member 2 ft away made the 3 ft rule achievable", isCorrect: true }
    - { id: c, text: "Both comply — 4½ ft is the universal securing distance for tubing and cable alike", distractorRationale: "4½ ft is the CABLE interval (334.30); EMT's box rule is 3 ft, stretched to 5 ft only where structure genuinely prevents closer fastening — available at box 1, not box 2." }
    - { id: d, text: "The first box violates (4½ ft > 3 ft); the second complies because a strap exists within 5 ft", distractorRationale: "Inverted: the 5 ft figure is an EXCEPTION conditioned on impracticability — box 1 meets the condition; box 2, with a usable member at 2 ft, does not, so its baseline stays 3 ft." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "358.30(A)'s 3-ft-of-the-box rule yields to its exception — up to 5 ft where structural members don't readily permit closer fastening. The relief is conditional: available where structure forces it, unavailable where a compliant point exists."
    codePath: ["358.30(A) → secure within 3 ft of every box/termination", "358.30(A) Exception → up to 5 ft where fastening within 3 ft is impracticable", "Condition tested per location, not per job"]
    steps:
      - { text: "Box 1: nearest fastenable member is 4½ ft away — fastening within 3 ft is structurally impracticable, so the exception applies; 4½ ft ≤ 5 ft → compliant.", ref: "358.30(A) Exception" }
      - { text: "Box 2: a usable member sits 2 ft from the box — the 3 ft baseline is readily achievable, the exception's condition fails, and the 4½ ft strap violates.", ref: "358.30(A)" }
      - { text: "The 10 ft interval spacing along both runs is independently fine; the defect is purely at the second box's first fastening." }
      - { text: "Lesson: exceptions are entitlement-tested at each location — 'for symmetry' is not a Code condition." }
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x029
  domainId: nec.wiring-methods
  commonMistake: "Wet-location logic chains THROUGH the transition: conductors that pass through ANY wet segment (the underground PVC) must be wet-rated over that portion — the run being 'mostly indoors' rescues nothing."
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 9
  stem: "A continuous circuit is pulled through three raceway segments with no splices: indoor EMT across a dry warehouse, underground Schedule 40 PVC beneath a courtyard (30 in cover), and indoor EMT again in the far building. The pull uses plain THHN (not dual-rated). Every depth, support, and fitting is correct. Which statement is right?"
  options:
    - { id: a, text: "Compliant — the run originates and terminates in dry locations, which sets the insulation requirement", distractorRationale: "Insulation is judged wherever the conductor actually IS: the underground segment's interior is a wet location, and the same unspliced conductor passes through it." }
    - { id: b, text: "Violation — the interior of the underground raceway is a wet location, so every conductor passing through it must be wet-rated (THWN, XHHW, or dual-rated)", isCorrect: true }
    - { id: c, text: "Compliant — 30 in of cover exceeds the 18 in requirement, and extra depth compensates for the insulation", distractorRationale: "Depth and insulation are unrelated requirements; no amount of cover reclassifies the raceway interior, which 300.5(B) declares wet by definition." }
    - { id: d, text: "Violation — THHN may never share a raceway with a wet location anywhere on the premises", distractorRationale: "Overbroad: plain THHN is fine in the two DRY EMT segments; the defect is only that the same conductors continue unspliced through the wet underground segment." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "A conductor must satisfy the location classification of every segment it occupies. 300.5(B) makes the buried PVC's interior wet; the unspliced THHN passing through it must therefore be wet-rated, however dry both ends are."
    codePath: ["300.5(B) → underground raceway interior = wet location", "310.10(C) → wet locations require wet-rated insulation", "Dry EMT segments impose no extra requirement"]
    steps:
      - { text: "Segment the run by location: dry EMT — dry; underground PVC — WET by definition; dry EMT — dry.", ref: "300.5(B)" }
      - { text: "Apply insulation rules per segment: the conductors physically occupying the wet segment need wet-listed insulation — plain THHN is dry/damp only.", ref: "310.10(C)" }
      - { text: "The 30 in cover, correct supports, and correct fittings are all surplus reassurance — none touches the insulation defect." }
      - { text: "Fix: pull dual-rated THHN/THWN (or XHHW) end-to-end, or splice to wet-rated conductors for the underground segment in accessible boxes." }
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x030
  domainId: nec.wiring-methods
  commonMistake: "Audit each element against ITS OWN rule instead of hunting one 'gotcha': depth, under-building sleeving, emergence protection, and support can all pass while a single conductor-rating detail sinks the job."
  skillIds: [nec.wm.method-rules, nec.wm.burial-depth, nec.wm.support]
  type: single
  difficulty: 10
  stem: "A detached-garage feeder at a dwelling is built as follows: (1) Schedule 40 PVC at 18 in cover across the lawn; (2) where the route passes under the garage slab, the PVC continues as a sleeve extending beyond the outside walls; (3) at the house end the riser is Schedule 80 PVC to 8 ft above grade in an area subject to damage; (4) exposed PVC indoors is strapped per Table 352.30 and within 3 ft of boxes; (5) the conductors are plain THHN throughout. Which numbered element violates the Code?"
  options:
    - { id: a, text: "Element (5) — the underground raceway interior is wet, so plain THHN is not permitted there", isCorrect: true }
    - { id: b, text: "Element (1) — PVC under a lawn requires 24 in of cover", distractorRationale: "24 in is the DIRECT-BURIAL cable column; a nonmetallic raceway in a general location takes Column 3's 18 in, which element (1) meets exactly." }
    - { id: c, text: "Element (2) — conductors may never pass under a building", distractorRationale: "Passing under the building is expressly handled by 300.5(C): the run must be in a raceway extending beyond the outside walls — which is precisely what was built." }
    - { id: d, text: "Element (3) — risers subject to damage must be RMC; PVC of any schedule is prohibited", distractorRationale: "Schedule 80 PVC is one of the methods identified for physical-damage exposure at emergences (300.5(D)(4)); RMC is an alternative, not the only answer." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Four elements are textbook-correct — 18 in Column 3 cover, the 300.5(C) under-building sleeve, the Schedule 80 riser to 8 ft, and Table 352.30 supports. The single defect is insulation: the buried raceway interior is wet and plain THHN is not wet-rated."
    codePath: ["Table 300.5, Column 3 → PVC: 18 in (element 1 passes)", "300.5(C) → raceway under building extending past walls (element 2 passes)", "300.5(D)(4) → Schedule 80 riser where subject to damage (element 3 passes)", "300.5(B) + 310.10(C) → wet interior requires wet-rated conductors (element 5 fails)"]
    steps:
      - { text: "Element (1): nonmetallic raceway, general location → 18 in required, 18 in provided — compliant on the boundary.", ref: "Table 300.5, Column 3" }
      - { text: "Elements (2) and (3): the under-slab sleeve extending past the walls satisfies 300.5(C); the Schedule 80 riser to 8 ft satisfies the emergence-protection rules where damage is expected.", ref: "300.5(C) / 300.5(D)" }
      - { text: "Element (4): PVC strapped per Table 352.30 with securing within 3 ft of boxes — compliant.", ref: "352.30" }
      - { text: "Element (5): the underground PVC's interior is a wet location, so the conductors through it must be THWN/XHHW-class; plain THHN fails — the only violation in the design.", ref: "300.5(B) / 310.10(C)" }
  timeTargetSec: 300
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."
