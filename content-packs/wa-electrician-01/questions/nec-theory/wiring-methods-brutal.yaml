# ---- Table 300.5 column adjudication under near-miss conditions (numerics) ----
- id: q-wm-x001
  recompute: { calc: burialDepth, inputs: { method: directBurial } }
  domainId: nec.wiring-methods
  commonMistake: "If you got 12 in, you saw 'dwelling, 20 A, GFCI breaker' and stopped counting conditions — Column 4 also caps the circuit at 120 V, and a 240 V multiwire-style circuit fails on voltage alone. One failed condition kills the whole column."
  skillIds: [nec.wm.burial-depth]
  type: numeric
  difficulty: 10
  stem: "At a single-family dwelling, a 240 V, 20 A branch circuit feeds a hot-tub heater 60 ft away using direct-buried UF cable across the lawn (no driveway, slab, or rock). The circuit originates on a 2-pole GFCI breaker, the run also passes within 4 ft of a 120 V, 15 A GFCI-protected landscape circuit in the same yard, and the soil is ordinary loam. Per Table 300.5, what minimum cover (inches) is required for the hot-tub circuit's trench?"
  answer: { kind: numeric, value: 24, unit: "in", tolerance: 0 }
  solution:
    keyIdea: "Column 4 needs ALL of: residential branch circuit, 120 V or less, 20 A or less OCPD, GFCI protection. Here three conditions pass and exactly one — voltage — fails, so the reduction is dead and the wiring-method column governs."
    codePath: ["Table 300.5, Column 4 → fails on voltage (240 V > 120 V)", "Table 300.5, Column 1 (direct-buried cable) → 24 in"]
    steps:
      - { text: "Inventory the Column 4 conditions for the hot-tub circuit: residential — yes; 20 A OCPD — yes; GFCI protected — yes; 120 V or less — NO (240 V).", ref: "Table 300.5" }
      - { text: "The neighboring 120 V, 15 A GFCI landscape circuit is a decoy — each circuit's cover is judged on its own conditions, not its neighbor's." }
      - { text: "With Column 4 unavailable, read the wiring-method column for direct-buried cable: 24 in.", ref: "Table 300.5, Column 1" }
      - { text: "Three passing conditions out of four buy nothing — the reduced-cover column is all-or-nothing." }
  trapIds: [table-column-selection]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x002
  recompute: { calc: burialDepth, inputs: { method: rmcImc } }
  domainId: nec.wiring-methods
  commonMistake: "If you got 12 in, you treated the residential-GFCI column as the floor for every qualifying circuit. Column 4 is an ALLOWANCE for the listed methods; when the installed method is RMC, Column 2's 6 in is itself a lawful minimum — the shallowest applicable column wins."
  skillIds: [nec.wm.burial-depth]
  type: numeric
  difficulty: 9
  stem: "A homeowner's 120 V, 20 A GFCI-protected branch circuit to a fountain is run underground in galvanized rigid metal conduit across a planting bed (general location, no vehicles). The estimator notes the circuit 'qualifies for the 12 in reduced cover.' The installer wants the legally shallowest trench for the RMC as installed. Per Table 300.5, what minimum cover (inches) applies?"
  answer: { kind: numeric, value: 6, unit: "in", tolerance: 0 }
  solution:
    keyIdea: "Three columns are each defensible at first glance — 24 (cable habit), 12 (GFCI circuit), 6 (RMC). The method actually installed is RMC, and its own column permits 6 in; the circuit-based 12 in column is an alternative, not a floor."
    codePath: ["Table 300.5, Column 2 (RMC/IMC) → 6 in", "Table 300.5, Column 4 → would allow 12 in but is not more restrictive here"]
    steps:
      - { text: "Identify the installed wiring method: rigid metal conduit → Column 2 applies directly.", ref: "Table 300.5, Column 2" }
      - { text: "The circuit also meets every Column 4 condition (residential, 120 V, 20 A, GFCI), which would permit 12 in — but that column exists to REDUCE cover for methods that need more, not to raise RMC's 6 in." }
      - { text: "The minimum required cover is the smallest value from any column the installation satisfies: 6 in for RMC in a general location.", ref: "Table 300.5" }
  trapIds: [table-column-selection]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

