  options:
    - { id: a, text: "Both compliant — 10 in is inside the 12 in securing distance NM requires at boxes", distractorRationale: "12 in is the distance only where the box provides clamping; the clamp-less single-gang nonmetallic box tightens it to 8 in, which 10 in exceeds." }
    - { id: b, text: "Box (1) compliant; box (2) violates because its clamp-less allowance requires securing within 8 in", isCorrect: true }
