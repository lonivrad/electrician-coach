  type: numeric
  difficulty: 9
  stem: "A dwelling's 120 V branch circuit to a detached greenhouse runs in Schedule 40 PVC under the vegetable garden (general location). The circuit is GFCI protected at the panel, the conductors are 10 AWG THWN, and the overcurrent device is 25 A to serve a specific listed appliance. Per Table 300.5, what minimum cover (inches) is required?"
  answer: { kind: numeric, value: 18, unit: "in", tolerance: 0 }
  solution:
    keyIdea: "Three columns compete: 12 (GFCI reduced), 18 (nonmetallic raceway), 24 (cable habit). The 25 A OCPD is 5 A past Column 4's 20 A ceiling, so the method column — PVC → 18 in — governs."
