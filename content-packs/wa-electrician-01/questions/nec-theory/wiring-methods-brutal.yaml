# ---- Multi-method / multi-segment underground runs (single) -------------------
- id: q-wm-x008
  domainId: nec.wiring-methods
  commonMistake: "Each SEGMENT takes its own column AND its own location row: RMC's 6 in general allowance dies under the dwelling driveway (18 in row), while the UF segment keeps Column 1's 24 in on the lawn."
  skillIds: [nec.wm.burial-depth]
  type: single
  difficulty: 10
  stem: "A 240 V, 30 A feeder to a detached shop leaves the house in rigid metal conduit that crosses under the dwelling's own concrete driveway, transitions in a flush pull box to Schedule 40 PVC under the lawn, then transitions again to direct-buried UF cable for the final stretch through the garden (all general locations except the driveway). What are the minimum covers for the three segments, in order (RMC under driveway / PVC under lawn / UF in garden)?"
  options:
    - { id: a, text: "18 in / 18 in / 24 in", isCorrect: true }
    - { id: b, text: "6 in / 18 in / 24 in", distractorRationale: "6 in is RMC's GENERAL-location value; the one/two-family-dwelling driveway row overrides it at 18 in for the methods used there." }
    - { id: c, text: "18 in / 12 in / 12 in", distractorRationale: "12 in is the residential-GFCI reduced cover — unavailable to a 240 V, 30 A feeder, which fails both the voltage and ampere conditions." }
    - { id: d, text: "24 in / 24 in / 24 in", distractorRationale: "Only the direct-buried UF segment owes 24 in; carrying the deepest segment's number across the whole route wastes trench and misreads the table — each segment is judged by its own column and row." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "A multi-method run is adjudicated segment by segment: pick each segment's location ROW first, then its method COLUMN — the driveway row overrides RMC's shallow general value, and the UF segment keeps the deep cable column."
    codePath: ["Table 300.5, one/two-family driveway row → 18 in (RMC segment)", "Table 300.5, Column 3 general row → 18 in (PVC segment)", "Table 300.5, Column 1 general row → 24 in (UF segment)"]
    steps:
      - { text: "Segment 1 — RMC under the dwelling's driveway: the location-specific driveway row (18 in) displaces RMC's 6 in general allowance.", ref: "Table 300.5" }
      - { text: "Segment 2 — PVC under the lawn: general row, nonmetallic-raceway column → 18 in.", ref: "Table 300.5, Column 3" }
      - { text: "Segment 3 — direct-buried UF in the garden: general row, Column 1 → 24 in. The 240 V, 30 A rating forecloses any Column 4 reduction on every segment.", ref: "Table 300.5, Column 1" }
      - { text: "Result: 18 / 18 / 24 — trench depth steps at each method or row change; no single number covers the route." }
  trapIds: [table-column-selection]
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live. Pack canon per q-wm-118/q-wm-h007: dwelling-driveway row = 18 in."

- id: q-wm-x009
  domainId: nec.wiring-methods
  commonMistake: "Sharing one trench does not average the columns: each method must independently satisfy its own cover, so a common burial elevation is set by the DEEPEST requirement among the occupants."
  skillIds: [nec.wm.burial-depth]
  type: single
  difficulty: 9
  stem: "To save excavation, a contractor lays a direct-buried UF feeder and a Schedule 40 PVC conduit side by side at the SAME elevation in one trench across a lawn (general location; neither circuit qualifies for reduced cover). What single burial depth, measured as cover over both, makes the whole trench compliant?"
  options:
    - { id: a, text: "18 in — the PVC column governs because a raceway is the more protective method in the trench", distractorRationale: "PVC's 18 in satisfies only the PVC; the UF cable beside it would sit 6 in shy of its own Column 1 requirement — the cable is not upgraded by its neighbor." }
    - { id: b, text: "24 in — each method must meet its own column, and the direct-buried cable's 24 in is the strictest", isCorrect: true }
    - { id: c, text: "21 in — the average of the two columns applies to a shared trench", distractorRationale: "Table 300.5 has no averaging provision; every wiring method in the trench must individually meet its own minimum cover." }
    - { id: d, text: "12 in — a shared trench is treated as a single 'multiple conductors' installation with reduced cover", distractorRationale: "There is no shared-trench reduction; 12 in belongs to the residential-GFCI column, whose conditions neither circuit meets." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Table 300.5 attaches to each wiring method individually. At a common elevation the trench must give the most demanding occupant its full cover — here the direct-buried cable's 24 in."
    codePath: ["Table 300.5, Column 1 (direct-buried cable) → 24 in", "Table 300.5, Column 3 (nonmetallic raceway) → 18 in", "Strictest occupant governs a shared elevation"]
    steps:
      - { text: "List each occupant's requirement: UF direct-buried → 24 in; Schedule 40 PVC → 18 in.", ref: "Table 300.5" }
      - { text: "Both sit at one elevation, so the cover over the pair must satisfy both simultaneously: max(24, 18) = 24 in." }
      - { text: "Alternative design: bench the trench — PVC on an 18 in shelf, UF at 24 in — each method at its own lawful depth." }
  trapIds: [table-column-selection]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x010
  domainId: nec.wiring-methods
  commonMistake: "The riser at grade must survive TWO tests at once: 300.5(D) protection to 8 ft AND the method's own damage rules — EMT fails the severe-damage test (358.12) even though it would satisfy the height."
  skillIds: [nec.wm.burial-depth, nec.wm.method-rules]
  type: single
  difficulty: 10
  stem: "An underground Schedule 40 PVC run surfaces at the wall of a truck-loading dock, where forklifts routinely strike the lower wall (severe physical damage). The installer plans to transition at grade to EMT with raintight fittings, rising 8 ft to a disconnect. Which statement is correct?"
  options:
    - { id: a, text: "Compliant — the riser reaches 8 ft above grade as 300.5(D) requires, and raintight fittings handle the wet location", distractorRationale: "Height and fittings satisfy 300.5(D) and the wet location, but 358.12 independently prohibits EMT where subject to severe physical damage — the forklift exposure fails the method itself." }
    - { id: b, text: "Violation — the riser must be RMC, IMC, or Schedule 80 PVC (a method permitted where subject to severe physical damage), extending at least 8 ft above grade", isCorrect: true }
    - { id: c, text: "Violation — the underground portion must also be upgraded to Schedule 80 for its entire buried length", distractorRationale: "The buried portion is protected by earth cover; only the exposed emergence subject to damage needs the damage-rated method — Schedule 40 remains fine underground." }
    - { id: d, text: "Compliant if the EMT is guarded by a bolted steel channel to 42 in above grade", distractorRationale: "A partial-height guard does not cure the method selection; where the location is subject to severe physical damage the raceway itself must be one identified for it, over the full protection window." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Stack the rules at the transition: 300.5(D) sets the protection window (below grade to 8 ft above), 300.5(D)(4)/358.12 set WHICH methods may occupy it — severe damage eliminates EMT and Schedule 40, leaving RMC, IMC, or Schedule 80 PVC."
    codePath: ["300.5(D) → protection from below grade to 8 ft above grade", "300.5(D)(4) → where subject to physical damage: RMC, IMC, Schedule 80 PVC, or equivalent", "358.12 → EMT not permitted where subject to severe physical damage"]
    steps:
      - { text: "Define the protection window for emerging underground conductors: from the required cover depth up to at least 8 ft above finished grade.", ref: "300.5(D)" }
      - { text: "Classify the exposure: forklift strikes at a loading dock = severe physical damage — this selects the permitted methods for the window.", ref: "300.5(D)(4)" }
      - { text: "Screen the proposed method: EMT is expressly disqualified where subject to severe physical damage, raintight fittings notwithstanding.", ref: "358.12" }
      - { text: "Compliant design: transition to RMC, IMC, or Schedule 80 PVC at (or below) grade and run it to at least 8 ft; the buried Schedule 40 upstream is unaffected." }
  trapIds: [table-column-selection]
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

# ---- Competing support rules on shared supports (single) ----------------------
- id: q-wm-x011
  domainId: nec.wiring-methods
  commonMistake: "A shared support line obeys the tightest occupant. Small PVC (½–1 in) is capped at 3 ft by Table 352.30 — tighter than NM's 4½ ft and far tighter than EMT's 10 ft."
  skillIds: [nec.wm.support]
  type: single
  difficulty: 9
  stem: "A strut trapeze system across an unfinished basement ceiling will carry three parallel runs: a ¾ in. EMT, a ¾ in. Schedule 40 PVC, and an NM cable (secured to the strut with listed fittings, and separately secured within 12 in of every box). The installer wants one uniform trapeze spacing for the whole rack. What is the largest spacing that keeps all three runs compliant between boxes?"
  options:
    - { id: a, text: "3 ft", isCorrect: true }
    - { id: b, text: "4.5 ft", distractorRationale: "4½ ft satisfies the NM cable (334.30) but exceeds the 3 ft maximum Table 352.30 assigns to ½–1 in. PVC — the smallest pipe on the rack is the binding constraint." }
    - { id: c, text: "10 ft", distractorRationale: "10 ft is EMT's own interval (358.30(A)); it triples the small-PVC limit and more than doubles NM's 4½ ft." }
    - { id: d, text: "5 ft", distractorRationale: "5 ft is the Table 352.30 value for 1¼–2 in. PVC — the rack's PVC is ¾ in., which sits in the 3 ft row, and NM's 4½ ft also fails at 5 ft." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Each method carries its own support law onto the shared rack: EMT 10 ft, NM 4½ ft, ¾ in. PVC 3 ft. The uniform spacing must be the minimum of the three — 3 ft."
    codePath: ["Table 352.30 → ½–1 in. PVC: 3 ft", "334.30 → NM secured at intervals ≤ 4½ ft", "358.30(A) → EMT ≤ 10 ft"]
    steps:
      - { text: "List each occupant's maximum interval: EMT — 10 ft; NM cable — 4½ ft; ¾ in. PVC — 3 ft.", ref: "358.30(A) / 334.30 / Table 352.30" }
      - { text: "A single trapeze spacing must not exceed the smallest of these: 3 ft, driven by the small-trade-size PVC row.", ref: "Table 352.30" }
      - { text: "Box-proximity rules still ride along independently: EMT and PVC within 3 ft of each box, NM secured within 12 in — met here by the stated box securing." }
  trapIds: [table-column-selection]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x012
  domainId: nec.wiring-methods
  commonMistake: "Support maxima are 'not to exceed' limits — landing EXACTLY on 10 ft, 3 ft, or a Table 352.30 value is compliant. Failing candidates either treat the boundary as a violation or miss that the rules are inclusive."
  skillIds: [nec.wm.support]
  type: single
  difficulty: 9
  stem: "An inspector measures an exposed run: EMT strapped at exactly 10 ft 0 in intervals with the first strap exactly 3 ft 0 in from each box, and a parallel 1¼ in. Schedule 40 PVC strapped at exactly 5 ft 0 in intervals with straps exactly 3 ft 0 in from its boxes. No other defects exist. What should the inspector conclude?"
  options:
    - { id: a, text: "Both runs comply — every measured value equals, and does not exceed, its rule's maximum", isCorrect: true }
    - { id: b, text: "The EMT violates — straps must be at LESS than 10 ft, so 10 ft 0 in fails by definition", distractorRationale: "358.30(A) says intervals 'not exceeding' 10 ft — equality is compliant; the limit is inclusive, not exclusive." }
    - { id: c, text: "The PVC violates — 1¼ in. PVC is limited to 3 ft between supports", distractorRationale: "3 ft is the Table 352.30 row for ½–1 in. PVC; 1¼ in. sits in the next row, which permits 5 ft." }
    - { id: d, text: "Both violate — a strap exactly 3 ft from a box leaves the box unsupported", distractorRationale: "The box-proximity rule for EMT and PVC is 'within 3 ft' — a securing point at exactly 3 ft satisfies it; boxes are supported by their own means." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Every support rule here is an inclusive maximum: EMT ≤ 10 ft and within 3 ft of boxes; 1¼ in. PVC ≤ 5 ft (Table 352.30) and within 3 ft of boxes. Measurements landing exactly on the limits pass."
    codePath: ["358.30(A) → intervals not exceeding 10 ft; within 3 ft of each box", "Table 352.30 → 1¼–2 in. PVC: 5 ft", "352.30 → PVC within 3 ft of each box"]
    steps:
      - { text: "EMT: 10 ft 0 in interval vs a 10 ft maximum — equal, therefore compliant; 3 ft 0 in to the box vs 'within 3 ft' — compliant.", ref: "358.30(A)" }
      - { text: "PVC: read the correct Table 352.30 row — 1¼ in. is in the 1¼–2 in. band → 5 ft maximum; 5 ft 0 in is compliant, and its 3 ft box distance passes 352.30.", ref: "Table 352.30" }
      - { text: "Conclusion: zero violations. The trap is treating an inclusive boundary as a failure, or sliding the PVC into the smaller-size 3 ft row." }
  trapIds: [table-column-selection]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x013
  domainId: nec.wiring-methods
  commonMistake: "334.30(B)'s fished-cable allowance attaches to the CLOSED, finished portion only — the same cable, where it runs through open new framing, owes full securing (intervals AND within 12 in of the clamped box)."
  skillIds: [nec.wm.support, nec.wm.method-rules]
  type: single
  difficulty: 9
  stem: "During a kitchen remodel, one NM cable serves two areas: it is fished 9 ft down an existing closed wall to an old-work box (no securing possible inside), then continues through a newly opened stud bay — exposed framing — running 3 ft horizontally to a metal box with internal clamps, with no staple anywhere in the open bay. Which portion, if any, violates Article 334?"
  options:
    - { id: a, text: "Only the fished portion — cable may never run 9 ft without support", distractorRationale: "Backwards: 334.30(B) expressly permits unsupported fished cable in concealed finished spaces where securing is impracticable — the 9 ft fished drop is the LEGAL portion." }
    - { id: b, text: "Only the new-work portion — in the open bay the cable must be secured within 12 in of the clamped box (and at intervals), and it is not", isCorrect: true }
    - { id: c, text: "Both portions violate — NM always requires securing every 4½ ft and within 12 in of every box", distractorRationale: "The blanket rule is displaced for the fished segment by 334.30(B); only the accessible open-framing segment still owes securing." }
    - { id: d, text: "Neither portion — one fished segment makes the entire cable a 'fished run' exempt from securing", distractorRationale: "The allowance is location-specific, not cable-specific: where the same cable emerges into open framing, securing becomes practicable and required again." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "One cable, two legal regimes: 334.30(B) exempts the concealed fished drop; the open new-work bay reverts to 334.30's full securing — intervals ≤ 4½ ft and within 12 in of the clamped box — which the unstapled 3 ft approach fails."
    codePath: ["334.30(B)(1) → fished in concealed finished spaces: unsupported permitted", "334.30 → open framing: secured ≤ 4½ ft intervals AND within 12 in of the box", "Metal box with clamps → the 12 in (not 8 in) securing distance applies"]
    steps:
      - { text: "Fished segment: closed finished wall, securing impracticable → the unsupported run is expressly permitted.", ref: "334.30(B)(1)" }
      - { text: "New-work segment: framing is open, so securing IS practicable — the general rule reapplies in full.", ref: "334.30" }
      - { text: "Test the approach to the box: metal box WITH clamps → cable must be secured within 12 in of the box; the nearest securing point is beyond the open bay entirely — violation." }
      - { text: "Fix: one staple within 12 in of the clamped box (and satisfy the interval across the bay); the fished wall needs nothing." }
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x014
  domainId: nec.wiring-methods
  commonMistake: "The clamp-less box's 8 in securing demand has its own escape hatch for OLD WORK: where the cable is fished, 314.17(C)'s exception drops the securing requirement — but the ¼ in sheath-into-box requirement never goes away."
  skillIds: [nec.wm.support, nec.wm.method-rules]
  type: single
  difficulty: 10
  stem: "In an existing finished wall, an electrician fishes NM cable to a single-gang nonmetallic old-work box that has NO internal cable clamps. The cable cannot be secured anywhere inside the closed wall, and the sheath extends about ½ in into the box. Is this installation permitted?"
  options:
    - { id: a, text: "No — a clamp-less single-gang nonmetallic box always requires the cable secured within 8 in of the box", distractorRationale: "The 8 in rule governs NEW work; 314.17(C)'s exception waives securing where the cable is fished between access points in a finished building and securing is impracticable." }
    - { id: b, text: "Yes — for fished cable in a finished wall, securing at the box is not required, provided the sheath extends at least ¼ in inside the box", isCorrect: true }
    - { id: c, text: "No — NM entering any box without an internal clamp is a violation regardless of securing outside", distractorRationale: "Single-gang nonmetallic boxes are expressly permitted without internal clamps; the trade-off is external securing (8 in) in new work, waived for fished old work." }
    - { id: d, text: "Yes — and the sheath may be stripped back flush with the box wall since no clamp will bear on it", distractorRationale: "The sheath-extension requirement (≥ ¼ in into the box) is independent of clamping and survives the fished-cable exception — flush-stripped sheath is a violation." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Three rules stack at this box: 314.17(C) sheath must extend ≥ ¼ in inside; clamp-less single-gang boxes normally demand securing within 8 in; the fished-cable exception waives the securing — never the sheath entry."
    codePath: ["314.17(C) → sheath ≥ ¼ in inside nonmetallic box", "314.17(C) → clamp-less single-gang: secure within 8 in (new work)", "314.17(C) Exception → fished in existing finished walls: securing not required"]
    steps:
      - { text: "Baseline for this box type: no internal clamp is allowed only with external securing within 8 in of the box, sheath extending at least ¼ in inside.", ref: "314.17(C)" }
      - { text: "Old-work condition: the cable is fished in a closed finished wall — securing is impracticable, and the exception expressly relieves the securing requirement.", ref: "314.17(C) Exception" }
      - { text: "What survives: the sheath-entry requirement. At ½ in inside the box it passes; a flush-stripped sheath would fail." }
      - { text: "Verdict: permitted as described — the exception removes securing, the sheath detail is met." }
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x015
