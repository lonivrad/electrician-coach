- id: q-wm-x006
  recompute: { calc: burialDepth, inputs: { method: directBurial } }
  domainId: nec.wiring-methods
  commonMistake: "If you got 12 in, you credited GFCI protection that lives DOWNSTREAM of the buried run. Column 4 requires the buried circuit to be GFCI protected — a GFCI receptacle at the load end protects nothing behind itself, so the buried UF is unprotected."
  skillIds: [nec.wm.burial-depth]
  type: numeric
  difficulty: 9
  stem: "A dwelling's 120 V, 20 A branch circuit runs direct-buried UF cable 40 ft across the back lawn to a post, where the FIRST device on the circuit is a GFCI receptacle protecting itself and one downstream outlet. The breaker at the panel is a standard inverse-time type with no GFCI function. Per Table 300.5, what minimum cover (inches) applies to the buried portion?"
  answer: { kind: numeric, value: 24, unit: "in", tolerance: 0 }
  solution:
    keyIdea: "GFCI protection must exist AHEAD of the buried conductors for Column 4 to apply. Protection provided at the far end of the run leaves the underground portion unprotected, so the direct-burial column's 24 in governs."
    codePath: ["Table 300.5, Column 4 → fails (buried run not GFCI protected)", "Table 300.5, Column 1 (direct-buried cable) → 24 in"]
    steps:
      - { text: "Locate the point of GFCI protection: a receptacle at the LOAD end of the buried run. A GFCI device protects only itself and what is wired downstream of it.", ref: "Table 300.5" }
      - { text: "The buried UF between the panel and the post is upstream of the GFCI — it has no ground-fault protection, so the Column 4 condition fails even though the circuit is residential, 120 V, and 20 A." }
      - { text: "Apply the wiring-method column: direct-buried cable → 24 in. (A GFCI breaker at the panel would have earned 12 in.)", ref: "Table 300.5, Column 1" }
