      - { text: "With the reduction unavailable, use the method column: Schedule 40 PVC = nonmetallic raceway → 18 in.", ref: "Table 300.5, Column 3" }
      - { text: "Swapping to a dual-function AFCI/GFCI breaker before burial would legitimately buy the 12 in trench." }
