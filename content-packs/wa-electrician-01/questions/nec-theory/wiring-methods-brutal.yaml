  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "320.23(A) (via 334.23): cables across the top of attic floor joists need guard strips — within 6 ft of the scuttle opening when access is by scuttle hole only. Cables in bored holes are already protected by the framing and need none."
    codePath: ["334.23 → NM in attics per 320.23", "320.23(A) → across top of joists: guard strips; scuttle-only access limits the zone to within 6 ft of the opening", "Bored holes → no guard strips required"]
    steps:
      - { text: "Classify each cable's position: A is exposed on top of the joists (where someone entering the attic kneels and steps); B is inside bored holes, below the surface.", ref: "320.23(A)" }
      - { text: "Apply the access rule: scuttle-hole-only attic → guard strips required for on-top cables within 6 ft of the opening's nearest edge. Cable A at 4 ft is inside the zone and unprotected — violation.", ref: "334.23 / 320.23(A)" }
      - { text: "Cable B needs no guard strips at 2 ft or anywhere else — bored-hole routing is itself the protection." }
