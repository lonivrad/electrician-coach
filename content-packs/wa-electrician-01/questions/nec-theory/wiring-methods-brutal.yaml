    - { id: d, text: "Box (1) violates because metal boxes require securing within 8 in; box (2) is compliant at 12 in", distractorRationale: "Exactly backwards — the metal box HAS clamps (12 in applies), and it is the clamp-less nonmetallic box that carries the 8 in condition." }
  answer: { kind: single, optionId: b }
