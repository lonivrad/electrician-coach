  skillIds: [nec.wm.burial-depth]
  type: numeric
  difficulty: 9
  stem: "A dwelling's 120 V, 20 A branch circuit to a detached studio runs THWN conductors in Schedule 40 PVC under the side yard (general location). The circuit is protected by a combination-type AFCI breaker (no GFCI function anywhere on the circuit). Per Table 300.5, what minimum cover (inches) is required?"
  answer: { kind: numeric, value: 18, unit: "in", tolerance: 0 }
  solution:
    keyIdea: "Column 4's protection condition is GFCI, not 'any electronic breaker.' AFCI-only protection fails it, so the installed method's column — nonmetallic raceway, 18 in — governs."
