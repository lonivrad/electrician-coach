    - { id: d, text: "Neither violates — a 1 in setback rounds up to the required 1¼ in", distractorRationale: "There is no rounding in 300.4(A)(1); at less than 1¼ in the NM requires a 1/16 in steel plate, full stop." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Same hole, different law: under-setback bored holes require the 1/16 in plate for cables like NM, but the exception releases RMC, IMC, rigid PVC, and EMT — the raceway wall is its own screw shield."
    codePath: ["300.4(A)(1) → <1¼ in setback: 1/16 in steel plate required (cables)", "300.4(A)(1) Exception → not required for RMC, IMC, rigid PVC, EMT", "Enforcement: plate run A; run B passes as-is"]
    steps:
      - { text: "Both holes fail the setback test: 1 in < 1¼ in, so the plate requirement is triggered for protected wiring methods.", ref: "300.4(A)(1)" }
      - { text: "Apply the exception: EMT is on the excused list (with RMC, IMC, rigid PVC) — no plate for run B.", ref: "300.4(A)(1) Exception" }
      - { text: "Run A's NM sheath has no such excuse — a 1/16 in steel plate (or listed equivalent) must cover the cable at each stud." }
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

# ---- Triple-condition method elimination (single) -----------------------------
- id: q-wm-x019
  domainId: nec.wiring-methods
  commonMistake: "Run all three filters, in any order, and only one method survives: wet kills nothing by itself, severe damage kills EMT and Schedule 40, corrosive spray kills unprotected steel — Schedule 80 PVC alone passes wet AND damage AND corrosion."
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 10
  stem: "A raceway must run exposed along the lower wall of a self-serve car-wash bay: continuously wet, routinely struck by wands and vehicle doors (severe physical damage), and soaked in corrosive detergent chemistry that attacks bare steel. Which single method satisfies all three conditions without supplementary protection?"
  options:
    - { id: a, text: "EMT with raintight compression fittings", distractorRationale: "Fittings answer only the water. EMT fails the severe-physical-damage test (358.12) and its steel also needs protection against the corrosive spray — two of three filters kill it." }
    - { id: b, text: "Schedule 40 PVC", distractorRationale: "Immune to the water and the chemicals, but Schedule 40 is not the PVC identified for physical-damage areas — the impact exposure demands extra-heavy-wall Schedule 80." }
    - { id: c, text: "Schedule 80 PVC", isCorrect: true }
    - { id: d, text: "Plain-steel RMC without supplementary corrosion protection", distractorRationale: "RMC beats the impacts and the water, but 344.10 permits it under severe corrosive influence only where judged suitably protected — unprotected steel in detergent spray fails the third filter." }
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "Three independent eliminations: (wet) all four candidates could survive with details; (severe damage) EMT and Schedule 40 out; (corrosive) unprotected steel out — Schedule 80 PVC is the intersection."
    codePath: ["358.12 → EMT not where subject to severe physical damage", "352.10(F) → PVC exposed to damage must be Schedule 80", "344.10 → RMC in severe corrosion only with suitable protection", "352.10 → PVC identified for corrosive/chemical environments"]
    steps:
      - { text: "Filter 1 — wet location: with proper fittings and wet-rated conductors, EMT, PVC, and RMC all remain candidates; nothing is eliminated yet.", ref: "300.9" }
      - { text: "Filter 2 — severe physical damage: EMT is expressly disqualified, and exposed PVC in damage areas must be Schedule 80 — Schedule 40 drops out.", ref: "358.12 / 352.10(F)" }
      - { text: "Filter 3 — corrosive chemicals: plain steel needs corrosion protection judged suitable, which the stem forbids adding — unprotected RMC drops out.", ref: "344.10" }
      - { text: "Survivor: Schedule 80 PVC — inherently corrosion-proof, identified for damage exposure, unaffected by water." }
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x020
  domainId: nec.wiring-methods
  commonMistake: "RMC's seductive 6 in column is only available where RMC itself is permitted — in corrosive cinder fill, unprotected steel conduit loses its use-permission first, so its shallow trench never comes into play."
  skillIds: [nec.wm.method-rules, nec.wm.burial-depth]
  type: single
  difficulty: 9
  stem: "A feeder must cross a yard whose subsoil is cinder fill subject to permanent moisture — an environment corrosive to steel. The contractor wants the cheapest lawful trench and proposes plain galvanized RMC at 6 in of cover, with no concrete envelope or added corrosion protection. Which evaluation is correct?"
  options:
    - { id: a, text: "Compliant — Table 300.5 gives RMC 6 in in a general location, and depth is the only underground requirement", distractorRationale: "Depth is the SECOND question. The first is use-permission: 344.10 restricts RMC in corrosive cinder fill without protection, so the 6 in column belongs to a method this soil forbids." }
    - { id: b, text: "Not compliant as proposed — unprotected steel conduit is not permitted in corrosive cinder fill; Schedule 40 PVC at 18 in of cover is a directly compliant alternative", isCorrect: true }
    - { id: c, text: "Not compliant — nothing may be buried in cinder fill; the feeder must be rerouted or run overhead", distractorRationale: "Cinder fill limits UNPROTECTED steel, not burial generally — corrosion-immune PVC (or steel with a suitable protective envelope) is fully permitted through it." }
    - { id: d, text: "Compliant if the trench is deepened to 24 in, which offsets the corrosion exposure", distractorRationale: "Extra depth is not a corrosion remedy — the chemistry attacks steel at any depth; the fix is a permitted method or protection, not more dirt." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Use-permission gates the depth table: corrosive cinder fill disqualifies unprotected RMC (344.10), taking its 6 in column off the menu; corrosion-immune PVC is permitted and takes Column 3's 18 in."
    codePath: ["344.10 → RMC in cinder fill/corrosive soil only with suitable protection (e.g., concrete envelope)", "352.10 → PVC identified for corrosive environments and direct burial", "Table 300.5, Column 3 → nonmetallic raceway: 18 in"]
    steps:
      - { text: "Screen the method before pricing the trench: permanently moist cinder fill severely corrodes steel, and RMC is permitted there only with protection judged suitable — the proposal has none.", ref: "344.10" }
      - { text: "With RMC out, its 6 in Table 300.5 column is unavailable — a depth column cannot be borrowed by a prohibited method." }
      - { text: "Select a permitted method: rigid PVC is identified for corrosive soils and direct burial → Column 3, 18 in of cover.", ref: "352.10 / Table 300.5" }
      - { text: "Alternative: keep RMC by adding suitable corrosion protection (such as a concrete envelope), then its own column applies — but that is not what was proposed." }
  trapIds: [table-column-selection]
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

