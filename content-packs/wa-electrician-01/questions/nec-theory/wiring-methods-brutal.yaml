# ---- 300.4 protection geometry by framing type (single) -----------------------
- id: q-wm-x016
  domainId: nec.wiring-methods
  commonMistake: "Three penetrations, three different remedies: a wood bored hole under 1¼ in setback takes a 1/16 in steel plate; a wood NOTCH takes a plate regardless of measurements; a steel-stud punchout takes a listed grommet no matter how generous the setback."
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 10
  stem: "One NM cable crosses a partition three ways: (1) through a bored hole in a wood stud whose edge is 1 in from the stud face, (2) through a notch cut in the wood top plate, and (3) through a factory punchout in a steel stud whose edge sits 2 in from either stud face. What protection does 300.4 require at each point, in order?"
  options:
    - { id: a, text: "(1) 1/16 in steel plate; (2) 1/16 in steel plate; (3) listed bushing/grommet in the punchout", isCorrect: true }
    - { id: b, text: "(1) nothing — bored holes are inherently protected; (2) steel plate; (3) nothing — the 2 in setback exceeds 1¼ in", distractorRationale: "The wood bored hole is only self-sufficient at ≥1¼ in setback (this one is 1 in → plate), and the metal-stud grommet requirement is about sheared edges, not setback — it applies at any distance." }
    - { id: c, text: "(1) steel plate; (2) nothing if the notch is less than 40% of the plate width; (3) grommet", distractorRationale: "The 40%-style figures are structural (building-code) notch limits — 300.4(A)(2) requires the steel plate at a notched member whenever the cable could be penetrated, with no percentage carve-out." }
    - { id: d, text: "Listed grommets at all three points", distractorRationale: "Grommets are the METAL-framing remedy (300.4(B)); wood members take the 1¼ in setback or a 1/16 in steel plate — a grommet in wood does not stop a drywall screw." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "300.4 assigns the remedy by member type and penetration type: wood bored hole → setback-or-plate; wood notch → plate; metal framing opening → listed grommet, independent of setback."
    codePath: ["300.4(A)(1) → wood bored hole: ≥1¼ in setback or 1/16 in steel plate", "300.4(A)(2) → wood notch: 1/16 in steel plate before finish", "300.4(B)(1) → metal framing: listed bushing/grommet in the opening"]
    steps:
      - { text: "Point (1): wood bored hole at 1 in from the edge — under the 1¼ in threshold, so a steel plate at least 1/16 in thick is required over the cable path.", ref: "300.4(A)(1)" }
      - { text: "Point (2): a notch in a wood member always takes the steel plate — the cable lies at the member surface where fasteners land, so no setback can qualify it.", ref: "300.4(A)(2)" }
      - { text: "Point (3): steel-stud punchout — the hazard is the sheared metal edge cutting the sheath, so a listed bushing or grommet is required even at a 2 in setback; a plate would be the wrong remedy.", ref: "300.4(B)(1)" }
      - { text: "Answer pattern: plate / plate / grommet — matching remedy to member is the whole test." }
  trapIds: [table-column-selection]
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x017
  domainId: nec.wiring-methods
  commonMistake: "The 1¼ in rule follows the cable, not just the hole: a cable run PARALLEL to a framing member (300.4(D)) needs the same 1¼ in standoff from the nailing edge or physical protection — stapling tight to the stud face at 1 in invites every trim screw."
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 9
  stem: "An NM cable runs vertically alongside a wood stud (parallel to the member, not through holes), stapled to the stud's side 1 in back from the drywall face. Baseboard and trim will be nailed over this wall. Per 300.4(D), which statement is correct?"
  options:
    - { id: a, text: "Compliant — the parallel-run rule applies only to cables inside bored holes", distractorRationale: "300.4(D) exists precisely for cables run PARALLEL to framing: they need the same 1¼ in clearance from the nearest edge or supplemental protection." }
    - { id: b, text: "Violation — the cable must sit at least 1¼ in from the nearest edge of the stud, or be protected by a 1/16 in steel plate (or be in RMC/IMC/EMT/rigid PVC)", isCorrect: true }
    - { id: c, text: "Compliant — staples themselves qualify as the required physical protection", distractorRationale: "A staple positions the cable; it does not shield it. The rule accepts distance (1¼ in), a 1/16 in steel plate/sleeve, or a raceway-class method — never the fastener." }
    - { id: d, text: "Violation — parallel runs along studs are prohibited; the cable must be re-run through bored holes", distractorRationale: "Parallel runs are fully permitted when the 1¼ in standoff or protection is provided; the geometry, not the routing style, is the defect." }
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "300.4(D): cables parallel to framing members must keep 1¼ in from the nearest edge where fasteners can land, or be protected by a 1/16 in steel plate — an exception excuses RMC, IMC, EMT, and rigid PVC, not staples."
    codePath: ["300.4(D) → parallel to framing: ≥1¼ in from nearest edge or protected", "300.4(D) Exception → steel plate not required for RMC/IMC/EMT/rigid PVC", "Trim nailing = the fastener exposure the rule anticipates"]
    steps:
      - { text: "Identify the rule family: this is a parallel run along a framing member, governed by 300.4(D) — not the bored-hole rule.", ref: "300.4(D)" }
      - { text: "Measure: 1 in from the likely-nailed drywall face is under the required 1¼ in — trim nails can reach the cable." }
      - { text: "Remedies: hold the cable ≥1¼ in back, add a 1/16 in steel plate along the exposure, or run a raceway-class method that the exception excuses.", ref: "300.4(D) Exception" }
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-wm-x018
  domainId: nec.wiring-methods
  commonMistake: "300.4(A)(1)'s steel-plate demand has a method-shaped hole: the exception excuses RMC, IMC, rigid PVC, and EMT in the identical under-setback bored hole — the plate protects soft sheaths, not steel-walled or rigid raceways."
  skillIds: [nec.wm.method-rules]
  type: single
  difficulty: 9
  stem: "Two runs pass through the SAME line of bored holes in wood studs, every hole edge exactly 1 in from the stud face: run A is NM cable, run B is ¾ in. EMT. Neither has any added protection. Per 300.4(A)(1), which is the correct enforcement?"
  options:
    - { id: a, text: "Both violate — every wiring method in an under-1¼ in hole requires a 1/16 in steel plate", distractorRationale: "The exception to 300.4(A)(1) exempts RMC, IMC, rigid PVC, and EMT from the plate — the tubing resists fastener penetration on its own; only the NM needs the plate." }
    - { id: b, text: "Only run A (NM) violates; the EMT is exempt from the steel-plate requirement by exception", isCorrect: true }
