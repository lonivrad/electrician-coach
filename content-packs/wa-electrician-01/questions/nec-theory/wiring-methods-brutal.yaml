- id: q-wm-x022
  domainId: nec.wiring-methods
  commonMistake: "Two protections stack at a service trench: 300.5(D)(3)'s warning ribbon lives 12 in ABOVE service conductors (not beside or below), and it attaches to underground SERVICE conductors not under the utility's exclusive control — feeders and branch circuits don't owe it."
