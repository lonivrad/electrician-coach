  domainId: nec.wiring-methods
  commonMistake: "Attic protection turns on TWO variables: where the cable sits (across the top of joists vs through bored holes) and how the attic is reached (scuttle hole → guard strips within 6 ft of the opening; cable in bored holes → no guard strips anywhere)."
