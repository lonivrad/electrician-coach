    steps:
      - { text: "Discard the 91 A reading and the 98 A nameplate for conductor sizing.", ref: "430.6(A)(1)" }
      - { text: "Table 430.250: 40 HP, 230 V, 3φ = 104 A.", ref: "Table 430.250" }
      - { text: "104 × 1.25 = 130 A minimum conductor ampacity.", ref: "430.22" }
  trapIds: [meter-reading-vs-ampacity, actual-current-vs-table, continuous-load-125]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

# ---- Overload protection from nameplate FLA (430.32) ------------------------
- id: q-mot-h003
  recompute: { calc: motorOverload, inputs: { nameplateFLA: 62 } }
  domainId: nec.motors
  commonMistake: "If you got 85, you took 125% of the 68 A table FLC. Overload protection is the one motor calculation that uses the NAMEPLATE FLA (430.6(A)(2) + 430.32)."
  skillIds: [nec.motor.overload, nec.motor.flc-table]
  type: numeric
  difficulty: 5
  stem: "A 25 HP, 230 V, three-phase motor has a nameplate FLA of 62 A and a service factor of 1.15 (Table 430.250 lists 68 A for this motor). What maximum rating (A) may a separate overload device be selected at per 430.32(A)(1)?"
  answer: { kind: numeric, value: 77.5, unit: "A", tolerance: 0.5 }
  solution:
    keyIdea: "Overload sizing flips the usual rule: use the nameplate FLA, not the table FLC; SF ≥ 1.15 permits 125%."
    codePath: ["430.6(A)(2) → nameplate for overload", "430.32(A)(1) → SF 1.15 → 125%", "62 × 1.25 = 77.5 A"]
    steps:
      - { text: "The 68 A table value is for conductors and branch OCPD only; overload uses the nameplate.", ref: "430.6(A)(2)" }
      - { text: "Service factor 1.15 or more → 125% column of 430.32(A)(1).", ref: "430.32(A)(1)" }
      - { text: "62 A × 1.25 = 77.5 A maximum overload selection." }
  trapIds: [actual-current-vs-table, continuous-load-125]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

