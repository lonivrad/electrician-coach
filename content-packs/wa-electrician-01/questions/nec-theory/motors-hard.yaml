  difficulty: 4
  stem: "A 40 HP, 230 V, three-phase continuous-duty motor has a nameplate FLA of 98 A. The installer's clamp meter reads 91 A under load. What minimum branch-circuit conductor ampacity (A) does 430.22 require?"
