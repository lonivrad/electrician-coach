# Motors (Article 430) — HARD tier (difficulty 4–5). 2020 NEC. All DRAFT.
# Multi-step chains: table FLC vs nameplate FLA (430.6), overload 115/125% split
# (430.32), 430.52 device percentages, and 430.24 feeder combinations.

# ---- Table FLC vs nameplate FLA in conductor sizing (430.6 / 430.22) --------
- id: q-mot-h001
  recompute: { calc: motorConductor, inputs: { flc: 14 } }
  domainId: nec.motors
  commonMistake: "If you got 16, you sized from the 12.8 A nameplate FLA. 430.6(A)(1) requires the Table 430.250 FLC (14 A) for conductor sizing; the nameplate is only for the overload device."
  skillIds: [nec.motor.flc-table, nec.motor.conductor-125]
  type: numeric
  difficulty: 4
  stem: "A continuous-duty 10 HP, 460 V, three-phase motor arrives with a nameplate reading 12.8 A FLA, service factor 1.15. What minimum branch-circuit conductor ampacity (A) is required?"
  answer: { kind: numeric, value: 17.5, unit: "A", tolerance: 0.1 }
  solution:
    keyIdea: "Conductors are sized at 125% of the TABLE FLC (430.6(A)(1) + 430.22), never the nameplate FLA."
    codePath: ["430.6(A)(1) → use Table 430.250, not nameplate", "Table 430.250 → 10 HP, 460 V, 3φ = 14 A", "430.22 → 14 × 1.25"]
    steps:
      - { text: "Ignore the 12.8 A nameplate for this task; 430.6(A)(1) sends conductor sizing to the table.", ref: "430.6(A)(1)" }
      - { text: "Table 430.250: 10 HP at 460 V three-phase = 14 A.", ref: "Table 430.250" }
      - { text: "14 A × 1.25 = 17.5 A minimum conductor ampacity.", ref: "430.22" }
  trapIds: [actual-current-vs-table, continuous-load-125]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

