# ---- Branch short-circuit/GF protection percentages (430.52) ----------------
- id: q-mot-h007
  recompute: { calc: motorBranchOCPD, inputs: { flc: 42, pct: 2.5 } }
  domainId: nec.motors
  commonMistake: "If you got 100, you rounded 105 A down; Table 430.52 note/exception allows the next standard size UP. If you got 52.5 or 60, you applied the 125% conductor factor instead of the 250% breaker factor."
  skillIds: [nec.motor.branch-protection, nec.motor.flc-table]
  type: numeric
  difficulty: 4
  stem: "A 15 HP, 230 V, three-phase motor (nameplate 38 A) is protected by an inverse-time circuit breaker sized at the Table 430.52 maximum of 250%, using the next standard size up where the calculation does not match a standard rating. What breaker rating (A) results?"
  answer: { kind: numeric, value: 110, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "Branch SC/GF protection: table FLC × the 430.52 device percentage, then up to the next 240.6 standard size."
    codePath: ["Table 430.250 → 15 HP, 230 V, 3φ = 42 A", "Table 430.52 → inverse-time breaker 250%", "42 × 2.5 = 105 → next standard = 110 A"]
    steps:
      - { text: "Use the 42 A table FLC (not the 38 A nameplate) for branch protection.", ref: "430.6(A)(1)" }
      - { text: "Inverse-time breaker column: 42 × 250% = 105 A.", ref: "Table 430.52" }
      - { text: "105 A is not a standard rating; the next standard size up is 110 A.", ref: "430.52(C)(1) Exc. 1 / 240.6" }
  trapIds: [next-size-up-rounding, actual-current-vs-table]
  timeTargetSec: 180
