# ---- Conceptual chains and rule-selection (single-choice) --------------------
- id: q-mot-h019
  domainId: nec.motors
  skillIds: [nec.motor.flc-table, nec.motor.overload]
  type: single
  difficulty: 4
  stem: "A three-phase motor's nameplate reads 29 A FLA; Table 430.250 lists 34 A for its HP and voltage. Which pairing of current sources is correct for the design?"
  options:
    - { id: a, text: "Conductors and branch OCPD from 34 A (table); overload device from 29 A (nameplate)", isCorrect: true }
    - { id: b, text: "Conductors and branch OCPD from 29 A (nameplate); overload device from 34 A (table)", distractorRationale: "Exactly reversed: 430.6(A)(1) sends conductors/OCPD to the table; 430.6(A)(2)/430.32 sends the overload to the nameplate." }
    - { id: c, text: "All three calculations from 34 A (table)", distractorRationale: "Using the table value for the overload oversizes it; 430.32 explicitly keys the overload to the motor nameplate current rating." }
    - { id: d, text: "All three calculations from 29 A (nameplate)", distractorRationale: "Using the nameplate for conductors/OCPD undersizes them; 430.6(A)(1) requires the table FLC for those tasks." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "430.6 splits the current sources: table FLC for conductors and branch/feeder protection, nameplate FLA only for overload protection."
    codePath: ["430.6(A)(1) → table values for 430.22 / 430.52 / 430.24", "430.6(A)(2) → nameplate for 430.32"]
    steps:
      - { text: "Conductor ampacity (430.22) and branch SC/GF protection (430.52) use Table 430.250's 34 A.", ref: "430.6(A)(1)" }
      - { text: "The separate overload device is selected from the 29 A nameplate.", ref: "430.32" }
  trapIds: [actual-current-vs-table]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-mot-h020
  domainId: nec.motors
  skillIds: [nec.motor.overload]
  type: single
  difficulty: 5
  stem: "Four continuous-duty motors are being fitted with separate overload relays per 430.32(A)(1). Which motor must be limited to 115% of its nameplate FLA rather than 125%?"
  options:
    - { id: a, text: "Nameplate: SF 1.15, temperature rise 50°C", distractorRationale: "The service factor of 1.15 alone qualifies it for 125% — only one of the two conditions has to be met." }
    - { id: b, text: "Nameplate: SF 1.0, temperature rise 40°C", distractorRationale: "A marked temperature rise of 40°C or less qualifies for 125% even with SF 1.0." }
    - { id: c, text: "Nameplate: SF 1.0, temperature rise 50°C", isCorrect: true }
    - { id: d, text: "Nameplate: SF 1.25, temperature rise 55°C", distractorRationale: "SF 1.25 is 'not less than 1.15,' so this motor also gets 125% despite the high rise." }
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "125% applies if SF ≥ 1.15 OR marked rise ≤ 40°C; only a motor failing BOTH tests drops to 115%."
    codePath: ["430.32(A)(1) → SF ≥ 1.15 → 125%", "430.32(A)(1) → rise ≤ 40°C → 125%", "all other motors → 115%"]
    steps:
      - { text: "Check each nameplate against both 125% conditions; either one passing is enough.", ref: "430.32(A)(1)" }
      - { text: "Only SF 1.0 with a 50°C rise fails both, landing in the 'all other motors' 115% row." }
  trapIds: [table-column-selection]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-mot-h021
  domainId: nec.motors
  skillIds: [nec.motor.branch-protection, nec.motor.conductor-125]
  type: single
  difficulty: 5
  stem: "An inspector notes a 10 HP, 230 V, three-phase motor (Table FLC 28 A) wired with conductors rated 40 A but protected by a 70 A inverse-time breaker. Why can this installation be code-compliant?"
  options:
    - { id: a, text: "430.52 sizes the breaker for short-circuit/ground-fault only (up to 250% of FLC); the separate overload device per 430.32 protects the conductors against overload", isCorrect: true }
    - { id: b, text: "It is not compliant — 240.4 always requires the breaker rating to be at or below the conductor ampacity", distractorRationale: "240.4(G) hands motor circuits to Article 430, where the branch OCPD routinely exceeds conductor ampacity." }
    - { id: c, text: "It is compliant only if the conductors are upsized to 70 A ampacity to match the breaker", distractorRationale: "Conductors are sized at 125% of the FLC (430.22), not to the branch OCPD rating." }
    - { id: d, text: "It is compliant because the next-size-up allowance of 240.4(B) covers the gap between 40 A and 70 A", distractorRationale: "240.4(B) only reaches the next standard size above the ampacity (here 40 A is already standard); it cannot justify a 70 A device — Article 430's split-protection scheme does." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Motor circuits split protection duties: the 430.52 device handles faults, the 430.32 overload device handles overload — so the breaker may legitimately exceed conductor ampacity."
    codePath: ["240.4(G) → Article 430 governs motor conductors", "430.22 → conductors 28 × 1.25 = 35 A minimum (40 A OK)", "430.52 → breaker up to 28 × 2.5 = 70 A"]
    steps:
      - { text: "Conductors: 28 × 1.25 = 35 A minimum, satisfied by 40 A conductors.", ref: "430.22" }
      - { text: "Breaker: 28 × 250% = 70 A maximum for an inverse-time breaker.", ref: "Table 430.52" }
      - { text: "Overload protection at roughly 115–125% of nameplate FLA is what keeps the 40 A conductors from sustained overload.", ref: "430.32" }
  trapIds: [next-size-up-rounding, continuous-load-125]
  timeTargetSec: 200
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-mot-h022
  domainId: nec.motors
  skillIds: [nec.motor.flc-table, nec.motor.conductor-125, nec.motor.branch-protection, nec.motor.overload]
  type: single
  difficulty: 5
  stem: "Which sequence correctly orders a single continuous-duty motor branch-circuit design from start to finish?"
  options:
    - { id: a, text: "Table FLC (430.6/430.250) → conductors at 125% of FLC (430.22) → branch SC/GF device from the 430.52 percentage of FLC → overload from nameplate FLA (430.32)", isCorrect: true }
    - { id: b, text: "Nameplate FLA → conductors at 125% of FLA → breaker at 250% of FLA → overload from table FLC", distractorRationale: "Sources are swapped throughout: conductors and the branch device come from the TABLE FLC, and the overload comes from the NAMEPLATE." }
    - { id: c, text: "Table FLC → branch device at 250% → conductors at 125% of the breaker rating → overload from nameplate", distractorRationale: "Conductors are 125% of the motor FLC, never a percentage of the breaker rating — the 430.52 device intentionally exceeds conductor ampacity." }
    - { id: d, text: "Table FLC → conductors at 125% → overload at 125% of table FLC → branch device from the nameplate", distractorRationale: "The overload keys to the nameplate FLA and the branch device to the table FLC — this ordering reverses the two current sources." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "One motor, four steps, two current sources: everything except the overload flows from the table FLC."
    codePath: ["430.6(A)(1) → Table 430.248/430.250", "430.22 → conductors", "430.52 → branch SC/GF device", "430.32 → overload from nameplate"]
    steps:
      - { text: "Look up the table FLC first — it feeds the conductor and branch-device steps.", ref: "430.6(A)(1)" }
      - { text: "Conductors: FLC × 125%.", ref: "430.22" }
      - { text: "Branch SC/GF device: FLC × the Table 430.52 percentage for the device type, next size up permitted.", ref: "430.52" }
      - { text: "Overload: selected from the nameplate FLA at 115% or 125% depending on SF/temp rise.", ref: "430.32(A)(1)" }
  trapIds: [actual-current-vs-table]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-mot-h023
  domainId: nec.motors
  skillIds: [nec.motor.flc-table]
  type: single
  difficulty: 4
  stem: "During commissioning of a 10 HP, 230 V, three-phase motor, a clamp meter reads 24 A, the nameplate reads 26 A FLA, and Table 430.250 lists 28 A. Which value sizes the branch-circuit conductors?"
  options:
    - { id: a, text: "24 A — it reflects the motor's real operating load", distractorRationale: "A field measurement varies with load and is never a code basis for conductor sizing (meter reading is not ampacity)." }
    - { id: b, text: "26 A — the manufacturer's tested full-load current", distractorRationale: "The nameplate FLA is reserved for overload-device selection (430.32); conductors come from the table." }
    - { id: c, text: "28 A — the Table 430.250 value", isCorrect: true }
    - { id: d, text: "Whichever of the three is largest at the time of inspection", distractorRationale: "430.6(A)(1) fixes the source as the table value; it is not a pick-the-largest rule." }
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "Three plausible currents, one code answer: conductor sizing always starts from the table FLC."
    codePath: ["430.6(A)(1) → Table 430.250 = 28 A", "430.22 → conductors at 28 × 1.25"]
    steps:
      - { text: "430.6(A)(1) directs conductor and branch-device sizing to Table 430.250, regardless of measured or nameplate current.", ref: "430.6(A)(1)" }
      - { text: "The 26 A nameplate is used later, only for the overload device (430.32); the 24 A reading is used for neither." }
  trapIds: [meter-reading-vs-ampacity, actual-current-vs-table]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."
