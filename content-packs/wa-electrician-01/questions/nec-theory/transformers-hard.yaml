# ---- Primary AND secondary current in one scenario (ask one) -----------------
- id: q-xfmr-h001
  recompute: { calc: transformerCurrent, inputs: { kva: 75, volts: 208, phase: 3 } }
  domainId: nec.transformers
  commonMistake: "If you got 90.2 A, you computed the PRIMARY current (480 V side). If you got 360.6 A, you dropped the √3."
  skillIds: [nec.xfmr.secondary]
  type: numeric
  difficulty: 4
  stem: "A 75 kVA three-phase transformer steps 480 V delta down to 208Y/120 V to feed a shop panelboard. Before landing the secondary conductors, the foreman asks for the full-load SECONDARY line current (A). What do you tell him?"
  answer: { kind: numeric, value: 208.18, unit: "A", tolerance: 0.5 }
  solution:
    keyIdea: "Same kVA, different voltage per side — use the SECONDARY voltage with √3 for the secondary current."
    codePath: ["I = VA / (√3·V)", "secondary V = 208"]
    steps:
      - { text: "kVA is the same on both windings; only the voltage changes side to side." }
      - { text: "75,000 ÷ (1.732 × 208) = 75,000 ÷ 360.3 = 208.2 A." }
      - { text: "The 480 V side would give 90.2 A — that is the primary, not what was asked." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

