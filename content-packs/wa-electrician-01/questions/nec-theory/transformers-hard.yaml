  type: numeric
  difficulty: 5
  stem: "A 750 VA control transformer (480 V single-phase primary) inside an industrial control panel has primary-only protection. Its primary FLC is under 2 A, so the standard 125% cell does NOT apply. What is the MAXIMUM fuse ampere value (A) permitted by Table 450.3(B)?"
