# ---- Primary-only OCP with explicit percentage (Table 450.3(B)) --------------
- id: q-xfmr-h005
  recompute: { calc: transformerPrimaryOCP, inputs: { kva: 45, volts: 480, phase: 3, pct: 2.5, standardize: 0 } }
  domainId: nec.transformers
  commonMistake: "If you got 67.7 A (or 70 A), you used the 125% primary-only cell — with compliant secondary protection the primary may go to 250%."
  skillIds: [nec.xfmr.ocp-sizing]
  type: numeric
  difficulty: 5
  stem: "A 45 kVA, three-phase, 480 V-primary transformer feeds a panelboard whose main breaker protects the secondary at not more than 125% of secondary FLC. Per Table 450.3(B) with secondary protection provided, what is the MAXIMUM calculated value (A) the primary overcurrent device rating may not exceed (250% of primary FLC, before selecting a device)?"
  answer: { kind: numeric, value: 135.33, unit: "A", tolerance: 1.0 }
  solution:
    keyIdea: "With secondary protection at ≤125%, Table 450.3(B) lets the primary device go up to 250% of primary FLC."
    codePath: ["I = VA/(√3·V)", "Table 450.3(B), 'primary and secondary' row → primary 250%"]
    steps:
      - { text: "Primary FLC = 45,000 ÷ 831.4 = 54.1 A." }
      - { text: "54.1 × 2.50 = 135.3 A — the primary device must not exceed this value." }
      - { text: "The 125% column (67.7 → 70 A) applies only when the primary device is the ONLY protection." }
  trapIds: [table-column-selection]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

