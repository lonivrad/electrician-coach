# ---- Rule-selection / ceiling-vs-round-up concepts (single-choice) -----------
- id: q-xfmr-h018
  domainId: nec.transformers
  skillIds: [nec.xfmr.ocp-sizing]
  type: single
  difficulty: 5
  stem: "A 4.5 kVA, single-phase transformer with a 480 V primary (primary FLC = 4,500 ÷ 480 = 9.38 A) will have primary-only protection. Which Table 450.3(B) treatment applies to sizing its primary overcurrent device?"
  options:
    - id: a
      text: "125% of primary FLC, with Note 1 permitting the next higher standard rating"
      isCorrect: true
    - id: b
      text: "167% of primary FLC as a maximum, because the current is 'under 10 A'"
      distractorRationale: "The 167% band ends BELOW 9 A. At 9.38 A the FLC is 9 A or more, so the 125% cell governs — 'under 10' is not a table breakpoint."
    - id: c
      text: "300% of primary FLC as a maximum, because the transformer is under 5 kVA"
      distractorRationale: "Table 450.3(B) bands are set by primary current in amperes, not kVA; 300% applies only when FLC is less than 2 A."
    - id: d
      text: "250% of primary FLC, rounded up to the next standard rating"
      distractorRationale: "250% applies only when compliant SECONDARY protection is also provided, and even then it is a ceiling — Note 1's round-up belongs to the 125% cell."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "9.38 A is at or above the 9 A breakpoint, so the 125% cell — the only cell with the Note 1 round-up — applies."
    codePath: ["I = 4,500/480 = 9.38 A", "Table 450.3(B) → ≥9 A: 125%", "Note 1"]
    steps:
      - { text: "Compute FLC first: 9.38 A." }
      - { text: "Compare to the breakpoints: <2 A → 300%; 2 to <9 A → 167%; ≥9 A → 125%." }
      - { text: "9.38 A ≥ 9 A → 125% cell; 9.38 × 1.25 = 11.7 A, and Note 1 would permit the next standard size." }
  trapIds: [table-column-selection]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-xfmr-h019
  domainId: nec.transformers
  skillIds: [nec.xfmr.ocp-sizing]
  type: single
  difficulty: 4
  stem: "A 2 kVA, single-phase, 240 V-primary transformer (primary FLC = 8.33 A) has primary-only protection. 167% of FLC works out to 13.9 A, and the smallest fuse on the truck is 15 A. May the installer use the 15 A fuse under Table 450.3(B)?"
  options:
    - id: a
      text: "No — 13.9 A is a maximum; the round-up allowance in Note 1 applies only to the 125% cell, so a device not exceeding 13.9 A is required"
      isCorrect: true
    - id: b
      text: "Yes — when the calculated value is not a standard rating, the next higher standard rating is always permitted"
      distractorRationale: "That 'always' is the trap: the next-size-up allowance (Note 1) is written into the 125% cell only. The 167% and 300% cells are hard ceilings."
    - id: c
      text: "Yes — 15 A is the smallest standard rating in 240.6(A), so nothing smaller can be required"
      distractorRationale: "240.6(A) lists standard ratings but fuses below 15 A exist and are permitted; the table's ceiling still controls the maximum."
    - id: d
      text: "No — the fuse must not exceed 125% of FLC (10.4 A) regardless of the current band"
      distractorRationale: "This applies the 125% cell to a 2–9 A transformer; at 8.33 A the table allows up to 167%, i.e. 13.9 A — the limit is 13.9 A, not 10.4 A."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "In the 167% (and 300%) cells the product is a ceiling — the next-size-up allowance lives only in the 125% cell."
    codePath: ["Table 450.3(B) → 2 to <9 A: 167% max", "Note 1 scope → 125% cell only"]
    steps:
      - { text: "8.33 A FLC → 167% band → maximum device value 13.9 A." }
      - { text: "15 A exceeds 13.9 A, and no note permits rounding up in this cell." }
      - { text: "A small fuse (e.g., 12 A or smaller, per its listing) must be used instead." }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-xfmr-h020
  domainId: nec.transformers
  skillIds: [nec.xfmr.ocp-sizing]
  type: single
  difficulty: 5
  stem: "A 75 kVA, three-phase, 480 V – 208Y/120 V transformer supplies a panelboard whose main breaker limits the secondary to not more than 125% of secondary FLC. Under Table 450.3(B), which limit now applies to the PRIMARY overcurrent device?"
  options:
    - id: a
      text: "Not more than 250% of primary FLC"
      isCorrect: true
    - id: b
      text: "125% of primary FLC, next standard size up per Note 1"
      distractorRationale: "That is the primary-ONLY row. Once compliant secondary protection exists, the table's combined row raises the primary allowance to 250%."
    - id: c
      text: "Not more than 167% of primary FLC"
      distractorRationale: "167% is the primary-only cell for small transformers with FLC between 2 A and 9 A — it has nothing to do with secondary protection being present."
    - id: d
      text: "No primary device is required at all once the secondary is protected"
      distractorRationale: "450.3(B) still requires primary overcurrent protection (or a feeder device serving as it); secondary protection changes the primary LIMIT, it does not delete the requirement."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Table 450.3(B) has two rows: primary-only (125%) and primary-plus-secondary — where the primary may rise to 250%."
    codePath: ["Table 450.3(B) → 'primary and secondary protection' row", "secondary ≤125% → primary ≤250%"]
    steps:
      - { text: "Identify which row applies: secondary protection at ≤125% is provided, so the combined row governs." }
      - { text: "That row allows the primary device up to 250% of primary FLC (90.2 A × 2.5 = 225.5 A ceiling)." }
      - { text: "Choosing the 125% row here would needlessly force a 125 A device where up to 225 A is permitted." }
  trapIds: [table-column-selection]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-xfmr-h021
  domainId: nec.transformers
  skillIds: [nec.xfmr.secondary]
  type: single
  difficulty: 4
  stem: "A journeyman sizes the primary breaker of a 480 V – 208Y/120 V transformer per Table 450.3(B) and declares the secondary conductors to the panelboard 'already protected by the primary device.' What is wrong with that reasoning?"
  options:
    - id: a
      text: "450.3 protects only the TRANSFORMER; the secondary conductors still need their own protection under the rules for secondary/tap conductors in Article 240"
      isCorrect: true
    - id: b
      text: "Nothing — a primary device sized per Table 450.3(B) protects the transformer and all downstream conductors"
      distractorRationale: "On a 3φ delta–wye (or any transformer other than limited 2-wire/delta-delta cases), the primary device cannot be counted on to protect secondary conductors — and 450.3 was never a conductor-protection rule."
    - id: c
      text: "The secondary conductors only need protection if they are longer than 10 ft"
      distractorRationale: "Length picks WHICH secondary-conductor rule applies (10 ft, 25 ft, etc.) — it does not create an exemption from protection for short runs."
    - id: d
      text: "He should have sized the primary device at 250% instead, which would then also cover the secondary conductors"
      distractorRationale: "Raising the primary to 250% (allowed only WITH secondary protection) protects the conductors even less — the percentages in 450.3(B) are about transformer protection, not conductor ampacity."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Two separate obligations: 450.3 = transformer protection; Article 240's secondary-conductor rules = conductor protection."
    codePath: ["450.3(B) scope", "240.4 / 240.21(C) secondary-conductor rules"]
    steps:
      - { text: "Table 450.3(B) percentages exist to protect the transformer windings." }
      - { text: "Secondary conductors from a 4-wire wye secondary are not considered protected by the primary device." }
      - { text: "They must comply with the secondary-conductor provisions (e.g., the 10 ft / 25 ft rules) and terminate in an OCPD." }
  trapIds: [table-column-selection]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-xfmr-h022
  domainId: nec.transformers
  skillIds: [nec.xfmr.ocp-sizing]
  type: single
  difficulty: 5
  stem: "For a 75 kVA, three-phase, 480 V – 208Y/120 V transformer with primary-only protection, an electrician calculates 208.2 A × 1.25 = 260.2 A and selects a 300 A primary breaker. The correct answer is a 125 A breaker. What single mistake produced the 300 A figure?"
  options:
    - id: a
      text: "He applied 125% to the SECONDARY current (208 V side) instead of the primary current (90.2 A at 480 V)"
      isCorrect: true
    - id: b
      text: "He forgot the √3 in the three-phase current formula"
      distractorRationale: "Dropping √3 on the primary gives 75,000 ÷ 480 = 156.3 A → ×1.25 = 195.3 → 200 A, not 300 A. The numbers point to the 208 V side, not a missing √3."
    - id: c
      text: "He used 167% instead of 125%"
      distractorRationale: "90.2 × 1.67 = 150.6 → a 150/175 A device, not 300 A — and 167% wouldn't apply anyway at 90.2 A FLC."
    - id: d
      text: "He rounded up when Table 450.3(B) required rounding down"
      distractorRationale: "Rounding direction isn't the error — in the 125% cell Note 1 really does permit the next size up. The base current itself was from the wrong winding."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "208.2 A is the 208 V secondary line current; the primary device must be sized from the 480 V primary FLC."
    codePath: ["I(pri) = 75,000/(√3·480) = 90.2 A", "×1.25 = 112.8 A", "Note 1 → 125 A"]
    steps:
      - { text: "Recognize 208.2 A as 75,000 ÷ (1.732 × 208) — the secondary current." }
      - { text: "Primary FLC = 75,000 ÷ (1.732 × 480) = 90.2 A." }
      - { text: "90.2 × 1.25 = 112.8 A → next standard size 125 A, not 300 A." }
  trapIds: [unit-or-phase-confusion, next-size-up-rounding]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."
