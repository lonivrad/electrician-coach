# Conduit fill (Chapter 9) — HARD tier (difficulty 4–5). 2020 NEC. All DRAFT.
# Mixed-size area method, PVC80 vs EMT column traps, 60% nipple fill, 53%/31% overrides,
# and the Table 1 Note round-up-at-0.8 edge. Calculator-backed; SME-verify before live.

# ---- Same-size max counts with rounding and column traps ---------------------
- id: q-cond-h001
  recompute: { calc: conduitMaxSameSize, inputs: { raceway: "EMT", tradeSize: "2", size: "1" } }
  domainId: nec.conduit-fill
  commonMistake: "If you got 9, you rounded 8.59 up — the Chapter 9 Table 1 note permits rounding up only when the decimal is 0.8 or larger."
  skillIds: [nec.conduit.same-size]
  type: numeric
  difficulty: 4
  stem: "A feeder pull uses 1 AWG THHN conductors in a full-length run of 2 in. EMT. Using the Chapter 9 area method, what is the maximum number of 1 AWG THHN conductors permitted at the 40% fill limit? (conductors)"
  answer: { kind: numeric, value: 8, unit: "conductors", tolerance: 0 }
  solution:
    keyIdea: "40% of the Table 4 EMT area divided by the Table 5 conductor area; round DOWN unless the decimal is ≥ 0.8."
    codePath: ["Ch.9 Table 4 (2 in. EMT = 3.356 in²)", "Ch.9 Table 5 (1 THHN = 0.1562 in²)", "Ch.9 Table 1 Note"]
    steps:
      - { text: "Usable area: 3.356 × 0.40 = 1.3424 in².", ref: "Ch.9 Table 4" }
      - { text: "1.3424 ÷ 0.1562 = 8.59 conductors.", ref: "Ch.9 Table 5" }
      - { text: "Decimal 0.59 is less than 0.8, so round down → 8.", ref: "Ch.9 Table 1 Note" }
  trapIds: [next-size-up-rounding]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-cond-h002
  recompute: { calc: conduitMaxSameSize, inputs: { raceway: "PVC80", tradeSize: "2", size: "3/0" } }
  domainId: nec.conduit-fill
  commonMistake: "If you got 2, you truncated 2.84 — a decimal of 0.8 or larger rounds UP per the Chapter 9 Table 1 note. If you got 4 or 5, you used the Schedule 40 area instead of Schedule 80."
  skillIds: [nec.conduit.same-size]
  type: numeric
  difficulty: 5
  stem: "Parallel service risers are run in 2 in. Schedule 80 PVC. How many 3/0 AWG THHN conductors are permitted in each raceway at the 40% fill limit? (conductors)"
  answer: { kind: numeric, value: 3, unit: "conductors", tolerance: 0 }
  solution:
    keyIdea: "Schedule 80 has a much smaller internal area than Schedule 40, and the 0.84 decimal triggers the Table 1 round-up."
    codePath: ["Ch.9 Table 4 (2 in. PVC-80 = 1.905 in²)", "Ch.9 Table 5 (3/0 THHN = 0.2679 in²)", "Ch.9 Table 1 Note"]
    steps:
      - { text: "Usable area: 1.905 × 0.40 = 0.762 in².", ref: "Ch.9 Table 4" }
      - { text: "0.762 ÷ 0.2679 = 2.84 conductors.", ref: "Ch.9 Table 5" }
      - { text: "Decimal 0.84 ≥ 0.8 → round up to 3.", ref: "Ch.9 Table 1 Note" }
  trapIds: [table-column-selection, next-size-up-rounding]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-cond-h003
  recompute: { calc: conduitMaxSameSize, inputs: { raceway: "PVC80", tradeSize: "1", size: "10" } }
  domainId: nec.conduit-fill
  commonMistake: "If you got 15, you read the Schedule 40 row of Table 4 (0.832 in²) instead of Schedule 80 (0.495 in²) — the wall thickness nearly halves the usable area."
  skillIds: [nec.conduit.same-size]
  type: numeric
  difficulty: 4
  stem: "An exterior run exposed to physical damage is changed from Schedule 40 to 1 in. Schedule 80 PVC. How many 10 AWG THHN conductors are now permitted at the 40% fill limit? (conductors)"
  answer: { kind: numeric, value: 9, unit: "conductors", tolerance: 0 }
  solution:
    keyIdea: "Schedule 80's thicker wall shrinks the Table 4 internal area; never reuse the Schedule 40 figure."
    codePath: ["Ch.9 Table 4 (1 in. PVC-80 = 0.495 in²)", "Ch.9 Table 5 (10 THHN = 0.0211 in²)"]
    steps:
      - { text: "Usable area: 0.495 × 0.40 = 0.198 in².", ref: "Ch.9 Table 4" }
      - { text: "0.198 ÷ 0.0211 = 9.38 → round down to 9.", ref: "Ch.9 Table 1 Note" }
      - { text: "Compare: Schedule 40 would have allowed 0.3328 ÷ 0.0211 = 15." }
  trapIds: [table-column-selection]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

