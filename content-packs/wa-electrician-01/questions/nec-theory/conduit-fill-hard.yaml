# ---- Minimum trade size (single-choice, mixed sizes) ---------------------------
- id: q-cond-h017
  domainId: nec.conduit-fill
  skillIds: [nec.conduit.mixed-size, nec.conduit.percent-fill]
  type: single
  difficulty: 5
  stem: "A full-length EMT run (about 60 ft) will contain three 3/0 AWG THHN conductors and one 6 AWG THHN equipment grounding conductor (total conductor area 0.8544 in²). What is the minimum EMT trade size?"
  options:
    - id: a
      text: "1 in."
      distractorRationale: "Compares the 0.8544 in² conductor area to the FULL internal area of 1 in. EMT (0.864 in²) instead of its 40% usable area (0.3456 in²)."
    - id: b
      text: "1-1/4 in."
      distractorRationale: "Applies the 60% nipple allowance (1.496 × 0.60 = 0.8976 in²) to a 60 ft run — the nipple rule only covers raceways not exceeding 24 in."
    - id: c
      text: "1-1/2 in."
      distractorRationale: "Omits the 6 AWG EGC: 0.8037 in² would squeak under the 1-1/2 in. limit of 0.8144 in², but the EGC counts toward fill."
    - id: d
      text: "2 in."
      isCorrect: true
  answer: { kind: single, optionId: d }
  solution:
    keyIdea: "Every conductor (EGC included) counts, and a full-length run gets only 40% of Table 4."
    codePath: ["Ch.9 Table 5 (sum = 0.8544 in²)", "Ch.9 Table 4 (EMT × 40%)", "Ch.9 Table 1"]
