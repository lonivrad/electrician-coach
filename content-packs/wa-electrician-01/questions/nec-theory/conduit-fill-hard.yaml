# ---- 60% nipple fill ---------------------------------------------------------
- id: q-cond-h006
  recompute: { calc: conduitMaxSameSize, inputs: { raceway: "EMT", tradeSize: "1", size: "12", fillPercent: 60 } }
  domainId: nec.conduit-fill
  commonMistake: "If you got 26, you used the 40% full-run limit — a raceway not exceeding 24 in. between enclosures is a nipple and may be filled to 60% (Ch.9 Note 4). If you got 38, you truncated 38.98 instead of rounding up."
  skillIds: [nec.conduit.same-size, nec.conduit.percent-fill]
  type: numeric
  difficulty: 5
  stem: "An 18 in. length of 1 in. EMT connects two adjacent panel enclosures. How many 12 AWG THHN conductors are permitted through this nipple? (conductors)"
  answer: { kind: numeric, value: 39, unit: "conductors", tolerance: 0 }
  solution:
    keyIdea: "A raceway ≤ 24 in. between enclosures is a nipple: 60% fill applies, then the 0.8 round-up note."
    codePath: ["Ch.9 Notes to Tables, Note 4 (nipple = 60%)", "Ch.9 Table 4 (1 in. EMT = 0.864 in²)", "Ch.9 Table 5 (12 THHN = 0.0133 in²)", "Ch.9 Table 1 Note"]
    steps:
      - { text: "18 in. ≤ 24 in. → nipple, 60% fill permitted.", ref: "Ch.9 Note 4" }
      - { text: "Usable area: 0.864 × 0.60 = 0.5184 in².", ref: "Ch.9 Table 4" }
      - { text: "0.5184 ÷ 0.0133 = 38.98; decimal 0.98 ≥ 0.8 → round up to 39.", ref: "Ch.9 Table 1 Note" }
  trapIds: [table-column-selection, next-size-up-rounding]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

