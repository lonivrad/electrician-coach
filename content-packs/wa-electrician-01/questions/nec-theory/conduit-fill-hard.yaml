# ---- Which-rule / procedure questions ------------------------------------------
- id: q-cond-h020
  domainId: nec.conduit-fill
  skillIds: [nec.conduit.percent-fill, nec.conduit.mixed-size]
  type: single
  difficulty: 4
  stem: "A 26 in. length of EMT between two enclosures will contain 10 AWG and 6 AWG THHN conductors together. Which procedure correctly determines whether the raceway is adequately sized?"
  options:
    - id: a
      text: "Look up the count for the larger conductor size in Annex C Table C.1."
      distractorRationale: "Annex C tables apply only when ALL conductors in the raceway are the same size and insulation type."
    - id: b
      text: "Sum the Chapter 9 Table 5 conductor areas and compare to 60% of the Table 4 internal area."
      distractorRationale: "The 60% allowance is for nipples not exceeding 24 in.; at 26 in. this raceway must meet the standard limit."
    - id: c
      text: "Sum the Chapter 9 Table 5 conductor areas and compare to 40% of the Table 4 internal area."
      isCorrect: true
    - id: d
      text: "Compare the conductor areas to 31% of the Table 4 internal area because only two conductor sizes are present."
      distractorRationale: "The 31% row applies to exactly two CONDUCTORS in the raceway, not two conductor sizes."
  answer: { kind: single, optionId: c }
  solution:
    keyIdea: "Mixed sizes force the area method, and at 26 in. the raceway misses the 24 in. nipple allowance."
    codePath: ["Ch.9 Table 1 (>2 conductors = 40%)", "Ch.9 Table 5 + Table 4", "Ch.9 Note 4 (nipple ≤ 24 in.)"]
    steps:
      - { text: "Different sizes in one raceway → Annex C is unavailable; use Table 5 areas." }
      - { text: "26 in. > 24 in. → not a nipple, so the 60% allowance does not apply.", ref: "Ch.9 Note 4" }
      - { text: "More than two conductors → compare the area sum to 40% of the Table 4 area.", ref: "Ch.9 Table 1" }
  trapIds: [table-column-selection]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-cond-h021
  domainId: nec.conduit-fill
  skillIds: [nec.conduit.percent-fill]
  type: single
  difficulty: 4
  stem: "A full-length conduit contains two 6 AWG THHN circuit conductors plus one 10 AWG THHN equipment grounding conductor. Which Chapter 9 Table 1 fill limit applies?"
  options:
    - id: a
      text: "31%, because the circuit has two current-carrying conductors."
      distractorRationale: "Table 1 counts ALL conductors occupying the raceway — the EGC included — not just current-carrying conductors; three conductors are present."
    - id: b
      text: "40%, because three conductors occupy the raceway."
      isCorrect: true
    - id: c
      text: "53%, because the conductors form a single circuit."
      distractorRationale: "The 53% row is for a raceway containing exactly ONE conductor, not one circuit."
    - id: d
      text: "60%, because grounding conductors are excluded from fill."
      distractorRationale: "60% is the nipple allowance for raceways ≤ 24 in.; EGCs are never excluded from conduit fill calculations."
  answer: { kind: single, optionId: b }
  solution:
    keyIdea: "Conduit fill counts physical conductors, unlike 310.15 adjustment which counts current-carrying conductors."
    codePath: ["Ch.9 Table 1", "Ch.9 Notes to Tables"]
    steps:
      - { text: "Count every conductor in the raceway: 2 circuit conductors + 1 EGC = 3." }
      - { text: "More than two conductors → 40% fill limit.", ref: "Ch.9 Table 1" }
      - { text: "Contrast: the EGC would NOT count for ampacity adjustment under 310.15(C)(1), which is a separate rule." }
  trapIds: [table-column-selection]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-cond-h022
  domainId: nec.conduit-fill
  skillIds: [nec.conduit.percent-fill]
  type: single
  difficulty: 4
  stem: "A conduit body-to-panel connection uses a raceway measuring exactly 24 in. between the enclosures. Which statement about its conductor fill is correct?"
  options:
