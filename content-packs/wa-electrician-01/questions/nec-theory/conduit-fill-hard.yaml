      - { text: "2 in. EMT: 3.356 × 0.40 = 1.3424 in² ≥ 0.8544 — minimum trade size is 2 in.", ref: "Ch.9 Table 4" }
  trapIds: [table-column-selection]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

