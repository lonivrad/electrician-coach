# ---- 53% / 31% fill overrides -------------------------------------------------
- id: q-cond-h009
  recompute: { calc: conduitMaxSameSize, inputs: { raceway: "PVC80", tradeSize: "1-1/4", size: "4/0", fillPercent: 53 } }
  domainId: nec.conduit-fill
  commonMistake: "If you got 0, you applied the 40% (>2 conductors) column — a raceway containing only ONE conductor may be filled to 53% (Ch.9 Table 1)."
  skillIds: [nec.conduit.same-size, nec.conduit.percent-fill]
  type: numeric
  difficulty: 4
  stem: "A single 4/0 AWG THHN conductor is sleeved by itself in 1-1/4 in. Schedule 80 PVC for physical protection. Applying the one-conductor fill limit of Chapter 9 Table 1, how many 4/0 THHN conductors are permitted in this sleeve? (conductors)"
  answer: { kind: numeric, value: 1, unit: "conductors", tolerance: 0 }
  solution:
    keyIdea: "One conductor gets 53% of the raceway area — and only 53% of Schedule 80's small bore fits exactly one 4/0."
    codePath: ["Ch.9 Table 1 (1 conductor = 53%)", "Ch.9 Table 4 (1-1/4 in. PVC-80 = 0.852 in²)", "Ch.9 Table 5 (4/0 THHN = 0.3237 in²)"]
    steps:
      - { text: "Usable area: 0.852 × 0.53 = 0.4516 in².", ref: "Ch.9 Table 1" }
      - { text: "0.4516 ÷ 0.3237 = 1.40 → round down to 1.", ref: "Ch.9 Table 1 Note" }
      - { text: "At 40% the sleeve would fail (0.3408 in² usable vs 0.3237 in² used barely passes for one, but the correct column is 53%)." }
  trapIds: [table-column-selection]
  timeTargetSec: 150
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

- id: q-cond-h010
  recompute: { calc: conduitMaxSameSize, inputs: { raceway: "PVC80", tradeSize: "2", size: "4/0", fillPercent: 31 } }
  domainId: nec.conduit-fill
  commonMistake: "If you got 1, you truncated 1.82 — the 0.8 round-up note applies even in the 31% two-conductor column. If you got 2 by using 40%, you used the wrong Table 1 row for two conductors."
  skillIds: [nec.conduit.same-size, nec.conduit.percent-fill]
  type: numeric
  difficulty: 5
  stem: "Exactly two 4/0 AWG THHN conductors of a 240 V circuit are pulled into 2 in. Schedule 80 PVC. Applying the two-conductor fill limit of Chapter 9 Table 1, what is the maximum number of 4/0 THHN conductors permitted? (conductors)"
  answer: { kind: numeric, value: 2, unit: "conductors", tolerance: 0 }
  solution:
    keyIdea: "Two conductors use the 31% column, and 1.82 rounds up to 2 under the ≥ 0.8 note — the installation just complies."
    codePath: ["Ch.9 Table 1 (2 conductors = 31%)", "Ch.9 Table 4 (2 in. PVC-80 = 1.905 in²)", "Ch.9 Table 5 (4/0 THHN = 0.3237 in²)", "Ch.9 Table 1 Note"]
    steps:
      - { text: "Usable area: 1.905 × 0.31 = 0.5906 in².", ref: "Ch.9 Table 1" }
      - { text: "0.5906 ÷ 0.3237 = 1.82 conductors.", ref: "Ch.9 Table 5" }
      - { text: "Decimal 0.82 ≥ 0.8 → round up to 2; the two-conductor pull is permitted.", ref: "Ch.9 Table 1 Note" }
  trapIds: [table-column-selection, next-size-up-rounding]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

# ---- Mixed-size fills: total area used (then compare to 40% of Table 4) -------
- id: q-cond-h011
  recompute:
    { calc: conduitAreaUsed, inputs: { conductors: [{ size: "3/0", count: 3 }, { size: "6", count: 1 }] } }
  domainId: nec.conduit-fill
  commonMistake: "If you got 0.8037 in², you forgot the 6 AWG equipment grounding conductor — EVERY conductor occupies fill area, including the EGC."
  skillIds: [nec.conduit.mixed-size]
  type: numeric
  difficulty: 4
  stem: "A 200 A feeder is pulled as three 3/0 AWG THHN phase conductors plus one 6 AWG THHN equipment grounding conductor. What total conductor cross-sectional area must be counted against the raceway fill? (in²)"
  answer: { kind: numeric, value: 0.8544, unit: "in²", tolerance: 0.001 }
  solution:
    keyIdea: "Mixed sizes require summing every conductor's Table 5 area — EGC included — before comparing to 40% of Table 4."
    codePath: ["Ch.9 Table 5 (3/0 THHN = 0.2679, 6 THHN = 0.0507)", "Ch.9 Table 4 (compare to 40%)"]
    steps:
      - { text: "3 × 0.2679 = 0.8037 in² for the phase conductors.", ref: "Ch.9 Table 5" }
      - { text: "Add the EGC: 0.8037 + 0.0507 = 0.8544 in²." }
      - { text: "Check: 1-1/2 in. EMT gives 2.036 × 0.40 = 0.8144 in² — too small; 2 in. EMT (1.3424 in²) is the minimum.", ref: "Ch.9 Table 4" }
  trapIds: [table-column-selection]
  timeTargetSec: 180
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft hard-tier question; SME-verify before live."

