      text: "It qualifies for 60% fill only if all conductors are the same size."
      distractorRationale: "The 60% nipple allowance has no same-size condition; mixed sizes simply use the area method against 60% of Table 4."
    - id: d
      text: "It is limited to 53% fill because it connects only two enclosures."
      distractorRationale: "53% is the one-conductor row of Table 1; the number of enclosures is irrelevant to the fill percentage."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "The nipple threshold is 'not exceeding 24 in.' — the boundary length itself qualifies for 60% fill."
    codePath: ["Ch.9 Notes to Tables, Note 4", "Ch.9 Table 1"]
    steps:
      - { text: "24 in. ≤ 24 in. → the raceway is a nipple.", ref: "Ch.9 Note 4" }
      - { text: "Nipples may be filled to 60% of the Table 4 internal area, and 310.15(C)(1) adjustment factors need not be applied." }
