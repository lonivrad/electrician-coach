# ---- Power triangle: two of three given (real / apparent / reactive) ---------
- id: q-thry-x005
  domainId: nec.theory-general
  skillIds: [nec.theory.power]
  type: single
  difficulty: 9
  stem: >-
    A power-quality meter on a facility service shows 50 kVA apparent power and
    30 kVAR reactive power (it also logs 480 V and 60.1 Hz). What REAL power (kW)
    is the facility consuming?
  options:
    - { id: a, text: "40 kW", isCorrect: true }
    - { id: b, text: "20 kW", distractorRationale: "That subtracts 50 − 30 arithmetically — real and reactive power are at right angles on the power triangle; they combine by squares, not simple subtraction." }
    - { id: c, text: "≈ 58.3 kW", distractorRationale: "That computes √(50² + 30²) — ADDING the squares treats kVA as a leg; apparent power is the HYPOTENUSE, so subtract." }
    - { id: d, text: "32 kW", distractorRationale: "That multiplies the correct 40 kW by the 0.80 power factor a second time — the triangle already produced watts; the pf is an output of this problem, not another multiplier." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "The power triangle: S² = P² + Q², so P = √(S² − Q²) — a 3-4-5 triangle here."
    codePath: ["P = √(S² − Q²)"]
    steps:
      - { text: "P = √(50² − 30²) = √(2,500 − 900) = √1,600 = 40 kW." }
      - { text: "Power factor check: 40 ÷ 50 = 0.80. The voltage and frequency readings are noise." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 210
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-thry-x006
  domainId: nec.theory-general
  skillIds: [nec.theory.power, nec.theory.three-phase]
  type: single
  difficulty: 10
  stem: >-
    A 480 V three-phase feeder serves a load metered at 36 kW real power and
    27 kVAR reactive power. What line current must the feeder conductors carry?
  options:
    - { id: a, text: "≈ 54.1 A", isCorrect: true }
    - { id: b, text: "≈ 43.3 A", distractorRationale: "That divides the 36 kW directly by √3 × 480 — conductors carry the APPARENT-power current; the reactive 27 kVAR raises the amps even though it does no work." }
    - { id: c, text: "≈ 75.8 A", distractorRationale: "That adds 36 + 27 = 63 kVA arithmetically — real and reactive power are perpendicular legs; combine them as √(36² + 27²) = 45 kVA." }
    - { id: d, text: "≈ 93.8 A", distractorRationale: "That is the single-phase result 45,000 ÷ 480 — a three-phase feeder needs the √3 in the denominator." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Build the hypotenuse first (S = √(P² + Q²)), then I = S/(√3·V) — a 3-4-5 triangle scaled by 9."
    codePath: ["S = √(P² + Q²)", "I = S/(√3·V)"]
    steps:
      - { text: "S = √(36² + 27²) = √(1,296 + 729) = √2,025 = 45 kVA." }
      - { text: "I = 45,000 ÷ (1.732 × 480) = 45,000 ÷ 831.4 ≈ 54.1 A." }
      - { text: "Power factor check: 36 ÷ 45 = 0.80." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-thry-x007
  domainId: nec.theory-general
  skillIds: [nec.theory.power]
  type: single
  difficulty: 9
  stem: >-
    A single-phase 240 V load is metered at 12 kVA apparent power with 7.2 kVAR
    of reactive power; the clamp meter shows 50 A. What would a wattmeter on this
    load read?
  options:
    - { id: a, text: "9.6 kW", isCorrect: true }
    - { id: b, text: "4.8 kW", distractorRationale: "That subtracts 12 − 7.2 arithmetically — the triangle legs combine by squares: P = √(S² − Q²), not S − Q." }
    - { id: c, text: "≈ 14.0 kW", distractorRationale: "That computes √(12² + 7.2²) — adding the squares makes the answer LARGER than the apparent power, which is impossible; real power never exceeds kVA." }
    - { id: d, text: "7.2 kW", distractorRationale: "That reports the reactive leg with the unit changed to kW — kVAR does no real work and is not what a wattmeter reads." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "P = √(S² − Q²); the wattmeter reads only the real component."
    codePath: ["P = √(S² − Q²)", "pf = P/S"]
    steps:
      - { text: "P = √(144 − 51.84) = √92.16 = 9.6 kW." }
      - { text: "Consistency: pf = 9.6 ÷ 12 = 0.80, and 240 V × 50 A = 12 kVA matches the meter." }
  trapIds: [unit-or-phase-confusion, meter-reading-vs-ampacity]
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

