    steps:
      - { text: "Branch 1: 20 + 40 = 60 Ω." }
      - { text: "Parallel bank: 1/60 + 1/30 + 1/20 = (1 + 2 + 3)/60 = 6/60 → 10 Ω." }
      - { text: "Total: 10 + 7 + 3 = 20 Ω; I = 240 ÷ 20 = 12 A." }
  timeTargetSec: 270
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

