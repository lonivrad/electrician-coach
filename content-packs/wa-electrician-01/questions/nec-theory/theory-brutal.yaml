# ---- Efficiency + pf + √3 current chains (single-choice) ----------------------
- id: q-thry-x024
  domainId: nec.theory-general
  skillIds: [nec.theory.power, nec.theory.three-phase]
  type: single
  difficulty: 10
  stem: >-
    A three-phase 460 V motor delivers 20 hp (14,920 W) at the shaft with 90%
    efficiency and 0.82 power factor. Table 430.250 lists 27 A for a 20 hp,
    460 V motor. What CALCULATED input current does the motor actually draw at
    this operating point?
  options:
    - { id: a, text: "≈ 25.4 A", isCorrect: true }
    - { id: b, text: "≈ 22.8 A", distractorRationale: "That skips efficiency — 14,920 W is the shaft OUTPUT; the motor must draw 14,920 ÷ 0.90 = 16,578 W of input real power." }
    - { id: c, text: "≈ 20.8 A", distractorRationale: "That skips the power factor — dividing input watts by √3·V alone ignores the reactive current the conductors also carry." }
    - { id: d, text: "≈ 44.0 A", distractorRationale: "That is the single-phase formula 16,578 ÷ (460 × 0.82) — a three-phase machine needs the √3 in the denominator." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Three-stage chain: output → input watts via efficiency; watts → amps via √3·V·pf. The Table 430.250 value sizes conductors, not this measurement question."
    codePath: ["Pin = Pout/eff", "I = Pin/(√3·V·pf)"]
    steps:
      - { text: "Input power: 14,920 ÷ 0.90 = 16,578 W." }
      - { text: "I = 16,578 ÷ (1.732 × 460 × 0.82) = 16,578 ÷ 653.3 ≈ 25.4 A." }
      - { text: "The 27 A table FLC is what 430.22 conductor sizing would use — a different question." }
  trapIds: [actual-current-vs-table, unit-or-phase-confusion]
  timeTargetSec: 300
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

