# ---- Feeder + branch voltage-drop budgets (single-choice reasoning) ----------
- id: q-thry-x008
  domainId: nec.theory-general
  skillIds: [nec.theory.ohms-law]
  type: single
  difficulty: 10
  stem: >-
    A 240 V single-phase service uses the 210.19(A) Informational Note guidance:
    feeder plus branch circuit together should not exceed 5% voltage drop. The
    feeder is 1/0 AWG copper (105,600 cmil), 160 ft one-way, carrying 100 A
    (K = 12.9). The panel also feeds a 20 A spare. How much voltage drop
    remains available for the branch circuit beyond the panel?
  options:
    - { id: a, text: "≈ 8.1 V", isCorrect: true }
    - { id: b, text: "≈ 3.3 V", distractorRationale: "That budgets only 3% total (7.2 V) — 3% is the guideline for the branch circuit ALONE; the combined feeder-plus-branch guideline is 5%." }
    - { id: c, text: "≈ 4.2 V", distractorRationale: "That computes the feeder drop with the 320 ft round-trip length AND the factor of 2 (7.82 V) — the 2 in the formula already accounts for the return conductor." }
    - { id: d, text: "≈ 10.1 V", distractorRationale: "That drops the factor of 2 from the feeder calculation (1.95 V used) — a single-phase feeder drops voltage in both conductors." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Compute the feeder segment numerically, then subtract it from the 5% combined budget; what is left belongs to the branch."
    codePath: ["Budget = 5% × 240 = 12 V", "VDfeeder = 2·K·I·D/cmil", "branch allowance = budget − feeder"]
    steps:
      - { text: "Total budget: 0.05 × 240 = 12 V." }
      - { text: "Feeder: 2 × 12.9 × 100 × 160 ÷ 105,600 = 412,800 ÷ 105,600 = 3.91 V." }
      - { text: "Remaining for the branch: 12 − 3.91 ≈ 8.1 V (the 20 A spare is a decoy)." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 300
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-thry-x021
  domainId: nec.theory-general
  skillIds: [nec.theory.three-phase, nec.theory.ohms-law]
  type: single
  difficulty: 9
  stem: >-
    On a 208 V three-phase system, the design limits combined feeder-plus-branch
    voltage drop to 5% of nominal. A branch circuit runs 10 AWG copper
    (10,380 cmil), 95 ft one-way, at 24 A per line (K = 12.9). The branch OCPD
    is 30 A. How much drop is left for the feeder ahead of the panel?
  options:
    - { id: a, text: "≈ 5.5 V", isCorrect: true }
    - { id: b, text: "≈ 4.7 V", distractorRationale: "That computes the branch drop with the single-phase factor of 2 (5.67 V) — a three-phase circuit uses √3, leaving more budget, not less." }
    - { id: c, text: "≈ 1.3 V", distractorRationale: "That uses a 3% total budget (6.24 V) — the stem sets the COMBINED limit at 5%; 3% is the per-segment guideline." }
    - { id: d, text: "10.4 V", distractorRationale: "That is the entire 5% budget — it ignores the branch segment already consuming part of it." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Compute the branch segment with the √3 formula, subtract from the 5% budget."
    codePath: ["Budget = 5% × 208 = 10.4 V", "VDbranch = √3·K·I·D/cmil", "feeder allowance = budget − branch"]
    steps:
      - { text: "Budget: 0.05 × 208 = 10.4 V." }
      - { text: "Branch: 1.732 × 12.9 × 24 × 95 ÷ 10,380 = 50,943 ÷ 10,380 = 4.91 V." }
      - { text: "Feeder allowance: 10.4 − 4.91 ≈ 5.5 V. The 30 A OCPD rating plays no role." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 300
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-thry-x022
  domainId: nec.theory-general
  skillIds: [nec.theory.three-phase, nec.theory.power]
  type: single
  difficulty: 10
  stem: >-
    A 480 V three-phase feeder, 300 ft one-way, copper (K = 12.9), must deliver
    45 kW of REAL power at 0.80... corrected: at 0.85 power factor, and the
    designer caps the FEEDER voltage drop at 2% of nominal (overall system
    budget is 5%). What is the minimum conductor size by circular-mil area
    (Ch. 9 Table 8)?
  options:
    - { id: a, text: "3 AWG (52,620 cmil)", isCorrect: true }
    - { id: b, text: "4 AWG (41,740 cmil)", distractorRationale: "That sizes for I = 45,000/(√3·480) = 54.1 A — treating the 45 kW as kVA. At pf 0.85 the conductors carry 63.7 A, and 41,740 cmil falls short of the required 44,463 cmil." }
    - { id: c, text: "1/0 AWG (105,600 cmil)", distractorRationale: "That uses the 600 ft round-trip distance — the √3 (or 2) factor in the formula already accounts for the return path; use the one-way length." }
    - { id: d, text: "6 AWG (26,240 cmil)", distractorRationale: "That budgets the full 5% system allowance (24 V) to the feeder — the stem caps the FEEDER alone at 2% (9.6 V)." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "kW → line amps via √3·V·pf, solve cmil = √3·K·I·D/VDmax, round UP to the next standard size."
    codePath: ["I = P/(√3·V·pf)", "VDmax = 2% × 480 = 9.6 V", "cmil = √3·K·I·D/VD", "Ch.9 Table 8"]
    steps:
      - { text: "Line current: 45,000 ÷ (1.732 × 480 × 0.85) = 45,000 ÷ 706.7 = 63.68 A." }
      - { text: "Allowable drop: 0.02 × 480 = 9.6 V." }
      - { text: "Required cmil = 1.732 × 12.9 × 63.68 × 300 ÷ 9.6 = 426,848 ÷ 9.6 = 44,463 cmil." }
      - { text: "4 AWG (41,740) is too small; 3 AWG (52,620) is the first size at or above 44,463 cmil." }
  trapIds: [unit-or-phase-confusion, next-size-up-rounding]
  timeTargetSec: 300
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
