  recompute: { calc: power1ph, inputs: { volts: 240, amps: 18, pf: 0.9 } }
  domainId: nec.theory-general
  commonMistake: "If you got 4,320, that is the apparent power in VA — real power (watts) is V·I·pf."
  skillIds: [nec.theory.power]
  type: numeric
  difficulty: 5
  stem: >-
    A single-phase 240 V pump motor draws 18 A while running, and its
    nameplate lists a power factor of 0.90. What real power (W) is the motor
    taking from the line?
  answer: { kind: numeric, value: 3888, unit: "W", tolerance: 2 }
  solution:
    keyIdea: "Real power is P = V × I × pf; V × I alone is volt-amperes."
    codePath: ["P = V·I·pf"]
