# ---- Wye / delta line-vs-phase relationships (single-choice) -------------------
- id: q-thry-m019
  domainId: nec.theory-general
  skillIds: [nec.theory.three-phase]
  type: single
  difficulty: 5
  stem: >-
    A luminaire is connected from one ungrounded conductor to the neutral on a
    480Y/277 V wye system. What voltage does the luminaire operate at?
  options:
    - { id: a, text: "277 V", isCorrect: true }
    - { id: b, text: "480 V", distractorRationale: "480 V is the LINE-TO-LINE voltage — a line-to-neutral connection sees the phase voltage, which is 480 ÷ √3." }
    - { id: c, text: "240 V", distractorRationale: "That halves 480 — wye phase voltage is line voltage divided by √3 (1.732), not by 2." }
    - { id: d, text: "120 V", distractorRationale: "120 V is the line-to-neutral value on a 208Y/120 system — this is a 480 V wye, where line-to-neutral is 277 V." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Wye: V(line-to-neutral) = V(line-to-line) ÷ √3; 480 ÷ 1.732 = 277 V."
    codePath: ["Wye relationships: VLL = √3·VLN"]
    steps:
      - { text: "480 ÷ 1.732 = 277 V — the system designation 480Y/277 states both values." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 75
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-thry-m020
  domainId: nec.theory-general
  skillIds: [nec.theory.three-phase]
  type: single
  difficulty: 5
  stem: >-
    A transformer bank supplies a 240 V three-phase DELTA system. What voltage
    appears across each individual transformer winding (phase) of the delta?
  options:
    - { id: a, text: "240 V", isCorrect: true }
    - { id: b, text: "139 V", distractorRationale: "That divides 240 by √3 — the wye rule. In a delta, each winding connects directly line-to-line, so phase voltage EQUALS line voltage." }
    - { id: c, text: "416 V", distractorRationale: "That multiplies by √3 — no delta quantity is √3 times the line voltage; in a delta the √3 shows up on the CURRENT side." }
    - { id: d, text: "120 V", distractorRationale: "That halves the line voltage — a 120 V value only appears on a delta via a center-tapped winding, not across a full winding." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Delta: V(phase) = V(line) because each winding spans two lines; the √3 applies to current instead."
    codePath: ["Delta relationships: VLL = Vφ, IL = √3·Iφ"]
    steps:
      - { text: "Each delta winding is connected line-to-line, so it sees the full 240 V." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 75
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-thry-m021
  domainId: nec.theory-general
  skillIds: [nec.theory.three-phase]
  type: single
  difficulty: 6
  stem: >-
    The line conductors feeding a balanced delta-connected load each carry
    26 A. Approximately what current flows in each phase winding of the delta?
  options:
    - { id: a, text: "≈ 15 A", isCorrect: true }
    - { id: b, text: "26 A", distractorRationale: "That applies the WYE rule (line = phase current). In a delta, each line splits between two windings, so winding current = line current ÷ √3." }
    - { id: c, text: "≈ 45 A", distractorRationale: "That MULTIPLIES 26 by √3 — winding current in a delta is always SMALLER than line current; the √3 divides going from line to phase." }
    - { id: d, text: "13 A", distractorRationale: "That halves the line current — the two windings at each terminal are 120° apart, so the split is by √3 (1.732), not by 2." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Delta: I(phase) = I(line) ÷ √3 — the mirror of finding line current from winding current."
    codePath: ["Delta relationships: IL = √3·Iφ, solved for Iφ"]
    steps:
      - { text: "Iφ = 26 ÷ 1.732 ≈ 15 A per winding." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 100
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

- id: q-thry-m022
  domainId: nec.theory-general
  skillIds: [nec.theory.three-phase]
  type: single
  difficulty: 6
  stem: >-
    On a wye-connected system, each line-to-neutral (phase) voltage measures
    120 V. What voltage will you read between any two ungrounded (line)
    conductors?
  options:
    - { id: a, text: "208 V", isCorrect: true }
    - { id: b, text: "240 V", distractorRationale: "That doubles 120 V — the two phase voltages are 120° apart, so they combine vectorially to √3 × 120, not arithmetically to 2 × 120." }
    - { id: c, text: "120 V", distractorRationale: "120 V is the line-to-NEUTRAL reading — between two ungrounded conductors of a wye you read the larger line-to-line value." }
    - { id: d, text: "180 V", distractorRationale: "That multiplies by 1.5 — the wye factor is √3 ≈ 1.732, giving 208 V, not 180 V." }
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Wye: V(line-to-line) = √3 × V(line-to-neutral); phasors 120° apart add to √3×, not 2×."
    codePath: ["Wye relationships: VLL = √3·VLN"]
    steps:
      - { text: "120 × 1.732 = 208 V — the familiar 208Y/120 designation." }
  trapIds: [unit-or-phase-confusion]
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

