# Electrical theory — MID tier (difficulty 5–6). Scenario-framed single-formula problems:
# Ohm's law, 1φ/3φ power with pf, direct voltage drop, wye/delta relationships, cmil ratios. All DRAFT; K = 12.9 Cu / 21.2 Al.

# ---- Ohm's law in a scenario (I = V / R) -------------------------------------
- id: q-thry-m001
  recompute: { calc: ohmsCurrent, inputs: { volts: 240, ohms: 16 } }
  domainId: nec.theory-general
  commonMistake: "The nameplate wattage is a decoy — with the measured resistance and voltage in hand, I = V/R gets you there directly (and 3,600 W ÷ 240 V confirms it)."
  skillIds: [nec.theory.ohms-law]
  type: numeric
  difficulty: 5
  stem: >-
    A 240 V resistance heater element is nameplated 3,600 W. Your ohmmeter
    confirms the element measures 16 Ω cold. Treating the resistance as
    constant, what current (A) does the element draw at 240 V?
  answer: { kind: numeric, value: 15, unit: "A", tolerance: 0.05 }
  solution:
    keyIdea: "With voltage and resistance known, current is I = V/R."
    codePath: ["Ohm's law: I = V/R"]
    steps:
      - { text: "I = 240 ÷ 16 = 15 A." }
      - { text: "Cross-check with the nameplate: 3,600 W ÷ 240 V = 15 A — consistent." }
  timeTargetSec: 75
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Draft mid-tier question; SME-verify before live."

