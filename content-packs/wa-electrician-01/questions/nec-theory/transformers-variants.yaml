# ---- Line current (VA / V or VA / (√3·V)) ----------------------------------
- id: q-xf-101
  recompute: { calc: transformerCurrent, inputs: { kva: 45, volts: 208, phase: 3 } }
  domainId: nec.transformers
  commonMistake: "For three-phase, divide by √3 × line voltage, not just the voltage."
  skillIds: [nec.xfmr.secondary]
  type: numeric
  difficulty: 2
  stem: "What is the secondary line current (A) of a 45 kVA, three-phase transformer with a 208 V secondary?"
  answer: { kind: numeric, value: 124.9, unit: "A", tolerance: 0.5 }
  solution:
    keyIdea: "3φ current = VA / (√3 × line-to-line voltage)."
    codePath: ["I = VA / (√3·V)"]
    steps:
      - { text: "45,000 ÷ (1.732 × 208) = 45,000 ÷ 360.3 = 124.9 A." }
  timeTargetSec: 90
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Calculator-backed (transformerCurrent)."

