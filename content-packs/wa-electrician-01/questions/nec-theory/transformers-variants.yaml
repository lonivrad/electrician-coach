# ---- Primary-only overcurrent protection (450.3(B), ≤600 V) -----------------
- id: q-xf-111
  recompute: { calc: transformerPrimaryOCP, inputs: { kva: 45, volts: 480, phase: 3 } }
  domainId: nec.transformers
  commonMistake: "Size the primary OCP at 125% of the primary FLC, then round UP to a standard size."
  skillIds: [nec.xfmr.ocp-sizing]
  type: numeric
  difficulty: 3
  stem: "A 45 kVA, three-phase, 480 V transformer is protected by a primary overcurrent device only. Per Table 450.3(B) at 125%, what standard OCPD rating (A) is used?"
  answer: { kind: numeric, value: 70, unit: "A", tolerance: 0 }
  solution:
    keyIdea: "Primary FLC × 125%, rounded up to a standard size (Note 1)."
    codePath: ["I = VA/(√3·V)", "Table 450.3(B)", "240.6(A)"]
    steps:
      - { text: "FLC = 45,000 ÷ 831.4 = 54.1 A." }
      - { text: "54.1 × 1.25 = 67.7 A → next standard 70 A." }
  timeTargetSec: 120
  modes: [diagnostic, board, overtrain]
  status: draft
  version: 1
  note: "Calculator-backed (transformerPrimaryOCP)."

