# Box fill (314.16) — BRUTAL tier (difficulty 9–10). 2020 NEC. All DRAFT.
# Circuit-by-circuit conductor counting (pass-throughs, long loops ×2, pigtails ×0), mixed-size yokes, knife-edge does-it-pass adjudications within 0.25 in³, miscount distractors. SME-verify before live.

# ---- Circuit-by-circuit multi-gang counts with mixed-size yokes ----------------
- id: q-box-x001
  recompute: { calc: boxFill, inputs: { conductors: { "12": 4, "14": 7 }, clampSize: "12", deviceCount: 1, deviceSize: "12", egcSize: "12" } }
  domainId: nec.box-fill
  commonMistake: "If you got 32.5, you counted the switch yoke at 12 AWG — only 14 AWG lands on the switch, so its yoke is 2 × 2.00. If you got 31.75, you sized the EGC allowance at 14 AWG; the largest EGC in the box is 12 AWG."
  skillIds: [nec.box.conductor-count, nec.box.largest-conductor, nec.box.device-clamp-allowance, nec.box.egc-allowance]
  type: numeric
  difficulty: 9
  stem: "A two-gang box with internal cable clamps serves two circuits. Circuit 1 (20 A): a 12/2 w/ground NM cable enters, and a second 12/2 w/ground leaves to the next outlet; a duplex receptacle has only 12 AWG landed on it. Circuit 2 (15 A): a 14/2 w/ground enters and a 14/3 w/ground leaves to a switched luminaire and fan; a single-pole switch has only 14 AWG landed on it. Six wirenuts are used. What minimum box volume (in³) does 314.16(B) require?"
  answer: { kind: numeric, value: 32.0, unit: "in³", tolerance: 0.01 }
  solution:
    keyIdea: "Count conductors circuit by circuit, then size EACH yoke by the largest conductor connected to THAT yoke — 12 AWG for the receptacle, 14 AWG for the switch."
    codePath: ["314.16(B)(1)", "314.16(B)(2)", "314.16(B)(4) per yoke", "314.16(B)(5)", "Table 314.16(B)"]
    steps:
      - { text: "Circuit 1 conductors: 2 + 2 = 4 × 2.25 = 9.00 in³. Circuit 2: 2 + 3 = 5 × 2.00 = 10.00 in³. Wirenuts count nothing.", ref: "314.16(B)(1)" }
      - { text: "Clamps = one allowance at the largest conductor in the box (12 AWG): 2.25 in³.", ref: "314.16(B)(2)" }
      - { text: "Receptacle yoke: 2 × 2.25 = 4.50 in³ (12 AWG connected). Switch yoke: 2 × 2.00 = 4.00 in³ (only 14 AWG connected).", ref: "314.16(B)(4)" }
      - { text: "All EGCs = one allowance at the largest EGC (12 AWG): 2.25 in³.", ref: "314.16(B)(5)" }
      - { text: "Total = 9.00 + 10.00 + 2.25 + 4.50 + 4.00 + 2.25 = 32.00 in³." }
  timeTargetSec: 240
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

- id: q-box-x002
  recompute: { calc: boxFill, inputs: { conductors: { "10": 4, "12": 4 }, clampSize: "10", deviceCount: 1, deviceSize: "12", egcSize: "10" } }
  domainId: nec.box-fill
  commonMistake: "If you got 23.5, you counted the two looped 10 AWG conductors once each — their loops are at least twice the 300.14 minimum, so each counts TWICE. If you got 28.0, you also sized the EGC allowance at 12 AWG instead of the largest EGC (10 AWG)."
