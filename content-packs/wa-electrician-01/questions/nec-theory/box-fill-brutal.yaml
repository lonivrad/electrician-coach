  note: "Draft brutal-tier question; SME-verify before live."

# ---- Does-this-box-pass, fill within 0.25 in³ of the limit ---------------------
- id: q-box-x003
  domainId: nec.box-fill
  skillIds: [nec.box.conductor-count, nec.box.device-clamp-allowance, nec.box.egc-allowance, nec.box.largest-conductor]
  type: single
  difficulty: 10
  stem: "A 4 in. square box marked 30.3 in³ has internal cable clamps and four cables: a 12/3 w/ground and a 12/2 w/ground (all five 12 AWG circuit conductors spliced, with a duplex receptacle on which only 12 AWG is landed), plus a 14/2 w/ground and a 14/3 w/ground whose five 14 AWG conductors are spliced straight through to downstream outlets. All four EGCs are joined. Is this installation permitted under 314.16?"
  options:
    - id: a
      text: "Yes — the required fill is 30.25 in³, 0.05 in³ under the 30.3 in³ marking."
      isCorrect: true
    - id: b
      text: "Yes — the required fill is 29.75 in³ because the receptacle yoke counts at 14 AWG."
      distractorRationale: "The yoke allowance uses the largest conductor CONNECTED to the yoke — 12 AWG — so it is 2 × 2.25 = 4.50, not 2 × 2.00. The verdict happens to match, but the fill is wrong by 0.50 in³, which would flip a tighter box."
    - id: c
      text: "Yes — the required fill is 28.0 in³; the clamp allowance is not required because the cables are also stapled outside the box."
      distractorRationale: "External stapling is irrelevant — internal clamps take one allowance of the largest conductor in the box (2.25 in³) under 314.16(B)(2). Omitting it understates the fill by 2.25 in³."
    - id: d
      text: "No — the required fill is 37.0 in³ because each of the four EGCs takes its own allowance."
      distractorRationale: "All EGCs together contribute ONE allowance at the largest EGC (2.25 in³), not one each; adding three phantom allowances (6.75 in³) wrongly fails a compliant box."
  answer: { kind: single, optionId: a }
  solution:
    keyIdea: "Every allowance category done exactly right lands 0.05 in³ under the marked volume — one category miscounted flips the verdict or the number."
    codePath: ["314.16(A)", "314.16(B)(1)", "314.16(B)(2)", "314.16(B)(4)", "314.16(B)(5)", "Table 314.16(B)"]
    steps:
      - { text: "12 AWG: 3 + 2 = 5 × 2.25 = 11.25 in³. 14 AWG: 2 + 3 = 5 × 2.00 = 10.00 in³.", ref: "314.16(B)(1)" }
      - { text: "Clamps = 2.25 in³ (largest in box is 12 AWG).", ref: "314.16(B)(2)" }
      - { text: "Receptacle yoke = 2 × 2.25 = 4.50 in³. All EGCs = one 12 AWG allowance = 2.25 in³.", ref: "314.16(B)(4)-(5)" }
      - { text: "Required = 11.25 + 10.00 + 2.25 + 4.50 + 2.25 = 30.25 in³ ≤ 30.3 in³ marked → permitted.", ref: "314.16(A)" }
  timeTargetSec: 300
  modes: [diagnostic, board, overtrain]
  status: live
  version: 1
  note: "Draft brutal-tier question; SME-verify before live."

