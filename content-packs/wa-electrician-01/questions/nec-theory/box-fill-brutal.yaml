      - { text: "Clamps = one 10 AWG allowance (largest in box): 2.50 in³.", ref: "314.16(B)(2)" }
      - { text: "Receptacle yoke = 2 × 2.25 = 4.50 in³ (largest connected is 12 AWG).", ref: "314.16(B)(4)" }
      - { text: "All EGCs = one 10 AWG allowance (largest EGC): 2.50 in³.", ref: "314.16(B)(5)" }
      - { text: "Total = 10.00 + 9.00 + 2.50 + 4.50 + 2.50 = 28.50 in³." }
