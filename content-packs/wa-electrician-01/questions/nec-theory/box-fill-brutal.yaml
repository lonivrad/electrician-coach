  stem: "A box with internal cable clamps contains: a 10/2 w/ground cable whose two circuit conductors pass through unbroken, each with a loop longer than twice the minimum free-conductor length of 300.14; two 12/2 w/ground cables whose four circuit conductors are spliced and feed a duplex receptacle (only 12 AWG lands on it); and equipment grounding conductors of 10 AWG and 12 AWG. The 10 AWG circuit is protected at 30 A and the 12 AWG at 20 A. What minimum box volume (in³) is required?"
  answer: { kind: numeric, value: 28.5, unit: "in³", tolerance: 0.01 }
