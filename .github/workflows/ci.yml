# Developer CI — never surfaced to end users. Runs the same gate used locally.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · typecheck · validate · test+coverage · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Validate content pack
        run: npm run validate:pack

      - name: Test (with coverage gate)
        run: npm run test:coverage

      - name: Build
        run: npm run build
